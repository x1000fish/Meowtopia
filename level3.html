<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meowtopia - Level 3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #FEF3C7; color: #000; }
        .hidden { display: none !important; }
        .main-layout { display: flex; align-items: flex-start; justify-content: center; gap: 20px; margin-top: 20px; }
        .game-canvas { position: relative; width: 850px; height: 500px; background: #EEE8D3; border: 8px solid #000; border-radius: 40px; overflow: hidden; }
        .node { width: 140px; height: 140px; background: white; border: 6px solid #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: absolute; box-shadow: 3px 3px 0 #000; z-index: 20; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .node img { width: 110px; height: auto; }
        .fixed-number { position: absolute; bottom: -5px; right: 50px; font-size: 22px; font-weight: 900; color: #000; pointer-events: none; z-index: 25; }
        .connection-line { position: absolute; background: #000; cursor: pointer; z-index: 10; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .multi-toggle-btn { background: #c76419; border: 4px solid #000; border-radius: 20px; padding: 5px 15px; font-weight: 900; font-size: 20px; color: white; cursor: pointer; box-shadow: 0 4px 0 #000; transition: all 0.1s; }
        .multi-toggle-btn.active-mode { background: #2b66e5; }
        .line-highlight { background: #ffc822 !important; box-shadow: 0 0 15px rgba(251, 191, 36, 0.8) !important; }
        .connection-line:hover { background: #ffc822; box-shadow: 0 0 15px rgba(251, 191, 36, 0.5); }
        .line-h { height: 8px; width: 300px; }
        .line-v { width: 8px; height: 250px; }
        .fish-wrapper { position: absolute; width: 80px; pointer-events: none; z-index: 30; display: flex; flex-direction: column; align-items: center; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .fish-wrapper img { width: 70px; height: auto; }
        .fish-label { background: #000000b6; color: #fff; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; margin-bottom: -47px; z-index: 5; position: relative; top: -10px; }
        .game-btn { cursor: pointer; border: 5px solid #000; border-radius: 60px; padding: 12px; font-size: 26px; font-weight: 900; color: white; text-shadow: 2px 2px 0 #000; box-shadow: 0 4px 0 #000; position: relative; transition: all 0.1s; display: inline-block; }
        .game-btn:active { top: 6px; box-shadow: 0 2px 0 #000; }
        .btn-red { background: #EF4444; }
        .btn-green { background: #22C55E; }
        .gate-btn-v2 { background: #e0e0e0; border: 2.5px solid #000; border-radius: 30px; padding: 5px; font-weight: 800; font-size: 16px; color: #000; cursor: pointer; box-shadow: 0 3px 6px rgba(0,0,0,0.1); transition: all 0.1s; text-align: center; }
        .gate-btn-v2:active { transform: translateY(2px); box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .gate-btn-v2:hover, .func-btn:hover { background-color: #fee58b !important; border-color: #000 !important; color: #000 !important; box-shadow: 0 0 5px rgba(0, 0, 0, 0.7), 0 3px 0 #000 !important; transform: translateY(-2px); }
        .func-btn { width: 100%; margin-top: 5px; padding: 14px; border-radius: 35px; font-weight: 900; font-size: 16px; border: 2.5px solid #000; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.1); }
        .btn-reset { background: #e0e0e0; color: #000; }
        .btn-undo { background: #e8a098 !important; color: #fff !important; border: 2.5px solid #cb867d !important; opacity: 0.6; cursor: not-allowed; }
        .btn-undo.active { background: #EF4444 !important; border-color: #000 !important; color: #fff !important; opacity: 1; cursor: pointer; box-shadow: 0 4px 0 #000; }
        .btn-undo.active:hover { background-color: #DC2626 !important; transform: translateY(-2px); box-shadow: 0 6px 0 #000; animation: pulse-red-undo 1.2s infinite ease-in-out !important; }
        .btn-undo.disabled { background: #e8a098 !important; border-color: #cb867d !important; color: #ffffff !important; cursor: not-allowed; opacity: 0.5; }
        #pro-panel { width: 0; opacity: 0; height: 500px; overflow: hidden; background: #ffffff; border: 0px solid #000; border-radius: 40px; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .pro-active #pro-panel { width: 320px; opacity: 1; border: 8px solid #000; padding: 20px; }
        .panel-section-title { font-weight: 900; font-size: 18px; margin-bottom: 10px; margin-top: 10px; color: #000; text-align: center; white-space: nowrap; overflow: hidden; }
        .pro-active #node-0, .pro-active #node-2 { left: 65px !important; }
        .pro-active #node-1, .pro-active #node-3 { left: 405px !important; }
        .pro-active .line-h { left: 130px !important; }
        .pro-active .line-v:nth-of-type(3) { left: 130px !important; }
        .pro-active .line-v:nth-of-type(4) { left: 470px !important; }
        .pro-active #fish-0, .pro-active #fish-2 { left: 95px; }
        .pro-active #fish-1, .pro-active #fish-3 { left: 435px; }
        #circuit-area { width: 900px; height: 0; opacity: 0; background: #ffffff; border: 0px solid #000; border-radius: 30px; margin-top: 20px; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); position: relative; padding: 0 15px; overflow: hidden; }
        .pro-active #circuit-area { height: 170px; opacity: 1; border: 8px solid #000; padding: 15px; }
        .circuit-title { text-align: center; font-weight: 900; font-size: 1.25rem; margin-bottom: 8px; color: #000; }
        #circuit-content-wrapper { position: relative; height: 130px; overflow-x: auto !important; overflow-y: hidden; margin-left: 30px; }
        #circuit-content { display: flex; height: 100%; padding: 0 7px; min-width: 100%; width: max-content; position: relative; background-image: linear-gradient(#000, #000), linear-gradient(#000, #000); background-size: 100% 3px; background-repeat: no-repeat; background-position: 0 20px, 0 60px; }
        .qubit-label { position: absolute; left: 12px; font-weight: 900; font-size: 16px; color: #000; z-index: 5; }
        .circuit-unit { min-width: 48px; height: 85px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; cursor: pointer; transition: all 0.2s; }
        .circuit-unit:hover { background: rgba(239, 68, 68, 0.2); border-radius: 12px; }
        .circuit-unit.selected-gate { background: rgba(40, 180, 255, 0.4) !important; border-radius: 12px; box-shadow: inset 0 0 0 3px #2a5cad !important; }
        .control-dot { width: 14px; height: 14px; background: black; border-radius: 50%; position: absolute; z-index: 5; }
        .connection-v-line { position: absolute; width: 2.5px; background: black; z-index: 3; }
        .circuit-target { position: absolute; width: 22px; height: 22px; border-radius: 50%; background: #fff; border: 2px solid #000; display: flex; align-items: center; justify-content: center; z-index: 15; transform: translate(-50%, -50%); }
        .circuit-target::before { content: ""; position: absolute; width: 2.5px; height: 100%; background-color: #000; }
        .circuit-target::after { content: ""; position: absolute; width: 100%; height: 2.5px; background-color: #000; }
        #pro-guide-mask { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); z-index: 900; display: none; }
        #guide-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 450; display: flex; }
        #guide-hint-text { position: fixed; background: #ffc822; color: #000; padding: 4px 12px; border-radius: 9999px; font-weight: 900; font-size: 16px; z-index: 1000; display: none; transition: all 0.3s; min-width: 150px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); text-align: center; }
        .next-btn { margin-top: 8px; background: #000; color: #fff; padding: 4px 12px; border-radius: 10px; font-size: 14px; cursor: pointer; border: none; font-weight: 900; }
        .lock-btn { opacity: 0.4; cursor: not-allowed !important; pointer-events: none !important; filter: grayscale(1); }
        .highlight-focus { position: relative !important; z-index: 950 !important; pointer-events: auto !important; animation: pulse-btn-border 1.5s infinite ease-in-out !important; }
        .highlight-static { position: relative !important; z-index: 950 !important; border-color: #ffc822 !important; box-shadow: 0 0 25px #ffc822 !important; pointer-events: auto !important; }
        .highlight-canvas-obj { position: absolute !important; z-index: 950 !important; box-shadow: 0 0 30px 10px #ffc822 !important; pointer-events: auto !important; }
        .fish-top-layer { z-index: 951 !important; }
        .gate-btn-v2.highlight-focus:hover, .func-btn.highlight-focus:hover { animation-play-state: paused !important; border-color: #ffc822 !important; border-width: 3px !important; background-color: #fee58b !important; box-shadow: 0 4px 0 #000, 0 0 20px #ffc822 !important; transform: scale(1.05) !important; }
        #circuit-area.tutorial-active { z-index: 910 !important; position: relative !important; background: #ffffff !important; transition: none !important; }
        .circuit-unit.highlight-focus { z-index: 1001 !important; pointer-events: auto !important; animation: pulse-circuit 1.5s infinite ease-in-out !important; border-radius: 12px; }
        #circuit-content-wrapper { position: relative; height: 130px; overflow-x: auto !important; overflow-y: visible !important; margin-left: 30px; padding-top: 4px; }
        .highlight-focus:hover { animation-play-state: paused !important; border-color: #ffc822 !important; transform: scale(1) !important; }
        .mode-toggle-fixed { position: fixed; top: 20px; right: 20px; width: 70px; height: 70px; background: white; border: 5px solid #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; box-shadow: 0 4px 0 #000; z-index: 500; }
        .start-hint-banner { position: fixed; top: 100px; right: 15px; z-index: 600; pointer-events: none; display: flex; flex-direction: column; align-items: flex-end; animation: tap-anim 1.5s infinite; }
        .hint-pill { background: #ffc822; color: #000; font-weight: 900; padding: 4px 12px; border-radius: 9999px; font-size: 16px; margin-top: 8px; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1100; }
        .modal-content { background: #F8F3DC; border: 8px solid #000; border-radius: 40px; padding: 30px; text-align: center; width: 380px; box-shadow: 0 10px 0 #000; }
        .no-fish-anim .fish-wrapper, .no-fish-anim .node { transition: none !important; }
        @keyframes yellow-pulse { 0%, 100% { box-shadow: 0 4px 0 #000, 0 0 5px #ffc822; border-color: #000; } 35% { box-shadow: 0 4px 0 #000, 0 0 30px #ffc822; border-color: #ffc822; transform: scale(1.1); } }
        @keyframes tap-anim { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes pulse-red-undo { 0%, 100% { transform: scale(1); box-shadow: 0 4px 0 #000; } 50% { transform: scale(1.05); box-shadow: 0 0 20px #EF4444, 0 4px 0 #000; } }
        @keyframes pulse-btn-border { 0%, 100% { border-color: #000; transform: scale(1); } 50% { border-color: #ffc822; transform: scale(1.05); box-shadow: 0 0 15px #ffc822; } }
        @keyframes pulse-circuit { 0%, 100% { box-shadow: 0 0 5px #ffc822; } 50% { box-shadow: 0 0 15px #ffc822; } }
        .yellow-glow { animation: yellow-pulse 1.5s infinite ease-in-out; z-index: 501 !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4" id="body-root">
    <div id="pro-guide-mask"></div><div id="guide-hint-text"></div><div id="guide-overlay"></div>
    <div id="mode-toggle-container">
        <div id="mode-toggle" class="mode-toggle-fixed yellow-glow" onclick="togglePro()">👁️</div>
        <div id="start-hint" class="start-hint-banner"><span class="text-5xl">👆🏻</span><div class="hint-pill">CLICK TO START PRO MODE</div></div>
    </div>
    <div class="w-full max-w-4xl">
        <div class="flex justify-between w-full px-4 mb-4 items-center">
            <div class="text-3xl font-black">STEPS: <span id="step-count">0</span> | TIME: <span id="timer">0</span>s</div>
            <button id="mode-2-btn" class="multi-toggle-btn" onclick="toggleMode2()">Mode: 1</button>
            <div class="text-3xl font-black text-green-600">LEVEL 3</div>
        </div>
        <div class="main-layout">
            <div id="pro-panel">
                <div class="panel-section-title">Quantum Gate</div>
                <div class="grid grid-cols-2 gap-4 w-full" id="gate-container">
                    <button id="gate-x0" class="gate-btn-v2" onclick="applyGate('X0')">X q0</button>
                    <button id="gate-x1" class="gate-btn-v2" onclick="applyGate('X1')">X q1</button>
                    <button id="gate-cx01" class="gate-btn-v2" onclick="applyGate('CX01')">1CNOT q0→q1</button>
                    <button id="gate-c0x01" class="gate-btn-v2" onclick="applyGate('C0X01')">0CNOT q0→q1</button>
                    <button id="gate-cx10" class="gate-btn-v2" onclick="applyGate('CX10')">1CNOT q1→q0</button>
                    <button id="gate-c0x10" class="gate-btn-v2" onclick="applyGate('C0X10')">0CNOT q1→q0</button>
                </div>
                <div class="panel-section-title">Control</div>
                <button id="reset-btn" class="func-btn btn-reset" onclick="resetCircuit()">Reset Circuit</button>
                <button id="undo-btn" class="func-btn btn-undo" onclick="undo()">Undo Last Step</button>
            </div>
            <div class="game-canvas" id="main-canvas">
                <div id="line-00-01" class="connection-line line-h" style="top: 95px; left: 280px;" 
                     onclick="handleLineClick('H', 'C0X01')" onmouseover="syncHighlight('H', true)" onmouseout="syncHighlight('H', false)"></div>
                <div id="line-10-11" class="connection-line line-h" style="bottom: 90px; left: 280px;" 
                     onclick="handleLineClick('H', 'CX01')" onmouseover="syncHighlight('H', true)" onmouseout="syncHighlight('H', false)"></div>
                <div id="line-00-10" class="connection-line line-v" style="top: 150px; left: 221px;" 
                     onclick="handleLineClick('V', 'C0X10')" onmouseover="syncHighlight('V', true)" onmouseout="syncHighlight('V', false)"></div>
                <div id="line-01-11" class="connection-line line-v" style="top: 150px; left: 571px;" 
                     onclick="handleLineClick('V', 'CX10')" onmouseover="syncHighlight('V', true)" onmouseout="syncHighlight('V', false)"></div>

                <div class="node" id="node-0" style="top: 25px; left: 155px;"><div class="fixed-number">00</div><img src="./image/Cat1.svg"></div>
                <div class="node" id="node-1" style="top: 25px; left: 505px;"><div class="fixed-number">01</div><img src="./image/Cat2.svg"></div>
                <div class="node" id="node-2" style="bottom: 25px; left: 155px;"><div class="fixed-number">10</div><img src="./image/Cat3.svg"></div>
                <div class="node" id="node-3" style="bottom: 25px; left: 505px;"><div class="fixed-number">11</div><img src="./image/Cat4.svg"></div>
                <div id="fish-0" class="fish-wrapper"><div class="fish-label">00</div><img src="./image/Fish1.svg"></div>
                <div id="fish-1" class="fish-wrapper"><div class="fish-label">01</div><img src="./image/Fish2.svg"></div>
                <div id="fish-2" class="fish-wrapper"><div class="fish-label">10</div><img src="./image/Fish3.svg"></div>
                <div id="fish-3" class="fish-wrapper"><div class="fish-label">11</div><img src="./image/Fish4.svg"></div>
            </div>
        </div>
        <div id="circuit-area" class="mx-auto">
            <div class="circuit-title">Circuit Diagram</div>
            <div class="qubit-label" style="top: 60px;">q0</div><div class="qubit-label" style="top: 100px;">q1</div>
            <div id="circuit-content-wrapper"><div id="circuit-content"></div></div>
        </div>
        <div class="w-full text-center mt-6 mb-6"><a href="index.html" class="game-btn btn-red px-16">GIVE UP</a></div>
    </div>
    <div id="victoryModal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-5xl font-black mb-4">MEOW!</h2>
            <h2 class="text-5xl font-black mb-4">🐾</h2>
            <p id="victoryMsg" class="text-xl font-bold mb-6"></p>
            <button onclick="location.href='index.html'" class="game-btn btn-green w-full mb-4">KEEP GOING</button>
            <button onclick="document.getElementById('victoryModal').style.display='none'" class="game-btn btn-red w-full">VIEW CIRCUIT</button>
        </div>
    </div>
    <script>
        let steps = 0, time = 0, isPro = false, fishAtNode = [1, 0, 3, 2], gateHistory = [], tutorialPhase = 0, tutorialCompleted = false, timerInterval, isSolved = false;
        let actionStack = []; 
        let selectedIndices = []; 
        let isMode2 = false; 
        const pop = new Audio('pop.m4a'), meow = new Audio('meow.m4a');
        window.onload = () => {
            timerInterval = setInterval(() => { time++; document.getElementById('timer').innerText = time; }, 1000);
            updateFishUI(); updateUndoStatus();
            const cw = document.getElementById('circuit-content-wrapper');
            cw.addEventListener('wheel', (e) => { e.preventDefault(); cw.scrollLeft += e.deltaY; });
        };
        function toggleMode2() {
            if (tutorialPhase > 0 && tutorialPhase < 100 && tutorialPhase !== 4.1) return;
            isMode2 = !isMode2;
            const btn = document.getElementById('mode-2-btn');
            btn.innerText = isMode2 ? "Mode: 2" : "Mode: 1";
            btn.classList.toggle('active-mode', isMode2);
            if (tutorialPhase === 4.1 && isMode2) { tutorialPhase = 4.2; updateTutorialUI(); }
        }
        function syncHighlight(dir, isOn) {
            if (!isMode2) return;
            const lines = dir === 'H' ? ['line-00-01', 'line-10-11'] : ['line-00-10', 'line-01-11'];
            lines.forEach(id => {
                const el = document.getElementById(id);
                if (isOn) el.classList.add('line-highlight');
                else el.classList.remove('line-highlight');
            });
        }
        function handleLineClick(dir, defaultGate) {
            if (isSolved) return;
            if (tutorialPhase > 0 && tutorialPhase < 100) {
                if (tutorialPhase === 4.2 && dir !== 'V') return; 
                if (tutorialPhase === 4.3 && dir !== 'H') return; 
                if (![4.2, 4.3].includes(tutorialPhase)) return; 
            }
            if (isMode2) { applyGate((dir === 'H') ? 'X1' : 'X0'); } else { applyGate(defaultGate); }
        }
        function togglePro() {
            isPro = !isPro; const b = document.getElementById('body-root');
            document.getElementById('guide-overlay').style.display = 'none';
            document.getElementById('start-hint').style.display = 'none';
            document.getElementById('mode-toggle').classList.remove('yellow-glow');
            b.classList.add('no-fish-anim'); b.classList.toggle('pro-active', isPro);
            updateFishUI();
            if (isPro && !tutorialCompleted) { tutorialPhase = 0.1; document.getElementById('pro-guide-mask').style.display = 'block'; setTimeout(updateTutorialUI, 100); }
            else { if(!tutorialCompleted) tutorialPhase = 0; document.getElementById('pro-guide-mask').style.display = 'none'; document.getElementById('guide-hint-text').style.display = 'none'; clearAllHighlights(); }
            setTimeout(() => b.classList.remove('no-fish-anim'), 50);
            document.getElementById('mode-toggle').innerText = isPro ? "⚡️" : "👁️";
        }
        function clearAllHighlights() {
            document.querySelectorAll('.highlight-focus, .highlight-static, .highlight-canvas-obj, .fish-top-layer').forEach(el => el.classList.remove('highlight-focus', 'highlight-static', 'highlight-canvas-obj', 'fish-top-layer'));
            document.querySelectorAll('.gate-btn-v2').forEach(el => el.classList.remove('lock-btn'));
            document.getElementById('circuit-area').classList.remove('tutorial-active');
        }
        function highlightAction(gate) {
            let ns = [], ls = []; 
            if (gate === 'C0X01') { ns = [0, 1]; ls = ['line-00-01']; } else if (gate === 'CX01') { ns = [2, 3]; ls = ['line-10-11']; }
            else if (gate === 'CX10') { ns = [1, 3]; ls = ['line-01-11']; } else if (gate === 'C0X10') { ns = [0, 2]; ls = ['line-00-10']; }
            else if (gate === 'X0') { ns = [0, 1, 2, 3]; ls = ['line-00-10', 'line-01-11']; } else if (gate === 'X1') { ns = [0, 1, 2, 3]; ls = ['line-00-01', 'line-10-11']; }
            ns.forEach(id => document.getElementById(`node-${id}`)?.classList.add('highlight-canvas-obj'));
            ls.forEach(id => document.getElementById(id)?.classList.add('highlight-canvas-obj'));
            fishAtNode.forEach((nid, fid) => { if(ns.includes(nid)) document.getElementById(`fish-${fid}`)?.classList.add('fish-top-layer'); });
        }
        function updateTutorialUI() {
            clearAllHighlights(); const h = document.getElementById('guide-hint-text'), bs = document.querySelectorAll('.gate-btn-v2');
            const circuitArea = document.getElementById('circuit-area');
            if ([1.1, 1.2, 2.1, 2.2, 3.1, 3.2, 3.3, 4.2, 4.3].includes(tutorialPhase)) {
                circuitArea.classList.add('tutorial-active');
            }
            if (tutorialPhase === 0.1) { bs.forEach(b => b.id !== 'gate-x0' && b.classList.add('lock-btn')); document.getElementById('gate-x0').classList.add('highlight-focus'); h.innerHTML = `TRY X q0 (FLIP ROW)`; positionHint('gate-x0', -80, 75); }
            else if (tutorialPhase === 0.2) { highlightAction('X0'); h.innerHTML = `q0 FLIPS : 0↔1<br><button class="next-btn" onclick="nextTutorial()">NEXT</button>`; positionHint('node-0', 290, 180); }
            else if (tutorialPhase === 0.3) { bs.forEach(b => b.id !== 'gate-x1' && b.classList.add('lock-btn')); document.getElementById('gate-x1').classList.add('highlight-focus'); h.innerHTML = `TRY X q1 (FLIP COL)`; positionHint('gate-x1', 6, 5); }
            else if (tutorialPhase === 0.4) { highlightAction('X1'); h.innerHTML = `q1 FLIPS : 0↔1<br><button class="next-btn" onclick="nextTutorial()">NEXT</button>`; positionHint('node-0', 290, 180); }
            else if (tutorialPhase === 1.1) { bs.forEach(b => b.classList.add('lock-btn')); document.getElementById('circuit-gate-1')?.classList.add('highlight-focus'); h.innerHTML = `HOLD CTRL & CLICK THE 2ND GATE`; positionHint('circuit-gate-1', -180, -45); }
            else if (tutorialPhase === 1.2) { bs.forEach(b => b.id !== 'gate-c0x10' && b.classList.add('lock-btn')); document.getElementById('gate-c0x10').classList.add('highlight-focus'); document.getElementById('circuit-gate-1')?.classList.add('highlight-focus'); h.innerHTML = `REPLACE IT: CLICK 0CNOT q1→q0`; positionHint('gate-c0x10', 15, 10); }
            else if (tutorialPhase === 2.1) { bs.forEach(b => b.classList.add('lock-btn')); document.getElementById('circuit-gate-0')?.classList.add('highlight-focus'); h.innerHTML = `HOLD CTRL & CLICK THE 1ST GATE`; positionHint('circuit-gate-0', -180, -45); }
            else if (tutorialPhase === 2.2) { bs.forEach(b => b.id !== 'gate-cx10' && b.classList.add('lock-btn')); document.getElementById('gate-cx10').classList.add('highlight-focus'); document.getElementById('circuit-gate-0')?.classList.add('highlight-focus'); h.innerHTML = `REPLACE TO FIX: CLICK 1CNOT q1→q0`; positionHint('gate-cx10', 15, 10); }
            else if (tutorialPhase === 3.1) { bs.forEach(b => b.classList.add('lock-btn')); document.getElementById('circuit-gate-0')?.classList.add('highlight-focus'); document.getElementById('circuit-gate-1')?.classList.add('highlight-focus'); h.innerHTML = `q0 IS ALWAYS TARGET, q1 CONTROLS ON 0 & 1.<br>IT SIMPLIFIES TO X q0!<br>HOLD CTRL & SELECT BOTH GATES`; positionHint('circuit-gate-1', 20, 0); }
            else if (tutorialPhase === 3.2) { bs.forEach(b => b.id !== 'gate-x0' && b.classList.add('lock-btn')); document.getElementById('gate-x0').classList.add('highlight-focus'); document.getElementById('circuit-gate-0')?.classList.add('highlight-focus'); document.getElementById('circuit-gate-1')?.classList.add('highlight-focus'); h.innerHTML = `MERGE THEM: CLICK X q0`; positionHint('gate-x0', -170, 65); }
            else if (tutorialPhase === 3.3) { document.getElementById('circuit-gate-0')?.classList.add('highlight-focus'); h.innerHTML = `SIMPLIFICATION SUCCESSFUL!<br><button class="next-btn" onclick="nextTutorial()">NEXT</button>`; positionHint('circuit-gate-0', 20, 5); }
            else if (tutorialPhase === 4.1) { bs.forEach(b => b.classList.add('lock-btn')); document.getElementById('mode-2-btn').classList.add('highlight-focus'); h.innerHTML = `LET'S TRY THE FAST WAY!<br>CLICK "Mode: 1" BUTTON TO SWITCH MODE`; positionHint('mode-2-btn', -250, 70); }
            else if (tutorialPhase === 4.2) { bs.forEach(b => b.classList.add('lock-btn')); highlightAction('X0'); document.getElementById('line-00-10').classList.add('highlight-focus'); h.innerHTML = `SWAP TWO AT ONCE (LIKE X q0)!<br>CLICK THE HIGHLIGHTED LINE`; positionHint('line-01-11', 20, 40); }
            else if (tutorialPhase === 4.3) { bs.forEach(b => b.classList.add('lock-btn')); highlightAction('X1'); document.getElementById('line-00-01').classList.add('highlight-focus'); h.innerHTML = `SWAP TWO AT ONCE (LIKE X q1)!<br>CLICK THE HIGHLIGHTED LINE`; positionHint('line-01-11', 20, 40); }
            else if (tutorialPhase === 100) { tutorialCompleted = true; document.getElementById('pro-guide-mask').style.display = 'none'; h.style.display = 'none'; clearAllHighlights(); }
        }
        function positionHint(id, ox, oy) {
            const h = document.getElementById('guide-hint-text'), r = document.getElementById(id)?.getBoundingClientRect();
            if(!r) return; h.style.display = 'block'; h.style.left = (r.right + ox) + "px"; h.style.top = (r.top + oy) + "px";
        }
        function nextTutorial() { 
            if (tutorialPhase === 0.2) tutorialPhase = 0.3;
            else if (tutorialPhase === 0.4) tutorialPhase = 1.1;
            else if (tutorialPhase === 3.3) tutorialPhase = 4.1;
            updateTutorialUI(); 
        }
        function applyGate(g) {
            if (isSolved) return;
            if (tutorialPhase > 0 && tutorialPhase < 100) {
                const allowed = { 0.1: 'X0', 0.3: 'X1', 1.2: 'C0X10', 2.2: 'CX10', 3.2: 'X0', 4.2: 'X0', 4.3: 'X1' };
                if (allowed[tutorialPhase] && g !== allowed[tutorialPhase]) return;
                if (!allowed[tutorialPhase]) return; 
            }
            if ([0.1, 0.3].includes(tutorialPhase)) {
                const nextMap = { 0.1: 0.2, 0.3: 0.4 };
                const oldPhase = tutorialPhase; tutorialPhase = nextMap[oldPhase]; updateTutorialUI();
                setTimeout(() => { executeGateLogic(g); actionStack.push({ type: 'add', index: gateHistory.length - 1, newGate: g }); renderCircuit(); }, 800);
                return;
            }
            if ([4.2, 4.3].includes(tutorialPhase)) {
                const nextMap = { 4.2: 4.3, 4.3: 100 };
                const oldPhase = tutorialPhase; executeGateLogic(g); actionStack.push({ type: 'add', index: gateHistory.length - 1, newGate: g });
                document.getElementById('guide-hint-text').style.display = 'none';
                setTimeout(() => { clearAllHighlights(); tutorialPhase = nextMap[oldPhase]; updateTutorialUI(); renderCircuit(); }, 800); 
                return;
            }
            let didReplace = false;
            if (selectedIndices.length > 0) {
                pop.currentTime = 0; pop.play();
                selectedIndices.sort((a, b) => a - b);
                const start = selectedIndices[0], count = selectedIndices.length, oldGates = gateHistory.slice(start, start + count);
                gateHistory.splice(start, count, g);
                actionStack.push({ type: 'replace', index: start, oldGates: oldGates, newGate: g });
                selectedIndices = []; didReplace = true;
                recalculatePositions(); finishMove();
            } else {
                executeGateLogic(g); actionStack.push({ type: 'add', index: gateHistory.length - 1, newGate: g });
            }
            if (tutorialPhase === 1.2 && g === 'C0X10' && didReplace) { tutorialPhase = 2.1; }
            else if (tutorialPhase === 2.2 && g === 'CX10' && didReplace) { tutorialPhase = 3.1; }
            else if (tutorialPhase === 3.2 && g === 'X0' && didReplace) { tutorialPhase = 3.3; }
            if (isPro && !tutorialCompleted) updateTutorialUI();
        }
        function executeGateLogic(g) {
            pop.currentTime = 0; pop.play();
            let pm = [0, 1, 2, 3].map(p => {
                let q0 = Math.floor(p / 2), q1 = p % 2;
                if (g === 'X0') q0 = 1 - q0; else if (g === 'X1') q1 = 1 - q1;
                else if (g === 'CX01' && q0 === 1) q1 = 1 - q1; else if (g === 'C0X01' && q0 === 0) q1 = 1 - q1;
                else if (g === 'CX10' && q1 === 1) q0 = 1 - q0; else if (g === 'C0X10' && q1 === 0) q0 = 1 - q0;
                return q0 * 2 + q1;
            });
            fishAtNode = fishAtNode.map(cp => pm[cp]); gateHistory.push(g); steps = gateHistory.length; finishMove();
        }
        function recalculatePositions() {
            let cp = [1, 0, 3, 2];
            gateHistory.forEach(g => {
                let pm = [0, 1, 2, 3].map(p => {
                    let q0 = Math.floor(p/2), q1 = p%2;
                    if (g === 'X0') q0 = 1-q0; else if (g === 'X1') q1 = 1-q1;
                    else if (g === 'CX01' && q0 === 1) q1 = 1-q1; else if (g === 'C0X01' && q0 === 0) q1 = 1-q1;
                    else if (g === 'CX10' && q1 === 1) q0 = 1-q0; else if (g === 'C0X10' && q1 === 0) q0 = 1-q0;
                    return q0 * 2 + q1;
                });
                cp = cp.map(p => pm[p]);
            });
            fishAtNode = cp; steps = gateHistory.length;
        }
        function finishMove() { document.getElementById('step-count').innerText = steps; updateFishUI(); renderCircuit(); checkWin(); }
        function updateFishUI() {
            for (let i = 0; i < 4; i++) {
                const f = document.getElementById(`fish-${i}`), n = document.getElementById(`node-${fishAtNode[i]}`);
                if (f && n) { f.style.top = (n.offsetTop + 90) + "px"; f.style.left = (n.offsetLeft + 30) + "px"; }
            }
        }
        function renderCircuit() {
            const c = document.getElementById('circuit-content'); c.innerHTML = '';
            gateHistory.forEach((g, i) => {
                const u = document.createElement('div'); u.className = 'circuit-unit'; u.id = `circuit-gate-${i}`;
                if (selectedIndices.includes(i)) u.classList.add('selected-gate');
                const isTutorialHighlight = (
                    (tutorialPhase === 3.1 && (i === 0 || i === 1)) ||
                    (tutorialPhase === 3.2 && (i === 0 || i === 1)) ||
                    (tutorialPhase === 1.1 && i === 1) ||
                    (tutorialPhase === 1.2 && i === 1) ||
                    (tutorialPhase === 2.1 && i === 0) ||
                    (tutorialPhase === 2.2 && i === 0) ||
                    (tutorialPhase === 3.3 && i === 0) ||
                    (tutorialPhase === 4.2 && i === 1) ||
                    (tutorialPhase === 4.3 && i === 2)
                );
                if (isTutorialHighlight) u.classList.add('highlight-focus');
                u.onclick = (e) => { 
                    if (isSolved) return;
                    if (tutorialPhase > 0 && tutorialPhase < 100) {
                        if (!e.ctrlKey && !e.metaKey) return; 
                        if (tutorialPhase === 1.1 && i !== 1) return;
                        if (tutorialPhase === 2.1 && i !== 0) return;
                        if (tutorialPhase === 3.1 && i !== 0 && i !== 1) return;
                    }
                    if (e.ctrlKey || e.metaKey) {
                        const sIdx = selectedIndices.indexOf(i);
                        if (sIdx > -1) selectedIndices.splice(sIdx, 1);
                        else selectedIndices.push(i);
                        renderCircuit();
                        if (tutorialPhase === 1.1 && selectedIndices.includes(1)) { tutorialPhase = 1.2; updateTutorialUI(); }
                        else if (tutorialPhase === 2.1 && selectedIndices.includes(0)) { tutorialPhase = 2.2; updateTutorialUI(); }
                        else if (tutorialPhase === 3.1 && selectedIndices.includes(0) && selectedIndices.includes(1)) { tutorialPhase = 3.2; updateTutorialUI(); }
                    } else {
                        pop.currentTime = 0; pop.play(); 
                        const removed = gateHistory[i]; actionStack.push({ type: 'delete', index: i, oldGates: [removed] });
                        gateHistory.splice(i, 1); selectedIndices = [];
                        recalculatePositions(); finishMove(); 
                        if (isPro && !tutorialCompleted) updateTutorialUI(); 
                    }
                };
                if (g.startsWith('X')) {
                    const t = document.createElement('div'); t.className = 'circuit-target'; t.style.left = '25px'; t.style.top = (g === 'X0' ? 21.2 : 61.2) + 'px'; u.appendChild(t);
                } else {
                    const is01 = g.includes('01'), is0 = g.includes('C0'), cY = is01 ? 20 : 60, tY = is01 ? 60 : 20;
                    const v = document.createElement('div'); v.className = 'connection-v-line'; v.style.left = '23.5px'; v.style.top = Math.min(cY, tY) + 'px'; v.style.height = '41px'; u.appendChild(v);
                    const d = document.createElement('div'); d.className = 'control-dot'; d.style.left = '18px'; d.style.top = (cY - 7) + 'px'; if (is0) { d.style.background = 'white'; d.style.border = '2.5px solid black'; } 
                    u.appendChild(d);
                    const t = document.createElement('div'); t.className = 'circuit-target'; t.style.left = '25px'; t.style.top = (tY + 1.2) + 'px'; u.appendChild(t);
                }
                c.appendChild(u);
            });
            updateUndoStatus(); 
            const w = document.getElementById('circuit-content-wrapper');
            if (selectedIndices.length === 0) { setTimeout(() => w && w.scrollTo({ left: w.scrollWidth, behavior: 'smooth' }), 100); }
        }
        function undo() { 
            if (isSolved || actionStack.length === 0) return;
            if (tutorialPhase > 0 && tutorialPhase < 100) return;
            pop.currentTime = 0; pop.play(); const action = actionStack.pop();
            if (action.type === 'add') { gateHistory.splice(action.index, 1); } 
            else if (action.type === 'delete') { gateHistory.splice(action.index, 0, ...action.oldGates); } 
            else if (action.type === 'replace') { gateHistory.splice(action.index, 1, ...action.oldGates); }
            recalculatePositions(); selectedIndices = []; finishMove();
            if (isPro && !tutorialCompleted) updateTutorialUI();
        }
        function resetCircuit() { 
            if (isSolved) return;
            if (tutorialPhase > 0 && tutorialPhase < 100) return;
            pop.currentTime = 0; pop.play(); fishAtNode = [1, 0, 3, 2]; gateHistory = []; actionStack = []; selectedIndices = []; steps = 0; finishMove(); if (isPro && !tutorialCompleted) updateTutorialUI(); 
        }
        function updateUndoStatus() {
            const ub = document.getElementById('undo-btn'); if (!ub) return;
            if (actionStack.length > 0 && !isSolved && !(tutorialPhase > 0 && tutorialPhase < 100)) { ub.classList.add('active'); ub.classList.remove('disabled'); ub.style.pointerEvents = "auto"; }
            else { ub.classList.remove('active'); ub.classList.add('disabled'); ub.style.pointerEvents = "none"; }
        }
        async function checkWin() {
            if (fishAtNode.every((pos, i) => pos === i)) {
                isSolved = true;
                updateUndoStatus();
                if (timerInterval) clearInterval(timerInterval);
                const ft = parseInt(document.getElementById('timer').innerText);
                const st = steps; 
                const u = sessionStorage.getItem('currentUser');
                const currentLvInSession = parseInt(sessionStorage.getItem('currentLevel') || "1");
                if (currentLvInSession <= 3) {
                    sessionStorage.setItem('currentLevel', 4);
                }
                setTimeout(() => { 
                    if(typeof meow !== 'undefined') { meow.currentTime = 0; meow.play(); }
                    document.getElementById('victoryMsg').innerText = `STEP：${st} | TIME：${ft}s`; 
                    document.getElementById('victoryModal').style.display = 'flex'; 
                }, 800);
                if (u) {
                    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzR0J0VXyl5ayKwDXlHimc4WS1FjvGEb2-gTBMhum8APQKfDHxc5wsiWRkNqkxJrocMOw/exec';
                    fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            action: 'saveRecord',
                            username: u, 
                            level: 3,           
                            steps: st, 
                            time: ft,
                            circuit: gateHistory.join(',') 
                        })
                    })
                    .then(() => console.log("Level 3 data sent"))
                    .catch(e => console.error("Save Error:", e));
                }
            }
        }
    </script>
