<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>Meowtopia - Level 11</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Gaegu:wght@700&family=Titan+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Shrikhand&family=Alfa+Slab+One&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #FFF9F0; background-image: linear-gradient(45deg, #fce4ec 25%, transparent 25%, transparent 50%, #fce4ec 50%, #fce4ec 75%, transparent 75%, transparent); background-size: 100px 100px; color: #463438; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; }
        .hidden { display: none !important; }
        .main-layout { display: flex; align-items: flex-start; justify-content: center; gap: 20px; margin-top: 20px; }
        .game-canvas { position: relative; width: 1900px; height: 550px; background: #fffaf5; border: 8px solid #463438; border-radius: 40px; overflow: hidden; box-shadow: 15px 15px 0px #FFB7C5; }
        #leaderboard-wrapper { position: fixed; left: -220px; top: 50px; transform: none; display: flex; z-index: 150; transition: left 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        #leaderboard-wrapper.expanded {left: 0; }
        .side-leaderboard-content { width: 220px; background: white; border: 6px solid #463438; border-left: none; border-radius: 0 30px 30px 0; padding: 15px; display: flex; flex-direction: column; max-height: 80vh; position: relative; z-index: 2; }
        .bookmark-tab { position: absolute; right: -45px; top: 40px; width: 45px; height: 130px; background: #463438; border: 5px solid #463438; border-left: none; border-radius: 0 15px 15px 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s, right 0.2s, width 0.2s; z-index: 1; }
        .bookmark-tab:hover { background: #FFB7C5; width: 55px; right: -55px; }
        .bookmark-text { writing-mode: vertical-lr; color: white; font-weight: 900; font-size: 20px; text-shadow: 2px 2px 0 #463438; letter-spacing: 4px; user-select: none; }
        #rankList::-webkit-scrollbar { width: 6px; }
        #rankList::-webkit-scrollbar-thumb { background-color: #FFB7C5; border-radius: 10px; }
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 2px; border-bottom: 2px solid #fce4ec; font-weight: 900; font-size: 14px; gap: 8px; color: #463438; }
        .rank-item:last-child { border-bottom: none; }
        .rank-item span:first-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .rank-item span:last-child { flex-shrink: 0; }
        .rank-tab { flex: 1; padding: 6px 4px; font-size: 12px; font-weight: 900;  border: 3px solid #463438; border-radius: 12px; cursor: pointer; transition: all 0.12s; text-align: center; background: #fff; color: #463438; }
        .rank-tab.active { background: #463438; color: #fff; }
        .node { width: 100px; height: 100px; background: white; border: 5px solid #463438; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: absolute; box-shadow: 3px 3px 0 #463438; z-index: 20; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .node img { width: 70px; height: auto; pointer-events: none; }
        .fixed-number { position: absolute; bottom: -2px; right: 24px; font-size: 16px; font-weight: 900; color: #463438; pointer-events: none; z-index: 25; }
        .connection-line { position: absolute; background: #463438; z-index: 10; cursor: pointer; transition: all 0.2s ease; opacity: 1; }
        @media (hover: hover) {
            .connection-line:hover { background: #99C44D !important; box-shadow: 0 0 15px rgba(153, 196, 77, 0.8); height: 10px !important; z-index: 16; opacity: 1 !important; border-top: none !important; }
        }
        .line-highlight { background: #99C44D !important; box-shadow: 0 0 15px rgba(153, 196, 77, 0.8) !important; height: 8px !important; z-index: 15; border-top: none !important; opacity: 1 !important; }
        .fish-wrapper { position: absolute; width: 70px; height: 70px; pointer-events: none; z-index: 30; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .fish-wrapper img.fish-img { width: 60px; height: auto; position: relative; z-index: 2; }
        .fish-wrapper img.fish-bg-shape { width: 60px; height: auto; position: absolute; z-index: 1; filter: brightness(0) invert(1);opacity: 1; }
        .fish-label { background: rgba(70, 52, 56, 0.8); color: #fff; width: 32px; height: 22px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; z-index: 5; position: absolute; top: 24px; }  
        .hat-img { position: absolute; height: auto; pointer-events: none; z-index: 21; }
        .cat-hat { width: 35px !important; top: 7px; left: 50px; transform: translateX(-50%) rotate(15deg); }
        .fish-hat { width: 22px; top: 6px; left: 43%; transform: translateX(-50%) rotate(15deg); z-index: 31; }
        #pro-panel { width: 0; opacity: 0; height: 550px; overflow: hidden; background: #fff; border: 0px solid #463438; border-radius: 40px; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .pro-active #pro-panel { width: 600px; opacity: 1; border: 8px solid #463438; padding: 15px; box-shadow: 10px 10px 0px #99C44D; }
        .panel-section-title { font-weight: 900; font-size: 18px; margin: 5px 0; color: #463438; text-align: center; white-space: nowrap; }
        .game-btn { cursor: pointer; border: 5px solid #463438; border-radius: 60px; padding: 12px; font-size: 26px; font-weight: 900; color: #fff; text-shadow: 2px 2px 0 #463438; box-shadow: 0 6px 0 #463438; position: relative; transition: all 0.1s; display: inline-block; }
        .game-btn:active { top: 6px; box-shadow: 0 2px 0 #463438; }
        .btn-red { background: #FFB7C5; }
        .btn-green { background: #99C44D; }
        .multi-toggle-btn { background: #e2de6e; border: 4px solid #463438; border-radius: 20px; padding: 5px 15px; font-weight: 900; font-size: 20px; color: white; cursor: pointer; box-shadow: 0 4px 0 #463438; transition: all 0.1s; min-width: 140px; text-shadow: 2px 2px 0 #463438; }
        .multi-toggle-btn.mode-2 { background: #629eed; }
        .multi-toggle-btn.mode-4 { background: #b583e5; }
        .multi-toggle-btn.mode-8 { background: #46c89d; }
        .multi-toggle-btn:hover, .game-btn:hover, .mode-toggle-fixed:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #463438;}
        .multi-toggle-btn:active, .mode-toggle-fixed:active { transform: translateY(2px); box-shadow: 0 2px 0 #463438;}
        .func-btn { width: 100%; margin-top: 5px; padding: 14px; border-radius: 35px; font-weight: 900; font-size: 16px; border: 2.5px solid #463438; cursor: pointer; box-shadow: 0 4px 0 rgba(70,52,56,0.1); }
        .btn-reset { background: #FFF9F0; color: #463438; }
        .btn-undo { background: #FFB7C5 !important; color: #fff !important; border: 2.5px solid #463438 !important; opacity: 0.6; cursor: not-allowed; pointer-events: none; }
        .btn-undo.active { background: #FFB7C5 !important; border-color: #463438 !important; color: #fff !important; opacity: 1; cursor: pointer; box-shadow: 0 4px 0 #463438; pointer-events: auto; }
        .func-btn:hover { background-color: #FFB7C5 !important; color: #fff !important; border-color: #463438 !important; transform: translateY(-2px); box-shadow: 0 3px 0 #463438; }
        .btn-undo.active:hover { background-color: #ff9fb2 !important; }
        
        #circuit-area { width: 1155px; height: 0; opacity: 0; background: #fff; border: 0px solid #463438; border-radius: 30px; margin-top: 20px; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); position: relative; overflow: hidden; }
        .pro-active #circuit-area { height: 250px; opacity: 1; border: 8px solid #463438; padding: 15px; box-shadow: 10px 10px 0px #FFB7C5; }
        #circuit-content-wrapper { position: relative; height: 180px; overflow-x: auto; margin-left: 45px; scrollbar-width: none; }
        #circuit-content-wrapper::-webkit-scrollbar { display: none; }
        #circuit-content { display: flex; height: 100%; padding: 0 10px; min-width: 100%; width: max-content; position: relative; background-image: linear-gradient(#463438,#463438), linear-gradient(#463438,#463438), linear-gradient(#463438,#463438), linear-gradient(#463438,#463438); background-size: 100% 3px; background-repeat: no-repeat; background-position: 0 30px, 0 70px, 0 110px, 0 150px; }
        .mini-mode #circuit-content { background-image: none !important; }
        
        .qubit-label { position: absolute; left: 19px; font-weight: 900; font-size: 16px; color: #463438; transition: all 0.3s; }
        .circuit-unit { min-width: 50px; height: 180px; display: flex; flex-direction: column; position: relative; cursor: pointer; transition: all 0.2s; background-color: transparent !important; }
        .circuit-unit:hover, .circuit-unit.selected-gate { background-color: var(--bg-hover) !important; border-radius: 12px; }
        
        .control-dot { width: 14px; height: 14px; background: #463438; border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); z-index: 5; }
        .connection-v-line { position: absolute; width: 2.5px; background: #463438; left: 50%; transform: translateX(-50%); z-index: 3; }
        .circuit-target { position: absolute; width: 24px; height: 24px; border-radius: 50%; background: #fff; border: 2.5px solid #463438; left: 50%; transform: translate(-50%, -50%); z-index: 15; }
        .circuit-target::before { content: ""; position: absolute; width: 2.5px; height: 100%; background: #463438; left: 50%; transform: translateX(-50%); }
        .circuit-target::after { content: ""; position: absolute; width: 100%; height: 2.5px; background: #463438; top: 50%; transform: translateY(-50%); }
        .mode-toggle-fixed { position: fixed; top: 20px; right: 20px; width: 70px; height: 70px; background: #ffffff; border: 5px solid #463438; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; box-shadow: 0 4px 0 #463438; z-index: 500; }
        
        #gate-scroll-area { position: relative; margin-top: 5px; flex: 1; min-height: 0; overflow-y: auto; width: 100%; padding: 5px; scrollbar-width: none; scroll-behavior: smooth; }
        #gate-scroll-area::-webkit-scrollbar { display: none; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(70, 52, 56, 0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #FFF9F0; border: 8px solid #463438; border-radius: 40px; padding: 30px; text-align: center; width: 380px; box-shadow: 0 10px 0 #FFB7C5; color: #463438; }
        #ios-indicator { position: absolute; top: 0; left: 0; transform: translate(-50%, -120%) scale(0.8); background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); border-radius: 50px; padding: 6px 18px; display: flex; align-items: center; box-shadow: 0 8px 24px rgba(70,52,56,0.1); opacity: 0; transition: opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1), transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1000; pointer-events: none; border: 1px solid rgba(70, 52, 56, 0.2); }
        #ios-indicator.active { opacity: 1; transform: translate(-50%, -120%) scale(1); }
        .ind-fraction { color: #463438; font-size: 16px; font-weight: 900; }
        .ind-label { display: none !important; }
        
        /* Gate Button Styles */
        .gate-btn-v2 { position: relative; height: 75px; width: 50px; display: flex; align-items: center; justify-content: center; padding: 0; border: 2px solid #463438; border-radius: 8px; cursor: pointer; transition: all 0.2s; box-shadow: 0 3px 6px rgba(0,0,0,0.1); background-size: 60% 1.5px; background-repeat: no-repeat; background-position: center 15px, center 30px, center 45px, center 60px; }
        .gate-btn-v2:hover { background-color: #FFB7C5 !important; filter: brightness(1.05); transform: scale(1.05); z-index: 10; }
        .btn-highlight { transform: scale(1.15); box-shadow: 0 0 10px rgba(0,0,0,0.3); border: 4px solid #99C44D !important; z-index: 10; filter: brightness(1.1); background-color: #FFB7C5 !important; }
        
        /* Hypercube SVG Styles */
        .hyper-line { stroke: #463438; stroke-width: 0.6; opacity: 0.3; }
        .hyper-line-hi { stroke: #FFB7C5; stroke-width: 2.5; opacity: 1; transition: stroke 0.2s; }
        .gate-btn-v2 .hyper-line-hi { stroke: #f78790; }
        .gate-btn-v2:hover .hyper-line-hi { stroke: #ffffff !important; }
        .btn-highlight .hyper-line-hi { stroke: #ffffff !important; }
        .circuit-unit:hover .hyper-line-hi, .circuit-unit.selected-gate .hyper-line-hi { stroke: #99C44D !important; }
        
        .gate-v-line { position: absolute; width: 1.5px; background: #463438; left: 50%; transform: translateX(-50%); z-index: 1; }
        .gate-dot { position: absolute; width: 8px; height: 8px; border-radius: 50%; border: 1px solid #463438; left: 50%; transform: translate(-50%, -50%); z-index: 2; }
        .gate-dot.fill { background: #463438; }
        .gate-dot.empty { background: #fff; }
        .gate-target-circle { position: absolute; width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid #463438; background: #fff; left: 50%; transform: translate(-50%, -50%); z-index: 3; }
        .gate-target-circle::before { content: ''; position: absolute; width: 100%; height: 1.5px; top: 50%; left: 0; transform: translateY(-50%); background: #463438; }
        .gate-target-circle::after { content: ''; position: absolute; height: 100%; width: 1.5px; left: 50%; top: 0; transform: translateX(-50%); background: #463438; }
        #canvas-bottom-btns { position: absolute; bottom: 15px; right: 30px; display: flex; gap: 10px; z-index: 100; }
        #canvas-bottom-btns .func-btn { margin-top: 0; width: 85px; font-size: 14px; padding: 8px 5px; text-transform: uppercase; border-width: 3px; }
        .pro-active #canvas-bottom-btns { display: none !important; }
        canvas, .game-canvas, .circuit-unit, .node, .gate-btn-v2 { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; touch-action: manipulation; }
        .swap-active { background: #99C44D !important; box-shadow: 0 0 15px rgba(153, 196, 77, 0.8) !important; height: 8px !important; z-index: 15 !important; border-top: none !important; opacity: 1 !important; }
    </style>
</head>
<body id="body-root" class="mini-mode">
    <div id="mode-toggle" class="mode-toggle-fixed" onclick="togglePro()">👁️</div>
    <div id="quantum-toggle" class="mode-toggle-fixed hidden" onclick="toggleQuantumMode()" style="top: 100px; font-size: 26px;">🔮</div>
    <div id="leaderboard-wrapper">
        <div class="side-leaderboard-content">
            <h2 class="text-xl font-black mb-3 text-center" style="color: #463438;">🏆 TOP CATS</h2>
            <div class="flex gap-2 mb-3">
                <button onclick="renderRank('steps')" id="tab-steps" class="rank-tab active">STEPS</button>
                <button onclick="renderRank('time')" id="tab-time" class="rank-tab">TIME</button>
            </div>
            <div id="rankList" class="flex-grow overflow-y-auto space-y-1 pr-1">
                <p class="text-center italic text-gray-400 mt-10 text-sm">Loading...</p>
            </div>
        </div>
        <div class="bookmark-tab" onclick="toggleLeaderboard()">
            <div class="bookmark-text">RANK</div>
        </div>
    </div>
    <div class="w-full max-w-6xl">
        <div class="flex w-full px-4 mb-4 items-center">
            <div class="text-3xl font-black" style="color: #463438">STEPS: <span id="step-count">0</span> | TIME: <span id="timer">0</span></div>
            <div class="flex items-center gap-12 ml-auto">
                <button id="mode-btn" class="multi-toggle-btn" onclick="cycleLineMode()">Mode: 1</button>
                <div class="text-3xl font-black" style="color: #7bc202;">LEVEL 11</div>
            </div>
        </div>
        <div class="main-layout">
            <div id="pro-panel">
                <div id="panel-gate-title" class="panel-section-title">Transformations</div>
                <div id="gate-scroll-area">
                    <div class="grid grid-cols-4 gap-1 w-full" id="gate-grid"></div>
                </div>
                <div class="panel-section-title">Control</div>
                <button class="func-btn btn-reset" onclick="resetCircuit()">Reset Circuit</button>
                <button id="undo-btn" class="func-btn btn-undo" onclick="undo()">Undo Step</button>
            </div>
            <div class="game-canvas" id="main-canvas">
                <div id="ios-indicator">
                    <span class="ind-fraction" id="ind-fraction">1 / 3</span>
                    <span class="ind-label" id="ind-label"></span>
                </div>
                <div id="lines-layer"></div>
                <div id="nodes-layer"></div>
                <div id="fishes-layer"></div>
               
                <div id="canvas-bottom-btns">
                    <button class="func-btn btn-reset" onclick="resetCircuit()">RESET</button>
                    <button id="undo-btn-bottom" class="func-btn btn-undo" onclick="undo()">UNDO</button>
                </div>
            </div>
        </div>
        <div id="circuit-area" class="mx-auto">
            <div id="circuit-diagram-title" class="circuit-title font-black text-xl text-center" style="color: #463438;">Hypercube Paths</div>
            <div id="q0-label" class="qubit-label" style="top: 60px;">d0</div>
            <div id="q1-label" class="qubit-label" style="top: 100px;">d1</div>
            <div id="q2-label" class="qubit-label" style="top: 140px;">d2</div>
            <div id="q3-label" class="qubit-label" style="top: 180px;">d3</div>
            <div id="circuit-content-wrapper"><div id="circuit-content"></div></div>
        </div>
        <div class="w-full text-center mt-6 mb-6">
            <a href="index.html" class="game-btn btn-red px-16">GIVE UP</a>
        </div>
    </div>
    <div id="victoryModal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-5xl font-black mb-4" style="color: #463438;">MEOW!<br>🐾</h2>
            <p id="victoryMsg" class="text-xl font-bold mb-6"></p>
            <button onclick="location.href='index.html'" class="game-btn btn-green w-full mb-4">KEEP GOING</button>
            <button onclick="viewInLab().style.display='none'" class="game-btn btn-red w-full">VIEW CIRCUIT</button>
        </div>
    </div>
    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzR0J0VXyl5ayKwDXlHimc4WS1FjvGEb2-gTBMhum8APQKfDHxc5wsiWRkNqkxJrocMOw/exec';
        let steps = 0, time = 0, isPro = false, isQuantumMode = false, timerInterval, gateHistory = [], isSolved = false;
        let selectedIndices = [];
        let actionStack = [];
        let fishAtNode = [14, 7, 10, 1, 5, 0, 11, 6, 8, 9, 3, 2, 4, 15, 13, 12];    
        let lineMode = 1;
        let hoverLine = null;
        let currentOptionIndex = -1;
        let currentOptions = [];
        let draggedIndex = null;
        let leaderboardData;
        let mobileDragging = false;
        
        let isTouchDevice = ('ontouchstart' in window || navigator.maxTouchPoints > 0);
        let lockedLineId = null;
        let hasScrolled = false;
        
        // Tilt Control Variables
        let lastTiltDirection = 0;
        const TILT_THRESHOLD = 15;
        const RETURN_THRESHOLD = 10;
        let gyroPermissionGranted = false;
        let lastSwipeTime = 0;
        
        // Auto-Scroll Variables for Drag & Drop
        let autoScrollRAF = null;
        let scrollSpeed = 0;

        const pop = new Audio('pop.m4a'), meow = new Audio('meow.m4a');
        const baseOffsetY = 195;
        const side = 120;
        const hyperOffset = 400;
        const offsetNormal = 240;
        const offsetPro = 100;
        const nodePositions = Array.from({ length: 16 }, (_, i) => {
            let x = (i & 1) ? side : 0;
            let y = (i & 2) ? side : 0;
            if (i & 4) { x += (i & 1) ? 90 : -80; y += (i & 2) ? 80 : -80; }
            if (i & 8) { x += hyperOffset; y -= 80; }
            const pos = { t: y + baseOffsetY, relX: x };
            Object.defineProperty(pos, 'l', { get: () => pos.relX + (isPro ? offsetPro : offsetNormal) });
            return pos;
        });

        window.onload = () => {
            initGameLayout();
            initGates();
            drawStaticLines();
            updateFishUI();
            updateUndoStatus();
            fetchLeaderboard();
            timerInterval = setInterval(() => { time++; document.getElementById('timer').innerText = time; }, 1000);
            
            const circuitWrapper = document.getElementById('circuit-content-wrapper');
            
            // Scroll normally inside wrapper
            circuitWrapper.addEventListener('wheel', (e) => {
                if (Math.abs(e.deltaY) > 0) {
                    e.preventDefault();
                    circuitWrapper.scrollLeft += e.deltaY;
                }
            }, { passive: false });

            // Smooth Auto-scroll logic for drag-and-drop
            function scrollLoop() {
                if (scrollSpeed !== 0 && draggedIndex !== null) {
                    circuitWrapper.scrollLeft += scrollSpeed;
                    autoScrollRAF = requestAnimationFrame(scrollLoop);
                } else {
                    autoScrollRAF = null;
                }
            }

            circuitWrapper.addEventListener('dragover', (e) => {
                if (draggedIndex !== null) {
                    e.preventDefault();
                    const rect = circuitWrapper.getBoundingClientRect();
                    const edgeThreshold = 80;
                    if (e.clientX - rect.left < edgeThreshold) {
                        scrollSpeed = -8; // 向左平滑捲動
                        if (!autoScrollRAF) autoScrollRAF = requestAnimationFrame(scrollLoop);
                    } else if (rect.right - e.clientX < edgeThreshold) {
                        scrollSpeed = 8; // 向右平滑捲動
                        if (!autoScrollRAF) autoScrollRAF = requestAnimationFrame(scrollLoop);
                    } else {
                        scrollSpeed = 0;
                    }
                }
            });

            circuitWrapper.addEventListener('dragleave', () => { scrollSpeed = 0; });
            circuitWrapper.addEventListener('drop', () => { scrollSpeed = 0; });

            // PC Scroll (for locked Line)
            document.addEventListener('wheel', (e) => {
                if (!lockedLineId || lineMode === 1 || lineMode === 8 || isTouchDevice) return;
                const target = e.target;
                if (!target.closest('#gate-scroll-area') && !target.closest('#circuit-content-wrapper')) {
                    e.preventDefault();
                    if (e.deltaY > 0) currentOptionIndex = (currentOptionIndex + 1) % currentOptions.length;
                    else currentOptionIndex = (currentOptionIndex - 1 + currentOptions.length) % currentOptions.length;
                    hasScrolled = true;
                    showIndicatorScrolled();
                }
            }, { passive: false });

            const canvas = document.getElementById('main-canvas');
            const indicator = document.getElementById('ios-indicator');
            
            // PC: Left click outside connection-line cancels the lock
            canvas.addEventListener('mousedown', (e) => {
                if (lockedLineId && !isTouchDevice) {
                    if (e.button === 0 && !e.target.classList.contains('connection-line')) { 
                        cancelLock(); 
                    }
                }
            });
            
            // PC: Right click confirms inside canvas
            canvas.addEventListener('contextmenu', (e) => {
                if (lockedLineId && !isTouchDevice) {
                    e.preventDefault(); 
                    if (lineMode === 8 && hoverLine) applyGate(`X${3 - hoverLine.dim}`);
                    else if (lineMode === 1 && hoverLine) applyGate(`SWAP_${hoverLine.i}_${hoverLine.j}`);
                    else if (currentOptions[currentOptionIndex]) applyGate(currentOptions[currentOptionIndex].gateType);
                }
            });

            // Mobile logic: dual-finger tap to confirm
            window.addEventListener('touchstart', (e) => {
                if (lockedLineId && e.touches.length >= 2) {
                    e.preventDefault();
                    if (lineMode === 8 && hoverLine) applyGate(`X${3 - hoverLine.dim}`);
                    else if (lineMode === 1 && hoverLine) applyGate(`SWAP_${hoverLine.i}_${hoverLine.j}`);
                    else if (hasScrolled && currentOptions[currentOptionIndex]) applyGate(currentOptions[currentOptionIndex].gateType);
                }
            }, { passive: false });

            // Mobile logic: single-finger tap outside cancels lock
            canvas.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1 && lockedLineId) {
                    if (!e.target.classList.contains('connection-line')) { cancelLock(); }
                }
            });

            canvas.addEventListener('mousemove', (e) => {
                if (indicator.classList.contains('active') && !isTouchDevice) {
                    const rect = canvas.getBoundingClientRect();
                    indicator.style.left = (e.clientX - rect.left) + 'px';
                    indicator.style.top = (e.clientY - rect.top - 25) + 'px';
                }
            });
        };

        function handleOrientation(event) {
            if (!lockedLineId || lineMode === 1 || lineMode === 8) return;
            
            let tilt = event.gamma; 
            const orientation = (screen.orientation || {}).type || window.orientation;
            
            // Support landscape tilt tracking
            if (orientation === 90 || orientation === "landscape-primary") {
                tilt = event.beta;
            } else if (orientation === -90 || orientation === "landscape-secondary") {
                tilt = -event.beta;
            } else if (orientation === 180 || orientation === "portrait-secondary") {
                tilt = -event.gamma;
            }

            const now = Date.now();
            if (now - lastSwipeTime < 400) return;

            if (tilt > TILT_THRESHOLD && lastTiltDirection <= 0) {
                // 向右傾斜 (+)：前進 (不論直橫幅)
                currentOptionIndex = (currentOptionIndex + 1) % currentOptions.length;
                lastTiltDirection = 1;
                lastSwipeTime = now;
                hasScrolled = true;
                showIndicatorScrolled();
                if ('vibrate' in navigator) navigator.vibrate(20);
            } else if (tilt < -TILT_THRESHOLD && lastTiltDirection >= 0) {
                // 向左傾斜 (-)：後退
                currentOptionIndex = (currentOptionIndex - 1 + currentOptions.length) % currentOptions.length;
                lastTiltDirection = -1;
                lastSwipeTime = now;
                hasScrolled = true;
                showIndicatorScrolled();
                if ('vibrate' in navigator) navigator.vibrate(20);
            } else if (Math.abs(tilt) < RETURN_THRESHOLD) {
                lastTiltDirection = 0;
            }
        }

        function getRgba(hex, alpha) {
            hex = hex.replace('#', '');
            const r = parseInt(hex.substring(0,2), 16), g = parseInt(hex.substring(2,4), 16), b = parseInt(hex.substring(4,6), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function getHighlightPairsForGate(type) {
            let pairs = [];
            if (type.startsWith('X')) {
                pairs = getAllPairs(3 - parseInt(type[1]));
            } else if (type.startsWith('CX')) {
                let ctrlVal = parseInt(type[2]), c = parseInt(type[3]), t = parseInt(type[4]);
                let bit = 1 << (3 - t), cBit = 1 << (3 - c);
                for (let k = 0; k < 16; k++) {
                    if ((k & bit) === 0 && ((k & cBit) >> (3 - c)) === ctrlVal) pairs.push([k, k ^ bit]);
                }
            } else if (type.startsWith('TOF')) {
                let cv1 = parseInt(type[3]), cv2 = parseInt(type[4]), c1 = parseInt(type[5]), c2 = parseInt(type[6]), t = parseInt(type[7]);
                let bit = 1 << (3 - t), b1 = 1 << (3 - c1), b2 = 1 << (3 - c2);
                for (let k = 0; k < 16; k++) {
                    if ((k & bit) === 0 && ((k & b1) >> (3 - c1)) === cv1 && ((k & b2) >> (3 - c2)) === cv2) pairs.push([k, k ^ bit]);
                }
            } else if (type.startsWith('SWAP_')) {
                let p = type.split('_');
                pairs.push([parseInt(p[1]), parseInt(p[2])]);
            }
            return pairs;
        }

        window.clearHighlight = function() { 
            document.querySelectorAll('.connection-line').forEach(l=>l.classList.remove('line-highlight')); 
            document.querySelectorAll('.gate-btn-v2').forEach(b=>b.classList.remove('btn-highlight'));
        }

        window.highlightByGate = function(type) {
            highlightPairs(getHighlightPairsForGate(type));
            highlightGateButton(type);
        }

        function highlightGateButton(type) {
            document.querySelectorAll('.gate-btn-v2').forEach(btn => btn.classList.remove('btn-highlight'));
            if(type) {
                const btn = document.getElementById(`gate-btn-${type}`);
                if(btn) {
                    btn.classList.add('btn-highlight');
                    
                    const container = document.getElementById('gate-scroll-area');
                    const btnRect = btn.getBoundingClientRect();
                    const containerRect = container.getBoundingClientRect();
                    
                    if (btnRect.top < containerRect.top) {

                    } else if (btnRect.bottom > containerRect.bottom) {

                    }

        function getGateColorMap(type) {
            if (type.startsWith('SWAP')) return '#e2de6e'; // Mode 1
            if (type.startsWith('TOF')) return '#629eed';  // Mode 2
            if (type.startsWith('CX')) return '#b583e5';   // Mode 4
            if (type.startsWith('X')) return '#46c89d';    // Mode 8
            return '#fff';
        }

        function getMiniHypercubeSVG(type) {
            let pairs = getHighlightPairsForGate(type);
            const miniNodes = nodePositions.map(n => ({ x: n.relX / 12, y: (n.t - baseOffsetY) / 12 }));
            let svg = `<svg viewBox="-10 -15 65 35" style="width:100%; height:100%; pointer-events:none;" preserveAspectRatio="xMidYMid meet">`;
            for(let i=0; i<16; i++) {
                for(let b=0; b<4; b++) {
                    let j = i ^ (1<<b);
                    if(j > i) {
                        let n1 = miniNodes[i], n2 = miniNodes[j];
                        let isHighlighted = pairs.some(p => (p[0]===i && p[1]===j) || (p[0]===j && p[1]===i));
                        let lineClass = isHighlighted ? 'hyper-line-hi' : 'hyper-line';
                        svg += `<line x1="${n1.x}" y1="${n1.y}" x2="${n2.x}" y2="${n2.y}" class="${lineClass}" stroke-linecap="round"/>`;
                    }
                }
            }
            for(let i=0; i<16; i++) {
                let n = miniNodes[i];
                svg += `<circle cx="${n.x}" cy="${n.y}" r="1.5" fill="#463438"/>`;
            }
            svg += `</svg>`;
            return svg;
        }

        function getGateContent(type) {
            if (isQuantumMode) {
                let controls = [], target = -1;
                if (type.startsWith('X')) { target = parseInt(type[1]); } 
                else if (type.startsWith('CX')) { controls.push({ q: parseInt(type[3]), type: parseInt(type[2]) }); target = parseInt(type[4]); } 
                else if (type.startsWith('TOF')) { controls.push({ q: parseInt(type[5]), type: parseInt(type[3]) }); controls.push({ q: parseInt(type[6]), type: parseInt(type[4]) }); target = parseInt(type[7]); }
                else if (type.startsWith('SWAP_')) {
                    let p = type.split('_'), iA = parseInt(p[1]), iB = parseInt(p[2]);
                    target = 3 - Math.round(Math.log2(iA ^ iB));
                    let binary = Math.min(iA, iB).toString(2).padStart(4, '0').split('').map(Number);
                    for (let q = 0; q < 4; q++) if (q !== target) controls.push({ q: q, type: binary[q] });
                }
                let content = '';
                const getY = (q) => 15.7 + q * 15;
                if (controls.length > 0) {
                    const allQs = [target, ...controls.map(c => c.q)];
                    const minQ = Math.min(...allQs), maxQ = Math.max(...allQs);
                    content += `<div class="gate-v-line" style="top:${getY(minQ)}px; height:${(maxQ-minQ)*15}px;"></div>`;
                }
                controls.forEach(ctrl => { content += `<div class="gate-dot ${ctrl.type === 1 ? 'fill' : 'empty'}" style="top:${getY(ctrl.q)}px;"></div>`; });
                content += `<div class="gate-target-circle" style="top:${getY(target)}px;"></div>`;
                return content;
            } else {
                return getMiniHypercubeSVG(type);
            }
        }

        function toggleQuantumMode() {
            pop.currentTime = 0; pop.play();
            isQuantumMode = !isQuantumMode;
            document.getElementById('quantum-toggle').innerText = isQuantumMode ? "⚛️" : "🔮";
            document.getElementById('body-root').classList.toggle('mini-mode', !isQuantumMode);
            
            document.getElementById('circuit-diagram-title').innerText = isQuantumMode ? "Circuit Diagram" : "Hypercube Paths";
            document.getElementById('panel-gate-title').innerText = isQuantumMode ? "Quantum Gates" : "Transformations";
            for(let i=0; i<4; i++) {
                document.getElementById(`q${i}-label`).innerText = isQuantumMode ? `q${i}` : `d${i}`;
            }

            renderCircuit();
        }

        function togglePro() {
            pop.currentTime = 0; pop.play();
            isPro = !isPro;
            document.getElementById('body-root').classList.toggle('pro-active', isPro);
            document.getElementById('mode-toggle').innerText = isPro ? "⚡️" : "👁️";
            const qToggle = document.getElementById('quantum-toggle');

            let startTime = Date.now();
            const animateMove = () => {

                }

        function initGates() {
            const grid = document.getElementById('gate-grid');
            let html = '';
            
            let gateOrder = [];
            let added = new Set();
            const addGate = (g) => { if(!added.has(g)) { gateOrder.push(g); added.add(g); } };

            let edges = [];
            for (let dim=0; dim<4; dim++) {
                for (let i=0; i<16; i++) {
                    let j = i ^ (1<<dim);
                    if (i < j) edges.push({i, j, dim});
                }
            }

            for(let dim=0; dim<4; dim++) addGate(`X${3-dim}`);
            edges.forEach(edge => {
                const targetQ = 3 - edge.dim; 
                const ctrlPool = [0,1,2,3].filter(q=>q!==targetQ); 
                ctrlPool.forEach(c => { const val = (edge.i >> (3-c)) & 1; addGate(`CX${val}${c}${targetQ}`); });
            });
            edges.forEach(edge => {
                const targetQ = 3 - edge.dim; 
                const ctrlPool = [0,1,2,3].filter(q=>q!==targetQ); 
                const combos = [[ctrlPool[0],ctrlPool[1]], [ctrlPool[0],ctrlPool[2]], [ctrlPool[1],ctrlPool[2]]];
                combos.forEach(([c0,c1]) => { const v0 = (edge.i>>(3-c0))&1, v1 = (edge.i>>(3-c1))&1; addGate(`TOF${v0}${v1}${c0}${c1}${targetQ}`); });
            });
            edges.forEach(edge => { addGate(`SWAP_${edge.i}_${edge.j}`); });

            const wrapBtn = (type) => {
                const hex = getGateColorMap(type);
                const rgbaLight = getRgba(hex, 0.35); 
                const bgImage = isQuantumMode ? `linear-gradient(#463438,#463438), linear-gradient(#463438,#463438), linear-gradient(#463438,#463438), linear-gradient(#463438,#463438)` : `none`;
                return `<button id="gate-btn-${type}" class="gate-btn-v2" style="background-color: ${rgbaLight}; background-image: ${bgImage};"
                    onmouseenter="highlightByGate('${type}')"
                    onmouseleave="clearHighlight()"
                    onclick="applyGate('${type}')">${getGateContent(type)}</button>`;
            };
            
            gateOrder.forEach(g => { html += wrapBtn(g); });
            grid.innerHTML = html;
        }

        function flashGateLines(type) {
            let pairs = getHighlightPairsForGate(type);
            pairs.forEach(([a, b]) => {
                const el = document.getElementById(`line-${Math.min(a,b)}-${Math.max(a,b)}`);
                if (el) el.classList.add('swap-active');
            });
            setTimeout(() => {
                pairs.forEach(([a, b]) => {
                    const el = document.getElementById(`line-${Math.min(a,b)}-${Math.max(a,b)}`);
                    if (el) el.classList.remove('swap-active');
                });
                clearHighlight();
            }, 500);
        }

        function drawStaticLines() {
            const layer = document.getElementById('lines-layer');
            layer.innerHTML = '';
            for (let i = 0; i < 16; i++) {
                for (let b = 0; b < 4; b++) {
                    let j = i ^ (1 << b);
                    if (j > i) createLine(i, j, b);
                }
            }
        }

        function createLine(i, j, dim) {
            const n1 = nodePositions[i], n2 = nodePositions[j];
            const x1 = n1.l + 45, y1 = n1.t + 45, x2 = n2.l + 45, y2 = n2.t + 45;
            const len = Math.sqrt((x2-x1)**2 + (y2-y1)**2);
            const ang = Math.atan2(y2-y1, x2-x1) * 180 / Math.PI;
            const line = document.createElement('div');
            line.className = 'connection-line';
            line.id = `line-${Math.min(i,j)}-${Math.max(i,j)}`;
            line.style.cssText = `width:${len}px; left:${x1}px; top:${y1}px; transform:rotate(${ang}deg); transform-origin:0 50%;`;
            if(dim===3){
                line.style.height='8px'; line.style.background='transparent'; line.style.borderTop='3px dashed #463438'; line.style.opacity='0.4';
            } else {
                line.style.height='3px'; line.style.background='#463438';
            }
            line.onmouseenter = () => {
                if (isTouchDevice || lockedLineId) return;
                hoverLine = { i, j, dim };
                if (lineMode === 8) { 
                    highlightPairs(getAllPairs(dim)); highlightGateButton(`X${3 - dim}`);
                } else if (lineMode === 1) {
                    highlightPairs([[i, j]]); highlightGateButton(`SWAP_${i}_${j}`);
                } else { 
                    highlightPairs([[i, j]]); 
                }
            };
            line.onmouseleave = () => { 
                if (isTouchDevice || lockedLineId) return; 
                hoverLine = null; clearHighlight(); 
            };
            line.onclick = (e) => {
                e.stopPropagation();
                if (isSolved) return;
                
                if (isTouchDevice && typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    if (!gyroPermissionGranted) {
                        DeviceOrientationEvent.requestPermission().then(state => {
                            if (state === 'granted') {
                                gyroPermissionGranted = true;
                                window.addEventListener('deviceorientation', handleOrientation);
                            }
                        }).catch(console.error);
                    }
                } else if (isTouchDevice && !gyroPermissionGranted) {
                    gyroPermissionGranted = true;
                    window.addEventListener('deviceorientation', handleOrientation);
                }

                if (lineMode === 1) { applyGate(`SWAP_${i}_${j}`); return; }
                if (lineMode === 8) { applyGate(`X${3 - dim}`); return; }

                if (lockedLineId === line.id) {
                    cancelLock();
                    return;
                }

                lockedLineId = line.id;
                hoverLine = { i, j, dim };
                currentOptions = buildGateOptions(i, j, dim);
                currentOptionIndex = 0;
                hasScrolled = false;

                const canvasRect = document.getElementById('main-canvas').getBoundingClientRect();
                const indicator = document.getElementById('ios-indicator');
                indicator.style.left = (e.clientX - canvasRect.left) + 'px';
                indicator.style.top = (e.clientY - canvasRect.top - 25) + 'px';

                showIndicatorLockedPrompt();
            };
            document.getElementById('lines-layer').appendChild(line);
        }

        function cancelLock() {
            lockedLineId = null;
            hoverLine = null;
            hasScrolled = false;
            hideIndicator();
            clearHighlight();
        }

        function cycleLineMode(){ 
            pop.currentTime = 0; pop.play(); 
            const modes = [1, 2, 4, 8]; 
            lineMode = modes[(modes.indexOf(lineMode) + 1) % modes.length]; 
            const btn = document.getElementById('mode-btn'); 
            btn.innerText = `Mode: ${lineMode}`; btn.className = `multi-toggle-btn mode-${lineMode}`; 
            cancelLock();
        }

        function showIndicatorLockedPrompt() {
            const pill = document.getElementById('ios-indicator');
            const frac = document.getElementById('ind-fraction');
            frac.innerText = isTouchDevice ? `↔ TILT` : `↕ SCROLL & R-CLICK`;
            pill.classList.add('active');
            clearHighlight();
            highlightPairs([[hoverLine.i, hoverLine.j]]);
        }

        function showIndicatorScrolled() { 
            const pill = document.getElementById('ios-indicator'); 
            const frac = document.getElementById('ind-fraction'); 
            const opt = currentOptions[currentOptionIndex]; 
            if (!opt) return; 
            frac.innerText = `${currentOptionIndex + 1} / ${currentOptions.length}`; 
            pill.classList.add('active'); 
            highlightPairs(opt.highlightPairs); 
            highlightGateButton(opt.gateType);
        }

        function hideIndicator() { document.getElementById('ios-indicator').classList.remove('active'); clearHighlight(); }

        function buildGateOptions(i, j, dim) {
            const targetQ = 3 - dim; const ctrlPool = [0,1,2,3].filter(q=>q!==targetQ); const bit = 1 << dim; const options = [];
            if(lineMode === 4) {
                ctrlPool.forEach(c => { const val = (i >> (3-c)) & 1; const cBit = 1 << (3-c), cVal = i & cBit; let pairs = []; for(let k=0;k<16;k++) if((k&bit)===0 && (k&cBit)===cVal) pairs.push([k, k^bit]); options.push({ gateType: `CX${val}${c}${targetQ}`, label: `CNOT: q${c} → q${targetQ}`, highlightPairs: pairs }); });
            } else if(lineMode === 2) {
                const combos = [[ctrlPool[0],ctrlPool[1]], [ctrlPool[0],ctrlPool[2]], [ctrlPool[1],ctrlPool[2]]];
                combos.forEach(([c0,c1]) => { const v0 = (i>>(3-c0))&1, v1 = (i>>(3-c1))&1; const b0 = 1<<(3-c0), b1 = 1<<(3-c1), val0 = i&b0, val1 = i&b1; let pairs = []; for(let k=0;k<16;k++) if((k&bit)===0 && (k&b0)===val0 && (k&b1)===val1) pairs.push([k,k^bit]); options.push({ gateType: `TOF${v0}${v1}${c0}${c1}${targetQ}`, label: `TOF: q${c0},q${c1} → q${targetQ}`, highlightPairs: pairs }); });
            }
            return options;
        }

        function getAllPairs(dim){ const bit=1<<dim, pairs=[]; for(let k=0;k<16;k++) if((k&bit)===0) pairs.push([k,k^bit]); return pairs; }

        function highlightPairs(pairs){ 
            clearHighlight(); 
            pairs.forEach(([a,b])=>{ const el=document.getElementById(`line-${Math.min(a,b)}-${Math.max(a,b)}`); if(el) el.classList.add('line-highlight'); }); 
        }
        
        function applyGate(type) {
            if (isSolved) return;
            cancelLock();
            if (selectedIndices.length > 0) {
                selectedIndices.sort((a, b) => a - b);
                const start = selectedIndices[0], count = selectedIndices.length;
                const oldOnes = gateHistory.slice(start, start + count);
                gateHistory.splice(start, count, type);
                actionStack.push({ type: 'replace', index: start, oldGates: oldOnes, newGate: type });
                selectedIndices = [];
                recalculate();
            } else {
                flashGateLines(type);
                executeLogic(type);
                gateHistory.push(type);
                actionStack.push({ type: 'add', index: gateHistory.length - 1, newGate: type });
                steps = gateHistory.length;
                finishMove();
            }
        }

        function executeLogic(type) {
            pop.currentTime = 0; pop.play();
            if (type.startsWith('SWAP_')) { let p = type.split('_'), iA = parseInt(p[1]), iB = parseInt(p[2]); [fishAtNode[iA], fishAtNode[iB]] = [fishAtNode[iB], fishAtNode[iA]]; return; }
            let pm = Array.from({ length: 16 }, (_, p) => {
                let b = p.toString(2).padStart(4, '0').split('').map(Number);
                if (type.startsWith('X')) { b[parseInt(type.substring(1))] ^= 1; }
                else if (type.startsWith('CX')) { let ctrlVal = parseInt(type[2]), c = parseInt(type[3]), t = parseInt(type[4]); if (b[c] === ctrlVal) b[t] ^= 1; }
                else if (type.startsWith('TOF')) { let cv1 = parseInt(type[3]), cv2 = parseInt(type[4]), c1 = parseInt(type[5]), c2 = parseInt(type[6]), t = parseInt(type[7]); if (b[c1] === cv1 && b[c2] === cv2) b[t] ^= 1; }
                return parseInt(b.join(''), 2);
            });
            let newFish = new Array(16);
            for (let i = 0; i < 16; i++) newFish[pm[i]] = fishAtNode[i];
            fishAtNode = newFish;
        }

        function recalculate() { fishAtNode = [14, 7, 10, 1, 5, 0, 11, 6, 8, 9, 3, 2, 4, 15, 13, 12]; let h = [...gateHistory]; gateHistory = []; h.forEach(g => { executeLogic(g); gateHistory.push(g); }); steps = gateHistory.length; finishMove(); }
        function finishMove() { document.getElementById('step-count').innerText = steps; updateFishUI(); renderCircuit(); checkWin(); }
        function updateFishUI() { for (let nI = 0; nI < 16; nI++) { const f = document.getElementById(`fish-${fishAtNode[nI]}`), n = nodePositions[nI]; if (f && n) { f.style.top = (n.t + 27) + "px"; f.style.left = (n.l + 15) + "px"; } } }
        
        function renderCircuit() {
            const c = document.getElementById('circuit-content');
            const wrapper = document.getElementById('circuit-content-wrapper');
            c.innerHTML = '';
            gateHistory.forEach((g, idx) => {
                const u = document.createElement('div');
                u.className = 'circuit-unit';
                
                const hex = getGateColorMap(g);
                u.style.setProperty('--bg-hover', getRgba(hex, 0.35));

                if (selectedIndices.includes(idx)) u.classList.add('selected-gate');
                
                u.draggable = true;
                u.addEventListener('dragstart', (e) => {
                    if (isSolved || mobileDragging) return;
                    draggedIndex = idx;
                    u.classList.add('opacity-50');
                    e.dataTransfer.effectAllowed = 'move';
                    e.dataTransfer.setData('text/plain', idx);
                });
                
                u.addEventListener('dragover', (e) => { 
                    e.preventDefault(); 
                    if (draggedIndex !== null && draggedIndex !== idx) {
                        const rect = u.getBoundingClientRect();
                        const isAfter = (e.clientX - rect.left) > (rect.width / 2);
                        // Highlight pink border left or right to indicate target slot
                        u.style.borderLeft = isAfter ? '' : '4px solid #FFB7C5';
                        u.style.borderRight = isAfter ? '4px solid #FFB7C5' : '';
                    }
                });
                
                u.addEventListener('dragleave', () => { 
                    u.style.borderLeft = ''; 
                    u.style.borderRight = '';
                });
                
                u.addEventListener('drop', (e) => {
                    e.preventDefault(); 
                    u.style.borderLeft = ''; 
                    u.style.borderRight = '';
                    scrollSpeed = 0;
                    
                    if (draggedIndex !== null && draggedIndex !== idx) {
                        const rect = u.getBoundingClientRect();
                        const isAfter = (e.clientX - rect.left) > (rect.width / 2);
                        
                        let targetIdx = idx;
                        if (isAfter) targetIdx++;
                        
                        // Shift target index back if the element was originally in front of it
                        if (draggedIndex < targetIdx) targetIdx--;
                        
                        pop.currentTime = 0; pop.play();
                        const movedGate = gateHistory.splice(draggedIndex, 1)[0];
                        gateHistory.splice(targetIdx, 0, movedGate);
                        actionStack.push({ type: 'replace', index: 0, oldGates: [], newGate: null });
                        selectedIndices = []; recalculate();
                    }
                });
                u.addEventListener('dragend', () => { 
                    u.classList.remove('opacity-50'); 
                    draggedIndex = null; 
                    scrollSpeed = 0;
                    renderCircuit(); 
                });

                u.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (isSolved || mobileDragging || isTouchDevice) return; 
                    pop.currentTime = 0; pop.play();
                    const removed = gateHistory[idx];
                    actionStack.push({ type: 'delete', index: idx, oldGates: [removed] });
                    gateHistory.splice(idx, 1); 
                    selectedIndices = []; 
                    recalculate();
                });

                u.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    if (isSolved || mobileDragging) return;
                    const sIdx = selectedIndices.indexOf(idx);
                    if (sIdx > -1) selectedIndices.splice(sIdx, 1); else selectedIndices.push(idx);
                    renderCircuit();
                });
                
                u.onmouseenter = () => highlightByGate(g);
                u.onmouseleave = () => clearHighlight();
                
                let touchTimer = null;
                let startX, startY;
                u.addEventListener('touchstart', (e) => {
                    if (isSolved || e.touches.length > 1) return;
                    startX = e.touches[0].clientX; startY = e.touches[0].clientY;
                    touchTimer = setTimeout(() => { touchTimer = null; }, 400);
                }, { passive: true });
                
                u.addEventListener('touchmove', (e) => {
                    if (mobileDragging) {
                    } else if (touchTimer !== null || startY !== undefined) {
                        const dx = e.touches[0].clientX - startX, dy = e.touches[0].clientY - startY;
                        if (Math.abs(dx) > 10 || Math.abs(dy) > 10) { if(touchTimer) { clearTimeout(touchTimer); touchTimer = null; } }
                        if (Math.abs(dy) > 30 && Math.abs(dy) > Math.abs(dx)) {
                            if (e.cancelable) e.preventDefault();
                            if (dy > 30) {
                                const sIdx = selectedIndices.indexOf(idx);
                                if (sIdx > -1) selectedIndices.splice(sIdx, 1); else selectedIndices.push(idx);
                                renderCircuit(); startY = undefined; 
                            } else if (dy < -30) {
                                pop.currentTime = 0; pop.play();
                                const removed = gateHistory[idx];
                                actionStack.push({ type: 'delete', index: idx, oldGates: [removed] });
                                gateHistory.splice(idx, 1);
                                selectedIndices = []; recalculate(); startY = undefined;
                            }
                        }
                    }
                }, { passive: false });
                
                u.addEventListener('touchend', () => { if (touchTimer) { clearTimeout(touchTimer); touchTimer = null; } });

                if (!isQuantumMode) {
                    u.innerHTML = getMiniHypercubeSVG(g);
                } else {
                    let controls = [], target = -1;
                    if (g.startsWith('SWAP_')) {
                        let p = g.split('_'), iA = parseInt(p[1]), iB = parseInt(p[2]); target = 3 - Math.round(Math.log2(iA ^ iB));
                        let binary = Math.min(iA, iB).toString(2).padStart(4, '0').split('').map(Number);
                        for (let q = 0; q < 4; q++) if (q !== target) controls.push({ line: q, type: binary[q] });
                    } else if (g.startsWith('X')) { target = parseInt(g.substring(1)); }
                    else if (g.startsWith('CX')) { controls.push({ line: parseInt(g[3]), type: parseInt(g[2]) }); target = parseInt(g[4]); }
                    else if (g.startsWith('TOF')) { controls.push({ line: parseInt(g[5]), type: parseInt(g[3]) }); controls.push({ line: parseInt(g[6]), type: parseInt(g[4]) }); target = parseInt(g[7]); }
                    if (target !== -1) {
                        let lines = [target, ...controls.map(ctrl => ctrl.line)]; let minQ = Math.min(...lines), maxQ = Math.max(...lines);
                        const vLine = document.createElement('div'); vLine.className = 'connection-v-line'; vLine.style.cssText = `top:${30 + minQ * 40}px; height:${(maxQ - minQ) * 40}px;`; u.appendChild(vLine);
                        controls.forEach(ctrl => {
                            const dot = document.createElement('div'); dot.className = 'control-dot'; dot.style.top = (24 + ctrl.line * 40) + 'px';
                            if (ctrl.type === 0) { dot.style.background = '#fff'; dot.style.border = '2px solid #463438'; } u.appendChild(dot);
                        });
                        const t = document.createElement('div'); t.className = 'circuit-target'; t.style.top = (32 + target * 40) + 'px'; u.appendChild(t);
                    }
                }
                c.appendChild(u);
            });
            updateUndoStatus();
            if (selectedIndices.length === 0 && gateHistory.length > 0 && draggedIndex === null) { setTimeout(() => wrapper.scrollTo({ left: wrapper.scrollWidth, behavior: 'smooth' }), 50); }
        }
        
        function undo() { if (isSolved || actionStack.length === 0) return; pop.currentTime = 0; pop.play(); const action = actionStack.pop(); if (action.type === 'add') { gateHistory.splice(action.index, 1); } else if (action.type === 'delete') { gateHistory.splice(action.index, 0, ...action.oldGates); } else if (action.type === 'replace') { if (action.newGate === null) gateHistory = [...action.oldGates]; else gateHistory.splice(action.index, 1, ...action.oldGates); } selectedIndices = []; recalculate(); }
        function resetCircuit() { if (isSolved) return; pop.currentTime = 0; pop.play(); gateHistory = []; actionStack = []; selectedIndices = []; recalculate(); }
        function updateUndoStatus() { const isActive = actionStack.length > 0 && !isSolved; const topUndo = document.getElementById('undo-btn'); if(topUndo) topUndo.classList.toggle('active', isActive); const bottomUndo = document.getElementById('undo-btn-bottom'); if(bottomUndo) bottomUndo.classList.toggle('active', isActive); }
        
        async function checkWin() {
            if (fishAtNode.every((pos, i) => pos === i)) {
                isSolved = true; updateUndoStatus(); if (timerInterval) clearInterval(timerInterval);
                const ft = time, st = steps, u = sessionStorage.getItem('currentUser'), savedLevel = parseInt(sessionStorage.getItem('currentLevel')) || 1;
                if (savedLevel < 11) sessionStorage.setItem('currentLevel', 11);
                setTimeout(() => {
                    if(typeof meow !== 'undefined') { meow.currentTime = 0; meow.play(); }
                    document.getElementById('victoryMsg').innerText = `STEP：${st} | TIME：${ft}s`;
                    document.getElementById('victoryModal').style.display = 'flex';
                }, 800);
            }
        }
        
        function viewInLab() { if (gateHistory.length === 0) { alert("Current circuit is empty!"); return; } window.location.href = `lab4.html?circuit=${encodeURIComponent(gateHistory.join(','))}`; }
        function toggleLeaderboard() { document.getElementById('leaderboard-wrapper').classList.toggle('expanded'); }
        async function fetchLeaderboard() { const listArea = document.getElementById('rankList'); try { const response = await fetch(`${SCRIPT_URL}?action=getLeaderboard&level=11`); const data = await response.json(); if (data && Array.isArray(data) && data.length > 0) { leaderboardData = data; renderRank('steps'); } else { listArea.innerHTML = '<p class="text-center italic text-gray-400 mt-10 text-sm">No records yet</p>'; } } catch (e) { listArea.innerHTML = '<p class="text-center italic text-red-400 mt-10 text-sm">Load Error</p>'; } }
        function renderRank(type) { const tabSteps = document.getElementById('tab-steps'), tabTime = document.getElementById('tab-time'), listArea = document.getElementById('rankList'); if (type === 'steps') { tabSteps.className = 'rank-tab active'; tabTime.className = 'rank-tab bg-gray-100'; } else { tabSteps.className = 'rank-tab bg-gray-100'; tabTime.className = 'rank-tab active'; } if (!leaderboardData || leaderboardData.length === 0) return; const sorted = [...leaderboardData].sort((a, b) => a[type] - b[type]); let html = ""; sorted.slice(0, 10).forEach((item, index) => { const medal = index === 0 ? "🥇" : index === 1 ? "🥈" : index === 2 ? "🥉" : (index + 1) + "."; html += `<div class="rank-item"><span class="truncate" style="max-width: 90px;">${medal} ${item.username || item.name || 'Anonymous'}</span><span class="text-blue-600">${type === 'steps' ? item.steps + '🐾' : item.time + 's'}</span></div>`; }); listArea.innerHTML = html; }
        function initGameLayout() { const nL = document.getElementById('nodes-layer'), fL = document.getElementById('fishes-layer'); nL.innerHTML = ''; fL.innerHTML = ''; for (let i = 0; i < 16; i++) { let bin = i.toString(2).padStart(4, '0'); const catHat = (i >= 8) ? `<img src="./image/hat.png" class="hat-img cat-hat">` : ''; nL.innerHTML += `<div class="node" id="node-${i}" style="top:${nodePositions[i].t}px; left:${nodePositions[i].l}px;"><div class="fixed-number">${bin}</div>${catHat}<img src="./image/Cat${(i % 8) + 1}.svg"></div>`; const fishSrc = `./image/Fish${(i % 8) + 1}.svg`; const fishHat = (i >= 8) ? `<img src="./image/hat.png" class="hat-img fish-hat">` : ''; fL.innerHTML += `<div id="fish-${i}" class="fish-wrapper"><div class="fish-label">${bin}</div>${fishHat}<img src="${fishSrc}" class="fish-bg-shape"><img src="${fishSrc}" class="fish-img"></div>`; } }
    </script>
</body>
