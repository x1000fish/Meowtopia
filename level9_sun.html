<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meowtopia - Level 9 (Scroll Selection)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #FEF3C7; color: #000; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; }
        .main-layout { display: flex; align-items: flex-start; justify-content: center; gap: 20px; margin-top: 20px; }
        .game-canvas { position: relative; width: 1900px; height: 550px; background: #EEE8D3; border: 8px solid #000; border-radius: 40px; overflow: hidden; }
        .node { width: 100px; height: 100px; background: white; border: 5px solid #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: absolute; box-shadow: 3px 3px 0 #000; z-index: 20; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .node img { width: 70px; height: auto; pointer-events: none; }
        .fixed-number { position: absolute; bottom: -2px; right: 24px; font-size: 16px; font-weight: 900; color: #000; pointer-events: none; z-index: 25; }
        .connection-line { position: absolute; background: #000; z-index: 10; cursor: pointer; transition: background 0.15s, height 0.15s; }
        .line-highlight { background: #ffc822 !important; box-shadow: 0 0 15px rgba(251,191,36,0.8) !important; height: 8px !important; z-index: 15; border-top: none !important; opacity: 1 !important; }

        /* ── 美化後的滾輪指示器 ── */
        #wheel-indicator {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            color: #fff;
            padding: 12px 25px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 900;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            pointer-events: none;
            opacity: 0;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 500;
            border: 2px solid #ffc822;
        }
        #wheel-indicator.active {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }
        .ind-fraction { color: #ffc822; font-size: 24px; border-right: 2px solid #555; padding-right: 15px; }
        .ind-label { font-size: 18px; letter-spacing: 1px; }

        /* 遊戲其餘樣式保持不變... */
        .fish-wrapper { position: absolute; width: 70px; height: 70px; pointer-events: none; z-index: 30; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .fish-label { background: #000000b6; color: #fff; width: 32px; height: 22px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; z-index: 5; position: absolute; top: 24px; }
        #pro-panel { width: 0; opacity: 0; height: 550px; overflow: hidden; background: #fff; border: 0px solid #000; border-radius: 40px; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .pro-active #pro-panel { width: 600px; opacity: 1; border: 8px solid #000; padding: 15px; }
        .multi-toggle-btn { background: #c76419; border: 4px solid #000; border-radius: 20px; padding: 5px 15px; font-weight: 900; font-size: 20px; color: white; cursor: pointer; box-shadow: 0 4px 0 #000; transition: all 0.1s; min-width: 140px; }
        .mode-2 { background: #2b66e5 !important; } .mode-4 { background: #A855F7 !important; } .mode-8 { background: #10B981 !important; }
        #circuit-area { width: 1155px; height: 0; opacity: 0; background: #fff; border: 0px solid #000; border-radius: 30px; margin-top: 20px; transition: all 0.5s; overflow: hidden; }
        .pro-active #circuit-area { height: 250px; opacity: 1; border: 8px solid #000; padding: 15px; }
        #circuit-content { display: flex; height: 180px; width: max-content; background-image: linear-gradient(#000,#000), linear-gradient(#000,#000), linear-gradient(#000,#000), linear-gradient(#000,#000); background-size: 100% 3px; background-repeat: no-repeat; background-position: 0 30px, 0 70px, 0 110px, 0 150px; }
    </style>
</head>
<body id="body-root">
    <div id="mode-toggle" class="mode-toggle-fixed" style="position:fixed;top:20px;right:20px;width:70px;height:70px;background:#fff;border:5px solid #000;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;cursor:pointer;box-shadow:0 4px 0 #000;z-index:500;" onclick="togglePro()">👁️</div>

    <div class="main-layout flex-col w-full max-w-6xl items-center">
        <div class="flex justify-between w-full px-4 mb-4 items-center">
            <div class="text-3xl font-black">STEPS: <span id="step-count">0</span> | TIME: <span id="timer">0</span></div>
            <button id="mode-btn" class="multi-toggle-btn" onclick="cycleLineMode()">Mode: 1</button>
            <div class="text-3xl font-black text-green-600">LEVEL 9</div>
        </div>

        <div class="flex main-layout w-full">
            <div id="pro-panel">
                <div class="panel-section-title">Control</div>
                <button class="func-btn btn-reset" style="width:100%;padding:10px;border:2px solid #000;border-radius:20px;background:#eee;font-weight:900;" onclick="resetCircuit()">Reset Circuit</button>
                <button id="undo-btn" class="func-btn btn-undo" style="width:100%;padding:10px;border:2px solid #000;border-radius:20px;background:#f88;color:#fff;font-weight:900;margin-top:5px;" onclick="undo()">Undo Step</button>
            </div>

            <div class="game-canvas" id="main-canvas">
                <div id="wheel-indicator">
                    <span class="ind-fraction" id="ind-fraction">1 / 3</span>
                    <span class="ind-label" id="ind-label">TOF: q0,q1 -> q3</span>
                </div>

                <div id="lines-layer"></div>
                <div id="nodes-layer"></div>
                <div id="fishes-layer"></div>
                <div class="mode-hint" id="mode-hint" style="position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:#000;color:#fff;padding:5px 15px;border-radius:20px;font-size:12px;opacity:0.7;"></div>
            </div>
        </div>

        <div id="circuit-area" class="mx-auto">
            <div id="circuit-content-wrapper" style="overflow-x:auto;scrollbar-width:none;margin-left:45px;"><div id="circuit-content"></div></div>
        </div>
        
        <div class="w-full text-center mt-6">
            <a href="index.html" class="game-btn btn-red px-16" style="background:#EF4444;border:5px solid #000;border-radius:50px;padding:10px 40px;color:#fff;font-weight:900;font-size:24px;">GIVE UP</a>
        </div>
    </div>

    <script>
    let steps = 0, time = 0, isPro = false, timerInterval;
    let gateHistory = [], isSolved = false, actionStack = [];
    let fishAtNode = [8,9,10,11,12,13,14,15, 0,1,2,3,4,5,6,7];
    let lineMode = 1;

    // 選擇狀態
    let hoverLine = null;
    let currentOptionIndex = 0;
    let currentOptions = [];

    const pop = new Audio('pop.m4a');
    const meow = new Audio('meow.m4a');

    const nodePositions = Array.from({length:16},(_,i)=>{
        let x=(i&1)?120:0, y=(i&2)?120:0;
        if(i&4){x+=(i&1)?90:-80; y+=(i&2)?80:-80;}
        if(i&8){x+=400; y-=80;}
        return {t:y+195, l_val:x};
    });

    window.onload = () => {
        initGameLayout();
        drawStaticLines();
        updateFishUI();
        timerInterval = setInterval(()=>{time++; document.getElementById('timer').innerText=time;},1000);

        // 核心滾輪邏輯
        document.addEventListener('wheel', (e) => {
            if (!hoverLine || lineMode === 1 || lineMode === 8) return;
            e.preventDefault();
            
            // 切換索引
            if (e.deltaY > 0) currentOptionIndex = (currentOptionIndex + 1) % currentOptions.length;
            else currentOptionIndex = (currentOptionIndex - 1 + currentOptions.length) % currentOptions.length;
            
            showWheelIndicator();
        }, { passive: false });
    };

    function showWheelIndicator() {
        const el = document.getElementById('wheel-indicator');
        const frac = document.getElementById('ind-fraction');
        const label = document.getElementById('ind-label');
        
        const opt = currentOptions[currentOptionIndex];
        if (!opt) return;

        frac.innerText = `${currentOptionIndex + 1} / ${currentOptions.length}`;
        label.innerText = opt.label;
        
        el.classList.add('active');
        
        // 高亮對應線條
        clearHighlight();
        highlightPairs(opt.highlightPairs);
    }

    function hideWheelIndicator() {
        document.getElementById('wheel-indicator').classList.remove('active');
        clearHighlight();
    }

    function cycleLineMode(){
        const modes = [1, 2, 4, 8];
        lineMode = modes[(modes.indexOf(lineMode) + 1) % modes.length];
        const btn = document.getElementById('mode-btn');
        btn.innerText = `Mode: ${lineMode}`;
        btn.className = `multi-toggle-btn mode-${lineMode}`;
        pop.currentTime = 0; pop.play();
        hideWheelIndicator();
    }

    /* ── Gate 邏輯產出 ── */
    function buildGateOptions(i, j, dim) {
        const targetQ = 3 - dim;
        const ctrlPool = [0,1,2,3].filter(q=>q!==targetQ);
        const bit = 1 << dim;
        const options = [];

        if(lineMode === 4) {
            ctrlPool.forEach(c => {
                const val = (i >> (3-c)) & 1;
                const cBit = 1 << (3-c), cVal = i & cBit;
                let pairs = [];
                for(let k=0;k<16;k++) if((k&bit)===0 && (k&cBit)===cVal) pairs.push([k, k^bit]);
                options.push({ gateType: `CX${val}${c}${targetQ}`, label: `CNOT: q${c} -> q${targetQ}`, highlightPairs: pairs });
            });
        } else if(lineMode === 2) {
            const combos = [[ctrlPool[0],ctrlPool[1]], [ctrlPool[0],ctrlPool[2]], [ctrlPool[1],ctrlPool[2]]];
            combos.forEach(([c0,c1]) => {
                const v0 = (i>>(3-c0))&1, v1 = (i>>(3-c1))&1;
                const b0 = 1<<(3-c0), b1 = 1<<(3-c1), val0 = i&b0, val1 = i&b1;
                let pairs = [];
                for(let k=0;k<16;k++) if((k&bit)===0 && (k&b0)===val0 && (k&b1)===val1) pairs.push([k,k^bit]);
                options.push({ gateType: `TOF${v0}${v1}${c0}${c1}${targetQ}`, label: `TOF: q${c0},q${c1} -> q${targetQ}`, highlightPairs: pairs });
            });
        }
        return options;
    }

    function createLine(i,j,dim){
        const n1=nodePositions[i], n2=nodePositions[j];
        const line=document.createElement('div');
        line.className='connection-line';
        line.id=`line-${Math.min(i,j)}-${Math.max(i,j)}`;
        
        const refreshPos = () => {
            const x1=n1.l_val+(isPro?100:240)+45, y1=n1.t+45;
            const x2=n2.l_val+(isPro?100:240)+45, y2=n2.t+45;
            const len=Math.sqrt((x2-x1)**2+(y2-y1)**2), ang=Math.atan2(y2-y1,x2-x1)*180/Math.PI;
            line.style.cssText=`width:${len}px;left:${x1}px;top:${y1}px;transform:rotate(${ang}deg);transform-origin:0 50%; height:${dim===3?'8px':'3px'}; background:${dim===3?'transparent':'#000'}; border-top:${dim===3?'3px dashed #000':''}; opacity:${dim===3?0.4:1};`;
        };
        refreshPos();

        line.onmouseenter = () => {
            if(lineMode === 1) return;
            hoverLine = {i,j,dim};
            if (lineMode === 8) {
                highlightPairs(buildXGatePairs(dim));
            } else {
                currentOptions = buildGateOptions(i,j,dim);
                currentOptionIndex = 0;
                showWheelIndicator();
            }
        };
        line.onmouseleave = () => { hoverLine = null; hideWheelIndicator(); };
        line.onclick = () => {
            if(isSolved) return;
            if(lineMode === 1) applyGate(`SWAP_${i}_${j}`);
            else if(lineMode === 8) applyGate(`X${3-dim}`);
            else if(currentOptions[currentOptionIndex]) applyGate(currentOptions[currentOptionIndex].gateType);
        };
        document.getElementById('lines-layer').appendChild(line);
    }

    function buildXGatePairs(dim) {
        const bit = 1 << dim; let pairs = [];
        for(let k=0;k<16;k++) if((k&bit)===0) pairs.push([k, k^bit]);
        return pairs;
    }

    function highlightPairs(pairs){
        clearHighlight();
        pairs.forEach(([a,b])=>{
            const el = document.getElementById(`line-${Math.min(a,b)}-${Math.max(a,b)}`);
            if(el) el.classList.add('line-highlight');
        });
    }
    function clearHighlight(){ document.querySelectorAll('.connection-line').forEach(l=>l.classList.remove('line-highlight')); }

    /* ── 核心遊戲邏輯 ── */
    function applyGate(type){
        executeLogic(type);
        gateHistory.push(type);
        steps = gateHistory.length;
        document.getElementById('step-count').innerText = steps;
        updateFishUI(); renderCircuit(); checkWin();
    }

    function executeLogic(type){
        pop.currentTime=0; pop.play();
        if(type.startsWith('SWAP_')){
            const p=type.split('_'), iA=parseInt(p[1]), iB=parseInt(p[2]);
            [fishAtNode[iA],fishAtNode[iB]]=[fishAtNode[iB],fishAtNode[iA]];
            return;
        }
        const pm = Array.from({length:16}, (_,p)=>{
            const b = p.toString(2).padStart(4,'0').split('').map(Number);
            if(type.startsWith('X')) b[parseInt(type[1])] ^= 1;
            else if(type.startsWith('CX')){
                const cv=parseInt(type[2]), c=parseInt(type[3]), t=parseInt(type[4]);
                if(b[c]===cv) b[t] ^= 1;
            } else if(type.startsWith('TOF')){
                const cv0=parseInt(type[3]), cv1=parseInt(type[4]), c0=parseInt(type[5]), c1=parseInt(type[6]), t=parseInt(type[7]);
                if(b[c0]===cv0 && b[c1]===cv1) b[t] ^= 1;
            }
            return parseInt(b.join(''),2);
        });
        let nextFish = new Array(16);
        for(let i=0; i<16; i++) nextFish[pm[i]] = fishAtNode[i];
        fishAtNode = nextFish;
    }

    function updateFishUI(){
        for(let i=0; i<16; i++){
            const f = document.getElementById(`fish-${fishAtNode[i]}`), n = nodePositions[i];
            const l = n.l_val + (isPro?100:240);
            if(f){ f.style.top=(n.t+27)+'px'; f.style.left=(l+15)+'px'; }
        }
    }

    function renderCircuit(){
        const c = document.getElementById('circuit-content');
        c.innerHTML = '';
        gateHistory.forEach((g,idx)=>{
            const u = document.createElement('div'); u.className = 'circuit-unit';
            u.style.minWidth = '40px'; u.style.borderRight = '1px solid #ddd';
            u.innerText = g.split('_')[0]; // 簡化顯示
            c.appendChild(u);
        });
    }

    function togglePro(){
        isPro = !isPro;
        document.getElementById('body-root').classList.toggle('pro-active', isPro);
        document.getElementById('mode-toggle').innerText = isPro ? '⚡️' : '👁️';
        document.getElementById('lines-layer').innerHTML = '';
        drawStaticLines(); updateFishUI();
    }

    function initGameLayout(){
        const nL=document.getElementById('nodes-layer'), fL=document.getElementById('fishes-layer');
        nL.innerHTML=''; fL.innerHTML='';
        for(let i=0; i<16; i++){
            const bin = i.toString(2).padStart(4,'0');
            nL.innerHTML += `<div class="node" id="node-${i}" style="top:${nodePositions[i].t}px;left:${nodePositions[i].l_val+240}px;"><div class="fixed-number">${bin}</div><img src="./image/Cat${(i%8)+1}.svg"></div>`;
            fL.innerHTML += `<div id="fish-${i}" class="fish-wrapper" style="top:${nodePositions[i].t+27}px;left:${nodePositions[i].l_val+240+15}px;"><div class="fish-label">${bin}</div><img src="./image/Fish${(i%8)+1}.svg" class="fish-img"></div>`;
        }
    }

    function drawStaticLines(){
        for(let i=0; i<16; i++) for(let b=0; b<4; b++){ let j=i^(1<<b); if(j>i) createLine(i,j,b); }
    }

    function checkWin(){
        if(fishAtNode.every((pos,i)=>pos===i)){
            isSolved = true; clearInterval(timerInterval);
            meow.play(); document.getElementById('victoryModal').style.display='flex';
        }
    }
    function resetCircuit(){ location.reload(); }
    function undo(){ gateHistory.pop(); recalculate(); }
    function recalculate(){ fishAtNode=[8,9,10,11,12,13,14,15,0,1,2,3,4,5,6,7]; gateHistory.forEach(g=>executeLogic(g)); steps=gateHistory.length; updateFishUI(); renderCircuit(); }
    </script>
</body>
</html>
