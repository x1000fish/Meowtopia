<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meowtopia - Level 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #FEF3C7; color: #000; }
        .game-btn { cursor: pointer; border: 5px solid #000; border-radius: 60px; padding: 12px; font-size: 26px; font-weight: 900; color: white; text-shadow: 2px 2px 0 #000; box-shadow: 0 4px 0 #000; position: relative; transition: all 0.1s; display: inline-block; }
        .game-btn:active { top: 6px; box-shadow: 0 2px 0 #000; }
        .btn-red { background: #EF4444; } .btn-green { background: #22C55E; }
        .game-canvas { position: relative; width: 850px; height: 410px; background: #EEE8D3; border: 8px solid #000; border-radius: 40px; margin: 20px auto; overflow: hidden; }
        .connection-line { height: 8px; background: #000; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); cursor: pointer; transition: all 0.3s ease; z-index: 10; }
        .connection-line:hover { background: #ffc822; box-shadow: 0 0 20px rgba(251, 191, 36, 0.5); }
        .cat-node { width: 160px; height: 160px; background: white; border: 6px solid #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: absolute; box-shadow: 3px 3px 0 #000; top: 50%; transform: translateY(-50%); z-index: 20; }
        #node-0 { left: 150px; } #node-1 { right: 150px; }
        .fish-wrapper { position: absolute; width: 80px; z-index: 30; pointer-events: none; display: flex; flex-direction: column; align-items: center; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .fish-wrapper img { width: 75px; height: auto; }
        .fish-label { background: #000000b6; color: #fff; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; margin-bottom: -47px; z-index: 5; position: relative; top: -10px; }
        .fixed-number { position: absolute; bottom: -5px; right: 65px; font-size: 24px; font-weight: 900; color: #000; pointer-events: none; z-index: 25; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #F8F3DC; border: 8px solid #000; border-radius: 40px; padding: 30px; text-align: center; width: 350px; }
        .line-guide { animation: line-glow 1.5s infinite ease-in-out; }
        @keyframes line-glow { 0%, 100% { box-shadow: 0 0 5px #FFC822; background: #000000; } 50% { box-shadow: 0 0 20px #FFC822; background: #FFC822; transform: translate(-50%, -50%) scaleY(1.5); } }       
        .guide-hand { position: absolute; top: 40%; left: 50%; transform: translateX(-50%); z-index: 100; pointer-events: none; display: flex; flex-direction: column; align-items: center; animation: tap-anim 1.5s infinite; }
        @keyframes tap-anim { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-15px); } }
        .guide-hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
    <div id="level-screen" class="flex flex-col items-center w-full max-w-4xl">
        <div class="flex justify-between w-full px-4 mb-4">
            <div class="text-3xl font-black">STEPS: <span id="step-count">0</span> | TIME: <span id="timer">0</span>s</div>
            <div class="text-3xl font-black text-green-600">LEVEL 1</div>
        </div>
        <div class="game-canvas">
            <div id="main-line" class="connection-line line-guide" style="width: 300px;" onclick="swapFish()"></div>
            <div id="guide-hand" class="guide-hand"><div class="bg-[#ffc822] text-black font-black px-3 py-1 rounded-full mb-5 shadow-lg">CLICK TO SWAP</div><span class="text-5xl">👆🏻</span></div>
            <div class="cat-node" id="node-0"><div class="fixed-number">0</div><img src="./image/Cat1.svg" class="w-32"></div>
            <div class="cat-node" id="node-1"><div class="fixed-number">1</div><img src="./image/Cat2.svg" class="w-32"></div>
            <div id="fish-wrap-0" class="fish-wrapper"><div id="label-0" class="fish-label">1</div><img id="fish-0" src="./image/Fish1.svg"></div>
            <div id="fish-wrap-1" class="fish-wrapper"><div id="label-1" class="fish-label">0</div><img id="fish-1" src="./image/Fish2.svg"></div>
        </div>
        <div class="w-full text-center mt-6"><a href="index.html" class="game-btn btn-red px-16">GIVE UP</a></div>
    </div>
    <div id="victoryModal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-5xl font-black mb-4">MEOW!</h2><h2 class="text-5xl font-black mb-4">🐾</h2>
            <p id="victoryMsg" class="text-xl font-bold mb-6"></p>
            <button onclick="location.href='index.html'" class="game-btn btn-green w-full">KEEP GOING</button>
        </div>
    </div>
    <script>
        let currentSteps = 0, fishAtNode = [1, 0], startTime, timerInterval = null;
        let isGameOver = false;
        const pop = new Audio('pop.m4a'), meow = new Audio('meow.m4a');
        window.onload = () => { startTimer(); updateFishUI(); };
        function startTimer() { if (timerInterval) return; startTime = Date.now(); timerInterval = setInterval(() => { document.getElementById('timer').innerText = Math.floor((Date.now() - startTime) / 1000); }, 1000); }
        function swapFish() {
            if (isGameOver) return;
            pop.currentTime = 0; pop.play();
            document.getElementById('main-line').classList.remove('line-guide');
            document.getElementById('guide-hand').classList.add('guide-hidden');
            currentSteps++; document.getElementById('step-count').innerText = currentSteps;
            [fishAtNode[0], fishAtNode[1]] = [fishAtNode[1], fishAtNode[0]];
            updateFishUI(); checkWin();
        }
        function updateFishUI() {
            for(let i=0; i<2; i++) {
                const f = document.getElementById(`fish-wrap-${i}`), n = document.getElementById(`node-${fishAtNode[i]}`);
                f.style.top = (n.offsetTop + 21) + "px"; f.style.left = (n.offsetLeft + 35) + "px";
            }
        }
        function checkWin() {
            if (fishAtNode[0] === 0 && fishAtNode[1] === 1) {
                isGameOver = true;
                clearInterval(timerInterval);
                const ft = document.getElementById('timer').innerText, u = sessionStorage.getItem('currentUser');
                if (u) {
                    const ud = JSON.parse(localStorage.getItem(u));
                    if (ud && ud.level === 1) { ud.level = 2; localStorage.setItem(u, JSON.stringify(ud)); }
                }
                setTimeout(() => { meow.currentTime = 0; meow.play(); document.getElementById('victoryMsg').innerText = `STEP：${currentSteps} | TIME：${ft}s`; document.getElementById('victoryModal').style.display = 'flex'; }, 600);
            }
        }
    </script>
</body>
</html>
