        .circuit-unit { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; touch-action: none; transition: background 0.2s, box-shadow 0.2s; }
        .gate-btn-v2, .multi-toggle-btn, .func-btn, .game-btn, .btn-share { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; touch-action: manipulation; }
        #shake-toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%) scale(0.8); background: #99C44D; color: #463438; padding: 15px 40px; border-radius: 50px; font-weight: 900; font-size: 24px; z-index: 10000; opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none; border: 4px solid #463438; box-shadow: 0 0 20px rgba(153, 196, 77, 0.6), 0 8px 0 #463438; }
        #shake-toast.show { opacity: 1; transform: translateX(-50%) scale(1); }
        @keyframes pulse-toast { 0%, 100% { transform: translateX(-50%) scale(1); box-shadow: 0 0 20px rgba(153, 196, 77, 0.6), 0 8px 0 #463438; } 50% { transform: translateX(-50%) scale(1.1); box-shadow: 0 0 30px #99C44D, 0 8px 0 #463438; } }
        .toast-highlight { animation: pulse-toast 1s infinite !important; background: #99C44D !important; color: white !important; }
        .swap-active {
            background: #99C44D !important;
            box-shadow: 0 0 15px rgba(153, 196, 77, 0.8) !important;

            z-index: 15 !important;

        }
    </style>
</head>
<body id="body-root">
    <div id="shake-toast">Ctrl Mode: ON</div>
    <button onclick="navWithSound('lab2.html')" class="nav-fab" title="Go to 2-Bit">2</button>
    <div class="w-full max-w-6xl">
        <div class="flex w-full px-4 mb-4 items-center">
            <div class="text-3xl font-black">GATE COUNT: <span id="step-count">0</span></div>
            <div class="flex items-center gap-6 ml-auto">
                <button id="view-toggle-btn" class="multi-toggle-btn view-btn" onclick="toggleTraceMode()">Trace: OFF</button>
                <button id="mode-btn" class="multi-toggle-btn" onclick="cycleLineMode()">Mode: 1</button>
                <div class="text-3xl font-black" style="color: #7bc202;">LAB MODE</div>
            </div>
        </div>
        <div class="main-layout">
            <div id="pro-panel">
                <div id="gate-view-container" class="w-full flex-col flex h-full min-h-0">
                    <div class="panel-section-title">Quantum Gates</div>
                    <div id="gate-scroll-area">
                        <div class="grid grid-cols-4 gap-1 w-full" id="gate-grid"></div>
                    </div>
                    <div class="mt-auto w-full">
                        <div class="panel-section-title">Control</div>
                        <button class="func-btn btn-reset" onclick="resetCircuit()">Reset Circuit</button>
                        <button id="undo-btn" class="func-btn btn-undo" onclick="undo()">Undo Step</button>
                    </div>
                </div>
                <div id="tt-view-container" class="w-full flex-col hidden-el h-full flex" style="max-height: 100%; overflow: hidden;">
                    <div class="panel-section-title shrink-0 mt-2">Truth Table</div>
                    <div class="text-lg text-gray-400 text-center mb-2 font-bold flex justify-between px-8 shrink-0 border-b border-black-100 pb-2">
                        <span class="w-1/2 text-left text-black">INPUT</span>
                        <span class="w-1/2 text-right text-black">OUTPUT</span>
                    </div>
                    <div class="overflow-y-auto w-full flex-grow px-2 mb-2 custom-scrollbar" style="scrollbar-width: none;">
                        <table class="w-full text-center text-lg border-separate border-spacing-y-1">
                            <tbody id="tt-body" class="font-bold">
                                </tbody>
                        </table>
                    </div>
                </div>
                <div id="trace-controls" class="hidden-el shrink-0 w-full mt-auto flex gap-1 items-center bg-gray-100 p-2 rounded-2xl border-4 border-black shadow-[0_4px_0_0_rgba(0,0,0,0.1)] opacity-50 pointer-events-none transition-opacity">
                    <button class="func-btn btn-reset m-0 py-2 px-1 text-xs hover:bg-yellow-200 flex-1" style="box-shadow: 0 2px 0 #463438;;" onclick="traceMove(-1)">◀</button>
                    <div class="flex flex-col items-center justify-center px-1 min-w-[50px]">
                        <span class="text-[10px] font-black text-green-700 leading-none">STEP</span>
                        <span id="trace-step-text" class="font-black text-lg leading-none">0</span>
                    </div>
                    <button class="func-btn btn-reset m-0 py-2 px-1 text-xs hover:bg-yellow-200 flex-1" style="box-shadow: 0 2px 0 #463438;;" onclick="traceMove(1)">▶</button>
                    <button class="func-btn btn-red m-0 py-2 px-1 text-xs text-white border-black flex-1" style="box-shadow: 0 2px 0 #463438;;" onclick="exitTrace()">EXIT</button>
                </div>
            </div>
            <div class="game-canvas" id="main-canvas">
                <div id="ios-indicator">
                    <span class="ind-fraction" id="ind-fraction">1 / 3</span>
                    <span class="ind-label" id="ind-label"></span>
                </div>

                <div id="nodes-layer"></div>
                <div id="fishes-layer"></div>
            </div>
        </div>
        <div id="circuit-area" class="mx-auto relative">
            <div class="circuit-title font-black text-xl text-center">Circuit Diagram</div>
            <div id="q-in-0" class="qubit-label" style="top: 60px;">q0</div>
            <div id="q-in-1" class="qubit-label" style="top: 100px;">q1</div>
            <div id="q-in-2" class="qubit-label" style="top: 140px;">q2</div>
            <div id="q-in-3" class="qubit-label" style="top: 180px;">q3</div>
            <div id="q-out-0" class="qubit-label right-side hidden-el" style="top: 60px;"></div>
            <div id="q-out-1" class="qubit-label right-side hidden-el" style="top: 100px;"></div>
            <div id="q-out-2" class="qubit-label right-side hidden-el" style="top: 140px;"></div>
            <div id="q-out-3" class="qubit-label right-side hidden-el" style="top: 180px;"></div>
            <div id="circuit-content-wrapper"><div id="circuit-content"></div></div>
        </div>
        <div class="w-full flex justify-center items-center gap-6 mt-6 mb-6">
            <a href="index.html" class="game-btn btn-red px-16">EXIT LAB</a>
            <button class="btn-share" onclick="shareCircuit()" style="padding: 12px 24px;">Share Circuit</button>
        </div>
    </div>
    <script>
        let initialFishAtNode = Array.from({ length: 16 }, (_, i) => i);
        let isTraceMode = false;
        let activeTraceInput = null;
        let currentTraceStep = 0;
        let gateCount = 0, gateHistory = [];
        let selectedIndices = [], actionStack = [];
        let fishAtNode = [];    
        let lineMode = 1, hoverLine = null;
        let currentOptionIndex = 0, currentOptions = [], draggedIndex = null;
        let desktopDragGhost = null;
        let isShakeCtrlActive = false;
        let lastShakeTime = 0;
        let shakePermissionRequested = false;
        let mobileDragging = false;
        let mDragIndex = null;
        let dragGhost = null;
        let originalDragEl = null;
        let isTouchDevice = false;
        let activeMobileLine = null;
        let touchStartY = 0;
        let lastSwipeTime = 0;
        let lastTiltDirection = 0;
        const TILT_THRESHOLD = 15;
        const RETURN_THRESHOLD = 10;
        let gyroPermissionGranted = false;
        const pop = new Audio('pop.m4a');
        const baseOffsetY = 195;
        const side = 120;
        const hyperOffset = 400;
        const offsetPro = 100;
        const nodePositions = Array.from({ length: 16 }, (_, i) => {
            let x = (i & 1) ? side : 0;
            let y = (i & 2) ? side : 0;
            if (i & 4) { x += (i & 1) ? 90 : -80; y += (i & 2) ? 80 : -80; }
            if (i & 8) { x += hyperOffset; y -= 80; }
            const pos = { t: y + baseOffsetY, relX: x };
            Object.defineProperty(pos, 'l', { get: () => pos.relX + offsetPro });
            return pos;
        });
        window.onload = () => {
            initLabData();
            initGameLayout();
            initGates();
            drawStaticLines();
            recalculate();
            const requestGyroPermission = async () => {
                if (!gyroPermissionGranted && typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try {
                        const permission = await DeviceOrientationEvent.requestPermission();
                        if (permission === 'granted') {
                            gyroPermissionGranted = true;
                            console.log("Gyroscope access granted.");
                        }
                    } catch (error) {
                        console.log("Gyroscope access request denied:", error);
                    }
                } else {
                    gyroPermissionGranted = true;
                }
                window.removeEventListener('click', requestGyroPermission);
                window.removeEventListener('touchstart', requestGyroPermission);
                document.getElementById('mode-btn')?.removeEventListener('click', requestGyroPermission);
            };
            window.addEventListener('click', () => {
                requestGyroPermission();
                if (!shakePermissionRequested) {
                    requestShakePermission();
                    shakePermissionRequested = true;
                }
            });
            window.addEventListener('touchstart', () => {
                requestGyroPermission();
                if (!shakePermissionRequested) {
                    requestShakePermission();
                    shakePermissionRequested = true;
                }
            }, { once: true });
            const btnMode = document.getElementById('mode-btn');
            if (btnMode) {
                btnMode.addEventListener('click', requestGyroPermission);
                btnMode.addEventListener('click', () => {
                    if (!shakePermissionRequested) {
                        requestShakePermission();
                        shakePermissionRequested = true;
                    }
                });
            }
            document.getElementById('circuit-content-wrapper').addEventListener('wheel', (e) => {
                e.preventDefault();
                e.currentTarget.scrollLeft += e.deltaY;
            });
            document.addEventListener('wheel', (e) => {
                if (!hoverLine || lineMode === 1 || lineMode === 8) return;
                e.preventDefault();
                if (e.deltaY > 0) currentOptionIndex = (currentOptionIndex + 1) % currentOptions.length;

            line.className = 'connection-line';
            line.id = `line-${Math.min(i,j)}-${Math.max(i,j)}`;
            line.style.cssText = `width:${len}px; left:${x1}px; top:${y1}px; transform:rotate(${ang}deg); transform-origin:0 50%;`;
            if(dim===3){
                line.style.height='8px'; line.style.background='transparent'; line.style.borderTop='3px dashed #463438'; line.style.opacity='0.4';
            } else {
                line.style.height='3px'; line.style.background='#463438';
            }
            line.onmouseenter = () => {
                if (isTouchDevice) return;
                if (lineMode === 1) return;
                hoverLine = { i, j, dim };
                if (lineMode === 8) {
                    highlightPairs(getAllPairs(dim));
                } else {
                    currentOptions = buildGateOptions(i, j, dim);
                    currentOptionIndex = 0;
                    showIndicator();
                }
            };
            line.onmouseleave = () => {
                if (isTouchDevice) return;
                hoverLine = null;
                hideIndicator();
            };
            line.onclick = (e) => {
                e.stopPropagation();
                if (lineMode === 1) {
                    applyGate(`SWAP_${i}_${j}`);
                    return;
                }
                if (isTouchDevice) {
                    const lineId = line.id;
                    if (lineMode === 8) {
                        if (activeMobileLine !== lineId) {
                            activeMobileLine = lineId;
                            hoverLine = { i, j, dim };
                            clearHighlight();
                            highlightPairs(getAllPairs(dim));
                            return;
                        } else {
                            applyGate(`X${3 - dim}`);
                            activeMobileLine = null;
                            hideIndicator();
                            return;
                        }
                    }
                    if (activeMobileLine !== lineId) {
                        activeMobileLine = lineId;
                        hoverLine = { i, j, dim };
                        currentOptions = buildGateOptions(i, j, dim);
                        currentOptionIndex = 0;
                        const canvasRect = document.getElementById('main-canvas').getBoundingClientRect();
                        const indicator = document.getElementById('ios-indicator');
                        indicator.style.left = (e.clientX - canvasRect.left) + 'px';
                        indicator.style.top = (e.clientY - canvasRect.top - 25) + 'px';
                        showIndicator();
                        return;
                    } else {
                        if (currentOptions[currentOptionIndex]) {
                            applyGate(currentOptions[currentOptionIndex].gateType);
                        }
                        activeMobileLine = null;
                        hideIndicator();
                        return;
                    }
                }
                if (lineMode === 8) {
                    applyGate(`X${3 - dim}`);
                    return;
                }
                if (currentOptions[currentOptionIndex]) {
                    applyGate(currentOptions[currentOptionIndex].gateType);
                }
            };
            document.getElementById('lines-layer').appendChild(line);
        }
        function cycleLineMode(){
            pop.currentTime = 0;
            pop.play();
            if (!shakePermissionRequested) {
                requestShakePermission();
                shakePermissionRequested = true;
            }
            const modes = [1, 2, 4, 8];
            lineMode = modes[(modes.indexOf(lineMode) + 1) % modes.length];
            const btn = document.getElementById('mode-btn');
            btn.innerText = `Mode: ${lineMode}`;
            btn.className = `multi-toggle-btn mode-${lineMode}`;
            hideIndicator();
        }
        function showIndicator() {
            const pill = document.getElementById('ios-indicator'), frac = document.getElementById('ind-fraction'), label = document.getElementById('ind-label');
            const opt = currentOptions[currentOptionIndex];
            if (!opt) return;
            frac.innerText = `${currentOptionIndex + 1} / ${currentOptions.length}`;
            label.innerText = opt.label;
            pill.classList.add('active');
            clearHighlight();
            highlightPairs(opt.highlightPairs);
        }
        function hideIndicator() { document.getElementById('ios-indicator').classList.remove('active'); clearHighlight(); }
        function buildGateOptions(i, j, dim) {
            const targetQ = 3 - dim;
            const ctrlPool = [0,1,2,3].filter(q=>q!==targetQ);
            const bit = 1 << dim;
            const options = [];
            if(lineMode === 4) {
                ctrlPool.forEach(c => {
                    const val = (i >> (3-c)) & 1;
                    const cBit = 1 << (3-c), cVal = i & cBit;
                    let pairs = [];
                    for(let k=0;k<16;k++) if((k&bit)===0 && (k&cBit)===cVal) pairs.push([k, k^bit]);
                    options.push({ gateType: `CX${val}${c}${targetQ}`, label: `CNOT: q${c} → q${targetQ}`, highlightPairs: pairs });
                });
            } else if(lineMode === 2) {
                const combos = [[ctrlPool[0],ctrlPool[1]], [ctrlPool[0],ctrlPool[2]], [ctrlPool[1],ctrlPool[2]]];
                combos.forEach(([c0,c1]) => {
                    const v0 = (i>>(3-c0))&1, v1 = (i>>(3-c1))&1;
                    const b0 = 1<<(3-c0), b1 = 1<<(3-c1), val0 = i&b0, val1 = i&b1;
                    let pairs = [];
                    for(let k=0;k<16;k++) if((k&bit)===0 && (k&b0)===val0 && (k&b1)===val1) pairs.push([k,k^bit]);
                    options.push({ gateType: `TOF${v0}${v1}${c0}${c1}${targetQ}`, label: `TOF: q${c0},q${c1} → q${targetQ}`, highlightPairs: pairs });
                });
            }
            return options;
        }
        function getAllPairs(dim){
            const bit=1<<dim, pairs=[];
            for(let k=0;k<16;k++) if((k&bit)===0) pairs.push([k,k^bit]);
            return pairs;
        }
        function highlightPairs(pairs){
            clearHighlight();
            pairs.forEach(([a,b])=>{
                const el=document.getElementById(`line-${Math.min(a,b)}-${Math.max(a,b)}`);
                if(el) el.classList.add('line-highlight');
            });
        }
        function clearHighlight(){ document.querySelectorAll('.connection-line').forEach(l=>l.classList.remove('line-highlight')); }
        function applyGate(type) {
            hideIndicator();
            clearHighlight();
            activeMobileLine = null;
            hoverLine = null;
            if (selectedIndices.length > 0) {
                selectedIndices.sort((a, b) => a - b);
                const start = selectedIndices[0];
                const count = selectedIndices.length;
                const oldOnes = gateHistory.slice(start, start + count);
                gateHistory.splice(start, count, type);
                actionStack.push({
                    type: 'replace',
                    index: start,
                    oldGates: oldOnes,
                    newGate: type
                });
                selectedIndices = [];
                if (typeof pop !== 'undefined' && pop.play) {
                    pop.currentTime = 0;
                    pop.play().catch(e => {});
                }
                recalculate();
            } else {
                flashGateLines(type);
                executeLogic(type);
                gateHistory.push(type);
                actionStack.push({
                    type: 'add',
                    index: gateHistory.length - 1,
                    newGate: type
                });
                gateCount = gateHistory.length;
                if (typeof pop !== 'undefined' && pop.play) {
                    pop.currentTime = 0;
                    pop.play().catch(e => {});
                }
                finishMove();
            }
        }
        function getPermutationForGate(type) {
            if (type.startsWith('SWAP_')) {
                let p = type.split('_'), iA = parseInt(p[1]), iB = parseInt(p[2]);
                let pm = Array.from({ length: 16 }, (_, i) => i);
                [pm[iA], pm[iB]] = [pm[iB], pm[iA]];
                return pm;
            }
            return Array.from({ length: 16 }, (_, p) => {
                let b = p.toString(2).padStart(4, '0').split('').map(Number);
                if (type.startsWith('X')) { b[parseInt(type.substring(1))] ^= 1; }
                else if (type.startsWith('CX')) {
                    let ctrlVal = parseInt(type[2]), c = parseInt(type[3]), t = parseInt(type[4]);
                    if (b[c] === ctrlVal) b[t] ^= 1;
                } else if (type.startsWith('TOF')) {
                    let cv1 = parseInt(type[3]), cv2 = parseInt(type[4]), c1 = parseInt(type[5]), c2 = parseInt(type[6]), t = parseInt(type[7]);
                    if (b[c1] === cv1 && b[c2] === cv2) b[t] ^= 1;
                }
                return parseInt(b.join(''), 2);
            });
        }
        function executeLogic(type) {
            let pm = getPermutationForGate(type);
            let newFish = new Array(16);
            for (let i = 0; i < 16; i++) newFish[pm[i]] = fishAtNode[i];
            fishAtNode = newFish;
        }
        function recalculate() {
            fishAtNode = [...initialFishAtNode];
            let h = [...gateHistory]; gateHistory = [];
            h.forEach(g => { executeLogic(g); gateHistory.push(g); });
            gateCount = gateHistory.length;
            finishMove();
        }
        function finishMove() {
            document.getElementById('step-count').innerText = gateCount;
            updateTruthTable();
            if (activeTraceInput !== null) {
                if (currentTraceStep > gateHistory.length) currentTraceStep = gateHistory.length;
                renderTraceStep();
            } else {
                updateFishUI();
                updateFishVisibility();
                renderCircuit();
            }
        }
        function updateFishUI() {
            for (let nI = 0; nI < 16; nI++) {
                const f = document.getElementById(`fish-${fishAtNode[nI]}`);
                const n = nodePositions[nI];
                if (f && n) { f.style.top = (n.t + 27) + "px"; f.style.left = (n.l + 15) + "px"; }
            }
        }
        function renderCircuit() {
            const c = document.getElementById('circuit-content');
            const wrapper = document.getElementById('circuit-content-wrapper');
            c.innerHTML = '';
            let states = [];
            if (activeTraceInput !== null) {
                let curr = activeTraceInput;
                states.push(curr);
                for (let k = 0; k < gateHistory.length; k++) {
                    curr = getPermutationForGate(gateHistory[k])[curr];
                    states.push(curr);
                }
            }
            const drawWires = (parentUnit, stepIdx) => {
                for (let q = 0; q < 4; q++) {
                    let wire = document.createElement('div');
                    wire.className = 'circuit-wire-bg';
                    wire.style.position = 'absolute';
                    wire.style.left = '0';
                    wire.style.width = '100%';
                    wire.style.height = '4px';
                    wire.style.top = (30 + q * 40 - 0.5) + 'px';
                    wire.style.zIndex = '1';
                    if (activeTraceInput !== null) {
                        if (stepIdx <= currentTraceStep) {
                            let bit = (states[stepIdx] >> (3 - q)) & 1;
                            if (bit === 1) {
                                wire.style.background = '#FFB7C5';
                                wire.style.boxShadow = '0 0 8px #FFB7C5';
                            } else {
                                wire.style.background = '#8a6d1c';
                                wire.style.boxShadow = 'none';
                            }
                        } else {
                            wire.style.background = '#d1d5db';
                            wire.style.boxShadow = 'none';
                        }
                    } else {
                        wire.style.background = '#463438';
                    }
                    parentUnit.appendChild(wire);
                }
            };
            const startU = document.createElement('div');
            startU.className = 'circuit-unit';
            startU.style.minWidth = '30px';
            startU.style.cursor = 'default';
            drawWires(startU, 0);
            c.appendChild(startU);
            gateHistory.forEach((g, idx) => {
                const u = document.createElement('div');
                u.className = 'circuit-unit';
                u.draggable = true;
                if (selectedIndices.includes(idx)) u.classList.add('selected-gate');
               
                if (activeTraceInput !== null) {
                    if (idx === currentTraceStep - 1) {
                        u.classList.add('trace-active');
                    } else if (idx >= currentTraceStep) {
                        u.style.opacity = '0.35';
                    }
                }
                drawWires(u, idx + 1);
                u.addEventListener('dragstart', (e) => handleDragStart(e, idx));
                u.addEventListener('dragover', (e) => handleDragOver(e));
                u.addEventListener('drop', (e) => handleDrop(e, idx));
                u.addEventListener('dragend', (e) => {
                    e.target.style.opacity = '1';
                    draggedIndex = null;
                    if (desktopDragGhost) {
                        desktopDragGhost.remove();
                        desktopDragGhost = null;
                    }
                });
                u.onmouseenter = () => highlightByGate(g);
                u.onmouseleave = () => clearHighlight();
                let touchTimer = null;
                let startX, startY;
                u.addEventListener('touchstart', (e) => {
                    if (e.touches.length > 1) return;
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                    touchTimer = setTimeout(() => {
                        touchTimer = null;
                        startMobileDrag(e.touches[0], u, idx);
                    }, 400);
                }, { passive: true });
                u.addEventListener('touchmove', (e) => {
                    if (mobileDragging) {
                        if (e.cancelable) e.preventDefault();
                        moveMobileDrag(e.touches[0]);
                    } else if (touchTimer) {
                        const dx = e.touches[0].clientX - startX;
                        const dy = e.touches[0].clientY - startY;
                        if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
                            clearTimeout(touchTimer);
                            touchTimer = null;
                        }
                    }
                }, { passive: false });
                u.addEventListener('touchend', (e) => {
                    if (touchTimer) {
                        clearTimeout(touchTimer);
                        touchTimer = null;
                    }
                    if (mobileDragging) {
                        if (e.cancelable) e.preventDefault();
                        endMobileDrag(e.changedTouches[0]);
                    }
                });
                u.addEventListener('touchcancel', (e) => {
                    if (touchTimer) {
                        clearTimeout(touchTimer);
                        touchTimer = null;
                    }
                    if (mobileDragging) {
                        const touch = (e.changedTouches && e.changedTouches[0]) || (e.touches && e.touches[0]);
                        if (touch) endMobileDrag(touch);
                    }
                });
                u.onclick = (e) => {
                    if (mobileDragging) return;
                    if (e.ctrlKey || e.metaKey || isShakeCtrlActive) {
                        const sIdx = selectedIndices.indexOf(idx);
                        if (sIdx > -1) selectedIndices.splice(sIdx, 1);
                        else selectedIndices.push(idx);
                        renderCircuit();
                    } else {
                        if (typeof pop !== 'undefined' && pop.play) {
                            pop.currentTime = 0;
                            pop.play().catch(e => {});
                        }
                        const removed = gateHistory[idx];
                        actionStack.push({ type: 'delete', index: idx, oldGates: [removed] });
                        gateHistory.splice(idx, 1);
                        selectedIndices = [];
                        recalculate();
                    }
                };
                let controls = [], target = -1;
                if (g.startsWith('SWAP_')) {
                    let p = g.split('_'), iA = parseInt(p[1]), iB = parseInt(p[2]);
                    target = 3 - Math.round(Math.log2(iA ^ iB));
                    let binary = Math.min(iA, iB).toString(2).padStart(4, '0').split('').map(Number);
                    for (let q = 0; q < 4; q++) if (q !== target) controls.push({ line: q, type: binary[q] });
                } else if (g.startsWith('X')) { target = parseInt(g.substring(1)); }
                else if (g.startsWith('CX')) { controls.push({ line: parseInt(g[3]), type: parseInt(g[2]) }); target = parseInt(g[4]); }
                else if (g.startsWith('TOF')) {
                    controls.push({ line: parseInt(g[5]), type: parseInt(g[3]) });
                    controls.push({ line: parseInt(g[6]), type: parseInt(g[4]) });
                    target = parseInt(g[7]);
                }
                if (target !== -1) {
                    let lines = [target, ...controls.map(ctrl => ctrl.line)];
                    let minQ = Math.min(...lines), maxQ = Math.max(...lines);
                   
                    const vLine = document.createElement('div');
                    vLine.className = 'connection-v-line';
                    vLine.style.cssText = `top:${30 + minQ * 40}px; height:${(maxQ - minQ) * 40}px; z-index: 5;`;
                    u.appendChild(vLine);
                    controls.forEach(ctrl => {
                        const dot = document.createElement('div'); dot.className = 'control-dot';
                        dot.style.top = (24 + ctrl.line * 40) + 'px';
                        dot.style.zIndex = '6';
                        if (ctrl.type === 0) { dot.style.background = '#fff'; dot.style.border = '2px solid #463438'; }
                        u.appendChild(dot);
                    });
                    const t = document.createElement('div'); t.className = 'circuit-target';
                    t.style.top = (32 + target * 40) + 'px';
                    t.style.zIndex = '6';
                    u.appendChild(t);
                }
                c.appendChild(u);
            });
            const endU = document.createElement('div');
            endU.className = 'circuit-unit';
            endU.style.minWidth = '50px';
            endU.style.flexGrow = '1';
            endU.style.cursor = 'default';
            drawWires(endU, states.length > 0 ? states.length - 1 : 0);
            c.appendChild(endU);
            updateUndoStatus();
            if (selectedIndices.length === 0 && gateHistory.length > 0 && draggedIndex === null && activeTraceInput === null) {
                setTimeout(() => wrapper.scrollTo({ left: wrapper.scrollWidth, behavior: 'smooth' }), 50);
            }
        }
        function undo() {
            if (actionStack.length === 0) return;
            if(typeof pop !== 'undefined' && pop.play) { pop.currentTime = 0; pop.play().catch(e=>{}); }
            const action = actionStack.pop();
            if (action.type === 'add') { gateHistory.splice(action.index, 1); }
            else if (action.type === 'delete') { gateHistory.splice(action.index, 0, ...action.oldGates); }
            else if (action.type === 'replace') {
                if (action.newGate === null) gateHistory = [...action.oldGates];
                else gateHistory.splice(action.index, 1, ...action.oldGates);
            }
            selectedIndices = []; recalculate();
        }
        function resetCircuit() {
            if(typeof pop !== 'undefined' && pop.play) { pop.currentTime = 0; pop.play().catch(e=>{}); }
            gateHistory = []; actionStack = []; selectedIndices = [];
            recalculate();
        }
        function updateUndoStatus() {
            const isActive = actionStack.length > 0;
            document.getElementById('undo-btn').classList.toggle('active', isActive);
        }
        function shareCircuit() {
            if (gateHistory.length === 0) {
                alert("The circuit is empty and cannot be shared.");
                return;
            }
            const circuitData = gateHistory.join(',');
            const shareUrl = `${window.location.origin}${window.location.pathname}?circuit=${encodeURIComponent(circuitData)}`;
            navigator.clipboard.writeText(shareUrl).then(() => {
                alert("Circuit sharing link copied! Send it to a friend to open this circuit.");
            }).catch(err => {
                console.error('Failed to copy link', err);
                alert("Link: " + shareUrl);
            });
        }
        function navWithSound(url) {
            if (typeof pop !== 'undefined') {
                pop.currentTime = 0;
                pop.play(); 
            }
            setTimeout(() => {
                window.location.href = url;
            }, 150); 
        }
    </script>
</body>
