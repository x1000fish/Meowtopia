
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>Meowtopia - LAB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --highlight-color:  #99C44D;
        }
        body { font-family: 'Arial', sans-serif; background-color: #FFF9F0; background-image: linear-gradient(45deg, #fce4ec 25%, transparent 25%, transparent 50%, #fce4ec 50%, #fce4ec 75%, transparent 75%, transparent); background-size: 100px 100px; color: #463438; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; }
        .hidden-el { display: none !important; }
        .main-layout { display: flex; align-items: flex-start; justify-content: center; gap: 20px; margin-top: 20px; }
        .game-canvas { position: relative; width: 1900px; height: 550px; background: #fffaf5; border: 8px solid #463438; border-radius: 40px; overflow: hidden; box-shadow: 15px 15px 0px #FFB7C5; }
        .node { width: 100px; height: 100px; background: white; border: 5px solid #463438; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: absolute; box-shadow: 3px 3px 0 #463438; z-index: 20; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .node img { width: 70px; height: auto; pointer-events: none; }
        .fixed-number { position: absolute; bottom: -2px; right: 24px; font-size: 16px; font-weight: 900; color: #463438; pointer-events: none; z-index: 25; }
        .connection-line { position: absolute; background: #463438; z-index: 10; cursor: pointer; transition: all 0.2s ease; opacity: 1;transform-origin: 0 50%; }
        .connection-line::after { content: ''; position: absolute; top: -10px; bottom: -10px; left: 0; right: 0; background: transparent; z-index: 10; pointer-events: auto;  }
        @media (hover: hover) {
            .connection-line:hover { background: var(--highlight-color) !important; box-shadow: 0 0 15px var(--highlight-color); height: 10px !important; z-index: 16; opacity: 1 !important; border-top: none !important; }
        }
        .line-highlight { background: var(--highlight-color) !important; box-shadow: 0 0 15px var(--highlight-color) !important; height: 8px !important; z-index: 15; border-top: none !important; opacity: 1 !important; }
        .trace-line-active { background: #99C44D !important; box-shadow: 0 0 15px rgba(153, 196, 77, 0.8) !important; height: 8px !important; z-index: 16 !important; opacity: 1 !important; border-top: none !important; }
        .trace-fish-active { filter: drop-shadow(0 0 12px #FFB7C5) drop-shadow(0 0 20px #FFB7C5) !important; transform: scale(1.15) !important; z-index: 45 !important; }
        .fish-wrapper { position: absolute; width: 70px; height: 70px; pointer-events: none; z-index: 30; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .fish-wrapper img.fish-img { width: 60px; height: auto; position: relative; z-index: 2; }
        .fish-wrapper img.fish-bg-shape { width: 60px; height: auto; position: absolute; z-index: 1; filter: brightness(0) invert(1);opacity: 1; }
        .fish-label { background: rgba(70, 52, 56, 0.8); color: #fff; width: 32px; height: 22px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; z-index: 5; position: absolute; top: 24px; }  
        .hat-img { position: absolute; height: auto; pointer-events: none; z-index: 21; }
        .cat-hat { width: 35px !important; top: 7px; left: 50px; transform: translateX(-50%) rotate(15deg); }
        .fish-hat { width: 22px; top: 6px; left: 43%; transform: translateX(-50%) rotate(15deg); z-index: 31; }
        #pro-panel { width: 297px; opacity: 1; height: 550px; background: #fff; border: 8px solid #463438; border-radius: 40px; padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 5px; flex-shrink: 0; box-sizing: border-box; box-shadow: 10px 10px 0px #99C44D;}
        .panel-section-title { font-weight: 900; font-size: 18px; margin: 5px 0; color: #463438; text-align: center; white-space: nowrap; }
        .game-btn { cursor: pointer; border: 5px solid #463438; border-radius: 60px; padding: 12px; font-size: 26px; font-weight: 900; color: #fff; text-shadow: 2px 2px 0 #463438; box-shadow: 0 6px 0 #463438; position: relative; transition: all 0.1s; display: inline-block; }
        .game-btn:active { top: 6px; box-shadow: 0 2px 0 #463438; }
        .btn-red { background: #FFB7C5; }
        .btn-green { background: #99C44D; }
        .multi-toggle-btn { background: #e2de6e; border: 4px solid #463438; border-radius: 20px; padding: 5px 15px; font-weight: 900; font-size: 20px; color: white; cursor: pointer; box-shadow: 0 4px 0 #463438; transition: all 0.1s; min-width: 140px; text-shadow: 2px 2px 0 #463438; }
        .multi-toggle-btn.mode-2 { background: #629eed; }
        .multi-toggle-btn.mode-4 { background: #b583e5; }
        .multi-toggle-btn.mode-8 { background: #46c89d; }
        .multi-toggle-btn:hover,
        .mode-toggle-fixed:hover,
        .view-btn:hover,
        .game-btn:hover,
        .btn-share:hover {transform: translateY(-2px);box-shadow: 0 6px 0 #463438; }
        .multi-toggle-btn:active,
        .mode-toggle-fixed:active,
        .view-btn:active,
        .game-btn:active,
        .btn-share:active {transform: translateY(2px); box-shadow: 0 2px 0 #463438;}
        .view-btn { background: #3d6183; }
        .multi-toggle-btn.mode-5 { background: #ee9ac6; }
        
        .gate-btn-v2 { position: relative; height: 75px; width: 50px; display: flex; align-items: center; justify-content: center; background-image: linear-gradient(#463438,#463438), linear-gradient(#463438,#463438), linear-gradient(#463438,#463438), linear-gradient(#463438,#463438); background-size: 60% 1.5px; background-repeat: no-repeat; background-position: center 15px, center 30px, center 45px, center 60px; padding: 0; border: 2px solid #463438; border-radius: 8px; cursor: pointer; transition: all 0.2s; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
        
        /* 選單按鈕 粉紅底 綠色框 Level 11 對齊特效 */
        .gate-btn-v2:hover, .btn-highlight { 
            background-color: #FFB7C5 !important; 
            border: 4px solid #99C44D !important; 
            transform: scale(1.15); 
            box-shadow: 0 0 10px rgba(0,0,0,0.3); 
            z-index: 10; 
        }

        .func-btn { width: 100%; margin-top: 5px; padding: 14px; border-radius: 35px; font-weight: 900; font-size: 16px; border: 2.5px solid #463438; cursor: pointer; box-shadow: 0 4px 0 rgba(70,52,56,0.1); }
        .btn-reset { background: #FFF9F0; color: #463438; }
        .btn-undo { background: #FFB7C5 !important; color: #fff !important; border: 2.5px solid #463438 !important; opacity: 0.6; cursor: not-allowed; pointer-events: none; }
        .btn-undo.active { background: #FFB7C5 !important; border-color: #463438 !important; color: #fff !important; opacity: 1; cursor: pointer; box-shadow: 0 4px 0 #463438; pointer-events: auto; }
        .func-btn:hover { background-color: #FFB7C5 !important; color: #fff !important; border-color: #463438 !important; transform: translateY(-2px); box-shadow: 0 3px 0 #463438; }
        .btn-undo.active:hover { background-color: #ff9fb2 !important; }
        
        #circuit-area { width: 1155px; height: 250px; opacity: 1; background: #fff; border: 8px solid #463438; border-radius: 30px; padding: 15px; margin-top: 20px; position: relative; overflow: hidden; box-shadow: 10px 10px 0px #FFB7C5;}
        #circuit-content-wrapper { position: relative; height: 180px; overflow-x: auto; margin-left: 45px; margin-right: 12px; scrollbar-width: none; }
        #circuit-content { display: flex; height: 100%; padding: 0 10px; min-width: 100%; width: max-content; position: relative; }
        .qubit-label { position: absolute; left: 19px; font-weight: 900; font-size: 18px; color: #463438; width: 25px; text-align: center; }
        .qubit-label.right-side { left: auto !important; right: 18px !important; color: rgb(255, 151, 172) !important; font-weight: 900; }
        .circuit-unit { min-width: 50px; height: 180px; display: flex; flex-direction: column; position: relative; cursor: pointer; transition: all 0.2s; background-color: transparent !important; }
       /* 滑鼠經過時只有背景色，沒有邊框 */
	    .circuit-unit:hover { background-color: var(--bg-hover, rgba(255, 183, 197, 0.3)) !important; border-radius: 12px; }
	/* 只有被右鍵選取時，才加上背景色與同色邊框 */
	    .circuit-unit.selected-gate { background-color: var(--bg-hover, rgba(255, 183, 197, 0.3)) !important; box-shadow: inset 0 0 0 3px var(--gate-color, #FFB7C5) !important; border-radius: 12px; }
        .circuit-unit.trace-active { background: #bdfc507a !important; box-shadow: inset 0 0 0 3px #99C44D; border-radius: 12px; z-index: 100 !important; }
        .control-dot { width: 14px; height: 14px; background: #463438; border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); z-index: 5; }
        .connection-v-line { position: absolute; width: 2.5px; background: #463438; left: 50%; transform: translateX(-50%); z-index: 3; }
        .circuit-target { position: absolute; width: 24px; height: 24px; border-radius: 50%; background: #fff; border: 2.5px solid #463438; left: 50%; transform: translate(-50%, -50%); z-index: 15; }
        .circuit-target::before { content: ""; position: absolute; width: 2.5px; height: 100%; background: #463438; left: 50%; transform: translateX(-50%); }
        .circuit-target::after { content: ""; position: absolute; width: 100%; height: 2.5px; background: #463438; top: 50%; transform: translateY(-50%); }
        #gate-scroll-area { margin-top: 5px; flex: 1; overflow-y: auto; width: 100%; padding: 5px; scrollbar-width: none; position: relative; }
        #gate-scroll-area::-webkit-scrollbar { display: none; }
        #ios-indicator { position: absolute; top: 0; left: 0; transform: translate(-50%, -120%) scale(0.8); background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); border-radius: 50px; padding: 6px 18px; display: flex; align-items: center; box-shadow: 0 8px 24px rgba(70,52,56,0.1); opacity: 0; transition: opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1), transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1000; pointer-events: none; border: 1px solid rgba(70, 52, 56, 0.2); }
        #ios-indicator.active { opacity: 1; transform: translate(-50%, -120%) scale(1); }
        .ind-fraction { color: #463438; font-size: 16px; font-weight: 900; }
        .ind-label { display: none !important; }
        .gate-v-line { position: absolute; width: 1.5px; background: #463438; left: 50%; transform: translateX(-50%); z-index: 1; }
        .gate-dot { position: absolute; width: 8px; height: 8px; border-radius: 50%; border: 1px solid #463438; left: 50%; transform: translate(-50%, -50%); z-index: 2; }
        .gate-dot.fill { background: #463438; }
        .gate-dot.empty { background: #fff; }
        .gate-target-circle { position: absolute; width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid #463438; background: #fff; left: 50%; transform: translate(-50%, -50%); z-index: 3; }
        .gate-target-circle::before { content: ''; position: absolute; width: 100%; height: 1.5px; top: 50%; left: 0; transform: translateY(-50%); background: #463438; }
        .gate-target-circle::after { content: ''; position: absolute; height: 100%; width: 1.5px; left: 50%; top: 0; transform: translateX(-50%); background: #463438; }
        
        /* Hypercube SVG Styles & Mode Toggle Styles */
        .hyper-line { stroke: #463438; stroke-width: 0.6; opacity: 0.3; }
        .hyper-line-hi { stroke: #FFB7C5; stroke-width: 2.5; opacity: 1; transition: stroke 0.2s; }
        .gate-btn-v2 .hyper-line-hi { stroke: #f78790; }
        .gate-btn-v2:hover .hyper-line-hi { stroke: #ffffff !important; }
        .btn-highlight .hyper-line-hi { stroke: #ffffff !important; }
        .circuit-unit:hover .hyper-line-hi, .circuit-unit.selected-gate .hyper-line-hi { stroke: #99C44D !important; filter: none; }
        
        .mini-mode .gate-btn-v2 { background-image: none !important; }
        .mini-mode .circuit-wire-bg { display: none !important; }
        .mode-toggle-fixed { position: fixed; width: 70px; height: 70px; background: #ffffff; border: 5px solid #463438; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 0 #463438; z-index: 500; transition: all 0.1s;}

        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        #tt-body { font-family: Arial, sans-serif; }
        #tt-body tr { transition: all 0.2s ease; }
        #tt-body td:first-child { border-top-left-radius: 12px; border-bottom-left-radius: 12px; }
        #tt-body td:last-child { border-top-right-radius: 12px; border-bottom-right-radius: 12px; }
        #tt-body tr:hover td { background-color: rgba(0, 0, 0, 0.05); cursor: pointer; }
        #tt-body tr.active-trace td { background-color: #a3cd5a9f  !important; color: #463438 !important; }
        #tt-view-container { padding: 0px; }
        #tt-view-container .panel-section-title { margin-bottom: 10px; }
        #circuit-content { padding-right: 40px; }
        #trace-controls { display: flex; align-items: center; justify-content: space-between; background: #e7e5dc; border-radius: 30px; padding: 10px 4px; gap: 4px; margin-top: 5px; margin-bottom: 8px; border: 2.5px solid #463438; }
        #trace-controls .func-btn { margin: 0; padding: 15px 16px; font-size: 16px; border-radius: 50px; background: #e7e5dc; color: white; }
        #trace-controls .btn-red { background: #FFB7C5; border-color: #463438; }
        #trace-step-text { color: #463438; font-family: 'Courier New', monospace; font-size: 24px; }
        #trace-controls span.text-green-700 { color: #99C44D; font-size: 14px; }
        .btn-share { background: #99C44D; border: 4px solid #463438; border-radius: 30px; padding: 5px 15px; font-weight: 900; font-size: 20px; color: white; cursor: pointer; box-shadow: 0 4px 0 #463438; transition: all 0.1s; min-width: 140px; }
        .btn-share:hover { background-color: #99C44D !important; }
        .nav-fab { position: fixed; top: 25px; right: 25px; width: 70px; height: 70px; background: #89CFF0; border: 5px solid #463438; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 900; color: white; cursor: pointer; box-shadow: 0 4px 0 #463438; z-index: 1000; transition: all 0.1s; text-shadow: 2px 2px 0 #463438; }
        .nav-fab:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #463438; }
        .nav-fab:active { transform: translateY(4px); box-shadow: 0 0px 0 #463438; }
        canvas, .game-canvas, .node { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; touch-action: manipulation; }
        .circuit-unit { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; touch-action: none; transition: background 0.2s, box-shadow 0.2s; }
        .gate-btn-v2, .multi-toggle-btn, .func-btn, .game-btn, .btn-share { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; touch-action: manipulation; }
        .swap-active { background: var(--highlight-color) !important; box-shadow: 0 0 15px var(--highlight-color) !important; height: 8px !important; z-index: 15 !important; border-top: none !important; opacity: 1 !important; }
        .mini-mode.is-tracing .qubit-label { display: none !important; }
        .circuit-unit {transition: all 0.2s ease, margin 0.2s ease;}
        .drag-target { position: relative; }
        .drag-target.right { margin-left: 0; margin-right: 0; }
        .drag-target::before {
            content: '';
            position: absolute;
            left: -3px;
            top: 10px;
            bottom: 10px;
            width: 4px;
            background-color: #FFB7C5;
            border-radius: 4px;
            z-index: 200;
            pointer-events: none;
        }
        .drag-target.right::before { left: auto; right: -3px; }
    </style>
</head>
<body id="body-root" class="mini-mode">
    <button onclick="navWithSound('lab2.html')" class="nav-fab" title="Go to 2-Bit">2</button>
    <div id="quantum-toggle" class="mode-toggle-fixed" onclick="toggleQuantumMode()" style="top: 110px; right: 25px; font-size: 26px;">⚛️</div>
    
    <div class="w-full max-w-6xl">
        <div class="flex w-full px-4 mb-4 items-center">
            <div class="text-3xl font-black" style="color: #463438;">GATE COUNT: <span id="step-count">0</span></div>
            <div class="flex items-center gap-6 ml-auto">
                <button id="view-toggle-btn" class="multi-toggle-btn view-btn" onclick="toggleTraceMode()">Trace: OFF</button>
                <button id="mode-btn" class="multi-toggle-btn" onclick="cycleLineMode()">Mode: 1</button>
                <div class="text-3xl font-black" style="color: #7bc202;">LAB MODE</div>
            </div>
        </div>
        <div class="main-layout">
            <div id="pro-panel">
                <div id="gate-view-container" class="w-full flex-col flex h-full min-h-0">
                    <div class="panel-section-title">Transformations</div>
                    <div id="gate-scroll-area">
                        <div class="grid grid-cols-4 gap-1 w-full" id="gate-grid"></div>
                    </div>
                    <div class="mt-auto w-full">
                        <div class="panel-section-title">Control</div>
                        <button class="func-btn btn-reset" onclick="resetCircuit()">Reset Circuit</button>
                        <button id="undo-btn" class="func-btn btn-undo" onclick="undo()">Undo Step</button>
                    </div>
                </div>
                <div id="tt-view-container" class="w-full flex-col hidden-el h-full flex" style="max-height: 100%; overflow: hidden;">
                    <div class="panel-section-title shrink-0 mt-2">Truth Table</div>
                    <div class="text-lg text-gray-400 text-center mb-2 font-bold flex justify-between px-8 shrink-0 border-b border-black-100 pb-2">
                        <span class="w-1/2 text-left text-black">INPUT</span>
                        <span class="w-1/2 text-right text-black">OUTPUT</span>
                    </div>
                    <div class="overflow-y-auto w-full flex-grow px-2 mb-2 custom-scrollbar" style="scrollbar-width: none;">
                        <table class="w-full text-center text-lg border-separate border-spacing-y-1">
                            <tbody id="tt-body" class="font-bold">
                                </tbody>
                        </table>
                    </div>
                </div>
                <div id="trace-controls" class="hidden-el shrink-0 w-full mt-auto flex gap-1 items-center bg-gray-100 p-2 rounded-2xl border-4 border-black shadow-[0_4px_0_0_rgba(0,0,0,0.1)] opacity-50 pointer-events-none transition-opacity">
                    <button class="func-btn btn-reset m-0 py-2 px-1 text-xs hover:bg-yellow-200 flex-1" style="box-shadow: 0 2px 0 #463438;;" onclick="traceMove(-1)">◀</button>
                    <div class="flex flex-col items-center justify-center px-1 min-w-[50px]">
                        <span class="text-[10px] font-black text-green-700 leading-none">STEP</span>
                        <span id="trace-step-text" class="font-black text-lg leading-none">0</span>
                    </div>
                    <button class="func-btn btn-reset m-0 py-2 px-1 text-xs hover:bg-yellow-200 flex-1" style="box-shadow: 0 2px 0 #463438;;" onclick="traceMove(1)">▶</button>
                    <button class="func-btn btn-red m-0 py-2 px-1 text-xs text-white border-black flex-1" style="box-shadow: 0 2px 0 #463438;;" onclick="exitTrace()">EXIT</button>
                </div>
            </div>
            <div class="game-canvas" id="main-canvas">
                <div id="ios-indicator">
                    <span class="ind-fraction" id="ind-fraction">1 / 3</span>
                    <span class="ind-label" id="ind-label"></span>
                </div>
                <div id="lines-layer"></div>
                <div id="nodes-layer"></div>
                <div id="fishes-layer"></div>
            </div>
        </div>
        <div id="circuit-area" class="mx-auto relative">
            <div id="circuit-diagram-title" class="circuit-title font-black text-xl text-center" style="color: #463438;">Paths</div>
            <div id="q-in-0" class="qubit-label" style="top: 60px;">d1</div>
            <div id="q-in-1" class="qubit-label" style="top: 100px;">d2</div>
            <div id="q-in-2" class="qubit-label" style="top: 140px;">d3</div>
            <div id="q-in-3" class="qubit-label" style="top: 180px;">d4</div>
            <div id="q-out-0" class="qubit-label right-side hidden-el" style="top: 60px;"></div>
            <div id="q-out-1" class="qubit-label right-side hidden-el" style="top: 100px;"></div>
            <div id="q-out-2" class="qubit-label right-side hidden-el" style="top: 140px;"></div>
            <div id="q-out-3" class="qubit-label right-side hidden-el" style="top: 180px;"></div>
            <div id="circuit-content-wrapper"><div id="circuit-content"></div></div>
        </div>
        <div class="w-full flex justify-center items-center gap-6 mt-6 mb-6">
            <a href="index.html" class="game-btn btn-red px-16">EXIT LAB</a>
            <button class="btn-share" onclick="shareCircuit()" style="padding: 12px 24px;">Share Circuit</button>
        </div>
    </div>

    <script>
        let initialFishAtNode = Array.from({ length: 16 }, (_, i) => i);
        let isTraceMode = false;
        let isQuantumMode = false; 
        let activeTraceInput = null;
        let currentTraceStep = 0;
        let gateCount = 0, gateHistory = [];
        let selectedIndices = [], actionStack = [];
        let fishAtNode = [];    
        let lineMode = 1, hoverLine = null;
        let currentOptionIndex = 0, currentOptions = [], draggedIndex = null;
        let desktopDragGhost = null;
        let mobileDragging = false;
        let mDragIndex = null;
        let dragGhost = null;
        let originalDragEl = null;
        let isTouchDevice = false;
        
        // 鎖定模式的變數
        let lockedLineId = null;
        let hasScrolled = false;
        
        let touchStartY = 0;
        let lastSwipeTime = 0;
        let lastTiltDirection = 0;
        let canvasTouchStartX = 0, canvasTouchStartY = 0;
        let lastCanvasX = 0, lastCanvasY = 0;
        let isCanvasSwiping = false;
        const TILT_THRESHOLD = 15;
        const RETURN_THRESHOLD = 10;
        let gyroPermissionGranted = false;
        const pop = new Audio('pop.m4a');
        const baseOffsetY = 195;
        const side = 120;
        const hyperOffset = 400;
        const offsetPro = 100;
        
        // --- 自動捲動變數 ---
        let targetGateScrollSpeed = 0;
        let currentGateScrollSpeed = 0;
        let gateAutoScrollRAF = null;

        let targetScrollSpeed = 0;
        let currentScrollSpeed = 0;
        let autoScrollRAF = null;

        const nodePositions = Array.from({ length: 16 }, (_, i) => {
            let x = (i & 1) ? side : 0;
            let y = (i & 2) ? side : 0;
            if (i & 4) { x += (i & 1) ? 90 : -80; y += (i & 2) ? 80 : -80; }
            if (i & 8) { x += hyperOffset; y -= 80; }
            const pos = { t: y + baseOffsetY, relX: x };
            Object.defineProperty(pos, 'l', { get: () => pos.relX + offsetPro });
            return pos;
        });

        function getRgba(hex, alpha) {
            hex = hex.replace('#', '');
            const r = parseInt(hex.substring(0,2), 16), g = parseInt(hex.substring(2,4), 16), b = parseInt(hex.substring(4,6), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function getGateColorMap(type) {
            if (type.startsWith('SWAP')) return '#e2de6e';
            if (type.startsWith('TOF')) return '#629eed';
            if (type.startsWith('CX')) return '#b583e5';
            if (type.startsWith('X')) return '#46c89d';
            return '#463438';
        }

        // --- 自動捲動函數 (左側面板) ---
        function gateScrollLoop() {
            const gateScrollArea = document.getElementById('gate-scroll-area');
            currentGateScrollSpeed += (targetGateScrollSpeed - currentGateScrollSpeed) * 0.15;
            
            if (Math.abs(currentGateScrollSpeed) > 0.1 || Math.abs(targetGateScrollSpeed) > 0) {
                gateScrollArea.scrollTop += currentGateScrollSpeed;
                gateAutoScrollRAF = requestAnimationFrame(gateScrollLoop);
            } else {
                currentGateScrollSpeed = 0;
                gateAutoScrollRAF = null;
            }
        }

        function handleGateScroll(e) {
            const gateScrollArea = document.getElementById('gate-scroll-area');
            const rect = gateScrollArea.getBoundingClientRect();
            const edgeThreshold = 80;
            const maxSpeed = 12;

            if (gateScrollArea.scrollHeight > gateScrollArea.clientHeight) {
                let distTop = e.clientY - rect.top;
                let distBottom = rect.bottom - e.clientY;

                if (distTop < edgeThreshold) {
                    let ratio = Math.max(0, 1 - (distTop / edgeThreshold));
                    targetGateScrollSpeed = -(ratio * maxSpeed);
                    if (!gateAutoScrollRAF) gateAutoScrollRAF = requestAnimationFrame(gateScrollLoop);
                } else if (distBottom < edgeThreshold) {
                    let ratio = Math.max(0, 1 - (distBottom / edgeThreshold));
                    targetGateScrollSpeed = (ratio * maxSpeed);
                    if (!gateAutoScrollRAF) gateAutoScrollRAF = requestAnimationFrame(gateScrollLoop);
                } else {
                    targetGateScrollSpeed = 0;
                }
            }
        }

        // --- 自動捲動函數 (底部電路區塊) ---
        function scrollLoop() {
            const circuitWrapper = document.getElementById('circuit-content-wrapper');
            currentScrollSpeed += (targetScrollSpeed - currentScrollSpeed) * 0.15;
            
            if (Math.abs(currentScrollSpeed) > 0.1 || Math.abs(targetScrollSpeed) > 0) {
                circuitWrapper.scrollLeft += currentScrollSpeed;
                autoScrollRAF = requestAnimationFrame(scrollLoop);
            } else {
                currentScrollSpeed = 0;
                autoScrollRAF = null;
            }
        }

        function handleCircuitScroll(e) {
            const circuitWrapper = document.getElementById('circuit-content-wrapper');
            const rect = circuitWrapper.getBoundingClientRect();
            const edgeThreshold = 120;
            const maxSpeed = 15;

            let distLeft = e.clientX - rect.left;
            let distRight = rect.right - e.clientX;

            if (distLeft < edgeThreshold) {
                let ratio = Math.max(0, 1 - (distLeft / edgeThreshold));
                targetScrollSpeed = -(ratio * maxSpeed);
                if (!autoScrollRAF) autoScrollRAF = requestAnimationFrame(scrollLoop);
            } else if (distRight < edgeThreshold) {
                let ratio = Math.max(0, 1 - (distRight / edgeThreshold));
                targetScrollSpeed = (ratio * maxSpeed);
                if (!autoScrollRAF) autoScrollRAF = requestAnimationFrame(scrollLoop);
            } else {
                targetScrollSpeed = 0;
            }
        }

        window.onload = () => {
            initLabData();
            initGameLayout();
            initGates();
            drawStaticLines();
            recalculate();
            
            // 綁定左側面板捲動事件
            const gateScrollArea = document.getElementById('gate-scroll-area');
            if(gateScrollArea) {
                gateScrollArea.addEventListener('mousemove', handleGateScroll);
                gateScrollArea.addEventListener('mouseleave', () => { targetGateScrollSpeed = 0; });
            }

            // 綁定底部電路區塊捲動事件
            const circuitWrapper = document.getElementById('circuit-content-wrapper');
            if(circuitWrapper) {
                circuitWrapper.addEventListener('mousemove', (e) => {
                    if (draggedIndex === null) handleCircuitScroll(e);
                });
                circuitWrapper.addEventListener('mouseleave', () => { targetScrollSpeed = 0; });
                circuitWrapper.addEventListener('dragover', (e) => {
                    if (draggedIndex !== null) {
                        e.preventDefault();
                        handleCircuitScroll(e);
                    }
                });
                circuitWrapper.addEventListener('dragleave', () => { targetScrollSpeed = 0; });
                circuitWrapper.addEventListener('drop', () => { targetScrollSpeed = 0; });
                
                circuitWrapper.addEventListener('wheel', (e) => {
                    if (Math.abs(e.deltaY) > 0) {
                        e.preventDefault();
                        circuitWrapper.scrollLeft += e.deltaY;
                    }
                }, { passive: false });
            }

            const requestGyroPermission = async () => {
                if (!gyroPermissionGranted && typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try {
                        const permission = await DeviceOrientationEvent.requestPermission();
                        if (permission === 'granted') {
                            gyroPermissionGranted = true;
                            console.log("Gyroscope access granted.");
                        }
                    } catch (error) {
                        console.log("Gyroscope access request denied:", error);
                    }
                } else {
                    gyroPermissionGranted = true;
                }
                window.removeEventListener('click', requestGyroPermission);
                window.removeEventListener('touchstart', requestGyroPermission);
                document.getElementById('mode-btn')?.removeEventListener('click', requestGyroPermission);
            };
            window.addEventListener('click', () => {
                requestGyroPermission();
            });
            window.addEventListener('touchstart', () => {
                requestGyroPermission();
            }, { once: true });
            const btnMode = document.getElementById('mode-btn');
            if (btnMode) {
                btnMode.addEventListener('click', requestGyroPermission);
            }
            
            document.addEventListener('wheel', (e) => {
                if (!lockedLineId || lineMode === 1 || lineMode === 8 || isTouchDevice) return;
                const target = e.target;
                if (!target.closest('#gate-scroll-area') && !target.closest('#circuit-content-wrapper')) {
                    e.preventDefault();
                    if (e.deltaY > 0) currentOptionIndex = (currentOptionIndex + 1) % currentOptions.length;
                    else currentOptionIndex = (currentOptionIndex - 1 + currentOptions.length) % currentOptions.length;
                    hasScrolled = true;
                    showIndicatorScrolled();
                }
            }, { passive: false });
            
            window.addEventListener('touchstart', () => {
                isTouchDevice = true;
            }, { once: true });
            
            const canvas = document.getElementById('main-canvas');
            const indicator = document.getElementById('ios-indicator');
            
            // 電腦版點擊背景取消鎖定
            canvas.addEventListener('mousedown', (e) => {
                if (lockedLineId && !isTouchDevice) {
                    if (e.button === 0 && !e.target.classList.contains('connection-line')) { 
                        cancelLock(); 
                    }
                }
            });

            // 電腦版右鍵確認 Gate
            canvas.addEventListener('contextmenu', (e) => {
                if (lockedLineId && !isTouchDevice) {
                    e.preventDefault(); 
                    if (lineMode === 8 && hoverLine) applyGate(`X${3 - hoverLine.dim}`);
                    else if (lineMode === 1 && hoverLine) applyGate(`SWAP_${hoverLine.i}_${hoverLine.j}`);
                    else if (currentOptions[currentOptionIndex]) applyGate(currentOptions[currentOptionIndex].gateType);
                }
            });

            // 手機版取消鎖定
            canvas.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    canvasTouchStartX = e.touches[0].clientX;
                    canvasTouchStartY = e.touches[0].clientY;
                    lastCanvasX = canvasTouchStartX;
                    lastCanvasY = canvasTouchStartY;
                    isCanvasSwiping = false;
                }
            }, { passive: true });

            // 手機版雙指確認 Gate
            canvas.addEventListener('touchstart', (e) => {
                if (lockedLineId && e.touches.length >= 2) {
                    e.preventDefault();
                    if (lineMode === 8 && hoverLine) applyGate(`X${3 - hoverLine.dim}`);
                    else if (lineMode === 1 && hoverLine) applyGate(`SWAP_${hoverLine.i}_${hoverLine.j}`);
                    else if (currentOptions[currentOptionIndex]) applyGate(currentOptions[currentOptionIndex].gateType);
                }
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                if (e.touches.length === 1 && lockedLineId && lineMode !== 1 && lineMode !== 8) {
                    const currentX = e.touches[0].clientX;
                    const currentY = e.touches[0].clientY;
                    const diffX = currentX - lastCanvasX;
                    const diffY = currentY - lastCanvasY;
                    if (Math.abs(currentX - canvasTouchStartX) > 8 || Math.abs(currentY - canvasTouchStartY) > 8) {
                        isCanvasSwiping = true;
                        if (e.cancelable) e.preventDefault();
                    }
                    if (isCanvasSwiping && currentOptions.length > 0) {
                        if (Math.abs(diffX) > Math.abs(diffY)) {
                            const steps = Math.floor(Math.abs(diffX) / 80);
                            if (steps > 0) {
                                const dir = diffX > 0 ? 1 : -1;
                                const shift = (dir * steps) % currentOptions.length;
                                currentOptionIndex = (((currentOptionIndex + shift) % currentOptions.length) + currentOptions.length) % currentOptions.length;
                                lastCanvasX += dir * steps * 80;
                                hasScrolled = true;
                                showIndicatorScrolled();
                            }
                        } else {
                            const steps = Math.floor(Math.abs(diffY) / 80);
                            if (steps > 0) {
                                const dir = diffY > 0 ? 1 : -1;
                                const shift = (dir * steps) % currentOptions.length;
                                currentOptionIndex = (((currentOptionIndex + shift) % currentOptions.length) + currentOptions.length) % currentOptions.length;
                                lastCanvasY += dir * steps * 80;
                                hasScrolled = true;
                                showIndicatorScrolled();
                            }
                        }
                    }
                }
            }, { passive: false });

            canvas.addEventListener('touchend', (e) => {
                if (!isCanvasSwiping && lockedLineId && e.changedTouches.length === 1) {
                    const target = document.elementFromPoint(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
                    if (target && !target.classList.contains('connection-line')) cancelLock();
                }
                isCanvasSwiping = false;
            });

            canvas.addEventListener('mousemove', (e) => {
                if (indicator.classList.contains('active') && !isTouchDevice) {
                    const rect = canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    indicator.style.left = x + 'px';
                    indicator.style.top = (y - 25) + 'px';
                }
            });
            
            window.addEventListener('deviceorientation', (e) => {
                if (!isTouchDevice || !lockedLineId || lineMode === 1 || lineMode === 8) return;
                let orientation = window.orientation || (screen.orientation && screen.orientation.angle) || 0;
                let tilt = 0;
                if (orientation === 0) {
                    tilt = e.gamma;
                } else if (orientation === 90) {
                    tilt = e.beta;
                } else if (orientation === -90 || orientation === 270) {
                    tilt = -e.beta;
                } else if (orientation === 180) {
                    tilt = -e.gamma;
                }
                if (tilt === null) return;
                
                const now = Date.now();
                if (now - lastSwipeTime < 400) return;

                if (lastTiltDirection === 0) {
                    if (tilt > TILT_THRESHOLD) {
                        lastTiltDirection = 1;
                        lastSwipeTime = now;
                        currentOptionIndex = (currentOptionIndex + 1) % currentOptions.length;
                        hasScrolled = true;
                        showIndicatorScrolled();
                        if ('vibrate' in navigator) navigator.vibrate(20);
                    } else if (tilt < -TILT_THRESHOLD) {
                        lastTiltDirection = -1;
                        lastSwipeTime = now;
                        currentOptionIndex = (currentOptionIndex - 1 + currentOptions.length) % currentOptions.length;
                        hasScrolled = true;
                        showIndicatorScrolled();
                        if ('vibrate' in navigator) navigator.vibrate(20);
                    }
                } else {
                    if (Math.abs(tilt) < RETURN_THRESHOLD) {
                        lastTiltDirection = 0;
                    }
                }
            });
        };

        function initLabData() {

                    if (savedCircuit) gateHistory = savedCircuit.split(',').filter(g => g !== "");

            } catch (e) {
                console.log("Initialization failed. Opening an empty lab instead.");

        }

        function startTrace(inputIndex) {
            if(typeof pop !== 'undefined' && pop.play) { pop.currentTime = 0; pop.play().catch(e=>{}); }
            activeTraceInput = inputIndex;
            currentTraceStep = 0;
            
            // === 新增：加上正在 Trace 的狀態 ===

        function traceMove(delta) {
            if(typeof pop !== 'undefined' && pop.play) { pop.currentTime = 0; pop.play().catch(e=>{}); }
            currentTraceStep += delta;
            if (currentTraceStep < 0) currentTraceStep = 0;
            if (currentTraceStep > gateHistory.length) currentTraceStep = gateHistory.length;
            renderTraceStep();
        }
        function exitTrace() {
            if(typeof pop !== 'undefined' && pop.play) { pop.currentTime = 0; pop.play().catch(e=>{}); }
            activeTraceInput = null;
            
            // === 新增：移除 Trace 的狀態 ===
            document.body.classList.remove('is-tracing');
            
            document.getElementById('trace-controls').classList.add('opacity-50', 'pointer-events-none');
            document.querySelectorAll('.trace-line-active').forEach(el => el.classList.remove('trace-line-active'));
            document.querySelectorAll('.trace-fish-active').forEach(el => el.classList.remove('trace-fish-active'));
            
            // 恢復顯示 d0~d3 / q0~q3 並隱藏右側的輸出數字
            for(let i=0; i<4; i++) {
                document.getElementById(`q-in-${i}`).innerText = isQuantumMode ? `q${i}` : `d${i}`;
                document.getElementById(`q-out-${i}`).classList.add('hidden-el');

        function renderTraceStep() {
            if (activeTraceInput === null) return;
            let prevNode = activeTraceInput;
            let currNode = activeTraceInput;
            for(let k = 0; k < currentTraceStep; k++) {
                prevNode = currNode;
                let pm = getPermutationForGate(gateHistory[k]);
                currNode = pm[currNode];
            }
            let trackedFishId = initialFishAtNode[activeTraceInput];
            let f = document.getElementById(`fish-${trackedFishId}`);
            let n = nodePositions[currNode];
            if (f && n) {
                f.style.top = (n.t + 27) + "px";
                f.style.left = (n.l + 15) + "px";
            }
            document.querySelectorAll('.trace-line-active').forEach(el => el.classList.remove('trace-line-active'));
            document.querySelectorAll('.trace-fish-active').forEach(el => el.classList.remove('trace-fish-active'));
            if (f) f.classList.add('trace-fish-active');
            if (currentTraceStep > 0 && prevNode !== currNode) {
                let lineId = `line-${Math.min(prevNode, currNode)}-${Math.max(prevNode, currNode)}`;
                let lineEl = document.getElementById(lineId);
                if (lineEl) lineEl.classList.add('trace-line-active');
            }
            updateFishVisibility();
            let inBin = activeTraceInput.toString(2).padStart(4, '0');
            let finalNode = activeTraceInput;
            for(let k = 0; k < gateHistory.length; k++) {
                let pm = getPermutationForGate(gateHistory[k]);
                finalNode = pm[finalNode];
            }
            let outBin = finalNode.toString(2).padStart(4, '0');
            for(let i = 0; i < 4; i++) {
                document.getElementById(`q-in-${i}`).innerText = inBin[i];
                document.getElementById(`q-out-${i}`).innerText = outBin[i];
                document.getElementById(`q-out-${i}`).classList.remove('hidden-el');
            }
            document.getElementById('trace-step-text').innerText = currentTraceStep;
            renderCircuit();
            const activeGate = document.querySelector('.circuit-unit.trace-active');
            if (activeGate) {
                activeGate.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        }
        function updateFishVisibility() {
            for (let i = 0; i < 16; i++) {
                let f = document.getElementById(`fish-${i}`);
                if (!f) continue;
                if (activeTraceInput !== null) {
                    let trackedFishId = initialFishAtNode[activeTraceInput];
                    if (i === trackedFishId) {
                        f.style.opacity = 1;
                        f.style.zIndex = 40;
                    } else {
                        f.style.opacity = 0;
                        f.style.zIndex = 30;
                    }
                } else {
                    f.style.opacity = 1;
                    f.style.zIndex = 30;
                }
            }
        }
        function updateTruthTable() {
            let stateMap = Array.from({length: 16}, (_, i) => i);
            gateHistory.forEach(type => {
                let pm = getPermutationForGate(type);
                let nextMap = new Array(16);
                for(let i=0; i<16; i++) nextMap[i] = pm[stateMap[i]];
                stateMap = nextMap;
            });
            let tbody = document.getElementById('tt-body');
            tbody.innerHTML = '';
            for(let i=0; i<16; i++) {
                let inStr = i.toString(2).padStart(4, '0');
                let outStr = stateMap[i].toString(2).padStart(4, '0');
                let isActive = (activeTraceInput === i);
                let isChanged = (i !== stateMap[i]);
                let outColor = isActive ? '' : (isChanged ? 'text-[#99C44D] font-bold' : 'text-gray-300');
                let rowClass = isActive ? 'active-trace' : '';

        function handleDragOver(e) {
            if (e.preventDefault) e.preventDefault();

        function handleDrop(e, targetIndex) {
            if (draggedIndex === null || draggedIndex === targetIndex) return;
            e.stopPropagation();
            const oldHistory = [...gateHistory];
            const movedItem = gateHistory.splice(draggedIndex, 1)[0];
            gateHistory.splice(targetIndex, 0, movedItem);
            actionStack.push({ type: 'replace', index: 0, oldGates: oldHistory, newGate: null });

                desktopDragGhost.remove();
                desktopDragGhost = null;

            if(typeof pop !== 'undefined' && pop.play) { pop.currentTime = 0; pop.play().catch(e=>{}); }
            targetScrollSpeed = 0;

        function startMobileDrag(touch, el, index) {

        function moveMobileDrag(touch) {
            if (!dragGhost) return;
            const x = touch.clientX - dragGhost.offsetWidth / 2;
            const y = touch.clientY - dragGhost.offsetHeight / 2;
            dragGhost.style.left = x + 'px';
            dragGhost.style.top = y + 'px';
        }
        function endMobileDrag(touch) {
            let targetUnit = null;
            const targetEl = document.elementFromPoint(touch.clientX, touch.clientY);
            if (targetEl) {
                targetUnit = targetEl.closest('.circuit-unit');
            }
            if (dragGhost) { dragGhost.remove(); dragGhost = null; }
            if (originalDragEl) { originalDragEl.style.visibility = '1'; originalDragEl = null; }
            document.querySelectorAll('.circuit-unit').forEach(el => {
                el.style.opacity = '1'; el.classList.remove('dragging-gate');
                el.classList.remove('drag-target', 'right');
            });
            
            if (targetUnit && mDragIndex !== null) {
                const type = targetUnit.dataset.type;
                const isSelf = type === 'gate' && parseInt(targetUnit.dataset.idx) === mDragIndex;
                if (!isSelf) {
                    const info = getDropInfo(targetUnit, touch.clientX);
                    if (isNoopDrop(targetUnit, info.insertIdx, mDragIndex)) {
                        mobileDragging = false;

        function getHighlightPairsForGate(type) {
            let pairs = [];
            if (type.startsWith('X')) {
                pairs = getAllPairs(3 - parseInt(type.substring(1)));
            } else if (type.startsWith('CX')) {
                let ctrlVal = parseInt(type[2]), c = parseInt(type[3]), t = parseInt(type[4]);
                let bit = 1 << (3 - t), cBit = 1 << (3 - c);
                for (let k = 0; k < 16; k++) {
                    if ((k & bit) === 0 && ((k & cBit) >> (3 - c)) === ctrlVal) pairs.push([k, k ^ bit]);
                }
            } else if (type.startsWith('TOF')) {
                let cv1 = parseInt(type[3]), cv2 = parseInt(type[4]), c1 = parseInt(type[5]), c2 = parseInt(type[6]), t = parseInt(type[7]);
                let bit = 1 << (3 - t), b1 = 1 << (3 - c1), b2 = 1 << (3 - c2);
                for (let k = 0; k < 16; k++) {
                    if ((k & bit) === 0 && ((k & b1) >> (3 - c1)) === cv1 && ((k & b2) >> (3 - c2)) === cv2) pairs.push([k, k ^ bit]);
                }
            } else if (type.startsWith('SWAP_')) {
                let p = type.split('_');
                pairs.push([parseInt(p[1]), parseInt(p[2])]);
            }
            return pairs;
        }

        // --- 生成對應的 Mini Hypercube SVG (支援大紅點標示) ---
        function getMiniHypercubeSVG(type, activeState = null) {
            let pairs = getHighlightPairsForGate(type);
            const miniNodes = nodePositions.map(n => ({ x: n.relX / 12, y: (n.t - baseOffsetY) / 12 }));
            let svg = `<svg viewBox="-10 -15 65 35" style="width:100%; height:100%; pointer-events:none;" preserveAspectRatio="xMidYMid meet">`;
            
            // 畫出所有的連線
            for(let i=0; i<16; i++) {
                for(let b=0; b<4; b++) {
                    let j = i ^ (1<<b);
                    if(j > i) {
                        let n1 = miniNodes[i], n2 = miniNodes[j];
                        let isHighlighted = pairs.some(p => (p[0]===i && p[1]===j) || (p[0]===j && p[1]===i));

                        svg += `<line x1="${n1.x}" y1="${n1.y}" x2="${n2.x}" y2="${n2.y}" class="${lineClass}" stroke-linecap="round"/>`;

            // 畫出所有的黑色基礎節點

                svg += `<circle cx="${n.x}" cy="${n.y}" r="2.5" fill="#f78790" stroke="#FFF9F0" stroke-width="1.5"/>`;
            }

            svg += `</svg>`;
            return svg;

        // 取得單個閘的圖案（根據視圖動態切換）
        function getGateContent(type) {

                else if (type.startsWith('TOF')) {
                    controls.push({ q: parseInt(type[5]), type: parseInt(type[3]) });
                    controls.push({ q: parseInt(type[6]), type: parseInt(type[4]) });

       function initGates() {

            // 2. 雙量子位元閘 (CX Gate)
            // 每個 Target 都有 3 條不同的控制線，利用 ctrlIdx (0, 1, 2) 來確保各欄橫向對齊
            for (let ctrlIdx = 0; ctrlIdx < 3; ctrlIdx++) {

                for (let t = 0; t < 4; t++) {
                    const pool = [0, 1, 2, 3].filter(q => q !== t);

                // 控制位元條件為 0 (CX0)

                    const pool = [0, 1, 2, 3].filter(q => q !== t);
                    html += wrapBtn(`CX0${pool[ctrlIdx]}${t}`);
                }
            }

            // 3. 三量子位元閘 (Toffoli Gate)
            const combos = [{ id: '11'}, { id: '00'}, { id: '01'}, { id: '10'}];
            for (let pairIdx = 0; pairIdx < 3; pairIdx++) {
                for (let cb of combos) {
                    for (let t = 0; t < 4; t++) {
                        const pool = [0, 1, 2, 3].filter(q => q !== t);
                        // 三種控制位元組合對
                        const pairs = [
                            [pool[0], pool[1]],
                            [pool[0], pool[2]],
                            [pool[1], pool[2]]
                        ];
                        const c1 = pairs[pairIdx][0];
                        const c2 = pairs[pairIdx][1];
                        html += wrapBtn(`TOF${cb.id}${c1}${c2}${t}`);
                    }
                }
            }
            grid.innerHTML = html;
        }

        function createLine(i, j, dim) {
            const n1 = nodePositions[i], n2 = nodePositions[j];

        function cycleLineMode(){

        function hideIndicator() {

        function buildGateOptions(i, j, dim) {
            const targetQ = 3 - dim;
            const ctrlPool = [0,1,2,3].filter(q=>q!==targetQ);
            const bit = 1 << dim;
            const options = [];
            if(lineMode === 4) {
                ctrlPool.forEach(c => {
                    const val = (i >> (3-c)) & 1;
                    const cBit = 1 << (3-c), cVal = i & cBit;
                    let pairs = [];
                    for(let k=0;k<16;k++) if((k&bit)===0 && (k&cBit)===cVal) pairs.push([k, k^bit]);
                    options.push({ gateType: `CX${val}${c}${targetQ}`, label: `CNOT: q${c} → q${targetQ}`, highlightPairs: pairs });
                });
            } else if(lineMode === 2) {
                const combos = [[ctrlPool[0],ctrlPool[1]], [ctrlPool[0],ctrlPool[2]], [ctrlPool[1],ctrlPool[2]]];
                combos.forEach(([c0,c1]) => {
                    const v0 = (i>>(3-c0))&1, v1 = (i>>(3-c1))&1;
                    const b0 = 1<<(3-c0), b1 = 1<<(3-c1), val0 = i&b0, val1 = i&b1;
                    let pairs = [];
                    for(let k=0;k<16;k++) if((k&bit)===0 && (k&b0)===val0 && (k&b1)===val1) pairs.push([k,k^bit]);
                    options.push({ gateType: `TOF${v0}${v1}${c0}${c1}${targetQ}`, label: `TOF: q${c0},q${c1} → q${targetQ}`, highlightPairs: pairs });
                });
            }
            return options;
        }
        function getAllPairs(dim){
            const bit=1<<dim, pairs=[];
            for(let k=0;k<16;k++) if((k&bit)===0) pairs.push([k,k^bit]);
            return pairs;
        }
        function highlightPairs(pairs){
            clearHighlight();
            pairs.forEach(([a,b])=>{

        function clearHighlight(){

        }
        
        function applyGate(type) {
            cancelLock();
            if (selectedIndices.length > 0) {
                selectedIndices.sort((a, b) => a - b);
                const start = selectedIndices[0];
                const count = selectedIndices.length;
                const oldOnes = gateHistory.slice(start, start + count);
                gateHistory.splice(start, count, type);
                actionStack.push({
                    type: 'replace',
                    index: start,
                    oldGates: oldOnes,
                    newGate: type
                });
                selectedIndices = [];
                if (typeof pop !== 'undefined' && pop.play) {
                    pop.currentTime = 0;
                    pop.play().catch(e => {});
                }
                recalculate();
            } else {
                flashGateLines(type);
                executeLogic(type);
                gateHistory.push(type);
                actionStack.push({
                    type: 'add',
                    index: gateHistory.length - 1,
                    newGate: type
                });
                gateCount = gateHistory.length;
                if (typeof pop !== 'undefined' && pop.play) {
                    pop.currentTime = 0;
                    pop.play().catch(e => {});
                }
                finishMove();
            }
        }
        function getPermutationForGate(type) {
            if (type.startsWith('SWAP_')) {
                let p = type.split('_'), iA = parseInt(p[1]), iB = parseInt(p[2]);
                let pm = Array.from({ length: 16 }, (_, i) => i);
                [pm[iA], pm[iB]] = [pm[iB], pm[iA]];
                return pm;
            }
            return Array.from({ length: 16 }, (_, p) => {
                let b = p.toString(2).padStart(4, '0').split('').map(Number);
                if (type.startsWith('X')) { b[parseInt(type.substring(1))] ^= 1; }
                else if (type.startsWith('CX')) {
                    let ctrlVal = parseInt(type[2]), c = parseInt(type[3]), t = parseInt(type[4]);
                    if (b[c] === ctrlVal) b[t] ^= 1;
                } else if (type.startsWith('TOF')) {
                    let cv1 = parseInt(type[3]), cv2 = parseInt(type[4]), c1 = parseInt(type[5]), c2 = parseInt(type[6]), t = parseInt(type[7]);
                    if (b[c1] === cv1 && b[c2] === cv2) b[t] ^= 1;
                }
                return parseInt(b.join(''), 2);
            });
        }
        function executeLogic(type) {
            let pm = getPermutationForGate(type);
            let newFish = new Array(16);
            for (let i = 0; i < 16; i++) newFish[pm[i]] = fishAtNode[i];
            fishAtNode = newFish;
        }
        function recalculate() {
            fishAtNode = [...initialFishAtNode];
            let h = [...gateHistory]; gateHistory = [];
            h.forEach(g => { executeLogic(g); gateHistory.push(g); });
            gateCount = gateHistory.length;
            finishMove();
        }
        function finishMove() {
            document.getElementById('step-count').innerText = gateCount;
            updateTruthTable();
            if (activeTraceInput !== null) {
                if (currentTraceStep > gateHistory.length) currentTraceStep = gateHistory.length;
                renderTraceStep();
            } else {
                updateFishUI();
                updateFishVisibility();
                renderCircuit();
            }
        }
        function getDropInfo(targetUnit, clientX) {
            const type = targetUnit.dataset.type;
            const rect = targetUnit.getBoundingClientRect();
            const isAfter = (clientX - rect.left) > (rect.width / 2);
            let insertIdx;
            let borderLeft = false;
            let borderRight = false;
            if (type === 'start') {
                insertIdx = 0;
                borderRight = true; // 放在最開頭
            } else if (type === 'end') {
                insertIdx = gateHistory.length;
                borderLeft = true;  // 放在最後面
            } else {
                const idx = parseInt(targetUnit.dataset.idx);
                insertIdx = isAfter ? idx + 1 : idx;
                borderLeft = !isAfter;
                borderRight = isAfter;
            }
            
            return { insertIdx, borderLeft, borderRight };
        }
        function getAdjustedDropIndex(insertIdx, sourceIdx) {
            return sourceIdx < insertIdx ? insertIdx - 1 : insertIdx;
        }
        function isNoopDrop(unit, insertIdx, sourceIdx) {
            if (sourceIdx === null) return true;
            const type = unit.dataset.type;
            if (type === 'gate' && parseInt(unit.dataset.idx) === sourceIdx) return true;
            return getAdjustedDropIndex(insertIdx, sourceIdx) === sourceIdx;
        }
        function updateFishUI() {
            for (let nI = 0; nI < 16; nI++) {
                const f = document.getElementById(`fish-${fishAtNode[nI]}`);
                const n = nodePositions[nI];
                if (f && n) { f.style.top = (n.t + 27) + "px"; f.style.left = (n.l + 15) + "px"; }

        function renderCircuit() {
            const c = document.getElementById('circuit-content');
            const wrapper = document.getElementById('circuit-content-wrapper');
            c.innerHTML = '';
            let states = [];
            
            if (activeTraceInput !== null) {
                let curr = activeTraceInput;
                states.push(curr);
                for (let k = 0; k < gateHistory.length; k++) {
                    curr = getPermutationForGate(gateHistory[k])[curr];
                    states.push(curr);
                }
            }
            
            const drawWires = (parentUnit, stepIdx) => {
                for (let q = 0; q < 4; q++) {
                    let wire = document.createElement('div');

                    wire.style.top = (30 + q * 40 - 0.5) + 'px';
                    wire.style.zIndex = '1';
                    if (activeTraceInput !== null) {
                        if (stepIdx <= currentTraceStep) {
                            let bit = (states[stepIdx] >> (3 - q)) & 1;
                            if (bit === 1) {
                                wire.style.background = '#FFB7C5';
                                wire.style.boxShadow = '0 0 8px #FFB7C5';
                            } else {
                                wire.style.background = '#8a6d1c';

            const bindDropEvents = (unit) => {

                    e.preventDefault();
                    if (draggedIndex === null) {
                        unit.classList.remove('drag-target', 'right');
                        return;
                    }
                    e.dataTransfer.dropEffect = 'move';
                    const type = unit.dataset.type;
                    document.querySelectorAll('.circuit-unit').forEach(el => {
                        el.classList.remove('drag-target', 'right');
                    });
                    const info = getDropInfo(unit, e.clientX);
                    if (!isNoopDrop(unit, info.insertIdx, draggedIndex)) {
                        if (info.borderLeft || info.borderRight) unit.classList.add('drag-target');
                        if (info.borderRight) unit.classList.add('right');
                    }
                    if (typeof handleCircuitScroll === 'function') handleCircuitScroll(e);
                });

                unit.addEventListener('dragleave', () => {
                    unit.classList.remove('drag-target', 'right');
                });

                unit.addEventListener('drop', (e) => {
                    // 3. 確保 drop 也有 preventDefault
                    e.preventDefault(); 
                    e.stopPropagation();
                    
                    unit.classList.remove('drag-target', 'right');
                    targetScrollSpeed = 0;

                    if (draggedIndex === null) return;
                    const type = unit.dataset.type;

                    const info = getDropInfo(unit, e.clientX);
                    if (isNoopDrop(unit, info.insertIdx, draggedIndex)) return;
                    let finalIdx = getAdjustedDropIndex(info.insertIdx, draggedIndex);

                    if (typeof pop !== 'undefined' && pop.play) { pop.currentTime = 0; pop.play().catch(e=>{}); }

                    const oldHistory = [...gateHistory];
                    const movedItem = gateHistory.splice(draggedIndex, 1)[0];
                    gateHistory.splice(finalIdx, 0, movedItem);

                    actionStack.push({ type: 'replace', index: 0, oldGates: oldHistory, newGate: null });
                    draggedIndex = null;
                    if (desktopDragGhost) { desktopDragGhost.remove(); desktopDragGhost = null; }
                    selectedIndices = [];
                    recalculate();
                });
            };
            
            const startU = document.createElement('div');
            startU.className = 'circuit-unit';
            startU.style.minWidth = '30px';
            startU.style.cursor = 'default';
            startU.dataset.type = 'start';
            drawWires(startU, 0);
            bindDropEvents(startU);
            c.appendChild(startU);
            
            gateHistory.forEach((g, idx) => {
                const u = document.createElement('div');
                u.className = 'circuit-unit';
                u.draggable = true;
                u.dataset.type = 'gate';
                u.dataset.idx = idx;
                
                const hex = getGateColorMap(g);
                u.style.setProperty('--bg-hover', getRgba(hex, 0.35));
                u.style.setProperty('--gate-color', hex);

                if (!isQuantumMode) u.style.minWidth = '280px';
                if (selectedIndices.includes(idx)) u.classList.add('selected-gate');
                
                if (activeTraceInput !== null) {
                    if (idx === currentTraceStep - 1) u.classList.add('trace-active');
                    else if (idx >= currentTraceStep) u.style.opacity = '0.35';
                }
                drawWires(u, idx + 1);
                
                if (!isQuantumMode) {
                    const svgWrap = document.createElement('div');
                    svgWrap.style.width = '100%'; svgWrap.style.height = '100%'; svgWrap.style.position = 'absolute'; svgWrap.style.zIndex = '4'; svgWrap.style.pointerEvents = 'none';
                    
                    let currentFishPos = null;
                    if (activeTraceInput !== null && idx < currentTraceStep) {
                        currentFishPos = states[idx + 1];
                    }
                    svgWrap.innerHTML = getMiniHypercubeSVG(g, currentFishPos);
                    u.appendChild(svgWrap);
                } else {
                    let controls = [], target = -1;
                    if (g.startsWith('SWAP_')) {
                        let p = g.split('_'), iA = parseInt(p[1]), iB = parseInt(p[2]); target = 3 - Math.round(Math.log2(iA ^ iB));
                        let binary = Math.min(iA, iB).toString(2).padStart(4, '0').split('').map(Number);
                        for (let q = 0; q < 4; q++) if (q !== target) controls.push({ line: q, type: binary[q] });
                    } else if (g.startsWith('X')) { target = parseInt(g.substring(1)); }
                    else if (g.startsWith('CX')) { controls.push({ line: parseInt(g[3]), type: parseInt(g[2]) }); target = parseInt(g[4]); }
                    else if (g.startsWith('TOF')) { controls.push({ line: parseInt(g[5]), type: parseInt(g[3]) }); controls.push({ line: parseInt(g[6]), type: parseInt(g[4]) }); target = parseInt(g[7]); }
                    if (target !== -1) {
                        let lines = [target, ...controls.map(ctrl => ctrl.line)]; let minQ = Math.min(...lines), maxQ = Math.max(...lines);
                        const vLine = document.createElement('div'); vLine.className = 'connection-v-line'; vLine.style.cssText = `top:${30 + minQ * 40}px; height:${(maxQ - minQ) * 40}px; z-index: 5;`; u.appendChild(vLine);
                        controls.forEach(ctrl => {
                            const dot = document.createElement('div'); dot.className = 'control-dot'; dot.style.top = (24 + ctrl.line * 40) + 'px'; dot.style.zIndex = '6';
                            if (ctrl.type === 0) { dot.style.background = '#fff'; dot.style.border = '2px solid #463438'; } u.appendChild(dot);
                        });
                        const t = document.createElement('div'); t.className = 'circuit-target'; t.style.top = (32 + target * 40) + 'px'; t.style.zIndex = '6'; u.appendChild(t);
                    }
                }

                bindDropEvents(u);
                u.addEventListener('dragstart', (e) => handleDragStart(e, idx));
                u.addEventListener('dragend', (e) => {
                    e.target.style.opacity = '1';
                    e.target.classList.remove('dragging-gate');
                    document.querySelectorAll('.circuit-unit').forEach(el => { el.classList.remove('drag-target', 'right'); });
                    draggedIndex = null; targetScrollSpeed = 0;
                    if (desktopDragGhost) { desktopDragGhost.remove(); desktopDragGhost = null; }
                    renderCircuit();
                });

                u.onmouseenter = () => highlightByGate(g);
                u.onmouseleave = () => clearHighlight();
                
                let touchTimer = null, startX, startY;
                u.addEventListener('touchstart', (e) => {
                    if (e.touches.length > 1) return;
                    startX = e.touches[0].clientX; startY = e.touches[0].clientY;
                    touchTimer = setTimeout(() => { touchTimer = null; startMobileDrag(e.touches[0], u, idx); }, 400);
                }, { passive: true });
                
                u.addEventListener('touchmove', (e) => {
                    if (mobileDragging) {
                        if (e.cancelable) e.preventDefault();
                        moveMobileDrag(e.touches[0]);
                        handleCircuitScroll(e.touches[0]);
                        document.querySelectorAll('.circuit-unit').forEach(el => {
                            el.classList.remove('drag-target', 'right');
                        });
                        const targetEl = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
                        if (targetEl) {
                            const targetUnit = targetEl.closest('.circuit-unit');
                            if (targetUnit) {
                                const type = targetUnit.dataset.type;
                                const isSelf = type === 'gate' && parseInt(targetUnit.dataset.idx) === idx;
                                if (!isSelf) {
                                    const info = getDropInfo(targetUnit, e.touches[0].clientX);
                                    if (!isNoopDrop(targetUnit, info.insertIdx, idx)) {
                                        if (info.borderLeft || info.borderRight) targetUnit.classList.add('drag-target');
                                        if (info.borderRight) targetUnit.classList.add('right');
                                    }
                                }
                            }
                        }
                    } else if (touchTimer !== null || startY !== undefined) {
                        const dx = e.touches[0].clientX - startX, dy = e.touches[0].clientY - startY;
                        if (Math.abs(dx) > 10 || Math.abs(dy) > 10) { if (touchTimer) { clearTimeout(touchTimer); touchTimer = null; } }
                        if (Math.abs(dy) > 30 && Math.abs(dy) > Math.abs(dx)) {
                            if (e.cancelable) e.preventDefault();
                            if (dy > 30) {
                                const sIdx = selectedIndices.indexOf(idx);
                                if (sIdx > -1) selectedIndices.splice(sIdx, 1); else selectedIndices.push(idx);
                                renderCircuit(); startY = undefined; 
                            } else if (dy < -30) {
                                if (typeof pop !== 'undefined' && pop.play) { pop.currentTime = 0; pop.play().catch(e=>{}); }
                                const removed = gateHistory[idx]; actionStack.push({ type: 'delete', index: idx, oldGates: [removed] });
                                gateHistory.splice(idx, 1); selectedIndices = []; recalculate(); startY = undefined;
                            }
                        }
                    }
                }, { passive: false });
                
                u.addEventListener('touchend', (e) => {
                    if (touchTimer) { clearTimeout(touchTimer); touchTimer = null; }
                    if (mobileDragging) { if (e.cancelable) e.preventDefault(); endMobileDrag(e.changedTouches[0]); }
                });
                
                u.addEventListener('touchcancel', (e) => {
                    if (touchTimer) { clearTimeout(touchTimer); touchTimer = null; }
                    if (mobileDragging) { const touch = (e.changedTouches && e.changedTouches[0]) || (e.touches && e.touches[0]); if (touch) endMobileDrag(touch); }
                });
                
                u.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (mobileDragging || isTouchDevice) return;
                    if (typeof pop !== 'undefined' && pop.play) { pop.currentTime = 0; pop.play().catch(e => {}); }
                    const removed = gateHistory[idx]; actionStack.push({ type: 'delete', index: idx, oldGates: [removed] });
                    gateHistory.splice(idx, 1); selectedIndices = []; recalculate();
                });

                u.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    if (mobileDragging) return;
                    const sIdx = selectedIndices.indexOf(idx);
                    if (sIdx > -1) selectedIndices.splice(sIdx, 1); else selectedIndices.push(idx);
                    renderCircuit();
                });
                
                c.appendChild(u);
            });
            
            const endU = document.createElement('div');
            endU.className = 'circuit-unit';
            endU.style.minWidth = '50px';
            endU.style.flexGrow = '1';
            endU.style.cursor = 'default';
            endU.dataset.type = 'end';
            drawWires(endU, states.length > 0 ? states.length - 1 : 0);
            bindDropEvents(endU);
            c.appendChild(endU);
            
            updateUndoStatus();
            if (selectedIndices.length === 0 && gateHistory.length > 0 && draggedIndex === null && activeTraceInput === null) {
                setTimeout(() => wrapper.scrollTo({ left: wrapper.scrollWidth, behavior: 'smooth' }), 50);
            }
        }
        function undo() {
            if (actionStack.length === 0) return;
            if(typeof pop !== 'undefined' && pop.play) { pop.currentTime = 0; pop.play().catch(e=>{}); }
            const action = actionStack.pop();
            if (action.type === 'add') { gateHistory.splice(action.index, 1); }
            else if (action.type === 'delete') { gateHistory.splice(action.index, 0, ...action.oldGates); }
            else if (action.type === 'replace') {
                if (action.newGate === null) gateHistory = [...action.oldGates];
                else gateHistory.splice(action.index, 1, ...action.oldGates);
            }
            selectedIndices = []; recalculate();
        }
        function resetCircuit() {
            if(typeof pop !== 'undefined' && pop.play) { pop.currentTime = 0; pop.play().catch(e=>{}); }
            gateHistory = []; actionStack = []; selectedIndices = [];
            targetScrollSpeed = 0;
            recalculate();
        }
        function updateUndoStatus() {
            const isActive = actionStack.length > 0;
            document.getElementById('undo-btn').classList.toggle('active', isActive);
        }
        function shareCircuit() {
            if (gateHistory.length === 0) {
                alert("The circuit is empty and cannot be shared.");
                return;
            }
            const circuitData = gateHistory.join(',');
            const shareUrl = `${window.location.origin}${window.location.pathname}?circuit=${encodeURIComponent(circuitData)}`;
            navigator.clipboard.writeText(shareUrl).then(() => {
                alert("Circuit sharing link copied! Send it to a friend to open this circuit.");
            }).catch(err => {
                console.error('Failed to copy link', err);
                alert("Link: " + shareUrl);
            });
        }
        function navWithSound(url) {
            if (typeof pop !== 'undefined') {
                pop.currentTime = 0;
                pop.play(); 
            }
            setTimeout(() => {
                window.location.href = url;
            }, 150); 
        }
    </script>
</body>
</html>
