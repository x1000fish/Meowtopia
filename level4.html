        .connection-line { position: absolute; background: #000; cursor: pointer; z-index: 10; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }

        .fish-wrapper img { width: 70px; height: auto; }
        .fish-label { background: #000000b6; color: #fff; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; margin-bottom: -47px; z-index: 5; position: relative; top: -10px; }
        .game-btn { cursor: pointer; border: 5px solid #000; border-radius: 60px; padding: 12px; font-size: 26px; font-weight: 900; color: white; text-shadow: 2px 2px 0 #000; box-shadow: 0 4px 0 #000; position: relative; transition: all 0.1s; display: inline-block; }
        .game-btn:active { top: 6px; box-shadow: 0 2px 0 #000; }
        .btn-red { background: #EF4444; }
        .btn-green { background: #22C55E; }
        .multi-toggle-btn { background: #c76419; border: 4px solid #000; border-radius: 20px; padding: 5px 15px; font-weight: 900; font-size: 20px; color: white; cursor: pointer; box-shadow: 0 4px 0 #000; transition: all 0.1s; }
        .multi-toggle-btn.active-mode { background: #2b66e5; }
        .multi-toggle-btn:hover,
        .game-btn:hover,
        .mode-toggle-fixed:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #000;}
        .multi-toggle-btn:active,
        .mode-toggle-fixed:active { transform: translateY(2px); box-shadow: 0 2px 0 #000;}
        .gate-btn-v2 { background: #ffffff; border: 2.5px solid #000; border-radius: 30px; padding: 5px; font-weight: 800; font-size: 16px; color: #000; cursor: pointer; box-shadow: 0 3px 6px rgba(0,0,0,0.1); transition: all 0.1s; text-align: center; }
        .gate-btn-v2:active { transform: translateY(2px); box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .gate-btn-v2:hover, .func-btn:hover { background-color: #fee58b !important; border-color: #000 !important; color: #000 !important; box-shadow: 0 0 5px rgba(0, 0, 0, 0.7), 0 3px 0 #000 !important; transform: translateY(-2px); }
        .func-btn { width: 100%; margin-top: 5px; padding: 10px; border-radius: 35px; font-weight: 900; font-size: 16px; border: 2.5px solid #000; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.1); }
        .btn-reset { background: #e0e0e0; color: #000; }
        .btn-undo { background: #e8a098 !important; color: #fff !important; border: 2.5px solid #cb867d !important; opacity: 0.6; cursor: not-allowed; }
        .btn-undo.active { background: #EF4444 !important; border-color: #000 !important; color: #fff !important; opacity: 1; cursor: pointer; box-shadow: 0 4px 0 #000; }
        #pro-panel { width: 0; opacity: 0; height: 500px; overflow: hidden; background: #ffffff; border: 0px solid #000; border-radius: 40px; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .pro-active #pro-panel { width: 320px; opacity: 1; border: 8px solid #000; padding: 12px 20px 20px 20px; }
        .panel-section-title { font-weight: 900; font-size: 18px; margin-bottom: 6px; margin-top: 6px; color: #000; text-align: center; white-space: nowrap; overflow: hidden; }

        .pro-active .line-h { left: 130px !important; }

        .pro-active #fish-1, .pro-active #fish-3 { left: 435px; }
        #circuit-area { width: 900px; height: 0; opacity: 0; background: #ffffff; border: 0px solid #000; border-radius: 30px; margin-top: 20px; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); position: relative; padding: 0 15px; overflow: hidden; }

        .circuit-title { text-align: center; font-weight: 900; font-size: 1.25rem; margin-bottom: 8px; color: #000; }
        #circuit-content-wrapper { position: relative; height: 130px; overflow-x: auto !important; overflow-y: hidden; margin-left: 30px; padding-top: 4px;}
        #circuit-content { display: flex; height: 100%; padding: 0 7px; min-width: 100%; width: max-content; position: relative; background-image: linear-gradient(#000, #000), linear-gradient(#000, #000); background-size: 100% 3px; background-repeat: no-repeat; background-position: 0 20px, 0 60px; }
        .qubit-label { position: absolute; left: 12px; font-weight: 900; font-size: 16px; color: #000; z-index: 5; }
        .circuit-unit { min-width: 48px; height: 85px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; cursor: pointer; transition: all 0.2s; }
        .circuit-unit:hover { background: rgba(239, 68, 68, 0.2); border-radius: 12px; }
        .circuit-unit.selected { background: rgba(40, 180, 255, 0.3) !important; border-radius: 12px; box-shadow: inset 0 0 0 2px #2a5cad; }
        .control-dot { width: 14px; height: 14px; background: black; border-radius: 50%; position: absolute; z-index: 5; }
        .connection-v-line { position: absolute; width: 2.5px; background: black; z-index: 3; }
        .circuit-target { position: absolute; width: 22px; height: 22px; border-radius: 50%; background: #fff; border: 2px solid #000; display: flex; align-items: center; justify-content: center; z-index: 15; transform: translate(-50%, -50%); }
        .circuit-target::before { content: ""; position: absolute; width: 2.5px; height: 100%; background-color: #000; }
        .circuit-target::after { content: ""; position: absolute; width: 100%; height: 2.5px; background-color: #000; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1100; }
        .modal-content { background: #F8F3DC; border: 8px solid #000; border-radius: 40px; padding: 30px; text-align: center; width: 380px; box-shadow: 0 10px 0 #000; }

        #pro-guide-mask { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); z-index: 900; display: none; }
        #guide-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 450; display: flex; }
        #guide-hint-text { position: fixed; background: #ffc822; color: #000; padding: 4px 12px; border-radius: 9999px; font-weight: 900; font-size: 16px; z-index: 1000; display: none; transition: all 0.3s; min-width: 150px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); text-align: center; }
        .next-btn { margin-top: 8px; background: #000; color: #fff; padding: 4px 12px; border-radius: 10px; font-size: 14px; cursor: pointer; border: none; font-weight: 900; }
        .lock-btn { opacity: 1; cursor: not-allowed !important; pointer-events: none !important; filter: grayscale(1); }
        .highlight-focus { position: relative !important; z-index: 950 !important; pointer-events: auto !important; animation: pulse-btn-border 1.5s infinite ease-in-out !important; }
        .highlight-static { position: relative !important; z-index: 950 !important; border-color: #ffc822 !important; box-shadow: 0 0 25px #ffc822 !important; pointer-events: auto !important; }
        .highlight-canvas-obj { position: absolute !important; z-index: 950 !important; box-shadow: 0 0 30px 10px #ffc822 !important; pointer-events: auto !important; }
        .fish-top-layer { z-index: 951 !important; }
        .gate-btn-v2.highlight-focus:hover, .func-btn.highlight-focus:hover { animation-play-state: paused !important; border-color: #ffc822 !important; border-width: 3px !important; background-color: #fee58b !important; box-shadow: 0 4px 0 #000, 0 0 20px #ffc822 !important; transform: scale(1.05) !important; }
        #circuit-area.tutorial-active { z-index: 910 !important; position: relative !important; background: #ffffff !important; transition: none !important; }
        .circuit-unit.highlight-focus { z-index: 1001 !important; pointer-events: auto !important; animation: pulse-circuit 1.5s infinite ease-in-out !important; border-radius: 12px; }
        .highlight-focus:hover { animation-play-state: paused !important; border-color: #ffc822 !important; transform: scale(1) !important; }
        .mode-toggle-fixed { position: fixed; top: 20px; right: 20px; width: 70px; height: 70px; background: white; border: 5px solid #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; box-shadow: 0 4px 0 #000; z-index: 500; }
        .start-hint-banner { position: fixed; top: 100px; right: 15px; z-index: 600; pointer-events: none; display: flex; flex-direction: column; align-items: flex-end; animation: tap-anim 1.5s infinite; }
        .hint-pill { background: #ffc822; color: #000; font-weight: 900; padding: 4px 12px; border-radius: 9999px; font-size: 16px; margin-top: 8px; }
        @keyframes yellow-pulse { 0%, 100% { box-shadow: 0 4px 0 #000, 0 0 5px #ffc822; border-color: #000; } 35% { box-shadow: 0 4px 0 #000, 0 0 30px #ffc822; border-color: #ffc822; transform: scale(1.1); } }
        @keyframes tap-anim { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes pulse-btn-border { 0%, 100% { border-color: #000; transform: scale(1); } 50% { border-color: #ffc822; transform: scale(1.05); box-shadow: 0 0 15px #ffc822; } }
        @keyframes pulse-circuit { 0%, 100% { box-shadow: 0 0 5px #ffc822; } 50% { box-shadow: 0 0 15px #ffc822; } }
        .yellow-glow { animation: yellow-pulse 1.5s infinite ease-in-out; z-index: 501 !important; }
        .highlight-fixed { z-index: 1001 !important; pointer-events: auto !important; }
        .highlight-fixed .side-leaderboard-content,
        .highlight-fixed .bookmark-tab {border-color: #ffc822 !important;box-shadow: 0 0 25px rgba(255, 200, 34, 0.8) !important;}
        .gate-btn-circuit { padding: 0 !important; height: 76px; display: flex; align-items: center; justify-content: center; border-radius: 16px !important; position: relative; }
        .wire-container { position: relative; width: 60%; max-width: 50px; height: 100%; background-image: linear-gradient(#000, #000), linear-gradient(#000, #000); background-size: 100% 3px; background-repeat: no-repeat; background-position: center 24px, center 52px; pointer-events: none; }
        #canvas-bottom-btns { position: absolute; bottom: 20px; right: 30px; display: flex; flex-direction: column; gap: 10px; z-index: 100; }
        #canvas-bottom-btns .func-btn { margin-top: 0; width: 90px; font-size: 14px; padding: 8px 5px; text-transform: uppercase; border-width: 3px; }
        .pro-active #canvas-bottom-btns { display: none !important; }
    </style>
</head>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzR0J0VXyl5ayKwDXlHimc4WS1FjvGEb2-gTBMhum8APQKfDHxc5wsiWRkNqkxJrocMOw/exec';
        let steps = 0, time = 0, isPro = false, fishAtNode = [3, 2, 1, 0], gateHistory = [], timerInterval, isSolved = false;
        let historyStack = [[]];
        let selectedIndices = [];
        let isMode2 = false;
        let leaderboardData = [];
        let draggedIndex = null;
        let tutorialPhase = 1;
        let tutorialCompleted = false;
        const pop = new Audio('pop.m4a'), meow = new Audio('meow.m4a');
        window.onload = () => {
            timerInterval = setInterval(() => { time++; document.getElementById('timer').innerText = time; }, 1000);
            updateFishUI();
            updateUndoStatus();
            fetchLeaderboard();
            const cw = document.getElementById('circuit-content-wrapper');
            cw.addEventListener('wheel', (e) => { e.preventDefault(); cw.scrollLeft += e.deltaY; });
        };
        function toggleLeaderboard() {
            const wrapper = document.getElementById('leaderboard-wrapper');
            wrapper.classList.toggle('expanded');
        }
        function clearAllHighlights() {
            document.querySelectorAll('.highlight-focus, .highlight-static, .highlight-canvas-obj, .fish-top-layer, .line-highlight, .highlight-fixed').forEach(el => el.classList.remove('highlight-focus', 'highlight-static', 'highlight-canvas-obj', 'fish-top-layer', 'line-highlight', 'highlight-fixed'));
            document.querySelectorAll('.gate-btn-v2, .func-btn').forEach(el => el.classList.remove('lock-btn'));
            document.getElementById('circuit-area').classList.remove('tutorial-active');
            document.getElementById('leaderboard-wrapper').style.zIndex = "150";
        }
        function updateTutorialUI() {
            if (tutorialCompleted) return;
            clearAllHighlights();
            const h = document.getElementById('guide-hint-text');
            const mask = document.getElementById('pro-guide-mask');
            const gates = document.querySelectorAll('.gate-btn-v2, .func-btn');
           
            if ([2, 3, 4, 5].includes(tutorialPhase)) {
                mask.style.display = 'block';
                document.getElementById('circuit-area').classList.add('tutorial-active');
            }
            if (tutorialPhase === 2) {
                gates.forEach(g => g.classList.add('lock-btn'));
                const targetBtn = document.getElementById('gate-cx01');
                if (targetBtn) {
                    targetBtn.classList.remove('lock-btn');
                    targetBtn.classList.add('highlight-focus');
                    h.innerHTML = `CLICK 1CNOT q0→q1`;
                    positionHint(targetBtn, -100, 90);
                }
            }
            else if (tutorialPhase === 3) {
                gates.forEach(g => g.classList.add('lock-btn'));
                const targetBtn = document.getElementById('gate-cx10');
                if (targetBtn) {
                    targetBtn.classList.remove('lock-btn');
                    targetBtn.classList.add('highlight-focus');
                    h.innerHTML = `CLICK 1CNOT q1→q0`;
                    positionHint(targetBtn, -130, 80);
                }
            }
            else if (tutorialPhase === 4) {
                gates.forEach(g => g.classList.add('lock-btn'));
                h.innerHTML = `DRAG THE 2ND GATE ONTO THE 1ST TO SWAP THEM`;
                const circuitWrapper = document.getElementById('circuit-area');
                if (circuitWrapper) {
                    positionHint(circuitWrapper, -1060, 20);
                }
                renderCircuit();
            }
            else if (tutorialPhase === 5) {
                gates.forEach(g => g.classList.add('lock-btn'));
                const board = document.getElementById('leaderboard-wrapper');
                board.classList.add('highlight-fixed');
                board.classList.add('expanded'); // 教學時自動展開排行榜
                h.innerHTML = `CHECK OUT THE LEADERBOARD OVER HERE!<br><button onclick="endTutorial()" class="next-btn">GOT IT</button>`;
                setTimeout(() => {
                    // 修改偏移量，讓教學文字框往右避開排行榜書籤
                    positionHint(board, 60, 70);
                }, 300);
                renderCircuit();
            }
        }
        function positionHint(idOrEl, ox, oy) {
            const h = document.getElementById('guide-hint-text');
            const el = typeof idOrEl === 'string' ? document.getElementById(idOrEl) : idOrEl;
            if (!el) return;
            const r = el.getBoundingClientRect();
            h.style.display = 'block';
            h.style.left = (r.right + ox) + 'px';
            h.style.top = (r.top + oy) + 'px';
        }
        function endTutorial() {
            tutorialPhase = 6;
            tutorialCompleted = true;
            document.getElementById('pro-guide-mask').style.display = 'none';
            document.getElementById('guide-hint-text').style.display = 'none';
            document.getElementById('leaderboard-wrapper').classList.remove('expanded'); // 自動收合
            clearAllHighlights();
            updateUndoStatus();
        }
        function handleDragStart(e, index) {
            if (isSolved) return;
            draggedIndex = index;
            e.dataTransfer.effectAllowed = 'move';
            e.target.style.opacity = '0.5';
        }
        function handleDragOver(e) {
            if (e.preventDefault) e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            return false;
        }
        function handleDrop(e, targetIndex) {
            if (isSolved || draggedIndex === null || draggedIndex === targetIndex) return;
           
            if (tutorialPhase === 4) {
                if (draggedIndex !== 1 || targetIndex !== 0) {
                    draggedIndex = null;
                    return;
                }
            }
            pop.currentTime = 0; pop.play();
            const movedGate = gateHistory.splice(draggedIndex, 1)[0];
            gateHistory.splice(targetIndex, 0, movedGate);
            pushHistory();
            selectedIndices = [];
            recalculatePositions();
            finishMove();
            draggedIndex = null;
            if (tutorialPhase === 4) {
                tutorialPhase = 5;
                setTimeout(updateTutorialUI, 100);
            }
        }
        async function fetchLeaderboard() {
            const listArea = document.getElementById('rankList');
            try {
                const response = await fetch(`${SCRIPT_URL}?action=getLeaderboard&level=4`);
                const data = await response.json();
                if (data && Array.isArray(data) && data.length > 0) {
                    leaderboardData = data;
                    renderRank('steps');
                } else {
                    listArea.innerHTML = '<p class="text-center italic text-gray-400 mt-10 text-sm">No records yet</p>';
                }
            } catch (e) {
                listArea.innerHTML = '<p class="text-center italic text-red-400 mt-10 text-sm">Load Error</p>';
            }
        }
        function renderRank(type) {
            const tabSteps = document.getElementById('tab-steps');
            const tabTime = document.getElementById('tab-time');
            const listArea = document.getElementById('rankList');
            if (type === 'steps') {
                tabSteps.className = 'rank-tab active';
                tabTime.className = 'rank-tab bg-gray-100';
            } else {
                tabSteps.className = 'rank-tab bg-gray-100';
                tabTime.className = 'rank-tab active';
            }
            if (!leaderboardData || leaderboardData.length === 0) return;
            const sorted = [...leaderboardData].sort((a, b) => a[type] - b[type]);
            let html = "";
            sorted.slice(0, 10).forEach((item, index) => {
                const medal = index === 0 ? "🥇" : index === 1 ? "🥈" : index === 2 ? "🥉" : (index + 1) + ".";
                const displayName = item.username || item.name || 'Anonymous';
                const displayValue = type === 'steps' ? item.steps + '🐾' : item.time + 's';
                html += `<div class="rank-item"><span class="truncate" style="max-width: 90px;">${medal} ${displayName}</span><span class="text-blue-600">${displayValue}</span></div>`;
            });
            listArea.innerHTML = html;
        }
        function toggleMode2() {
            pop.currentTime = 0;
            pop.play();
            if (tutorialPhase > 0 && tutorialPhase < 6) return;
            isMode2 = !isMode2;
            const btn = document.getElementById('mode-2-btn');
            btn.innerText = isMode2 ? "Mode: 2" : "Mode: 1";
            btn.classList.toggle('active-mode', isMode2);
        }
        function syncHighlight(dir, isOn) {
            if (!isMode2) return;
            const lines = dir === 'H' ? ['line-h-0', 'line-h-1'] : ['line-v-0', 'line-v-1'];
            lines.forEach(id => {
                const el = document.getElementById(id);
                if (isOn) el.classList.add('line-highlight');
                else el.classList.remove('line-highlight');
            });
        }
        function syncGateHighlight(gate, isOn) {
            let lineIds = [];
            if (gate === 'X0') lineIds = ['line-v-0', 'line-v-1'];
            else if (gate === 'X1') lineIds = ['line-h-0', 'line-h-1'];
            else if (gate === 'C0X01') lineIds = ['line-h-0'];
            else if (gate === 'CX01') lineIds = ['line-h-1'];
            else if (gate === 'C0X10') lineIds = ['line-v-0'];
            else if (gate === 'CX10') lineIds = ['line-v-1'];
            lineIds.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    if (isOn) el.classList.add('line-highlight');
                    else el.classList.remove('line-highlight');
                }
            });
        }
        function handleLineClick(dir) {
            if (isSolved) return;
            if (tutorialPhase > 0 && tutorialPhase < 6) return;
            if (isMode2) {
                const gate = (dir === 'H') ? 'X1' : 'X0';
                applyGate(gate);
            } else {
                const eventId = event.currentTarget.id;
                if (eventId === 'line-h-0') applyGate('C0X01');
                if (eventId === 'line-h-1') applyGate('CX01');
                if (eventId === 'line-v-0') applyGate('C0X10');
                if (eventId === 'line-v-1') applyGate('CX10');
            }
        }
        function togglePro() {
            pop.currentTime = 0;
            pop.play();
            isPro = !isPro; const b = document.getElementById('body-root');
            const overlay = document.getElementById('guide-overlay');
            if(overlay) overlay.style.display = 'none';
            const startHint = document.getElementById('start-hint');
            if(startHint) startHint.style.display = 'none';
            document.getElementById('mode-toggle').classList.remove('yellow-glow');
            b.classList.add('no-fish-anim'); b.classList.toggle('pro-active', isPro);
            updateFishUI(); setTimeout(() => b.classList.remove('no-fish-anim'), 50);
            document.getElementById('mode-toggle').innerText = isPro ? "⚡️" : "👁️";
           
            if (tutorialPhase === 1 && isPro) {
                tutorialPhase = 2;
                setTimeout(updateTutorialUI, 100);
            }
        }
        function pushHistory() { historyStack.push([...gateHistory]); }
        function applyGate(g) {
            if (isSolved) return;
            if (tutorialPhase > 0 && tutorialPhase < 6) {
                if (tutorialPhase === 2 && g !== 'CX01') return;
                if (tutorialPhase === 3 && g !== 'CX10') return;
                if (tutorialPhase === 4 || tutorialPhase === 5) return;
            }
            pop.currentTime = 0; pop.play();
            if (selectedIndices.length > 0) {
                let targetIdx = Math.min(...selectedIndices);
                let newHistory = [];
                for(let i=0; i<gateHistory.length; i++) {
                    if (i === targetIdx) newHistory.push(g);
                    else if (!selectedIndices.includes(i)) newHistory.push(gateHistory[i]);
                }
                gateHistory = newHistory;
                selectedIndices = [];
                pushHistory(); recalculatePositions(); finishMove();
            } else { executeGateLogic(g); }




            if (tutorialPhase === 2 && g === 'CX01') {
                tutorialPhase = 3;
                setTimeout(updateTutorialUI, 100);
            } else if (tutorialPhase === 3 && g === 'CX10') {
                tutorialPhase = 4;
                setTimeout(updateTutorialUI, 100);
            }
        }
        function executeGateLogic(g) {
            let pm = [0,1,2,3].map(pos => {
                let q0 = Math.floor(pos/2), q1 = pos%2;
                if(g==='X0') q0=1-q0; else if(g==='X1') q1=1-q1;
                else if(g==='CX01' && q0===1) q1=1-q1; else if(g==='C0X01' && q0===0) q1=1-q1;
                else if(g==='CX10' && q1===1) q0=1-q0; else if(g==='C0X10' && q1===0) q0=1-q0;
                return q0*2+q1;
            });
            fishAtNode = fishAtNode.map(cp => pm[cp]);
            gateHistory.push(g); pushHistory();
            steps = gateHistory.length; finishMove();
        }
        function recalculatePositions() {
            let cp = [3, 2, 1, 0];
            gateHistory.forEach(g => {
                let pm = [0,1,2,3].map(pos => {
                    let q0=Math.floor(pos/2), q1=pos%2;
                    if(g==='X0') q0=1-q0; else if(g==='X1') q1=1-q1;
                    else if(g==='CX01' && q0===1) q1=1-q1; else if(g==='C0X01' && q0===0) q1=1-q1;
                    else if(g==='CX10' && q1===1) q0=1-q0; else if(g==='C0X10' && q1===0) q0=1-q0;
                    return q0*2+q1;
                });
                cp = cp.map(p => pm[p]);
            });
            fishAtNode = cp; steps = gateHistory.length;
        }
        function finishMove() { document.getElementById('step-count').innerText = steps; updateFishUI(); renderCircuit(); checkWin(); }
        function updateFishUI() {
            for(let i=0; i<4; i++) {
                const f = document.getElementById(`fish-${i}`), n = document.getElementById(`node-${fishAtNode[i]}`);
                if(f && n) { f.style.top = (n.offsetTop + 90) + "px"; f.style.left = (n.offsetLeft + 30) + "px"; }
            }
        }
        function renderCircuit() {
            const c = document.getElementById('circuit-content'); c.innerHTML = '';
            gateHistory.forEach((g, idx) => {
                const u = document.createElement('div');
                u.className = 'circuit-unit' + (selectedIndices.includes(idx) ? ' selected' : '');
                u.draggable = !isSolved;
                u.ondragstart = (e) => handleDragStart(e, idx);
                u.ondragover = (e) => handleDragOver(e);
                u.ondrop = (e) => handleDrop(e, idx);
                u.ondragend = (e) => { e.target.style.opacity = '1'; draggedIndex = null; };
                u.onmouseover = () => syncGateHighlight(g, true);
                u.onmouseout = () => syncGateHighlight(g, false);
               
                if (tutorialPhase === 4 && idx === 1) {
                    u.classList.add('highlight-focus');
                }
                u.onclick = (e) => {
                    if (isSolved) return;
                    if (tutorialPhase > 0 && tutorialPhase < 6) return;
                    if (e.ctrlKey) {
                        if (selectedIndices.includes(idx)) selectedIndices = selectedIndices.filter(i => i !== idx);
                        else selectedIndices.push(idx);
                        renderCircuit();
                    } else {
                        syncGateHighlight(g, false);
                        selectedIndices = [];
                        deleteGate(idx);
                    }
                };
                if(g.startsWith('X')) {
                    const tQ = g==='X0'?0:1, tY = tQ===0?20:60, t = document.createElement('div');
                    t.className = 'circuit-target'; t.style.left = '25px'; t.style.top = (tY+1.2)+'px'; u.appendChild(t);
                } else {
                    const is01 = g.includes('01'), is0 = g.includes('C0'), cY = is01?20:60, tY = is01?60:20;
                    const v = document.createElement('div'); v.className = 'connection-v-line'; v.style.left = '23.5px'; v.style.top = Math.min(cY,tY)+'px'; v.style.height = '41px'; u.appendChild(v);
                    const d = document.createElement('div'); d.className = 'control-dot'; d.style.left = '18px'; d.style.top = (cY-7)+'px'; if(is0){d.style.background='white'; d.style.border='2.5px solid black';} u.appendChild(d);
                    const t = document.createElement('div'); t.className = 'circuit-target'; t.style.left = '25px'; t.style.top = (tY+1.2)+'px'; u.appendChild(t);
                }
                c.appendChild(u);
            });
            updateUndoStatus(); const w = document.getElementById('circuit-content-wrapper');
            setTimeout(() => { if(w) w.scrollTo({ left: w.scrollWidth, behavior: 'smooth' }); }, 100);
        }
        function undo() {
            if (isSolved || historyStack.length <= 1) return;
            if (tutorialPhase > 0 && tutorialPhase < 6) return;
            pop.currentTime = 0; pop.play();
            historyStack.pop();
            gateHistory = [...historyStack[historyStack.length - 1]];
            selectedIndices = []; recalculatePositions(); finishMove();
        }
        function resetCircuit() {
            if (isSolved) return;
            if (tutorialPhase > 0 && tutorialPhase < 6) return;
            pop.currentTime=0; pop.play();
            fishAtNode=[3,2,1,0]; gateHistory=[]; historyStack = [[]]; selectedIndices = []; steps=0; finishMove();
        }
        function deleteGate(idx) {
            if (isSolved) return;
            if (tutorialPhase > 0 && tutorialPhase < 6) return;
            pop.currentTime=0; pop.play();
            gateHistory.splice(idx,1); pushHistory(); recalculatePositions(); finishMove();
        }
       
        // --- 確保兩個 Undo 的狀態同步 ---
        function updateUndoStatus() {
            const isActive = (historyStack.length > 1 && !isSolved && tutorialPhase === 6);
           
            const ub = document.getElementById('undo-btn');
            if(ub) {
                if(isActive){ ub.classList.add('active'); ub.style.pointerEvents="auto"; }
                else { ub.classList.remove('active'); ub.style.pointerEvents="none"; }
            }
           
            const bottomUndo = document.getElementById('undo-btn-bottom');
            if(bottomUndo) {
                if(isActive) { bottomUndo.classList.add('active'); bottomUndo.style.pointerEvents="auto"; }
                else { bottomUndo.classList.remove('active'); bottomUndo.style.pointerEvents="none"; }
            }
        }
       
        async function checkWin() {
            if (fishAtNode.every((pos, i) => pos === i)) {
                isSolved = true;
                updateUndoStatus();
                if (timerInterval) clearInterval(timerInterval);
                const ft = time;
                const st = steps;
                const u = sessionStorage.getItem('currentUser');
                const savedLevel = parseInt(sessionStorage.getItem('currentLevel')) || 1;
                if (savedLevel < 5) {
                    sessionStorage.setItem('currentLevel', 5);
                }
                setTimeout(() => {
                    if(typeof meow !== 'undefined') { meow.currentTime = 0; meow.play(); }
                    document.getElementById('victoryMsg').innerText = `STEP：${st} | TIME：${ft}s`;
                    document.getElementById('victoryModal').style.display = 'flex';
                }, 800);
                if (u) {
                    fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({
                            action: 'saveRecord',
                            username: u,
                            level: 4,          
                            steps: st,
                            time: ft,
                            circuit: gateHistory.join(',')
                        })
                    }).then(() => {
                        setTimeout(fetchLeaderboard, 1200);
                    });
                }
            }
        }
        function viewInLab() {
            if (gateHistory.length === 0) {
                alert("Current circuit is empty!");
                return;
            }
            const circuitData = gateHistory.join(',');
            const labUrl = `lab2.html?circuit=${encodeURIComponent(circuitData)}`;
            window.location.href = labUrl;
        }
    </script>
</body>
