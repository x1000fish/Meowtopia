<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>Meowtopia - Level 4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.3.1/DragDropTouch.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Gaegu:wght@700&family=Titan+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Shrikhand&family=Alfa+Slab+One&display=swap" rel="stylesheet">
    <style>
        /* 防護手機長按與文字選取，確保拖曳順暢 */
        body, canvas, .game-canvas, .node, .gate-btn-v2, #circuit-content {
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        body { font-family: 'Arial', sans-serif; background-color: #FFF9F0; background-image: linear-gradient(45deg, #fce4ec 25%, transparent 25%, transparent 50%, #fce4ec 50%, #fce4ec 75%, transparent 75%, transparent); background-size: 100px 100px; color: #463438; min-height: 100vh; }
        .hidden { display: none !important; }
        .main-layout { display: flex; align-items: flex-start; justify-content: center; gap: 20px; margin-top: 20px; }
        .game-canvas { position: relative; width: 850px; height: 500px; background: #fffaf5; border: 8px solid #463438; border-radius: 40px; overflow: hidden; box-shadow: 15px 15px 0px #FFB7C5; }
        #leaderboard-wrapper {position: fixed;left: -220px;top: 50px;transform: none; display: flex; z-index: 150;transition: left 0.5s cubic-bezier(0.16, 1, 0.3, 1), z-index 0.3s;}
        #leaderboard-wrapper.expanded { left: 0;}
        .side-leaderboard-content { width: 220px;background: white;border: 6px solid #463438;border-left: none;border-radius: 0 30px 30px 0;padding: 15px;display: flex;flex-direction: column; max-height: 80vh; position: relative; z-index: 2; }
        .bookmark-tab {position: absolute;right: -45px;  top: 40px; width: 45px; height: 130px;background: #463438;border: 5px solid #463438; border-left: none; border-radius: 0 15px 15px 0; cursor: pointer; display: flex; align-items: center;justify-content: center;transition: background 0.2s, right 0.2s, width 0.2s; z-index: 1;}
        .bookmark-tab:hover { background: #FFB7C5; width: 55px; right: -55px;}
        .bookmark-text { writing-mode: vertical-lr;  color: white;font-weight: 900;font-size: 20px;text-shadow: 2px 2px 0 #463438;letter-spacing: 4px;user-select: none;}
        #rankList::-webkit-scrollbar { width: 6px; }
        #rankList::-webkit-scrollbar-thumb { background-color: #FFB7C5; border-radius: 10px; }
        .rank-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 2px solid #fce4ec; font-weight: 900; font-size: 14px; color: #463438; }
        .rank-tab { flex: 1; padding: 4px; font-size: 12px; font-weight: 900; border: 3px solid #463438; border-radius: 12px; cursor: pointer; transition: all 0.1s; text-align: center; background: #fff; color: #463438; }
        .rank-tab.active { background: #463438; color: #fff; }
        .node { width: 140px; height: 140px; background: white; border: 6px solid #463438; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: absolute; box-shadow: 3px 3px 0 #463438; z-index: 20; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .node img { width: 110px; height: auto; pointer-events: none; }
        .fixed-number { position: absolute; bottom: -5px; right: 50px; font-size: 22px; font-weight: 900; color: #463438; pointer-events: none; z-index: 25; }
        .connection-line { position: absolute; background: #463438; cursor: pointer; z-index: 10; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .connection-line:hover { background: #99C44D !important; box-shadow: 0 0 15px rgba(153, 196, 77, 0.8) !important; z-index: 16 !important; }
        .line-highlight { background: #99C44D !important; box-shadow: 0 0 15px rgba(153, 196, 77, 0.8) !important; z-index: 15 !important; }
        .line-h { height: 8px; width: 300px; }
        .line-v { width: 8px; height: 250px; }
        .fish-wrapper { position: absolute; width: 80px; pointer-events: none; z-index: 30; display: flex; flex-direction: column; align-items: center; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .fish-wrapper img { width: 70px; height: auto; }
        .fish-label { background: rgba(70, 52, 56, 0.8); color: #fff; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; margin-bottom: -47px; z-index: 5; position: relative; top: -10px; }
        .game-btn { cursor: pointer; border: 5px solid #463438; border-radius: 60px; padding: 12px; font-size: 26px; font-weight: 900; color: white; text-shadow: 2px 2px 0 #463438; box-shadow: 0 6px 0 #463438; position: relative; transition: all 0.1s; display: inline-block; }
        .game-btn:active { top: 6px; box-shadow: 0 2px 0 #463438; }
        .btn-red { background: #FFB7C5; }
        .btn-green { background: #99C44D; }
        .multi-toggle-btn { background: #e2de6e; border: 4px solid #463438; border-radius: 20px; padding: 5px 15px; font-weight: 900; font-size: 20px; color: white; cursor: pointer; box-shadow: 0 4px 0 #463438; transition: all 0.1s; min-width: 140px; text-shadow: 2px 2px 0 #463438; }
        .multi-toggle-btn.active-mode { background: #629eed; }
        .multi-toggle-btn:hover,
        .game-btn:hover,
        .mode-toggle-fixed:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #463438;}
        .multi-toggle-btn:active,
        .mode-toggle-fixed:active { transform: translateY(2px); box-shadow: 0 2px 0 #463438;}
        .gate-btn-v2 { background: #ffffff; border: 2.5px solid #463438; border-radius: 30px; padding: 5px; font-weight: 800; font-size: 16px; color: #463438; cursor: pointer; box-shadow: 0 3px 6px rgba(70,52,56,0.1); transition: all 0.1s; text-align: center; }
        .gate-btn-v2:active { transform: translateY(2px); box-shadow: 0 1px 2px rgba(70,52,56,0.2); }
        .gate-not { background-color: #fce4ec !important; }
        .gate-btn-v2:hover, .func-btn:hover, .gate-not:hover { background-color: #FFB7C5 !important; color: #fff !important; border-color: #463438 !important; box-shadow: 0 3px 0 #463438 !important; transform: translateY(-2px); } 
        .func-btn { width: 100%; margin-top: 5px; padding: 10px; border-radius: 35px; font-weight: 900; font-size: 16px; border: 2.5px solid #463438; cursor: pointer; box-shadow: 0 4px 0 rgba(70,52,56,0.1); }
        .btn-reset { background: #FFF9F0; color: #463438; }
        .btn-undo { background: #FFB7C5 !important; color: #fff !important; border: 2.5px solid #463438 !important; opacity: 0.6; cursor: not-allowed; }
        .btn-undo.active { background: #FFB7C5 !important; border-color: #463438 !important; color: #fff !important; opacity: 1; cursor: pointer; box-shadow: 0 4px 0 #463438; }
        .btn-undo.active:hover { background-color: #ff9fb2 !important; transform: translateY(-2px); box-shadow: 0 6px 0 #463438; animation: pulse-red-undo 1.2s infinite ease-in-out !important; }
        #pro-panel { width: 0; opacity: 0; height: 500px; overflow: hidden; background: #ffffff; border: 0px solid #463438; border-radius: 40px; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .pro-active #pro-panel { width: 320px; opacity: 1; border: 8px solid #463438; padding: 12px 20px 20px 20px; box-shadow: 10px 10px 0px #99C44D; }
        .panel-section-title { font-weight: 900; font-size: 18px; margin-bottom: 6px; margin-top: 6px; color: #463438; text-align: center; white-space: nowrap; overflow: hidden; }
        .pro-active #node-0, .pro-active #node-2 { left: 65px !important; }
        .pro-active #node-1, .pro-active #node-3 { left: 405px !important; }
        .pro-active .line-h { left: 130px !important; }
        .pro-active .line-v:nth-of-type(3) { left: 130px !important; }
        .pro-active .line-v:nth-of-type(4) { left: 470px !important; }
        .pro-active #fish-0, .pro-active #fish-2 { left: 95px; }
        .pro-active #fish-1, .pro-active #fish-3 { left: 435px; }
        #circuit-area { width: 900px; height: 0; opacity: 0; background: #ffffff; border: 0px solid #463438; border-radius: 30px; margin-top: 20px; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); position: relative; padding: 0 15px; overflow: hidden; }
        .pro-active #circuit-area { height: 170px; opacity: 1; border: 8px solid #463438; padding: 15px; box-shadow: 10px 10px 0px #FFB7C5; }
        .circuit-title { text-align: center; font-weight: 900; font-size: 1.25rem; margin-bottom: 8px; color: #463438; }
        #circuit-content-wrapper { position: relative; height: 130px; overflow-x: auto !important; overflow-y: hidden; margin-left: 30px; padding-top: 4px;}
        #circuit-content { display: flex; height: 100%; padding: 0 7px; min-width: 100%; width: max-content; position: relative; background-image: linear-gradient(#463438, #463438), linear-gradient(#463438, #463438); background-size: 100% 3px; background-repeat: no-repeat; background-position: 0 20px, 0 60px; }
        .qubit-label { position: absolute; left: 12px; font-weight: 900; font-size: 16px; color: #463438; z-index: 5; }
        
        /* === 拖曳保護設定 === */
        .circuit-unit { 
            min-width: 48px; height: 85px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; cursor: grab; transition: all 0.2s; 
            touch-action: none; /* 絕對不可拿掉：防止 iOS 拖曳時觸發頁面滑動 */
        }
        .circuit-unit:active { cursor: grabbing; }
        .circuit-unit:hover { background: rgba(255, 183, 197, 0.3); border-radius: 12px; }
        .circuit-unit.selected { background: rgba(153, 196, 77, 0.3) !important; border-radius: 12px; box-shadow: inset 0 0 0 2px #99C44D !important; }
        
        .control-dot { width: 14px; height: 14px; background: #463438; border-radius: 50%; position: absolute; z-index: 5; }
        .connection-v-line { position: absolute; width: 2.5px; background: #463438; z-index: 3; }
        .circuit-target { position: absolute; width: 22px; height: 22px; border-radius: 50%; background: #fff; border: 2.5px solid #463438; display: flex; align-items: center; justify-content: center; z-index: 15; transform: translate(-50%, -50%); }
        .circuit-target::before { content: ""; position: absolute; width: 2.5px; height: 100%; background-color: #463438; }
        .circuit-target::after { content: ""; position: absolute; width: 100%; height: 2.5px; background-color: #463438; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(70, 52, 56, 0.7); display: none; align-items: center; justify-content: center; z-index: 1100; }
        .modal-content { background: #FFF9F0; border: 8px solid #463438; border-radius: 40px; padding: 30px; text-align: center; width: 380px; box-shadow: 0 10px 0 #FFB7C5; color: #463438; }
        .no-fish-anim .fish-wrapper, .no-fish-anim .node { transition: none !important; }
        #pro-guide-mask { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); z-index: 900; display: none; }
        #guide-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); z-index: 450; display: flex; }
        
        /* === 完美防走失的 Hint 設計 === */
        #guide-hint-text { 
            position: absolute !important; /* 解除 fixed，讓它跟隨文件座標 */
            background: #99C44D; color: #fff; padding: 12px 20px; border-radius: 9999px; 
            font-weight: 900; font-size: 16px; 
            z-index: 10005 !important; /* 保證不被排行榜或遮罩蓋住 */
            display: none; transition: all 0.3s; 
            min-width: 150px; max-width: 250px; /* 控制寬度避免破版 */
            word-wrap: break-word; white-space: normal; line-height: 1.4;
            box-shadow: 0 4px 0 #463438; border: 3px solid #463438; text-align: center; 
        }

        .next-btn { margin-top: 8px; background: #463438; color: #fff; padding: 4px 12px; border-radius: 10px; font-size: 14px; cursor: pointer; border: none; font-weight: 900; }
        .lock-btn { opacity: 1; cursor: not-allowed !important; pointer-events: none !important; filter: grayscale(1); }
        .highlight-focus { position: relative !important; z-index: 950 !important; pointer-events: auto !important; animation: pulse-btn-border 1.5s infinite ease-in-out !important; }
        .highlight-static { position: relative !important; z-index: 950 !important; border-color: #99C44D !important; box-shadow: 0 0 25px #99C44D !important; pointer-events: auto !important; }
        .highlight-canvas-obj { position: absolute !important; z-index: 950 !important; box-shadow: 0 0 30px 10px #99C44D !important; pointer-events: auto !important; }
        .fish-top-layer { z-index: 951 !important; }
        .gate-btn-v2.highlight-focus:hover, .func-btn.highlight-focus:hover, .highlight-focus:hover, .gate-not.highlight-focus:hover { animation-play-state: paused !important; border-color: #99C44D !important; border-width: 3px !important; background-color: #FFB7C5 !important; color: #fff !important; box-shadow: 0 4px 0 #463438, 0 0 20px #99C44D !important; transform: scale(1.05) !important; }
        #circuit-area.tutorial-active { z-index: 910 !important; position: relative !important; background: #ffffff !important; transition: none !important; }
        .circuit-unit.highlight-focus { z-index: 1001 !important; pointer-events: auto !important; animation: pulse-circuit 1.5s infinite ease-in-out !important; border-radius: 12px; background: rgba(153, 196, 77, 0.2); }
        .highlight-focus:hover { animation-play-state: paused !important; border-color: #99C44D !important; transform: scale(1) !important; }
        .mode-toggle-fixed { position: fixed; top: 20px; right: 20px; width: 70px; height: 70px; background: white; border: 5px solid #463438; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; box-shadow: 0 4px 0 #463438; z-index: 500; }
        .start-hint-banner { position: fixed; top: 100px; right: 15px; z-index: 600; pointer-events: none; display: flex; flex-direction: column; align-items: flex-end; animation: tap-anim 1.5s infinite; }
        .hint-pill { background: #99C44D; color: #fff; font-weight: 900; padding: 4px 12px; border-radius: 9999px; font-size: 16px; margin-top: 8px; border: 3px solid #463438; box-shadow: 0 4px 0 #463438; }
        @keyframes yellow-pulse { 0%, 100% { box-shadow: 0 4px 0 #463438, 0 0 5px #99C44D; border-color: #463438; } 35% { box-shadow: 0 4px 0 #463438, 0 0 30px #99C44D; border-color: #99C44D; transform: scale(1.1); } }
        @keyframes tap-anim { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes pulse-red-undo { 0%, 100% { transform: scale(1); box-shadow: 0 4px 0 #463438; } 50% { transform: scale(1.05); box-shadow: 0 0 20px #FFB7C5, 0 4px 0 #463438; } }
        @keyframes pulse-btn-border { 0%, 100% { border-color: #463438; transform: scale(1); } 50% { border-color: #99C44D; transform: scale(1.05); box-shadow: 0 0 15px #99C44D; } }
        @keyframes pulse-circuit { 0%, 100% { box-shadow: 0 0 5px #99C44D; } 50% { box-shadow: 0 0 15px #99C44D; } }
        .yellow-glow { animation: yellow-pulse 1.5s infinite ease-in-out; z-index: 501 !important; }
        .highlight-fixed { z-index: 1001 !important; pointer-events: auto !important; }
        .highlight-fixed .side-leaderboard-content,
        .highlight-fixed .bookmark-tab { border-color: #99C44D !important; box-shadow: 0 0 25px rgba(153, 196, 77, 0.8) !important; }
        .gate-btn-circuit { padding: 0 !important; height: 76px; display: flex; align-items: center; justify-content: center; border-radius: 16px !important; position: relative; }
        .wire-container { position: relative; width: 60%; max-width: 50px; height: 100%; background-image: linear-gradient(#463438, #463438), linear-gradient(#463438, #463438); background-size: 100% 3px; background-repeat: no-repeat; background-position: center 24px, center 52px; pointer-events: none; }
        #canvas-bottom-btns { position: absolute; bottom: 20px; right: 30px; display: flex; flex-direction: column; gap: 10px; z-index: 100; }
        #canvas-bottom-btns .func-btn { margin-top: 0; width: 90px; font-size: 14px; padding: 8px 5px; text-transform: uppercase; border-width: 3px; }
        .pro-active #canvas-bottom-btns { display: none !important; }

        /* 搖晃開關文字提示 */
        #shake-toast {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%) scale(0.8);
            background: #99C44D; color: #463438; padding: 15px 40px;
            border-radius: 50px; font-weight: 900; font-size: 24px; z-index: 10000;
            opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none; border: 4px solid #463438;
            box-shadow: 0 0 20px rgba(153, 196, 77, 0.6), 0 8px 0 #463438;
        }
        #shake-toast.show { opacity: 1; transform: translateX(-50%) scale(1); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4" id="body-root">
    <div id="shake-toast">CTRL MODE: ON</div>
    <div id="pro-guide-mask"></div><div id="guide-hint-text"></div><div id="guide-overlay"></div>
    <div id="mode-toggle-container">
        <div id="mode-toggle" class="mode-toggle-fixed yellow-glow" onclick="togglePro()">👁️</div>
        <div id="start-hint" class="start-hint-banner"><span class="text-5xl">👆🏻</span><div class="hint-pill">CLICK TO START PRO MODE</div></div>
    </div>
    <div id="leaderboard-wrapper">
        <div class="side-leaderboard-content">
            <h2 class="text-xl font-black mb-3 text-center" style="color: #463438;">🏆 TOP CATS</h2>
            <div class="flex gap-2 mb-3">
                <button onclick="renderRank('steps')" id="tab-steps" class="rank-tab active">STEPS</button>
                <button onclick="renderRank('time')" id="tab-time" class="rank-tab">TIME</button>
            </div>
            <div id="rankList" class="flex-grow overflow-y-auto space-y-1 pr-1">
                <p class="text-center italic text-gray-400 mt-10 text-sm">Loading...</p>
            </div>
        </div>
        <div class="bookmark-tab" onclick="toggleLeaderboard()">
            <div class="bookmark-text">RANK</div>
        </div>
    </div>
    <div class="w-full max-w-4xl">
        <div class="flex justify-between w-full px-4 mb-4 items-center mt-6">
            <div class="text-3xl font-black" style="color: #463438;">STEPS: <span id="step-count">0</span> | TIME: <span id="timer">0</span>s</div>
            <div class="flex items-center gap-12 ml-auto">
                <button id="mode-2-btn" class="multi-toggle-btn" onclick="toggleMode2()">Mode: 1</button>
                <div class="text-3xl font-black" style="color: #7bc202;">LEVEL 4</div>
            </div>
        </div>
        <div class="main-layout">
            <div id="pro-panel">
                <div class="panel-section-title">Quantum Gate</div>
                <div class="grid grid-cols-2 gap-2 w-10/12 mx-auto" id="gate-container">
                    <button id="gate-x0" class="gate-btn-v2 gate-not gate-btn-circuit" onclick="applyGate('X0')" onmouseover="syncGateHighlight('X0', true)" onmouseout="syncGateHighlight('X0', false)">
                        <div class="wire-container">
                            <div class="circuit-target" style="left: 50%; top: 25.5px;"></div>
                        </div>
                    </button>
                    <button id="gate-x1" class="gate-btn-v2 gate-not gate-btn-circuit" onclick="applyGate('X1')" onmouseover="syncGateHighlight('X1', true)" onmouseout="syncGateHighlight('X1', false)">
                        <div class="wire-container">
                            <div class="circuit-target" style="left: 50%; top: 53.5px;"></div>
                        </div>
                    </button>
                    <button id="gate-cx01" class="gate-btn-v2 gate-btn-circuit" onclick="applyGate('CX01')" onmouseover="syncGateHighlight('CX01', true)" onmouseout="syncGateHighlight('CX01', false)">
                        <div class="wire-container">
                            <div class="connection-v-line" style="left: 50%; top: 25.5px; height: 28px; transform: translateX(-50%);"></div>
                            <div class="control-dot" style="left: 50%; top: 25.5px; background: #463438; transform: translate(-50%, -50%);"></div>
                            <div class="circuit-target" style="left: 50%; top: 53.5px;"></div>
                        </div>
                    </button>
                    <button id="gate-c0x01" class="gate-btn-v2 gate-btn-circuit" onclick="applyGate('C0X01')" onmouseover="syncGateHighlight('C0X01', true)" onmouseout="syncGateHighlight('C0X01', false)">
                        <div class="wire-container">
                            <div class="connection-v-line" style="left: 50%; top: 25.5px; height: 28px; transform: translateX(-50%);"></div>
                            <div class="control-dot" style="box-sizing: border-box; left: 50%; top: 24px; background: white; border: 2.5px solid #463438; transform: translate(-50%, -50%);"></div>
                            <div class="circuit-target" style="left: 50%; top: 53.5px;"></div>
                        </div>
                    </button>
                    <button id="gate-cx10" class="gate-btn-v2 gate-btn-circuit" onclick="applyGate('CX10')" onmouseover="syncGateHighlight('CX10', true)" onmouseout="syncGateHighlight('CX10', false)">
                        <div class="wire-container">
                            <div class="connection-v-line" style="left: 50%; top: 25.5px; height: 28px; transform: translateX(-50%);"></div>
                            <div class="control-dot" style="left: 50%; top: 53.5px; background: #463438; transform: translate(-50%, -50%);"></div>
                            <div class="circuit-target" style="left: 50%; top: 25.5px;"></div>
                        </div>
                    </button>
                    <button id="gate-c0x10" class="gate-btn-v2 gate-btn-circuit" onclick="applyGate('C0X10')" onmouseover="syncGateHighlight('C0X10', true)" onmouseout="syncGateHighlight('C0X10', false)">
                        <div class="wire-container">
                            <div class="connection-v-line" style="left: 50%; top: 25.5px; height: 28px; transform: translateX(-50%);"></div>
                            <div class="control-dot" style="box-sizing: border-box; left: 50%; top: 53.5px; background: white; border: 2.5px solid #463438; transform: translate(-50%, -50%);"></div>
                            <div class="circuit-target" style="left: 50%; top: 25.5px;"></div>
                        </div>
                    </button>
                </div>
                <div class="panel-section-title">Control</div>
                <button id="reset-btn" class="func-btn btn-reset" onclick="resetCircuit()">Reset Circuit</button>
                <button id="undo-btn" class="func-btn btn-undo" onclick="undo()">Undo Step</button>
            </div>
            <div class="game-canvas" id="main-canvas">
                <div id="line-h-0" class="connection-line line-h" style="top: 95px; left: 280px;"
                    onclick="handleLineClick('H')" onmouseover="syncHighlight('H', true)" onmouseout="syncHighlight('H', false)"></div>
                <div id="line-h-1" class="connection-line line-h" style="bottom: 90px; left: 280px;"
                    onclick="handleLineClick('H')" onmouseover="syncHighlight('H', true)" onmouseout="syncHighlight('H', false)"></div>
                <div id="line-v-0" class="connection-line line-v" style="top: 150px; left: 221px;"
                    onclick="handleLineClick('V')" onmouseover="syncHighlight('V', true)" onmouseout="syncHighlight('V', false)"></div>
                <div id="line-v-1" class="connection-line line-v" style="top: 150px; left: 571px;"
                    onclick="handleLineClick('V')" onmouseover="syncHighlight('V', true)" onmouseout="syncHighlight('V', false)"></div>
                <div class="node" id="node-0" style="top: 25px; left: 155px;"><div class="fixed-number">00</div><img src="./image/Cat1.svg"></div>
                <div class="node" id="node-1" style="top: 25px; left: 505px;"><div class="fixed-number">01</div><img src="./image/Cat2.svg"></div>
                <div class="node" id="node-2" style="bottom: 25px; left: 155px;"><div class="fixed-number">10</div><img src="./image/Cat3.svg"></div>
                <div class="node" id="node-3" style="bottom: 25px; left: 505px;"><div class="fixed-number">11</div><img src="./image/Cat4.svg"></div>
                <div id="fish-0" class="fish-wrapper"><div class="fish-label">00</div><img src="./image/Fish1.svg"></div>
                <div id="fish-1" class="fish-wrapper"><div class="fish-label">01</div><img src="./image/Fish2.svg"></div>
                <div id="fish-2" class="fish-wrapper"><div class="fish-label">10</div><img src="./image/Fish3.svg"></div>
                <div id="fish-3" class="fish-wrapper"><div class="fish-label">11</div><img src="./image/Fish4.svg"></div>
                <div id="canvas-bottom-btns">
                    <button class="func-btn btn-reset" onclick="resetCircuit()">RESET</button>
                    <button id="undo-btn-bottom" class="func-btn btn-undo" onclick="undo()">UNDO</button>
                </div>
            </div>
        </div>
        <div id="circuit-area" class="mx-auto">
            <div class="circuit-title">Circuit Diagram</div>
            <div class="qubit-label" style="top: 60px;">q0</div>
            <div class="qubit-label" style="top: 100px;">q1</div>
            <div id="circuit-content-wrapper"><div id="circuit-content"></div></div>
        </div>
        <div class="w-full text-center mt-6 mb-6">
            <a href="index.html" class="game-btn btn-red px-16">GIVE UP</a>
        </div>
    </div>
    <div id="victoryModal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-5xl font-black mb-4" style="color: #463438;">MEOW!</h2>
            <h2 class="text-5xl font-black mb-4" style="color: #463438;">🐾</h2>
            <p id="victoryMsg" class="text-xl font-bold mb-6"></p>
            <button onclick="location.href='index.html'" class="game-btn btn-green w-full mb-4">KEEP GOING</button>
            <button onclick="viewInLab().style.display='none'" class="game-btn btn-red w-full">VIEW CIRCUIT</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzR0J0VXyl5ayKwDXlHimc4WS1FjvGEb2-gTBMhum8APQKfDHxc5wsiWRkNqkxJrocMOw/exec';
        let steps = 0, time = 0, isPro = false, fishAtNode = [3, 2, 1, 0], gateHistory = [], timerInterval, isSolved = false;
        let historyStack = [[]];
        let selectedIndices = [];
        let isMode2 = false;
        let leaderboardData = [];
        let draggedIndex = null;
        let tutorialPhase = 1;
        let tutorialCompleted = false;
        
        // 搖晃開啟 Ctrl 功能相關變數
        let isShakeCtrlActive = false;
        let lastShakeTime = 0;
        let shakePermissionRequested = false;

        const pop = new Audio('pop.m4a'), meow = new Audio('meow.m4a');
        
        // 處理手機搖晃事件
        function handleMotion(event) {
            const acc = event.accelerationIncludingGravity;
            if (!acc) return;
            const threshold = 20;
            const delta = Math.sqrt(acc.x ** 2 + acc.y ** 2 + acc.z ** 2);
            if (delta > threshold) {
                const now = Date.now();
                if (now - lastShakeTime > 1000) {
                    isShakeCtrlActive = !isShakeCtrlActive;
                    lastShakeTime = now;
                    if (navigator.vibrate) navigator.vibrate([100]);
                    
                    const toast = document.getElementById('shake-toast');
                    if (toast) {
                        toast.style.background = isShakeCtrlActive ? "#99C44D" : "#FFB7C5";
                        toast.style.color = isShakeCtrlActive ? "white" : "#463438";
                        toast.innerText = isShakeCtrlActive ? "⚡️ CTRL MODE: ON" : "❌ CTRL MODE: OFF";
                        toast.classList.add('show');
                        setTimeout(() => toast.classList.remove('show'), 1500);
                    }
                }
            }
        }

        function requestShakePermission() {
            if (!shakePermissionRequested) {
                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    DeviceMotionEvent.requestPermission()
                        .then(state => {
                            if (state === 'granted') {
                                window.addEventListener('devicemotion', handleMotion);
                            }
                        })
                        .catch(console.error);
                } else {
                    window.addEventListener('devicemotion', handleMotion);
                }
                shakePermissionRequested = true;
            }
        }

        window.onload = () => {
            window.addEventListener('click', requestShakePermission, { once: true });
            window.addEventListener('touchstart', requestShakePermission, { once: true });

            timerInterval = setInterval(() => { time++; document.getElementById('timer').innerText = time; }, 1000);
            updateFishUI();
            updateUndoStatus();
            fetchLeaderboard();
            const cw = document.getElementById('circuit-content-wrapper');
            cw.addEventListener('wheel', (e) => { e.preventDefault(); cw.scrollLeft += e.deltaY; });
        };

        function toggleLeaderboard() {
            const wrapper = document.getElementById('leaderboard-wrapper');
            wrapper.classList.toggle('expanded');
        }

        function clearAllHighlights() {
            document.querySelectorAll('.highlight-focus, .highlight-static, .highlight-canvas-obj, .fish-top-layer, .line-highlight, .highlight-fixed').forEach(el => el.classList.remove('highlight-focus', 'highlight-static', 'highlight-canvas-obj', 'fish-top-layer', 'line-highlight', 'highlight-fixed'));
            document.querySelectorAll('.gate-btn-v2, .func-btn').forEach(el => el.classList.remove('lock-btn'));
            document.getElementById('circuit-area').classList.remove('tutorial-active');
            document.getElementById('leaderboard-wrapper').style.zIndex = "150";
        }

        // 精準定位並主動運鏡的 Hint 函數
        function positionHint(idOrEl, ox, oy) {
            const h = document.getElementById('guide-hint-text');
            const el = typeof idOrEl === 'string' ? document.getElementById(idOrEl) : idOrEl;
            if (!el) return;
            const r = el.getBoundingClientRect();
            h.style.display = 'block';
            
            // 確保座標相對於整份文件，不會因放大而跑位
            h.style.left = (r.right + window.scrollX + ox) + 'px';
            h.style.top = (r.top + window.scrollY + oy) + 'px';

            // 強制捲動視窗，讓使用者看到提示（解決放大後找不到的問題）
            setTimeout(() => {
                h.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
            }, 50);
        }

        function updateTutorialUI() {
            if (tutorialCompleted) return;
            clearAllHighlights();
            const h = document.getElementById('guide-hint-text');
            const mask = document.getElementById('pro-guide-mask');
            const gates = document.querySelectorAll('.gate-btn-v2, .func-btn');
            
            if ([2, 3, 4, 5].includes(tutorialPhase)) {
                mask.style.display = 'block';
                document.getElementById('circuit-area').classList.add('tutorial-active');
            }
            
            if (tutorialPhase === 2) {
                gates.forEach(g => g.classList.add('lock-btn'));
                const targetBtn = document.getElementById('gate-cx01');
                if (targetBtn) {
                    targetBtn.classList.remove('lock-btn');
                    targetBtn.classList.add('highlight-focus');
                    h.innerHTML = `CLICK 1CNOT q0→q1`;
                    positionHint(targetBtn, 40, 10); // 放在按鈕右邊 20px
                }
            }
            else if (tutorialPhase === 3) {
                gates.forEach(g => g.classList.add('lock-btn'));
                const targetBtn = document.getElementById('gate-cx10');
                if (targetBtn) {
                    targetBtn.classList.remove('lock-btn');
                    targetBtn.classList.add('highlight-focus');
                    h.innerHTML = `CLICK 1CNOT q1→q0`;
                    positionHint(targetBtn, 10, 10); // 放在按鈕右邊 20px
                }
            }
            else if (tutorialPhase === 4) {
                gates.forEach(g => g.classList.add('lock-btn'));
                h.innerHTML = `DRAG THE 2ND GATE ONTO THE 1ST TO SWAP THEM`;
                renderCircuit(); 
                
                // 等待方塊繪製完成後，精準定位在第二顆方塊旁邊
                setTimeout(() => {
                    const secondGate = document.querySelectorAll('.circuit-unit')[1];
                    if (secondGate) {
                        positionHint(secondGate, 20, -20);
                    } else {
                        positionHint('circuit-area', 0, 0);
                    }
                }, 100);
            }
            else if (tutorialPhase === 5) {
                gates.forEach(g => g.classList.add('lock-btn'));
                const board = document.getElementById('leaderboard-wrapper');
                board.classList.add('highlight-fixed');
                board.classList.add('expanded'); 
                h.innerHTML = `CHECK OUT THE LEADERBOARD OVER HERE!<br><button onclick="endTutorial()" class="next-btn">GOT IT</button>`;
                
                // 等待展開動畫(0.5s)結束再定位，才會精準抓到位置
                setTimeout(() => {
                    positionHint(board, 30, 150);
                }, 550);
                renderCircuit();
            }
        }

        function endTutorial() {
            tutorialPhase = 6;
            tutorialCompleted = true;
            document.getElementById('pro-guide-mask').style.display = 'none';
            document.getElementById('guide-hint-text').style.display = 'none';
            document.getElementById('leaderboard-wrapper').classList.remove('expanded'); 
            clearAllHighlights();
            updateUndoStatus();
        }
        
        // === 拖曳事件處理 (完全相容 DragDropTouch) ===
        function handleDragStart(e, index) {
            if (isSolved) return;
            draggedIndex = index;
            e.dataTransfer.effectAllowed = 'move';
            
            // 強制寫入 setData 以確保手機版拖曳被瀏覽器接受
            e.dataTransfer.setData('text/plain', index.toString());
            
            // 使用 setTimeout 來解決 iOS 拖曳時原件透明度卡死的問題
            setTimeout(() => { e.target.style.opacity = '0.5'; }, 0);
        }
        
        function handleDragOver(e) {
            e.preventDefault(); // 必須阻止預設行為才能允許 Drop
            e.dataTransfer.dropEffect = 'move';
            return false;
        }
        
        function handleDrop(e, targetIndex) {
            e.preventDefault();
            if (isSolved || draggedIndex === null || draggedIndex === targetIndex) return;
            
            if (tutorialPhase === 4) {
                if (draggedIndex !== 1 || targetIndex !== 0) {
                    draggedIndex = null;
                    return;
                }
            }
            pop.currentTime = 0; pop.play();
            const movedGate = gateHistory.splice(draggedIndex, 1)[0];
            gateHistory.splice(targetIndex, 0, movedGate);
            pushHistory();
            selectedIndices = [];
            recalculatePositions();
            finishMove();
            draggedIndex = null;
            if (tutorialPhase === 4) {
                tutorialPhase = 5;
                setTimeout(updateTutorialUI, 100);
            }
        }

        async function fetchLeaderboard() {
            const listArea = document.getElementById('rankList');
            try {
                const response = await fetch(`${SCRIPT_URL}?action=getLeaderboard&level=4`);
                const data = await response.json();
                if (data && Array.isArray(data) && data.length > 0) {
                    leaderboardData = data;
                    renderRank('steps');
                } else {
                    listArea.innerHTML = '<p class="text-center italic text-gray-400 mt-10 text-sm">No records yet</p>';
                }
            } catch (e) {
                listArea.innerHTML = '<p class="text-center italic text-red-400 mt-10 text-sm">Load Error</p>';
            }
        }
        function renderRank(type) {
            const tabSteps = document.getElementById('tab-steps');
            const tabTime = document.getElementById('tab-time');
            const listArea = document.getElementById('rankList');
            if (type === 'steps') {
                tabSteps.className = 'rank-tab active';
                tabTime.className = 'rank-tab bg-gray-100';
            } else {
                tabSteps.className = 'rank-tab bg-gray-100';
                tabTime.className = 'rank-tab active';
            }
            if (!leaderboardData || leaderboardData.length === 0) return;
            const sorted = [...leaderboardData].sort((a, b) => a[type] - b[type]);
            let html = "";
            sorted.slice(0, 10).forEach((item, index) => {
                const medal = index === 0 ? "🥇" : index === 1 ? "🥈" : index === 2 ? "🥉" : (index + 1) + ".";
                const displayName = item.username || item.name || 'Anonymous';
                const displayValue = type === 'steps' ? item.steps + '🐾' : item.time + 's';
                html += `<div class="rank-item"><span class="truncate" style="max-width: 90px;">${medal} ${displayName}</span><span class="text-blue-600">${displayValue}</span></div>`;
            });
            listArea.innerHTML = html;
        }
        function toggleMode2() {
            pop.currentTime = 0;
            pop.play();
            if (tutorialPhase > 0 && tutorialPhase < 6) return;
            isMode2 = !isMode2;
            const btn = document.getElementById('mode-2-btn');
            btn.innerText = isMode2 ? "Mode: 2" : "Mode: 1";
            btn.classList.toggle('active-mode', isMode2);
        }
        const gateLineMap = {
            X0: ['line-v-0', 'line-v-1'],
            X1: ['line-h-0', 'line-h-1'],
            C0X01: ['line-h-0'],
            CX01: ['line-h-1'],
            C0X10: ['line-v-0'],
            CX10: ['line-v-1']
        };
        function toggleLineHighlight(lineIds, isOn) {
            lineIds.forEach(id => document.getElementById(id)?.classList.toggle('line-highlight', isOn));
        }
        function syncHighlight(dir, isOn) {
            if (!isMode2) return;
            toggleLineHighlight(dir === 'H' ? gateLineMap.X1 : gateLineMap.X0, isOn);
        }
        function syncGateHighlight(gate, isOn) {
            toggleLineHighlight(gateLineMap[gate] || [], isOn);
        }
        function handleLineClick(dir) {
            if (isSolved) return;
            if (tutorialPhase > 0 && tutorialPhase < 6) return;
            if (isMode2) {
                const gate = (dir === 'H') ? 'X1' : 'X0';
                applyGate(gate);
            } else {
                const eventId = event.currentTarget.id;
                if (eventId === 'line-h-0') applyGate('C0X01');
                if (eventId === 'line-h-1') applyGate('CX01');
                if (eventId === 'line-v-0') applyGate('C0X10');
                if (eventId === 'line-v-1') applyGate('CX10');
            }
        }
        function togglePro() {
            pop.currentTime = 0;
            pop.play();
            isPro = !isPro; const b = document.getElementById('body-root');
            const overlay = document.getElementById('guide-overlay');
            if(overlay) overlay.style.display = 'none';
            const startHint = document.getElementById('start-hint');
            if(startHint) startHint.style.display = 'none';
            document.getElementById('mode-toggle').classList.remove('yellow-glow');
            b.classList.add('no-fish-anim'); b.classList.toggle('pro-active', isPro);
            updateFishUI(); setTimeout(() => b.classList.remove('no-fish-anim'), 50);
            document.getElementById('mode-toggle').innerText = isPro ? "⚡️" : "👁️";
            if (tutorialPhase === 1 && isPro) {
                tutorialPhase = 2;
                setTimeout(updateTutorialUI, 100);
            }
        }
        function pushHistory() { historyStack.push([...gateHistory]); }
        function applyGate(g) {
            if (isSolved) return;
            if (tutorialPhase > 0 && tutorialPhase < 6) {
                if (tutorialPhase === 2 && g !== 'CX01') return;
                if (tutorialPhase === 3 && g !== 'CX10') return;
                if (tutorialPhase === 4 || tutorialPhase === 5) return;
            }
            pop.currentTime = 0; pop.play();
            if (selectedIndices.length > 0) {
                let targetIdx = Math.min(...selectedIndices);
                let newHistory = [];
                for(let i=0; i<gateHistory.length; i++) {
                    if (i === targetIdx) newHistory.push(g);
                    else if (!selectedIndices.includes(i)) newHistory.push(gateHistory[i]);
                }
                gateHistory = newHistory;
                selectedIndices = [];
                pushHistory(); recalculatePositions(); finishMove();
            } else { executeGateLogic(g); }
            if (tutorialPhase === 2 && g === 'CX01') {
                tutorialPhase = 3;
                setTimeout(updateTutorialUI, 100);
            } else if (tutorialPhase === 3 && g === 'CX10') {
                tutorialPhase = 4;
                setTimeout(updateTutorialUI, 100);
            }
        }
        function getPermutation(g) {
            return [0, 1, 2, 3].map(pos => {
                let q0 = Math.floor(pos / 2), q1 = pos % 2;
                if (g === 'X0') q0 = 1 - q0;
                else if (g === 'X1') q1 = 1 - q1;
                else if (g === 'CX01' && q0 === 1) q1 = 1 - q1;
                else if (g === 'C0X01' && q0 === 0) q1 = 1 - q1;
                else if (g === 'CX10' && q1 === 1) q0 = 1 - q0;
                else if (g === 'C0X10' && q1 === 0) q0 = 1 - q0;
                return q0 * 2 + q1;
            });
        }
        function executeGateLogic(g) {
            const permutation = getPermutation(g);
            fishAtNode = fishAtNode.map(pos => permutation[pos]);
            gateHistory.push(g);
            pushHistory();
            steps = gateHistory.length;
            finishMove();
        }
        function recalculatePositions() {
            fishAtNode = gateHistory.reduce((currentPositions, gate) => {
                const permutation = getPermutation(gate);
                return currentPositions.map(pos => permutation[pos]);
            }, [3, 2, 1, 0]);
            steps = gateHistory.length;
        }
        function finishMove() { document.getElementById('step-count').innerText = steps; updateFishUI(); renderCircuit(); checkWin(); }
        function updateFishUI() {
            for(let i=0; i<4; i++) {
                const f = document.getElementById(`fish-${i}`), n = document.getElementById(`node-${fishAtNode[i]}`);
                if(f && n) { f.style.top = (n.offsetTop + 90) + "px"; f.style.left = (n.offsetLeft + 30) + "px"; }
            }
        }
        function renderCircuit() {
            const c = document.getElementById('circuit-content'); c.innerHTML = '';
            gateHistory.forEach((g, idx) => {
                const u = document.createElement('div');
                u.className = 'circuit-unit' + (selectedIndices.includes(idx) ? ' selected' : '');
                
                // 拖曳相關設定
                u.draggable = !isSolved;
                u.ondragstart = (e) => handleDragStart(e, idx);
                u.ondragover = (e) => handleDragOver(e);
                u.ondrop = (e) => handleDrop(e, idx);
                u.ondragend = (e) => { e.target.style.opacity = '1'; draggedIndex = null; };
                
                u.onmouseover = () => syncGateHighlight(g, true);
                u.onmouseout = () => syncGateHighlight(g, false);
                
                if (tutorialPhase === 4 && idx === 1) {
                    u.classList.add('highlight-focus');
                }

                u.onclick = (e) => {
                    if (isSolved) return;
                    if (tutorialPhase > 0 && tutorialPhase < 6) return;
                    if (e.ctrlKey || e.metaKey || isShakeCtrlActive) {
                        if (selectedIndices.includes(idx)) selectedIndices = selectedIndices.filter(i => i !== idx);
                        else selectedIndices.push(idx);
                        renderCircuit();
                    } else {
                        syncGateHighlight(g, false);
                        selectedIndices = [];
                        deleteGate(idx);
                    }
                };

                if(g.startsWith('X')) {
                    const tQ = g==='X0'?0:1, tY = tQ===0?20:60, t = document.createElement('div');
                    t.className = 'circuit-target'; t.style.left = '25px'; t.style.top = (tY+1.2)+'px'; u.appendChild(t);
                } else {
                    const is01 = g.includes('01'), is0 = g.includes('C0'), cY = is01?20:60, tY = is01?60:20;
                    const v = document.createElement('div'); v.className = 'connection-v-line'; v.style.left = '23.5px'; v.style.top = Math.min(cY,tY)+'px'; v.style.height = '41px'; u.appendChild(v);
                    const d = document.createElement('div'); d.className = 'control-dot'; d.style.left = '18px'; d.style.top = (cY-7)+'px'; if(is0){d.style.background='white'; d.style.border='2.5px solid #463438';} u.appendChild(d);
                    const t = document.createElement('div'); t.className = 'circuit-target'; t.style.left = '25px'; t.style.top = (tY+1.2)+'px'; u.appendChild(t);
                }
                c.appendChild(u);
            });
            updateUndoStatus(); const w = document.getElementById('circuit-content-wrapper');
            setTimeout(() => { if(w) w.scrollTo({ left: w.scrollWidth, behavior: 'smooth' }); }, 100);
        }
        function undo() {
            if (isSolved || historyStack.length <= 1) return;
            if (tutorialPhase > 0 && tutorialPhase < 6) return;
            pop.currentTime = 0; pop.play();
            historyStack.pop();
            gateHistory = [...historyStack[historyStack.length - 1]];
            selectedIndices = []; recalculatePositions(); finishMove();
        }
        function resetCircuit() {
            if (isSolved) return;
            if (tutorialPhase > 0 && tutorialPhase < 6) return;
            pop.currentTime=0; pop.play();
            fishAtNode=[3,2,1,0]; gateHistory=[]; historyStack = [[]]; selectedIndices = []; steps=0; finishMove();
        }
        function deleteGate(idx) {
            if (isSolved) return;
            if (tutorialPhase > 0 && tutorialPhase < 6) return;
            pop.currentTime=0; pop.play();
            gateHistory.splice(idx,1); pushHistory(); recalculatePositions(); finishMove();
        }
        function updateUndoStatus() {
            const isActive = (historyStack.length > 1 && !isSolved && tutorialPhase === 6);
            const ub = document.getElementById('undo-btn');
            if(ub) {
                if(isActive){ ub.classList.add('active'); ub.style.pointerEvents="auto"; }
                else { ub.classList.remove('active'); ub.style.pointerEvents="none"; }
            }
            const bottomUndo = document.getElementById('undo-btn-bottom');
            if(bottomUndo) {
                if(isActive) { bottomUndo.classList.add('active'); bottomUndo.style.pointerEvents="auto"; }
                else { bottomUndo.classList.remove('active'); bottomUndo.style.pointerEvents="none"; }
            }
        }
        async function checkWin() {
            if (fishAtNode.every((pos, i) => pos === i)) {
                isSolved = true;
                updateUndoStatus();
                if (timerInterval) clearInterval(timerInterval);
                const ft = time;
                const st = steps;
                const u = sessionStorage.getItem('currentUser');
                const savedLevel = parseInt(sessionStorage.getItem('currentLevel')) || 1;
                if (savedLevel < 5) {
                    sessionStorage.setItem('currentLevel', 5);
                }
                setTimeout(() => {
                    if(typeof meow !== 'undefined') { meow.currentTime = 0; meow.play(); }
                    document.getElementById('victoryMsg').innerText = `STEP：${st} | TIME：${ft}s`;
                    document.getElementById('victoryModal').style.display = 'flex';
                }, 800);
                if (u) {
                    fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({
                            action: 'saveRecord',
                            username: u,
                            level: 4,          
                            steps: st,
                            time: ft,
                            circuit: gateHistory.join(',')
                        })
                    }).then(() => {
                        setTimeout(fetchLeaderboard, 1200);
                    });
                }
            }
        }
        function viewInLab() {
            if (gateHistory.length === 0) {
                alert("Current circuit is empty!");
                return;
            }
            const circuitData = gateHistory.join(',');
            const labUrl = `lab2.html?circuit=${encodeURIComponent(circuitData)}`;
            window.location.href = labUrl;
        }
    </script>
</body>
