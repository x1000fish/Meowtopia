<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>Meowtopia - Level 4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.3.1/DragDropTouch.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Gaegu:wght@700&family=Titan+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Shrikhand&family=Alfa+Slab+One&display=swap" rel="stylesheet">
    <style>
        body, canvas, .game-canvas, .node, .gate-btn-v2, #circuit-content { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
        body { font-family: 'Arial', sans-serif; background-color: #FFF9F0; background-image: linear-gradient(45deg, #fce4ec 25%, transparent 25%, transparent 50%, #fce4ec 50%, #fce4ec 75%, transparent 75%, transparent); background-size: 100px 100px; color: #463438; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; }
        .hidden { display: none !important; }
        .main-layout { display: flex; align-items: flex-start; justify-content: center; gap: 20px; margin-top: 20px; }
        .game-canvas { position: relative; width: 850px; height: 500px; background: #fffaf5; border: 8px solid #463438; border-radius: 40px; overflow: hidden; box-shadow: 15px 15px 0px #FFB7C5; }    
        #leaderboard-wrapper {position: fixed;left: -220px;top: 50px;transform: none; display: flex; z-index: 150;transition: left 0.5s cubic-bezier(0.16, 1, 0.3, 1), z-index 0.3s;}
        #leaderboard-wrapper.expanded { left: 0;}
        .side-leaderboard-content { width: 220px;background: white;border: 6px solid #463438;border-left: none;border-radius: 0 30px 30px 0;padding: 15px;display: flex;flex-direction: column; max-height: 80vh; position: relative; z-index: 2; }
        .bookmark-tab {position: absolute;right: -45px;  top: 40px; width: 45px; height: 130px;background: #463438;border: 5px solid #463438; border-left: none; border-radius: 0 15px 15px 0; cursor: pointer; display: flex; align-items: center;justify-content: center;transition: background 0.2s, right 0.2s, width 0.2s; z-index: 1;}
        .bookmark-tab:hover { background: #FFB7C5; width: 55px; right: -55px;}
        .bookmark-text { writing-mode: vertical-lr;  color: white;font-weight: 900;font-size: 20px;text-shadow: 2px 2px 0 #463438;letter-spacing: 4px;user-select: none;}
        #rankList::-webkit-scrollbar { width: 6px; }
        #rankList::-webkit-scrollbar-thumb { background-color: #FFB7C5; border-radius: 10px; }
        .rank-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 2px solid #fce4ec; font-weight: 900; font-size: 14px; color: #463438; }
        .rank-tab { flex: 1; padding: 4px; font-size: 12px; font-weight: 900; border: 3px solid #463438; border-radius: 12px; cursor: pointer; transition: all 0.1s; text-align: center; background: #fff; color: #463438; }
        .rank-tab.active { background: #463438; color: #fff; }    
        .node { width: 140px; height: 140px; background: white; border: 6px solid #463438; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: absolute; box-shadow: 3px 3px 0 #463438; z-index: 20; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .node img { width: 110px; height: auto; pointer-events: none; transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }      
        .fixed-number { position: absolute; bottom: -4px; right: 47px; font-size: 22px; font-weight: 900; color: #463438; pointer-events: none; z-index: 25; display: flex; gap: 1px; transition: opacity 0.3s, transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .bit { display: inline-block; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); padding: 0 1px; border-radius: 4px; }     
        .connection-line { position: absolute; background: #463438; cursor: pointer; z-index: 10; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .connection-line:hover { background: var(--hl-bg, #99C44D) !important; box-shadow: 0 0 15px var(--hl-shadow, rgba(153, 196, 77, 0.8)) !important; z-index: 16 !important; }
        .connection-line::after { content: ''; position: absolute; top: -15px; bottom: -15px; left: -15px; right: -15px; background-color: transparent; }
        .line-highlight { background: var(--hl-bg, #99C44D) !important; box-shadow: 0 0 15px var(--hl-shadow, rgba(153, 196, 77, 0.8)) !important; z-index: 15 !important; opacity: 1 !important; }
        .swap-active { background: var(--hl-bg, #99C44D) !important; box-shadow: 0 0 15px var(--hl-shadow, rgba(153, 196, 77, 0.8)) !important; z-index: 15 !important; opacity: 1 !important; border-top: none !important;}       
        .line-h { height: 8px; width: 300px; }
        .line-v { width: 8px; height: 250px; }
        .fish-wrapper { position: absolute; width: 80px; height: 80px;  pointer-events: none; z-index: 30; display: none; justify-content: center; align-items: center; transition: transform 0.3s, filter 0.3s; }
        .fish-ready { display: flex; }
        .fish-animate { transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1), transform 0.3s, filter 0.3s; }     
        .fish-wrapper img.fish-img { width: 70px; height: auto; position: absolute; z-index: 2; top: 73%; transform: translateY(-61%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .fish-wrapper img.fish-bg-shape { width: 70px; height: auto; position: absolute; z-index: 1; filter: brightness(0) invert(1); opacity: 1; top: 73%; transform: translateY(-61%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .fish-label { background: rgba(70, 52, 56, 0.8); color: #fff; padding: 2px 5px; height: 26px; border-radius: 13px; display: flex; gap: 1px; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; z-index: 5; position: absolute; top: 42px; transition: opacity 0.3s, transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .hide-labels .fixed-number { opacity: 0; pointer-events: none; transform: scale(0.5); }
        .hide-labels .fish-label { opacity: 0; pointer-events: none; transform: scale(0.5); }
        .hide-labels .node > img { transform: scale(1.15); }
        .hide-labels .fish-wrapper > img.fish-img, .hide-labels .fish-wrapper > img.fish-bg-shape { transform: scale(1.15) translateY(-40%); }
        .node img { transform: scale(1.05) translateY(-5px); }
        body.labels-colorful .node .bit-1 { color: #333333; }
        body.labels-colorful .fish-wrapper .bit-1 { color: #dddddd; } 
        body.labels-colorful .bit-0 { color: #FFB7C5; }
        .mode-toggle-inline { width: 44px; height: 44px; background: #ffffff; border: 3px solid #463438; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; box-shadow: 0 3px 0 #463438; transition: all 0.1s; }
        .mode-toggle-inline:hover { transform: translateY(-2px); box-shadow: 0 5px 0 #463438; }
        .mode-toggle-inline:active { transform: translateY(2px); box-shadow: 0 1px 0 #463438; }    
        .game-btn { cursor: pointer; border: 5px solid #463438; border-radius: 60px; padding: 12px; font-size: 26px; font-weight: 900; color: white; text-shadow: 2px 2px 0 #463438; box-shadow: 0 6px 0 #463438; position: relative; transition: all 0.1s; display: inline-block; }
        .game-btn:active { top: 6px; box-shadow: 0 2px 0 #463438; }
        .btn-red { background: #FFB7C5; }
        .btn-green { background: #99C44D; }
        .multi-toggle-btn { background: #e2de6e; border: 4px solid #463438; border-radius: 20px; padding: 5px 15px; font-weight: 900; font-size: 20px; color: white; cursor: pointer; box-shadow: 0 4px 0 #463438; transition: all 0.1s; min-width: 140px; text-shadow: 2px 2px 0 #463438; }
        .multi-toggle-btn.active-mode { background: #629eed; }
        .multi-toggle-btn:hover, .game-btn:hover, .mode-toggle-fixed:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #463438;}
        .multi-toggle-btn:active, .mode-toggle-fixed:active { transform: translateY(2px); box-shadow: 0 2px 0 #463438;}      
        .gate-btn-v2 { position: relative; height: 76px; width: 72px; display: flex; align-items: center; justify-content: center; padding: 0; border: 2.5px solid #463438; border-radius: 8px; cursor: pointer; transition: all 0.2s; box-shadow: 0 3px 6px rgba(0,0,0,0.1); margin: auto; background-color: transparent;}     
        .gate-btn-v2:hover { background-color: #FFB7C5 !important; filter: brightness(1.05); transform: scale(1.05); z-index: 10; border-color: #463438; }
        .btn-highlight { transform: scale(1.15) !important; box-shadow: 0 0 10px rgba(0,0,0,0.3) !important; border: 4px solid #99C44D !important; z-index: 10 !important; filter: brightness(1.1) !important; background-color: #FFB7C5 !important; }   
        .hyper-line { stroke: #463438; stroke-width: 2; opacity: 0.3; }
        .hyper-line-hi { stroke: #FFB7C5; stroke-width: 4.5; opacity: 1; transition: stroke 0.2s; }
        .gate-btn-v2 .hyper-line-hi { stroke: #f78790; }
        .gate-btn-v2:hover .hyper-line-hi { stroke: #ffffff !important; }
        .btn-highlight .hyper-line-hi { stroke: #ffffff !important; }
        .circuit-unit:hover .hyper-line-hi, .circuit-unit.selected .hyper-line-hi { stroke: #99C44D !important; }
        .func-btn { width: 100%; margin-top: 5px; padding: 10px; border-radius: 35px; font-weight: 900; font-size: 16px; border: 2.5px solid #463438; cursor: pointer; box-shadow: 0 4px 0 rgba(70,52,56,0.1); }
        .btn-reset { background: #FFF9F0; color: #463438; }
        .btn-undo { background: #FFB7C5 !important; color: #fff !important; border: 2.5px solid #463438 !important; opacity: 0.6; cursor: not-allowed; }
        .btn-undo.active { background: #FFB7C5 !important; border-color: #463438 !important; color: #fff !important; opacity: 1; cursor: pointer; box-shadow: 0 4px 0 #463438; }
        .btn-undo.active:hover { background-color: #ff9fb2 !important; transform: translateY(-2px); box-shadow: 0 6px 0 #463438; animation: pulse-red-undo 1.2s infinite ease-in-out !important; }
        .func-btn:hover { background-color: #FFB7C5 !important; color: #fff !important; border-color: #463438 !important; box-shadow: 0 3px 0 #463438 !important; transform: translateY(-2px); }     
        #pro-panel { width: 0; opacity: 0; height: 500px; overflow: hidden; background: #ffffff; border: 0px solid #463438; border-radius: 40px; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .pro-active #pro-panel { width: 320px; opacity: 1; border: 8px solid #463438; padding: 12px 20px 20px 20px; box-shadow: 10px 10px 0px #99C44D; }
        .panel-section-title { font-weight: 900; font-size: 18px; margin-bottom: 6px; margin-top: 6px; color: #463438; text-align: center; white-space: nowrap; overflow: hidden; }
        .pro-active #node-0, .pro-active #node-2 { left: 65px !important; }
        .pro-active #node-1, .pro-active #node-3 { left: 405px !important; }
        .pro-active .line-h { left: 130px !important; }
        .pro-active .line-v:nth-of-type(3) { left: 130px !important; }
        .pro-active .line-v:nth-of-type(4) { left: 470px !important; }
        .pro-active #fish-0, .pro-active #fish-2 { left: 95px; }
        .pro-active #fish-1, .pro-active #fish-3 { left: 435px; }      
        #circuit-area { width: 900px; height: 0; opacity: 0; background: #ffffff; border: 0px solid #463438; border-radius: 30px; margin-top: 20px; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); position: relative; padding: 0 15px; overflow: hidden; touch-action: pan-x; overscroll-behavior-y: none; }
        .pro-active #circuit-area { height: 170px; opacity: 1; border: 8px solid #463438; padding: 15px; box-shadow: 10px 10px 0px #FFB7C5; }
        .circuit-title { text-align: center; font-weight: 900; font-size: 1.25rem; margin-bottom: 7px; color: #463438; }
        #circuit-content-wrapper { position: relative; height: 130px; overflow-x: auto !important; overflow-y: hidden; margin-left: 30px; padding-top: 4px; scroll-behavior: auto; touch-action: pan-x; overscroll-behavior-y: none; }
        #circuit-content-wrapper::-webkit-scrollbar { display: none; }
        #circuit-content { display: flex; height: 100%; padding: 0 7px; min-width: 100%; width: max-content; position: relative; background-image: linear-gradient(#463438, #463438), linear-gradient(#463438, #463438); background-size: 100% 3px; background-repeat: no-repeat; background-position: 0 20px, 0 60px; }     
        .mini-mode #circuit-content { background-image: none !important; }
        .mini-mode .circuit-unit { min-width: 85px !important; width: 85px !important; max-width: 85px !important; flex: 0 0 85px !important; padding: 0 !important; }
        .qubit-label { position: absolute; left: 0px; font-weight: 900; font-size: 16px; color: #463438; width: 35px; text-align: right; display: flex; align-items: center; justify-content: flex-end; user-select: none; }
        .circuit-unit { min-width: 60px; height: 85px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; cursor: grab; transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.2s, border 0.2s; touch-action: none; box-sizing: border-box; background-color: transparent !important; border: 3px solid transparent; border-radius: 12px; }
        .circuit-unit:active { cursor: grabbing; }
        .circuit-unit:hover { background-color: var(--bg-hover) !important; border-radius: 12px; }
        .circuit-unit.selected { background-color: var(--bg-hover) !important; border: 3px solid var(--border-color) !important; border-radius: 12px; } 
        .control-dot { width: 14px; height: 14px; background: #463438; border-radius: 50%; position: absolute; z-index: 5; left: 50%; transform: translate(-50%, -50%); }
        .control-dot.fill { background: #463438; }
        .control-dot.empty { background: #fff; border: 2.5px solid #463438; box-sizing: border-box; }
        .connection-v-line { position: absolute; width: 2.5px; background: #463438; z-index: 3; left: 50%; transform: translateX(-50%); }
        .circuit-target { position: absolute; width: 24px; height: 24px; border-radius: 50%; background: #fff; border: 2.5px solid #463438; display: flex; align-items: center; justify-content: center; z-index: 15; left: 50%; transform: translate(-50%, -50%); overflow: hidden; }
        .circuit-target::before { content: ""; position: absolute; width: 2.5px; height: 100%; background: #463438; left: 50%; transform: translateX(-50%); }
        .circuit-target::after { content: ""; position: absolute; width: 100%; height: 2.5px; background: #463438; top: 50%; transform: translateY(-50%); }
        .drop-hint-left::before { content: ''; position: absolute; left: -3px; top: 10px; bottom: 10px; width: 4px; background-color: #f78790; border-radius: 4px; z-index: 200; pointer-events: none; }
        .drop-hint-right::after { content: ''; position: absolute; right: -3px; top: 10px; bottom: 10px; width: 4px; background-color: #f78790; border-radius: 4px; z-index: 200; pointer-events: none; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(70, 52, 56, 0.7); display: none; align-items: center; justify-content: center; z-index: 1100; }
        .modal-content { background: #FFF9F0; border: 8px solid #463438; border-radius: 40px; padding: 30px; text-align: center; width: 380px; box-shadow: 0 10px 0 #FFB7C5; color: #463438; }
        .no-fish-anim .fish-wrapper, .no-fish-anim .node { transition: none !important; }     
        .mode-toggle-fixed { position: fixed; right: 20px; width: 70px; height: 70px; background: white; border: 5px solid #463438; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; box-shadow: 0 4px 0 #463438; z-index: 500; }
        @keyframes pulse-red-undo { 0%, 100% { transform: scale(1); box-shadow: 0 4px 0 #463438; } 50% { transform: scale(1.05); box-shadow: 0 0 20px #FFB7C5, 0 4px 0 #463438; } }     
        #canvas-bottom-btns { position: absolute; bottom: 20px; right: 30px; display: flex; flex-direction: column; gap: 10px; z-index: 100; }
        #canvas-bottom-btns .func-btn { margin-top: 0; width: 90px; font-size: 14px; padding: 8px 5px; text-transform: uppercase; border-width: 3px; }
        .pro-active #canvas-bottom-btns { display: none !important; }
        .circuit-unit.is-dragging { background-color: var(--bg-hover) !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 mini-mode hide-labels" id="body-root">
    <div id="mode-toggle-container">
        <div id="mode-toggle" class="mode-toggle-fixed" onclick="toggleProMode()" style="top: 20px;">👁️</div>
        <div id="hyper-toggle" class="mode-toggle-fixed hidden" onclick="toggleMiniHypercube()" style="top: 100px;">🧊</div>
        <div id="logic-toggle" class="mode-toggle-fixed hidden" onclick="toggleQuantumMode()" style="top: 180px;">🪄</div>
    </div> 
    <div id="leaderboard-wrapper">
        <div class="side-leaderboard-content">
            <h2 class="text-xl font-black mb-3 text-center" style="color: #463438;">🏆 TOP CATS</h2>
            <div class="flex gap-2 mb-3">
                <button onclick="renderRank('steps')" id="tab-steps" class="rank-tab active">STEPS</button>
                <button onclick="renderRank('time')" id="tab-time" class="rank-tab">TIME</button>
            </div>
            <div id="rankList" class="flex-grow overflow-y-auto space-y-1 pr-1">
                <p class="text-center italic text-gray-400 mt-10 text-sm">Loading...</p>
            </div>
        </div>
        <div class="bookmark-tab" onclick="toggleLeaderboard()">
            <div class="bookmark-text">RANK</div>
        </div>
    </div>    
    <div class="w-full max-w-4xl">
        <div class="flex justify-between w-full px-4 mb-4 items-center mt-6">
            <div class="text-3xl font-black" style="color: #463438;">STEPS: <span id="step-count">0</span> | TIME: <span id="timer">0</span>s</div>
            <div class="flex items-center gap-4 ml-auto">
                <button id="label-toggle-inline" class="mode-toggle-inline" onclick="toggleLabels()">🌈</button>
                <button id="mode-2-btn" class="multi-toggle-btn" onclick="toggleMode2()">Mode: 1</button>
                <div class="text-3xl font-black ml-4" style="color: #7bc202;">LEVEL 4</div>
            </div>
        </div>       
        <div class="main-layout">
            <div id="pro-panel">
                <div class="panel-section-title" id="panel-title-gates">Transformations</div>
                <div class="grid grid-cols-2 gap-2 w-10/12 mx-auto" id="gate-container">
                    <button id="gate-x0" class="gate-btn-v2" onclick="applyGate('X0')" onmouseover="syncGateHighlight('X0', true)" onmouseout="syncGateHighlight('X0', false)"></button>
                    <button id="gate-x1" class="gate-btn-v2" onclick="applyGate('X1')" onmouseover="syncGateHighlight('X1', true)" onmouseout="syncGateHighlight('X1', false)"></button>
                    <button id="gate-cx10" class="gate-btn-v2" onclick="applyGate('CX10')" onmouseover="syncGateHighlight('CX10', true)" onmouseout="syncGateHighlight('CX10', false)"></button>
                    <button id="gate-cx01" class="gate-btn-v2" onclick="applyGate('CX01')" onmouseover="syncGateHighlight('CX01', true)" onmouseout="syncGateHighlight('CX01', false)"></button>
                    <button id="gate-c0x10" class="gate-btn-v2" onclick="applyGate('C0X10')" onmouseover="syncGateHighlight('C0X10', true)" onmouseout="syncGateHighlight('C0X10', false)"></button>
                    <button id="gate-c0x01" class="gate-btn-v2" onclick="applyGate('C0X01')" onmouseover="syncGateHighlight('C0X01', true)" onmouseout="syncGateHighlight('C0X01', false)"></button>
                </div>
                <div class="panel-section-title mt-2">Control</div>
                <button id="reset-btn" class="func-btn btn-reset" onclick="resetCircuit()">Reset Circuit</button>
                <button id="undo-btn" class="func-btn btn-undo" onclick="undo()">Undo Step</button>
            </div>
            <div class="game-canvas" id="main-canvas">
                <div id="line-h-0" class="connection-line line-h" style="top: 95px; left: 280px;"
                    onclick="handleLineClick(this.id)" onmouseover="syncHighlight(this.id, true)" onmouseout="syncHighlight(this.id, false)"></div>
                <div id="line-h-1" class="connection-line line-h" style="bottom: 90px; left: 280px;"
                    onclick="handleLineClick(this.id)" onmouseover="syncHighlight(this.id, true)" onmouseout="syncHighlight(this.id, false)"></div>
                <div id="line-v-0" class="connection-line line-v" style="top: 150px; left: 221px;"
                    onclick="handleLineClick(this.id)" onmouseover="syncHighlight(this.id, true)" onmouseout="syncHighlight(this.id, false)"></div>
                <div id="line-v-1" class="connection-line line-v" style="top: 150px; left: 571px;"
                    onclick="handleLineClick(this.id)" onmouseover="syncHighlight(this.id, true)" onmouseout="syncHighlight(this.id, false)"></div>                 
                <div class="node" id="node-0" style="top: 25px; left: 155px;"><div class="fixed-number"><span class="bit bit-1">0</span><span class="bit bit-0">0</span></div><img src="./image/cat0.svg"></div>
                <div class="node" id="node-1" style="top: 25px; left: 505px;"><div class="fixed-number"><span class="bit bit-1">0</span><span class="bit bit-0">1</span></div><img src="./image/cat1.svg"></div>
                <div class="node" id="node-2" style="bottom: 25px; left: 155px;"><div class="fixed-number"><span class="bit bit-1">1</span><span class="bit bit-0">0</span></div><img src="./image/cat2.svg"></div>
                <div class="node" id="node-3" style="bottom: 25px; left: 505px;"><div class="fixed-number"><span class="bit bit-1">1</span><span class="bit bit-0">1</span></div><img src="./image/cat3.svg"></div>            
                <div id="fish-0" class="fish-wrapper"><div class="fish-label"><span class="bit bit-1">0</span><span class="bit bit-0">0</span></div><img src="./image/fish0.svg" class="fish-bg-shape"><img src="./image/fish0.svg" class="fish-img"></div>
                <div id="fish-1" class="fish-wrapper"><div class="fish-label"><span class="bit bit-1">0</span><span class="bit bit-0">1</span></div><img src="./image/fish1.svg" class="fish-bg-shape"><img src="./image/fish1.svg" class="fish-img"></div>
                <div id="fish-2" class="fish-wrapper"><div class="fish-label"><span class="bit bit-1">1</span><span class="bit bit-0">0</span></div><img src="./image/fish2.svg" class="fish-bg-shape"><img src="./image/fish2.svg" class="fish-img"></div>
                <div id="fish-3" class="fish-wrapper"><div class="fish-label"><span class="bit bit-1">1</span><span class="bit bit-0">1</span></div><img src="./image/fish3.svg" class="fish-bg-shape"><img src="./image/fish3.svg" class="fish-img"></div>          
                <div id="canvas-bottom-btns">
                    <button class="func-btn btn-reset" onclick="resetCircuit()">RESET</button>
                    <button id="undo-btn-bottom" class="func-btn btn-undo" onclick="undo()">UNDO</button>
                </div>
            </div>
        </div>    
        <div id="circuit-area" class="mx-auto">
            <div class="circuit-title" id="circuit-title-text">Paths</div>
            <div class="qubit-label" id="q-label-0" style="top: 62px;">d1</div>
            <div class="qubit-label" id="q-label-1" style="top: 102px;">d2</div>
            <div id="circuit-content-wrapper"><div id="circuit-content"></div></div>
        </div>       
        <div class="w-full text-center mt-6 mb-6">
            <a href="index.html" class="game-btn btn-red px-16">GIVE UP</a>
        </div>
    </div>
    <div id="victoryModal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-5xl font-black mb-4" style="color: #463438;">MEOW!</h2>
            <h2 class="text-5xl font-black mb-4" style="color: #463438;">🐾</h2>
            <p id="victoryMsg" class="text-xl font-bold mb-6"></p>
            <button onclick="location.href='index.html'" class="game-btn btn-green w-full mb-4">KEEP GOING</button>
            <button onclick="viewInLab().style.display='none'" class="game-btn btn-red w-full">VIEW CIRCUIT</button>
        </div>
    </div>
    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzR0J0VXyl5ayKwDXlHimc4WS1FjvGEb2-gTBMhum8APQKfDHxc5wsiWRkNqkxJrocMOw/exec';
        let steps = 0, time = 0, isPro = false, showMiniHypercube = true, isKidsMode = true, labelState = 0, timerInterval, gateHistory = [], isSolved = false;
        let fishAtNode = [3, 2, 1, 0];
        let historyStack = [[]];
        let selectedIndices = [];
        let isMode2 = false;
        let leaderboardData = [];
        let draggedIndex = null;
        let currentDragGhost = null;
        let isTouchDevice = ('ontouchstart' in window || navigator.maxTouchPoints > 0);
        let autoScrollRAF = null;
        let scrollSpeed = 0;        
        const pop = new Audio('pop.m4a'), meow = new Audio('meow.m4a');
        const dimColors = {
            1: '#333333',
            0: '#FFB7C5' 
        };
        const dimLineStyles = {
            1: 'repeating-linear-gradient(45deg, #463438, #463438 8px, #ffffff 8px, #ffffff 16px)',
            0: 'repeating-linear-gradient(45deg, #FFB7C5, #FFB7C5 8px, #e2de6e 8px, #e2de6e 16px)'
        };
        const getDynamicOffset = () => parseInt(getComputedStyle(document.body).getPropertyValue('--cube-offset-x')) || 0;
        const nodePositions = Array.from({ length: 8 }, (_, i) => {
            let t, l_rel;
            if (i === 0) { t = 150; l_rel = 135; }
            else if (i === 1) { t = 150; l_rel = 350; }
            else if (i === 2) { t = 330; l_rel = 135; }
            else if (i === 3) { t = 330; l_rel = 350; }
            else if (i === 4) { t = 20;  l_rel = -10; }
            else if (i === 5) { t = 20;  l_rel = 510; }
            else if (i === 6) { t = 460; l_rel = -10; }
            else if (i === 7) { t = 460; l_rel = 510; }
            const pos = { t: t, relX: l_rel };
            Object.defineProperty(pos, 'l', { get: () => pos.relX + getDynamicOffset() });
            return pos;
        });
        function getQubitLabelHTML(q, type, sizeClass = '24px') {
            let borderStyle = type === 1 ? 'solid' : 'dashed';
            let opac = type === 1 ? 1 : 0.3;
            const colors = [
                `repeating-linear-gradient(45deg, #463438, #463438 4px, transparent 4px, transparent 8px)`, 
                `#FFB7C5` 
            ];
            return `<div style="width: ${sizeClass}; height: ${sizeClass}; background-color: #fff; border-radius: 50%; position: relative; box-sizing: border-box;">
                <div style="position: absolute; inset: 0; border: 2.5px ${borderStyle} #463438; border-radius: 50%; overflow: hidden; opacity: ${opac}; box-sizing: border-box;">
                    <div style="position: absolute; inset: 0; background: ${colors[q]};"></div>
                </div>
            </div>`;
        }
        function updateScrollSpeed(clientX) {
            const wrapper = document.getElementById('circuit-content-wrapper');
            if (!wrapper) return;
            const rect = wrapper.getBoundingClientRect();
            const edgeThreshold = 150;
            const maxSpeed = 5;
            if (clientX < rect.left + edgeThreshold || clientX < edgeThreshold) {
                scrollSpeed = -maxSpeed;
                if (!autoScrollRAF) autoScrollRAF = requestAnimationFrame(scrollLoop);
            } else if (clientX > rect.right - edgeThreshold || clientX > window.innerWidth - edgeThreshold) {
                scrollSpeed = maxSpeed;
                if (!autoScrollRAF) autoScrollRAF = requestAnimationFrame(scrollLoop);
            } else {
                scrollSpeed = 0;
            }
        }
        function scrollLoop() {
            const wrapper = document.getElementById('circuit-content-wrapper');
            if (scrollSpeed !== 0) {
                wrapper.scrollLeft += scrollSpeed;
                autoScrollRAF = requestAnimationFrame(scrollLoop);
            } else {
                autoScrollRAF = null;
            }
        }
        window.onload = () => {
            updateUIState();
            updateFishUI();
            const fishes = document.querySelectorAll('.fish-wrapper');
            fishes.forEach(fw => fw.classList.add('fish-ready'));
            setTimeout(() => { fishes.forEach(fw => fw.classList.add('fish-animate')); }, 50);
            timerInterval = setInterval(() => { time++; document.getElementById('timer').innerText = time; }, 1000);      
            updateUndoStatus();
            fetchLeaderboard();        
            const circuitWrapper = document.getElementById('circuit-content-wrapper');
            circuitWrapper.addEventListener('wheel', (e) => { 
                if (Math.abs(e.deltaY) > 0) {
                    e.preventDefault(); 
                    circuitWrapper.scrollLeft += e.deltaY; 
                }
            }, { passive: false });           
            circuitWrapper.addEventListener('mousemove', (e) => {
                updateScrollSpeed(e.clientX);
            });
            circuitWrapper.addEventListener('mouseleave', () => { 
                if (draggedIndex === null) scrollSpeed = 0; 
            });
            document.addEventListener('dragover', (e) => {
                if (draggedIndex !== null) {
                    updateScrollSpeed(e.clientX);
                }
            });
            document.addEventListener('dragend', () => {
                scrollSpeed = 0;
            });
        };
        function updateUIState() {
            document.getElementById('mode-toggle').innerText = isPro ? "⚡" : "👁️";
            const hyperBtn = document.getElementById('hyper-toggle');
            const logicBtn = document.getElementById('logic-toggle');
            if (isPro) {
                document.getElementById('body-root').classList.add('pro-active');
                hyperBtn.classList.remove('hidden');
                hyperBtn.innerText = showMiniHypercube ? "🍡" : "🧊";
                if (!showMiniHypercube) {
                    logicBtn.classList.remove('hidden');
                    logicBtn.innerText = isKidsMode ? "⚛️" : "🪄";
                } else {
                    logicBtn.classList.add('hidden');
                }
            } else {
                document.getElementById('body-root').classList.remove('pro-active');
                hyperBtn.classList.add('hidden');
                logicBtn.classList.add('hidden');
            }
            if (showMiniHypercube) {
                document.getElementById('circuit-title-text').innerText = "Paths";
                document.getElementById('panel-title-gates').innerText = "Transformations";
                document.getElementById('body-root').classList.add('mini-mode');
            } else {
                document.getElementById('circuit-title-text').innerText = isKidsMode ? "Kids Rules" : "Circuit Diagram";
                document.getElementById('panel-title-gates').innerText = isKidsMode ? "Magic Rules" : "Quantum Gates";
                document.getElementById('body-root').classList.remove('mini-mode');
            }
            for(let i=0; i<2; i++) {
                const label = document.getElementById(`q-label-${i}`);
                if (!showMiniHypercube && isKidsMode) {
                    label.innerHTML = getQubitLabelHTML(i, 1, '28px');
                    label.style.left = '5px';
                } else {
                    label.innerHTML = (!showMiniHypercube) ? `q${i}` : `d${i+1}`;
                    label.style.left = '0px';
                }
            }
            updateGateButtonsUI();
            renderCircuit();
        }    
        function toggleProMode() {
            pop.currentTime = 0; pop.play();
            isPro = !isPro;
            updateUIState();           
            const b = document.getElementById('body-root');
            b.classList.add('no-fish-anim'); 
            updateFishUI(); 
            setTimeout(() => b.classList.remove('no-fish-anim'), 50);
        }
        function toggleMiniHypercube() {
            pop.currentTime = 0; pop.play();
            showMiniHypercube = !showMiniHypercube;
            updateUIState();
        }
        function toggleQuantumMode() {
            pop.currentTime = 0; pop.play();
            isKidsMode = !isKidsMode;
            updateUIState();
        }
        function toggleLabels() {
            pop.currentTime = 0; pop.play();
            labelState = (labelState + 1) % 3;
            const btn = document.getElementById('label-toggle-inline');
            const root = document.getElementById('body-root');
            if (labelState === 0) {
                btn.innerText = "🌈"; 
                root.classList.add('hide-labels');
                root.classList.remove('labels-colorful');
            } else if (labelState === 1) {
                btn.innerText = "🏷️"; 
                root.classList.remove('hide-labels');
                root.classList.add('labels-colorful');
            } else {
                btn.innerText = "🚫"; 
                root.classList.remove('hide-labels');
                root.classList.remove('labels-colorful');
            }
        }        
        function getRgba(hex, alpha) {
            hex = hex.replace('#', '');
            const r = parseInt(hex.substring(0,2), 16), g = parseInt(hex.substring(2,4), 16), b = parseInt(hex.substring(4,6), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }        
        function getGateColorMap(type) {
            if (type.startsWith('X')) return '#e2de6e'; 
            return '#629eed'; 
        }
        const gateLineMap = {
            X0: ['line-v-0', 'line-v-1'],
            X1: ['line-h-0', 'line-h-1'],
            C0X01: ['line-h-0'],
            CX01: ['line-h-1'],
            C0X10: ['line-v-0'],
            CX10: ['line-v-1']
        };
        function getDimFromGateType(type) {
            if (type === 'X0') return 1;
            if (type === 'X1') return 0;
            if (type === 'C0X01' || type === 'CX01') return 0;
            if (type === 'C0X10' || type === 'CX10') return 1;
            return null;
        }
        function toggleLeaderboard() {
            const wrapper = document.getElementById('leaderboard-wrapper');
            wrapper.classList.toggle('expanded');
        }
        function getHighlightPairsForGate(type) {
            let pairs = [];
            if (type === 'X0') pairs = [[0,2], [1,3]];
            else if (type === 'X1') pairs = [[0,1], [2,3]];
            else if (type === 'CX01') pairs = [[2,3]];
            else if (type === 'C0X01') pairs = [[0,1]];
            else if (type === 'CX10') pairs = [[1,3]];
            else if (type === 'C0X10') pairs = [[0,2]];
            return pairs;
        }
        function toggleLineHighlight(lineIds, isOn, dim) {
            let bg = '#99C44D';
            let shadow = 'rgba(153, 196, 77, 0.8)';
            if (dim !== null && dim !== undefined) {
                bg = dimLineStyles[dim] || bg;
                shadow = getRgba(dimColors[dim], 0.8) || shadow;
            }
            lineIds.forEach(id => {
                const el = document.getElementById(id);
                if(el) {
                    if(isOn) {
                        el.classList.add('line-highlight');
                        el.style.setProperty('--hl-bg', bg);
                        el.style.setProperty('--hl-shadow', shadow);
                    } else {
                        el.classList.remove('line-highlight');
                        el.style.removeProperty('--hl-bg');
                        el.style.removeProperty('--hl-shadow');
                    }
                }
            });
        }
        function syncHighlight(lineId, isOn) {
            const gate = getGateForLine(lineId);
            if (!gate) return;
            const dim = getDimFromGateType(gate);
            toggleLineHighlight(gateLineMap[gate] || [], isOn, dim);
            const btn = document.getElementById('gate-' + gate.toLowerCase());
            if (btn) {
                if (isOn) btn.classList.add('btn-highlight');
                else btn.classList.remove('btn-highlight');
            }
            if (isOn && labelState !== 0 && dim !== null) {
                document.querySelectorAll(`.bit-${dim}`).forEach(el => {
                    el.style.transform = 'scale(1.5) translateY(-2px)';
                    el.style.color = dimColors[dim];
                    el.style.textShadow = '0 0 5px #fff, 0px 2px 0px rgba(0,0,0,0.3)';
                    el.style.background = 'radial-gradient(circle, rgba(255,255,255,0.6) 20%, transparent 70%)';
                });
            } else {
                document.querySelectorAll('.bit').forEach(el => {
                    el.style.transform = '';
                    el.style.color = '';
                    el.style.textShadow = '';
                    el.style.background = '';
                });
            }
        }
        function syncGateHighlight(gate, isOn) {
            const dim = getDimFromGateType(gate);
            toggleLineHighlight(gateLineMap[gate] || [], isOn, dim);
            const btn = document.getElementById('gate-' + gate.toLowerCase());
            if (btn) {
                if (isOn) btn.classList.add('btn-highlight');
                else btn.classList.remove('btn-highlight');
            }
            if (isOn && labelState !== 0 && dim !== null) {
                document.querySelectorAll(`.bit-${dim}`).forEach(el => {
                    el.style.transform = 'scale(1.5) translateY(-2px)';
                    el.style.color = dimColors[dim];
                    el.style.textShadow = '0 0 5px #fff, 0px 2px 0px rgba(0,0,0,0.3)';
                    el.style.background = 'radial-gradient(circle, rgba(255,255,255,0.6) 20%, transparent 70%)';
                });
            } else {
                document.querySelectorAll('.bit').forEach(el => {
                    el.style.transform = '';
                    el.style.color = '';
                    el.style.textShadow = '';
                    el.style.background = '';
                });
            }
        }
        function handleLineClick(lineId) {
            if (isSolved) return;
            const gate = getGateForLine(lineId);
            if (gate) applyGate(gate);
        }
        async function fetchLeaderboard() {
            const listArea = document.getElementById('rankList');
            try {
                const response = await fetch(`${SCRIPT_URL}?action=getLeaderboard&level=4`);
                const data = await response.json();
                if (data && Array.isArray(data) && data.length > 0) {
                    leaderboardData = data;
                    renderRank('steps');
                } else {
                    listArea.innerHTML = '<p class="text-center italic text-gray-400 mt-10 text-sm">No records yet</p>';
                }
            } catch (e) {
                listArea.innerHTML = '<p class="text-center italic text-red-400 mt-10 text-sm">Load Error</p>';
            }
        } 
        function renderRank(type) {
            const tabSteps = document.getElementById('tab-steps');
            const tabTime = document.getElementById('tab-time');
            const listArea = document.getElementById('rankList');
            if (type === 'steps') {
                tabSteps.className = 'rank-tab active';
                tabTime.className = 'rank-tab bg-gray-100';
            } else {
                tabSteps.className = 'rank-tab bg-gray-100';
                tabTime.className = 'rank-tab active';
            }
            if (!leaderboardData || leaderboardData.length === 0) return;
            const sorted = [...leaderboardData].sort((a, b) => a[type] - b[type]);
            let html = "";
            sorted.slice(0, 10).forEach((item, index) => {
                const medal = index === 0 ? "🥇" : index === 1 ? "🥈" : index === 2 ? "🥉" : (index + 1) + ".";
                const displayName = item.username || item.name || 'Anonymous';
                const displayValue = type === 'steps' ? item.steps + '🐾' : item.time + 's';
                html += `<div class="rank-item"><span class="truncate" style="max-width: 90px;">${medal} ${displayName}</span><span class="text-blue-600">${displayValue}</span></div>`;
            });
            listArea.innerHTML = html;
        } 
        function toggleMode2() {
            pop.currentTime = 0; pop.play();
            isMode2 = !isMode2;
            const btn = document.getElementById('mode-2-btn');
            btn.innerText = isMode2 ? "Mode: 2" : "Mode: 1";
            btn.classList.toggle('active-mode', isMode2);
        }
        function getGateForLine(lineId) {
            if (isMode2) {
                if (lineId.includes('h')) return 'X1';
                if (lineId.includes('v')) return 'X0';
            } else {
                if (lineId === 'line-h-0') return 'C0X01';
                if (lineId === 'line-h-1') return 'CX01';
                if (lineId === 'line-v-0') return 'C0X10';
                if (lineId === 'line-v-1') return 'CX10';
            }
            return null;
        }
        function pushHistory() { historyStack.push([...gateHistory]); }
        function applyGate(g) {
            if (isSolved) return;
            pop.currentTime = 0; pop.play();
            if (selectedIndices.length > 0) {
                let targetIdx = Math.min(...selectedIndices);
                let newHistory = [];
                for(let i=0; i<gateHistory.length; i++) {
                    if (i === targetIdx) newHistory.push(g);
                    else if (!selectedIndices.includes(i)) newHistory.push(gateHistory[i]);
                }
                gateHistory = newHistory;
                selectedIndices = [];
                pushHistory(); recalculatePositions(); finishMove();
            } else { executeGateLogic(g); }
        }
        function getPermutation(g) {
            return [0, 1, 2, 3].map(pos => {
                let q0 = Math.floor(pos / 2), q1 = pos % 2;
                if (g === 'X0') q0 = 1 - q0;
                else if (g === 'X1') q1 = 1 - q1;
                else if (g === 'CX01' && q0 === 1) q1 = 1 - q1;
                else if (g === 'C0X01' && q0 === 0) q1 = 1 - q1;
                else if (g === 'CX10' && q1 === 1) q0 = 1 - q0;
                else if (g === 'C0X10' && q1 === 0) q0 = 1 - q0;
                return q0 * 2 + q1;
            });
        }
        function executeGateLogic(g) {
            const permutation = getPermutation(g);
            fishAtNode = fishAtNode.map(pos => permutation[pos]);
            gateHistory.push(g);
            pushHistory();
            steps = gateHistory.length;
            finishMove();
        }
        function recalculatePositions() {
            fishAtNode = gateHistory.reduce((currentPositions, gate) => {
                const permutation = getPermutation(gate);
                return currentPositions.map(pos => permutation[pos]);
            }, [3, 2, 1, 0]);
            steps = gateHistory.length;
        }
        function finishMove() { document.getElementById('step-count').innerText = steps; updateFishUI(); renderCircuit(); checkWin(); }
        function updateFishUI() {
            for(let i=0; i<4; i++) {
                const f = document.getElementById(`fish-${i}`), n = document.getElementById(`node-${fishAtNode[i]}`);
                if(f && n) { 
                    f.style.top = (n.offsetTop + 30) + "px"; 
                    f.style.left = (n.offsetLeft + 30) + "px"; 
                }
            }
        }
        function getMiniSquareSVG(type) {
            let pairs = getHighlightPairsForGate(type);
            const miniNodes = [
                { x: 20, y: 18 },
                { x: 80, y: 18 },
                { x: 20, y: 78 },
                { x: 80, y: 78 }
            ];
            let svg = `<svg viewBox="0 0 100 100" style="width:100%; height:100%; pointer-events:none; display: block;" preserveAspectRatio="xMidYMid meet">`;
            const edges = [ [0, 1], [0, 2], [1, 3], [2, 3] ];
            edges.forEach(([i, j]) => {
                let n1 = miniNodes[i], n2 = miniNodes[j];
                let isHighlighted = pairs.some(p => (p[0] === i && p[1] === j) || (p[0] === j && p[1] === i));
                let lineClass = isHighlighted ? 'hyper-line-hi' : 'hyper-line';
                let strokeW = isHighlighted ? 4.5 : 2;
                svg += `<line x1="${n1.x}" y1="${n1.y}" x2="${n2.x}" y2="${n2.y}" class="${lineClass}" style="stroke-width: ${strokeW}" stroke-linecap="round"/>`;
            });
            for(let i=0; i<4; i++) {
                let n = miniNodes[i];
                svg += `<circle cx="${n.x}" cy="${n.y}" r="6" fill="#463438"/>`;
            }
            svg += `</svg>`;
            return svg;
        }    
        function getGateContent(g) {
            if (showMiniHypercube) {
                return getMiniSquareSVG(g);
            } else {
                let controls = [], target = -1;
                if (g === 'X0') target = 0;
                if (g === 'X1') target = 1;
                if (g === 'CX01') { controls.push({ line: 0, type: 1 }); target = 1; }
                if (g === 'C0X01') { controls.push({ line: 0, type: 0 }); target = 1; }
                if (g === 'CX10') { controls.push({ line: 1, type: 1 }); target = 0; }
                if (g === 'C0X10') { controls.push({ line: 1, type: 0 }); target = 0; }
                let content = '<div style="position:relative; width:100%; height:100%;">';
                const getY = (q) => q === 0 ? 25.5 : 53.5;
                content += `<div style="position:absolute; width:60%; left:20%; height:100%; background-image: linear-gradient(#463438, #463438), linear-gradient(#463438, #463438); background-size: 100% 2.5px; background-repeat: no-repeat; background-position: center 24px, center 52px; pointer-events: none;"></div>`;
                if (controls.length > 0) {
                    content += `<div class="connection-v-line" style="top:${getY(0)}px; height:${getY(1)-getY(0)}px; z-index:2;"></div>`;
                }
                if (isKidsMode) {
                    controls.forEach(ctrl => {
                        content += `<div style="position:absolute; left:50%; transform:translate(-50%, -50%); top:${getY(ctrl.line)}px; z-index:2;">${getQubitLabelHTML(ctrl.line, ctrl.type, '24px')}</div>`;
                    });
                    content += `<div style="position:absolute; left:50%; transform:translate(-50%, -50%); top:${getY(target)}px; width:28px; height:28px; display:flex; align-items:center; justify-content:center; background:#e2de6e; border: 2.5px solid #463438; border-radius:50%; box-sizing:border-box; padding:2px; z-index:6;"><img src="./image/change.svg" style="width:100%; height:100%;"></div>`;
                } else {
                    controls.forEach(ctrl => { 
                        const dotClass = ctrl.type === 1 ? 'control-dot fill' : 'control-dot empty';
                        content += `<div class="${dotClass}" style="top:${getY(ctrl.line)}px;"></div>`; 
                    });
                    content += `<div class="circuit-target" style="top:${getY(target)}px;"></div>`;
                }
                content += '</div>';
                return content;
            }
        }
        function getCircuitGateContent(g) {
            if (showMiniHypercube) {
                return getMiniSquareSVG(g);
            } else {
                let controls = [], target = -1;
                if (g === 'X0') target = 0;
                if (g === 'X1') target = 1;
                if (g === 'CX01') { controls.push({ line: 0, type: 1 }); target = 1; }
                if (g === 'C0X01') { controls.push({ line: 0, type: 0 }); target = 1; }
                if (g === 'CX10') { controls.push({ line: 1, type: 1 }); target = 0; }
                if (g === 'C0X10') { controls.push({ line: 1, type: 0 }); target = 0; }    
                let content = '';
                const getY = (q) => q === 0 ? 19 : 59;
                if (controls.length > 0) {
                    content += `<div class="connection-v-line" style="top:${getY(0)}px; height:${getY(1)-getY(0)}px; z-index:5;"></div>`;
                }    
                if (isKidsMode) {
                    controls.forEach(ctrl => {
                        content += `<div style="position:absolute; left:50%; transform:translate(-50%, -50%); top:${getY(ctrl.line)}px; z-index:6;">${getQubitLabelHTML(ctrl.line, ctrl.type, '32px')}</div>`;
                    });
                    content += `<div style="position:absolute; left:50%; transform:translate(-50%, -50%); top:${getY(target)}px; width:34px; height:34px; display:flex; align-items:center; justify-content:center; background:#e2de6e; border: 2.5px solid #463438; border-radius:50%; box-sizing:border-box; padding:2px; z-index:6;"><img src="./image/change.svg" style="width:100%; height:100%;"></div>`;
                } else {
                    controls.forEach(ctrl => {
                        const dotClass = ctrl.type === 1 ? 'control-dot fill' : 'control-dot empty';
                        content += `<div class="${dotClass}" style="top:${getY(ctrl.line)}px;"></div>`;
                    });
                    content += `<div class="circuit-target" style="top:${getY(target)}px;"></div>`;
                }
                return content;
            }
        }
        function updateGateButtonsUI() {
            const gates = ['X0', 'X1', 'CX10', 'CX01', 'C0X10', 'C0X01'];
            gates.forEach(g => {
                const btn = document.getElementById('gate-' + g.toLowerCase());
                if (!btn) return;      
                const hex = getGateColorMap(g);
                btn.style.backgroundColor = getRgba(hex, 0.35);
                btn.style.backgroundImage = 'none';
                btn.innerHTML = getGateContent(g);
            });
        }
        function renderCircuit() {
            const c = document.getElementById('circuit-content'); 
            const wrapper = document.getElementById('circuit-content-wrapper');
            c.innerHTML = '';
            gateHistory.forEach((g, idx) => {
                const u = document.createElement('div');
                u.className = 'circuit-unit' + (selectedIndices.includes(idx) ? ' selected' : ''); 
                const hex = getGateColorMap(g);
                u.style.setProperty('--bg-hover', getRgba(hex, 0.35));
                u.style.setProperty('--border-color', getRgba(hex, 1));      
                u.draggable = !isSolved;      
                u.ondragstart = (e) => {
                    if (isVerticalSwipe || isSolved) {
                        e.preventDefault();
                        return false;
                    }
                    draggedIndex = idx;
                    e.dataTransfer.effectAllowed = 'move';
                    e.dataTransfer.setData('text/plain', idx.toString());
                    
                    if (currentDragGhost && currentDragGhost.parentNode) {
                        currentDragGhost.parentNode.removeChild(currentDragGhost);
                    }
                    currentDragGhost = u.cloneNode(true);
                    currentDragGhost.style.position = 'absolute';
                    currentDragGhost.style.top = '-10000px';
                    currentDragGhost.style.left = '-10000px';
                    currentDragGhost.style.backgroundColor = 'transparent';
                    currentDragGhost.style.border = 'none';
                    currentDragGhost.classList.remove('selected');
                    document.body.appendChild(currentDragGhost);
                    e.dataTransfer.setDragImage(currentDragGhost, u.offsetWidth / 2, u.offsetHeight / 2);
                    setTimeout(() => { u.style.opacity = '0.01'; }, 0);
                };      
                u.ondragend = (e) => { 
                    e.target.style.opacity = '1'; 
                    draggedIndex = null; 
                    scrollSpeed = 0; 
                    Array.from(document.querySelectorAll('.circuit-unit')).forEach(el => {
                        el.classList.remove('drop-hint-left', 'drop-hint-right');
                        el.style.transform = '';
                    });          
                    if (currentDragGhost && currentDragGhost.parentNode) {
                        currentDragGhost.parentNode.removeChild(currentDragGhost);
                        currentDragGhost = null;
                    }
                };         
                u.onmouseover = () => syncGateHighlight(g, true);
                u.onmouseout = () => syncGateHighlight(g, false);             
                u.oncontextmenu = (e) => {
                    e.preventDefault();
                    if (isSolved) return;
                    if (selectedIndices.includes(idx)) selectedIndices = selectedIndices.filter(i => i !== idx);
                    else selectedIndices.push(idx);
                    renderCircuit();
                };
                let startY, startX;
                let isVerticalSwipe = false;
                let swipeDirectionLocked = false;
                u.addEventListener('touchstart', (e) => {
                    if (e.touches.length === 1) {
                        startY = e.touches[0].clientY;
                        startX = e.touches[0].clientX;
                        isVerticalSwipe = false;
                        swipeDirectionLocked = false;
                    }
                }, { passive: true });         
                u.addEventListener('touchmove', (e) => {
                    if (startY === undefined) return;
                    const dy = e.touches[0].clientY - startY;
                    const dx = e.touches[0].clientX - startX;          
                    if (!swipeDirectionLocked && (Math.abs(dx) > 3 || Math.abs(dy) > 3)) {
                        swipeDirectionLocked = true;
                        if (Math.abs(dy) > Math.abs(dx)) {
                            isVerticalSwipe = true;
                        } else {
                            startY = undefined; 
                            return;
                        }
                    }
                    if (isVerticalSwipe) {
                        try { if (e.cancelable) e.preventDefault(); } catch(err) {}  
                        if (Math.abs(dy) > 40) {
                            const triggerDy = dy;
                            startY = undefined;
                            isVerticalSwipe = false;
                            if (triggerDy > 40) {
                                const sIdx = selectedIndices.indexOf(idx);
                                if (sIdx > -1) selectedIndices.splice(sIdx, 1);
                                else selectedIndices.push(idx);
                                renderCircuit();
                            } else if (triggerDy < -40) {
                                syncGateHighlight(g, false);
                                selectedIndices = [];
                                deleteGate(idx);
                            }
                        }
                    }
                }, { passive: false });
                u.addEventListener('touchend', (e) => {
                    startY = undefined;
                    isVerticalSwipe = false;
                    swipeDirectionLocked = false;
                });
                if (!isTouchDevice) {
                    u.onclick = (e) => {
                        if (isSolved) return;
                        syncGateHighlight(g, false);
                        selectedIndices = [];
                        deleteGate(idx);
                    };
                }
                u.innerHTML = getCircuitGateContent(g);
                c.appendChild(u);
            });
            c.ondragover = (e) => {
                e.preventDefault();
                updateScrollSpeed(e.clientX);
                if (draggedIndex === null || isSolved) return;
                const units = Array.from(c.querySelectorAll('.circuit-unit'));
                const cRect = c.getBoundingClientRect();
                const mouseX = e.clientX - cRect.left;
                let currentX = units.length > 0 ? units[0].offsetLeft : 7;
                let visualMids = [];
                let mapping = [];                
                for (let i = 0; i < units.length; i++) {
                    if (i === draggedIndex) continue;
                    visualMids.push(currentX + units[i].offsetWidth / 2);
                    mapping.push(i);
                    currentX += units[i].offsetWidth;
                }
                let insertVisualIdx = visualMids.length;
                for (let v = 0; v < visualMids.length; v++) {
                    if (mouseX < visualMids[v]) {
                        insertVisualIdx = v;
                        break;
                    }
                }     
                let insertIdx = insertVisualIdx < mapping.length ? mapping[insertVisualIdx] : units.length;
                units.forEach(el => el.classList.remove('drop-hint-left', 'drop-hint-right'));
                if (insertIdx < units.length) {
                    units[insertIdx].classList.add('drop-hint-left');
                } else if (units.length > 0) {
                    units[units.length - 1].classList.add('drop-hint-right');
                }
                const gap = (units[0] ? units[0].offsetWidth : 60) * 0.25;
                units.forEach((unit, i) => {
                    if (i === draggedIndex) {
                        unit.style.transform = '';
                        return;
                    }
                    let shift = 0;
                    if (i > draggedIndex) shift -= gap;
                    if (i >= insertIdx) shift += gap;
                    unit.style.transform = `translateX(${shift}px)`;
                });
            };
            c.ondrop = (e) => {
                e.preventDefault();
                scrollSpeed = 0;
                const units = Array.from(c.querySelectorAll('.circuit-unit'));
                units.forEach(el => {
                    el.classList.remove('drop-hint-left', 'drop-hint-right');
                    el.style.transform = ''; 
                });               
                if (isSolved || draggedIndex === null) return;
                const cRect = c.getBoundingClientRect();
                const mouseX = e.clientX - cRect.left;
                let currentX = units.length > 0 ? units[0].offsetLeft : 7;
                let visualMids = [];
                let mapping = [];             
                for (let i = 0; i < units.length; i++) {
                    if (i === draggedIndex) continue;
                    visualMids.push(currentX + units[i].offsetWidth / 2);
                    mapping.push(i);
                    currentX += units[i].offsetWidth;
                }
                let insertVisualIdx = visualMids.length;
                for (let v = 0; v < visualMids.length; v++) {
                    if (mouseX < visualMids[v]) {
                        insertVisualIdx = v;
                        break;
                    }
                }        
                let insertIdx = insertVisualIdx < mapping.length ? mapping[insertVisualIdx] : units.length;
                pop.currentTime = 0; pop.play();
                const movedGate = gateHistory.splice(draggedIndex, 1)[0];              
                if (insertIdx > draggedIndex) {
                    insertIdx--;
                }         
                gateHistory.splice(insertIdx, 0, movedGate);
                pushHistory();
                selectedIndices = [];
                recalculatePositions();
                finishMove();
                draggedIndex = null;
            };
            updateUndoStatus(); 
            setTimeout(() => { if(wrapper) wrapper.scrollTo({ left: wrapper.scrollWidth, behavior: 'smooth' }); }, 100);
        }  
        function undo() {
            if (isSolved || historyStack.length <= 1) return;
            pop.currentTime = 0; pop.play();
            historyStack.pop();
            gateHistory = [...historyStack[historyStack.length - 1]];
            selectedIndices = []; recalculatePositions(); finishMove();
        }      
        function resetCircuit() {
            if (isSolved) return;
            pop.currentTime=0; pop.play();
            fishAtNode=[3, 2, 1, 0]; gateHistory=[]; historyStack = [[]]; selectedIndices = []; steps=0; finishMove();
        } 
        function deleteGate(idx) {
            if (isSolved) return;
            pop.currentTime=0; pop.play();
            gateHistory.splice(idx,1); pushHistory(); recalculatePositions(); finishMove();
        }       
        function updateUndoStatus() {
            const isActive = (historyStack.length > 1 && !isSolved);
            const ub = document.getElementById('undo-btn');
            if(ub) {
                if(isActive){ ub.classList.add('active'); ub.style.pointerEvents="auto"; }
                else { ub.classList.remove('active'); ub.style.pointerEvents="none"; }
            }
            const bottomUndo = document.getElementById('undo-btn-bottom');
            if(bottomUndo) {
                if(isActive) { bottomUndo.classList.add('active'); bottomUndo.style.pointerEvents="auto"; }
                else { bottomUndo.classList.remove('active'); bottomUndo.style.pointerEvents="none"; }
            }
        }       
        async function checkWin() {
            if (fishAtNode.every((pos, i) => pos === i)) {
                isSolved = true;
                updateUndoStatus();
                if (timerInterval) clearInterval(timerInterval);
                const ft = time;
                const st = steps;
                const u = sessionStorage.getItem('currentUser');
                const savedLevel = parseInt(sessionStorage.getItem('currentLevel')) || 1;
                if (savedLevel < 5) { 
                    sessionStorage.setItem('currentLevel', 5);
                }
                setTimeout(() => {
                    if(typeof meow !== 'undefined') { meow.currentTime = 0; meow.play(); }
                    document.getElementById('victoryMsg').innerText = `STEP：${st} | TIME：${ft}s`;
                    document.getElementById('victoryModal').style.display = 'flex';
                }, 800);
                if (u) {
                    fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({
                            action: 'saveRecord',
                            username: u,
                            level: 4,          
                            steps: st,
                            time: ft,
                            circuit: gateHistory.join(',')
                        })
                    }).then(() => {
                        setTimeout(fetchLeaderboard, 1200);
                    });
                }
            }
        }
        function viewInLab() {
            if (gateHistory.length === 0) {
                alert("Current circuit is empty!");
                return;
            }
            const circuitData = gateHistory.join(',');
            const labUrl = `lab2.html?circuit=${encodeURIComponent(circuitData)}`;
            window.location.href = labUrl;
        }
    </script>
