<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meowtopia - LAB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #FEF3C7; color: #000; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; }
        .hidden-el { display: none !important; }
        .main-layout { display: flex; align-items: flex-start; justify-content: center; gap: 20px; margin-top: 20px; }
        .game-canvas { position: relative; width: 1950px; height: 628px; background: #EEE8D3; border: 8px solid #000; border-radius: 40px; overflow: hidden; }
        .node { width: 130px; height: 130px; background: white; border: 6px solid #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: absolute; box-shadow: 3px 3px 0 #000; z-index: 20; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .node img { width: 100px; height: auto; pointer-events: none; }
        .fixed-number { position: absolute; bottom: -4px; right: 41px; font-size: 20px; font-weight: 900; color: #000; pointer-events: none; z-index: 25; }
        .connection-line { position: absolute; background: #000; z-index: 10; cursor: pointer; transition: all 0.2s ease; opacity: 1; }
        .connection-line:hover { background: #ffc822 !important; box-shadow: 0 0 15px rgba(251, 191, 36, 0.8); height: 10px !important; z-index: 16; }
        .line-highlight { background: #ffc822 !important; box-shadow: 0 0 15px rgba(251, 191, 36, 0.8) !important; height: 8px !important; z-index: 15; }
        .fish-wrapper { position: absolute; width: 80px; pointer-events: none; z-index: 30; display: flex; flex-direction: column; align-items: center; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .fish-wrapper img { width: 70px; height: auto; }
        .fish-label { background: #000000b6; color: #fff; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; margin-bottom: -45px; z-index: 5; position: relative; top: -8px; }
        .trace-line-active { background: #ffc822 !important; box-shadow: 0 0 15px rgba(251, 191, 36, 1) !important; height: 8px !important; z-index: 16 !important; opacity: 1 !important; border-top: none !important; }
        .trace-fish-active { filter: drop-shadow(0 0 12px rgba(255, 200, 34, 0.8)) drop-shadow(0 0 20px rgba(255, 200, 34, 1)) !important; transform: scale(1.15) !important; z-index: 45 !important; }
        #pro-panel { width: 280px; opacity: 1; height: 628px; background: #fff; border: 8px solid #000; border-radius: 40px; padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 0px; flex-shrink: 0; box-sizing: border-box; }
        .panel-section-title { font-weight: 900; font-size: 18px; margin: 5px 0; color: #000; text-align: center; white-space: nowrap; }
        .game-btn { cursor: pointer; border: 5px solid #000; border-radius: 60px; padding: 12px; font-size: 26px; font-weight: 900; color: #fff; text-shadow: 2px 2px 0 #000; box-shadow: 0 4px 0 #000; position: relative; transition: all 0.1s; display: inline-block; }
        .game-btn:active { top: 6px; box-shadow: 0 2px 0 #000; }
        .btn-red { background: #EF4444; }
        .btn-green { background: #22C55E; }
        .multi-toggle-btn { background: #c76419; border: 4px solid #000; border-radius: 20px; padding: 5px 15px; font-weight: 900; font-size: 20px; color: white; cursor: pointer; box-shadow: 0 4px 0 #000; transition: all 0.1s; min-width: 140px; }
        .multi-toggle-btn.mode-2 { background: #2b66e5; }
        .multi-toggle-btn.mode-4 { background: #A855F7; }
        .view-btn { background: #475569; }
        .func-btn { width: 100%; margin-top: 5px; padding: 14px; border-radius: 35px; font-weight: 900; font-size: 16px; border: 2.5px solid #000; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.1); }
        .btn-reset { background: #e0e0e0; color: #000; }
        .btn-undo { background: #e8a098 !important; color: #fff !important; border: 2.5px solid #cb867d !important; opacity: 0.6; cursor: not-allowed; pointer-events: none; }
        .btn-undo.active { background: #EF4444 !important; border-color: #000 !important; color: #fff !important; opacity: 1; cursor: pointer; box-shadow: 0 4px 0 #000; pointer-events: auto; }
        .gate-btn-v2:hover, .func-btn:hover { background-color: #fee58b !important; border-color: #000 !important; transform: translateY(-2px); box-shadow: 0 3px 0 #000; }
        .btn-undo.active:hover { background-color: #f05a5a !important; }
        #circuit-area { width: 1024px; height: 210px; opacity: 1; background: #fff; border: 8px solid #000; border-radius: 30px; padding: 15px; margin-top: 20px; position: relative; overflow: hidden; }
        #circuit-content-wrapper { position: relative; height: 180px; overflow-x: auto; margin-left: 45px; margin-right: 12px; scrollbar-width: none; }
        #circuit-content { display: flex; height: 100%; padding: 0 10px; min-width: 100%; width: max-content; position: relative; }
        .qubit-label { position: absolute; left: 19px; font-weight: 900; font-size: 18px; color: #000; width: 25px; text-align: center; }
        .qubit-label.right-side { left: auto !important; right: 16px !important; color: #EF4444 !important; font-weight: 900; }
        .circuit-unit { min-width: 55px; height: 140px; display: flex; flex-direction: column; position: relative; cursor: pointer; transition: all 0.2s; }
        .circuit-unit:hover { background: rgba(239, 68, 68, 0.15); border-radius: 12px; }
        .circuit-unit.selected-gate { background: rgba(40, 180, 255, 0.3) !important; border-radius: 12px; box-shadow: inset 0 0 0 2px #2a5cad; }
        .circuit-unit.trace-active { background: rgba(251, 214, 119, 0.508) !important; box-shadow: inset 0 0 0 3px #ffc822; border-radius: 12px; z-index: 100 !important; }
        .control-dot { width: 14px; height: 14px; background: #000; border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); }
        .connection-v-line { position: absolute; width: 2.5px; background: #000; left: 50%; transform: translateX(-50%); }
        .circuit-target { position: absolute; width: 24px; height: 24px; border-radius: 50%; background: #fff; border: 2.5px solid #000; left: 50%; transform: translate(-50%, -50%); }
        .circuit-target::before { content: ""; position: absolute; width: 2.5px; height: 100%; background: #000; left: 50%; transform: translateX(-50%); }
        .circuit-target::after { content: ""; position: absolute; width: 100%; height: 2.5px; background: #000; top: 50%; transform: translateY(-50%); }
        #gate-scroll-area { margin-top: 5px; max-height: 400px; overflow-y: auto; width: 100%; padding: 5px; scrollbar-width: none; }
        #ios-indicator { position: absolute; top: 0; left: 0; transform: translate(-50%, -120%) scale(0.8); background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); border-radius: 50px; padding: 6px 18px; display: flex; align-items: center; box-shadow: 0 8px 24px rgba(0,0,0,0.1); opacity: 0; transition: opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1), transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1000; pointer-events: none; border: 1px solid rgba(255, 255, 255, 0.3); }
        #ios-indicator.active { opacity: 1; transform: translate(-50%, -120%) scale(1); }
        .ind-fraction { color: #000; font-size: 16px; font-weight: 900; }
        .ind-label { display: none !important; }
        .gate-btn-v2 { position: relative; height: 60px; width: 45px; display: flex; align-items: center; justify-content: center; background-image: linear-gradient(#000,#000), linear-gradient(#000,#000), linear-gradient(#000,#000); background-size: 60% 1.5px; background-repeat: no-repeat; background-position: center 15px, center 30px, center 45px; padding: 0; border: 2px solid #000; cursor: pointer; transition: all 0.2s; border-radius: 8px; margin: auto; }
        .gate-btn-v2:hover { background-color: #f0f0f0; transform: scale(1.05); z-index: 10; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .gate-v-line { position: absolute; width: 1.5px; background: #000; left: 50%; transform: translateX(-50%); z-index: 1; }
        .gate-dot { position: absolute; width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid #000; left: 50%; transform: translate(-50%, -50%); z-index: 2; }
        .gate-dot.fill { background: #000; }
        .gate-dot.empty { background: #fff; }
        .gate-target-circle { position: absolute; width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid #000; background: #fff; left: 50%; transform: translate(-50%, -50%); z-index: 3; }
        .gate-target-circle::before { content: ''; position: absolute; width: 100%; height: 1.5px; top: 50%; left: 0; transform: translateY(-50%); background: #000; }
        .gate-target-circle::after { content: ''; position: absolute; height: 100%; width: 1.5px; left: 50%; top: 0; transform: translateX(-50%); background: #000; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        #tt-body { font-family: Arial, sans-serif; }
        #tt-body tr { transition: all 0.2s ease; }
        #tt-body td:first-child { border-top-left-radius: 12px; border-bottom-left-radius: 12px; }
        #tt-body td:last-child { border-top-right-radius: 12px; border-bottom-right-radius: 12px; }
        #tt-body tr:hover td { background-color: rgba(0, 0, 0, 0.05); cursor: pointer; }
        #tt-body tr.active-trace td { background-color: #fdcd52 !important; color: #000 !important; }
        #tt-view-container { padding: 0px; }
        #tt-view-container .panel-section-title { margin-bottom: 10px; }
        #circuit-content { padding-right: 40px; }
        #trace-controls { display: flex; align-items: center; justify-content: space-between; background: #e7e5dc; border-radius: 40px; padding: 10px 4px; gap: 4px; margin-top: 8px; margin-bottom: 15px; border: 2.5px solid #000; }
        #trace-controls .func-btn { margin: 0; padding: 15px 13px; font-size: 16px; border-radius: 50px; background: #e7e5dc; color: white; }
        #trace-controls .btn-red { background: #ef4444; border-color: #b91c1c; }
        #trace-step-text { color: #000000; font-family: 'Courier New', monospace; font-size: 24px; }
        #trace-controls span.text-green-700 { color: #d00000; font-size: 14px; }
        .btn-share { background: #059669; border: 4px solid #000; border-radius: 30px; padding: 5px 15px; font-weight: 900; font-size: 20px; color: white; cursor: pointer; box-shadow: 0 4px 0 #000; transition: all 0.1s; min-width: 140px; }
        .btn-share:hover { background-color: #3ea786 !important; }
        /* 懸浮切換按鈕樣式 */
        .nav-fab { position: fixed; top: 25px; right: 25px; width: 65px; height: 65px; background: #349fec; border: 5px solid #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 900; color: white; cursor: pointer; box-shadow: 0 4px 0 #000; z-index: 1000; transition: all 0.1s; text-shadow: 2px 2px 0 #000; }
        .nav-fab:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #000; }
        .nav-fab:active { transform: translateY(4px); box-shadow: 0 0px 0 #000; }
    </style>
</head>
<body id="body-root">
    <button onclick="window.location.href='lab4.html'" class="nav-fab" title="Go to 4-Bit">4</button>
    <div class="w-full max-w-5xl">
        <div class="flex w-full px-4 mb-4 items-center">
            <div class="text-3xl font-black">GATE COUNT: <span id="step-count">0</span></div>
            <div class="flex items-center gap-6 ml-auto">
                <button id="view-toggle-btn" class="multi-toggle-btn view-btn" onclick="toggleTraceMode()">Trace: OFF</button>
                <button id="mode-btn" class="multi-toggle-btn" onclick="cycleLineMode()">Mode: 1</button>
                <div class="text-3xl font-black text-green-600">LAB MODE</div>
            </div>
        </div>
        <div class="main-layout">
            <div id="pro-panel">
                <div id="gate-view-container" class="w-full flex-col flex h-full min-h-0">
                    <div class="panel-section-title">Quantum Gates</div>
                    <div id="gate-scroll-area">
                        <div class="grid grid-cols-4 gap-1 w-full" id="gate-grid"></div>
                    </div>
                    <div class="mt-auto w-full">
                        <div class="panel-section-title">Control</div>
                        <button class="func-btn btn-reset" onclick="resetCircuit()">Reset Circuit</button>
                        <button id="undo-btn" class="func-btn btn-undo" onclick="undo()">Undo Step</button>
                    </div>
                </div>
                <div id="tt-view-container" class="w-full flex-col hidden-el h-full flex" style="max-height: 100%; overflow: hidden;">
                    <div class="panel-section-title shrink-0 mt-2">Truth Table</div>
                    <div class="text-lg text-gray-400 text-center mb-2 font-bold flex justify-between px-8 shrink-0 border-b border-black-100 pb-2">
                        <span class="w-1/2 text-left text-black">INPUT</span>
                        <span class="w-1/2 text-right text-black">OUTPUT</span>
                    </div>
                    <div class="overflow-y-auto w-full flex-grow px-2 mb-2 custom-scrollbar" style="scrollbar-width: none;">
                        <table class="w-full text-center text-lg border-separate border-spacing-y-1">
                            <tbody id="tt-body" class="font-bold">
                                </tbody>
                        </table>
                    </div>
                </div>
                <div id="trace-controls" class="hidden-el shrink-0 w-full mt-auto flex gap-1 items-center bg-gray-100 p-2 rounded-2xl border-4 border-black shadow-[0_4px_0_0_rgba(0,0,0,0.1)] opacity-50 pointer-events-none transition-opacity">
                    <button class="func-btn btn-reset m-0 py-2 px-1 text-xs hover:bg-yellow-200 flex-1" style="box-shadow: 0 2px 0 #000;" onclick="traceMove(-1)">◀</button>
                    <div class="flex flex-col items-center justify-center px-1 min-w-[50px]">
                        <span class="text-[10px] font-black text-green-700 leading-none">STEP</span>
                        <span id="trace-step-text" class="font-black text-lg leading-none">0</span>
                    </div>
                    <button class="func-btn btn-reset m-0 py-2 px-1 text-xs hover:bg-yellow-200 flex-1" style="box-shadow: 0 2px 0 #000;" onclick="traceMove(1)">▶</button>
                    <button class="func-btn btn-red m-0 py-2 px-1 text-xs text-white border-black flex-1" style="box-shadow: 0 2px 0 #000;" onclick="exitTrace()">EXIT</button>
                </div>
            </div>
            <div class="game-canvas" id="main-canvas">
                <div id="ios-indicator">
                    <span class="ind-fraction" id="ind-fraction">1 / 3</span>
                    <span class="ind-label" id="ind-label"></span>
                </div>
                <div id="lines-layer"></div>
                <div id="nodes-layer"></div>
                <div id="fishes-layer"></div>
            </div>
        </div>
        <div id="circuit-area" class="mx-auto">
            <div class="circuit-title font-black text-xl text-center">Circuit Diagram</div>
            <div id="q-in-0" class="qubit-label" style="top: 60px;">q0</div>
            <div id="q-in-1" class="qubit-label" style="top: 100px;">q1</div>
            <div id="q-in-2" class="qubit-label" style="top: 140px;">q2</div>
            <div id="q-out-0" class="qubit-label right-side hidden-el" style="top: 60px;"></div>
            <div id="q-out-1" class="qubit-label right-side hidden-el" style="top: 100px;"></div>
            <div id="q-out-2" class="qubit-label right-side hidden-el" style="top: 140px;"></div>
            <div id="circuit-content-wrapper"><div id="circuit-content"></div></div>
        </div>
        <div class="w-full flex justify-center items-center gap-6 mt-6 mb-6">
            <a href="index.html" class="game-btn btn-red px-16">EXIT LAB</a>
            <button class="btn-share" onclick="shareCircuit()" style="padding: 12px 24px;">Share Circuit</button>
        </div>
    </div>
    <script>
        let initialFishAtNode = Array.from({ length: 8 }, (_, i) => i);
        let isTraceMode = false;
        let activeTraceInput = null;
        let currentTraceStep = 0;
        let gateCount = 0, gateHistory = [];
        let selectedIndices = [], actionStack = [];
        let fishAtNode = [];    
        let lineMode = 1, hoverLine = null;
        let currentOptionIndex = 0, currentOptions = [], draggedIndex = null;
        const pop = new Audio('pop.m4a');
        const baseOffsetY = 130;
        const side = 220;
        const offsetPro = 165;


        // 重新定義 3-bit 的節點位置 (共 8 個點)
        const nodePositions = Array.from({ length: 8 }, (_, i) => {
            let x = (i & 1) ? side : 0;
            let y = (i & 2) ? side : 0;
            // 處理第 3 個 bit (i & 4) 的偏移
            if (i & 4) {
                x += (i & 1) ? 160 : -140;
                y += (i & 2) ? 110 : -110;
            }
            // 移除原本 i & 8 的 hyperOffset，因為 3-bit 不需要
            const pos = { t: y + baseOffsetY, relX: x };
            Object.defineProperty(pos, 'l', { get: () => pos.relX + offsetPro });
            return pos;
        });


        window.onload = () => {
            initLabData();
            initGameLayout();
            initGates();
            drawStaticLines();
            recalculate();
           
            document.getElementById('circuit-content-wrapper').addEventListener('wheel', (e) => {
                e.preventDefault();
                e.currentTarget.scrollLeft += e.deltaY;
            });
            document.addEventListener('wheel', (e) => {
                if (!hoverLine || lineMode === 1) return;
                e.preventDefault();
                if (e.deltaY > 0) currentOptionIndex = (currentOptionIndex + 1) % currentOptions.length;
                else currentOptionIndex = (currentOptionIndex - 1 + currentOptions.length) % currentOptions.length;
                showIndicator();
            }, { passive: false });


            const canvas = document.getElementById('main-canvas');
            const indicator = document.getElementById('ios-indicator');
            canvas.addEventListener('mousemove', (e) => {
                if (indicator.classList.contains('active')) {
                    const rect = canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    indicator.style.left = x + 'px';
                    indicator.style.top = (y - 15) + 'px';
                }
            });
        };


        function initLabData() {
            const urlParams = new URLSearchParams(window.location.search);
            const sharedCircuit = urlParams.get('circuit');
            try {
                if (sharedCircuit) {
                    gateHistory = sharedCircuit.split(',').filter(g => g !== "");
                } else {
                    const savedCircuit = sessionStorage.getItem('labCircuit');
                    if (savedCircuit) gateHistory = savedCircuit.split(',').filter(g => g !== "");
                }
            } catch (e) {
                console.log("Initialization failed. Opening an empty lab instead.");
            }
        }


        function toggleTraceMode() {
            isTraceMode = !isTraceMode;
            const btn = document.getElementById('view-toggle-btn');
            const gView = document.getElementById('gate-view-container');
            const tView = document.getElementById('tt-view-container');
            const tCtrl = document.getElementById('trace-controls');
            if (isTraceMode) {
                btn.innerText = "Trace: ON";
                btn.classList.add('mode-2');
                gView.classList.add('hidden-el');
                tView.classList.remove('hidden-el');
                tCtrl.classList.remove('hidden-el', 'opacity-50', 'pointer-events-none');
                renderTruthTable();
            } else {
                btn.innerText = "Trace: OFF";
                btn.classList.remove('mode-2');
                gView.classList.remove('hidden-el');
                tView.classList.add('hidden-el');
                tCtrl.classList.add('hidden-el', 'opacity-50', 'pointer-events-none');
                exitTrace();
            }
        }


        function startTrace(inputIndex) {
            if(typeof pop !== 'undefined' && pop.play) { pop.currentTime = 0; pop.play().catch(e=>{}); }
            activeTraceInput = inputIndex;
            currentTraceStep = 0;
            document.getElementById('trace-controls').classList.remove('opacity-50', 'pointer-events-none');
            updateTruthTable();
            renderTraceStep();
        }


        function traceMove(delta) {
            if(typeof pop !== 'undefined' && pop.play) { pop.currentTime = 0; pop.play().catch(e=>{}); }
            currentTraceStep += delta;
            if (currentTraceStep < 0) currentTraceStep = 0;
            if (currentTraceStep > gateHistory.length) currentTraceStep = gateHistory.length;
            renderTraceStep();
        }


        function exitTrace() {
            if(typeof pop !== 'undefined' && pop.play) { pop.currentTime = 0; pop.play().catch(e=>{}); }
            activeTraceInput = null;
            document.getElementById('trace-controls').classList.add('opacity-50', 'pointer-events-none');
            document.querySelectorAll('.trace-line-active').forEach(el => el.classList.remove('trace-line-active'));
            document.querySelectorAll('.trace-fish-active').forEach(el => el.classList.remove('trace-fish-active'));
           
            // 修正為 3 個 qubit 標籤
            for(let i=0; i<3; i++) {
                const labelIn = document.getElementById(`q-in-${i}`);
                const labelOut = document.getElementById(`q-out-${i}`);
                if(labelIn) labelIn.innerText = `q${i}`;
                if(labelOut) labelOut.classList.add('hidden-el');
            }
            updateTruthTable();
            if (typeof finishMove === "function") finishMove();
        }


        function renderTraceStep() {
            if (activeTraceInput === null) return;
            let prevNode = activeTraceInput;
            let currNode = activeTraceInput;
            for(let k = 0; k < currentTraceStep; k++) {
                prevNode = currNode;
                let pm = getPermutationForGate(gateHistory[k]);
                currNode = pm[currNode];
            }
            let trackedFishId = initialFishAtNode[activeTraceInput];
            let f = document.getElementById(`fish-${trackedFishId}`);
            let n = nodePositions[currNode];
            if (f && n) {
                f.style.top = (n.t + 78) + "px";
                f.style.left = (n.l + 22) + "px";
            }
            document.querySelectorAll('.trace-line-active').forEach(el => el.classList.remove('trace-line-active'));
            document.querySelectorAll('.trace-fish-active').forEach(el => el.classList.remove('trace-fish-active'));
            if (f) f.classList.add('trace-fish-active');
            if (currentTraceStep > 0 && prevNode !== currNode) {
                let lineId = `line-${Math.min(prevNode, currNode)}-${Math.max(prevNode, currNode)}`;
                let lineEl = document.getElementById(lineId);
                if (lineEl) lineEl.classList.add('trace-line-active');
            }
            updateFishVisibility();
           
            // 3-bit 填充
            let inBin = activeTraceInput.toString(2).padStart(3, '0');
            let finalNode = activeTraceInput;
            for(let k = 0; k < gateHistory.length; k++) {
                let pm = getPermutationForGate(gateHistory[k]);
                finalNode = pm[finalNode];
            }
            let outBin = finalNode.toString(2).padStart(3, '0');
           
            // 更新 3 個 qubit 的狀態顯示
            for(let i = 0; i < 3; i++) {
                const qIn = document.getElementById(`q-in-${i}`);
                const qOut = document.getElementById(`q-out-${i}`);
                if(qIn) qIn.innerText = inBin[i];
                if(qOut) {
                    qOut.innerText = outBin[i];
                    qOut.classList.remove('hidden-el');
                }
            }
            document.getElementById('trace-step-text').innerText = currentTraceStep;
            if (typeof renderCircuit === "function") renderCircuit();
           
            const activeGate = document.querySelector('.circuit-unit.trace-active');
            if (activeGate) {
                activeGate.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        }


        function updateFishVisibility() {
            // 迴圈改為 8
            for (let i = 0; i < 8; i++) {

        function highlightByGate(type) {
            clearHighlight();

            // 使用正則或字串解析 level8 格式
            let ctrl = [], target = -1, zero = [];
            if (type.startsWith('X')) {
                target = parseInt(type[1]);
            } else if (type.startsWith('CX')) {
                ctrl = [parseInt(type[2])]; target = parseInt(type[3]);
            } else if (type.startsWith('C0X')) {
                ctrl = [parseInt(type[3])]; target = parseInt(type[4]); zero = [parseInt(type[3])];
            } else if (type.startsWith('TOF')) {
                let s = type.replace('TOF', '').split('_')[0];
                let parts = [];
                for (let i = 0; i < s.length; i++) {
                    if (s[i + 1] === 'p') {
                        parts.push({ v: parseInt(s[i]), p: true }); i++;
                    } else parts.push({ v: parseInt(s[i]), p: false });
                }
                target = parts.pop().v;
                parts.forEach(p => {
                    ctrl.push(p.v);
                    if (p.p) zero.push(p.v);

                for (let k = 0; k < 8; k++) {
                    if ((k & tBit) === 0) { // 只找 target bit 為 0 的，另一半用 XOR 找
                        let match = cConfigs.every(cfg => ((k & cfg.bit) ? 1 : 0) === cfg.val);
                        if (match) pairs.push([k, k ^ tBit]);

            }

        }
        function initGates() {

        }
            function drawStaticLines() {
                const layer = document.getElementById('lines-layer');
                layer.innerHTML = '';
                for (let i = 0; i < 8; i++) {
                    for (let b = 0; b < 3; b++) {

                    }
                }
            }
            function createLine(i, j, dim) {
                const n1 = nodePositions[i], n2 = nodePositions[j];
                const x1 = n1.l + 65, y1 = n1.t + 60, x2 = n2.l + 65, y2 = n2.t + 60;

                line.onmouseenter = () => {

               line.onclick = (e) => {
                e.stopPropagation();
                if(lineMode === 1) {
                    const targetBit = 2 - dim;
                    const otherBits = [0, 1, 2].filter(b => b !== targetBit);
                    const cv1 = (i & (1 << (2 - otherBits[0]))) ? 1 : 0;
                    const cv2 = (i & (1 << (2 - otherBits[1]))) ? 1 : 0;
                    // Mode 1 直接生成 TOF 閘，不會再是空白了
                    applyGate(`TOF_${cv1}_${cv2}_${otherBits[0]}_${otherBits[1]}_${targetBit}`);
                }
                else if(currentOptions[currentOptionIndex]) applyGate(currentOptions[currentOptionIndex].gateType);
            };
                document.getElementById('lines-layer').appendChild(line);
            }
            function cycleLineMode(){
                const modes = [1, 2, 4];
                lineMode = modes[(modes.indexOf(lineMode) + 1) % modes.length];
                const btn = document.getElementById('mode-btn');
                btn.innerText = `Mode: ${lineMode}`;
                btn.className = `multi-toggle-btn mode-${lineMode}`;
                hideIndicator();
            }
            function showIndicator() {
                const pill = document.getElementById('ios-indicator'), frac = document.getElementById('ind-fraction'), label = document.getElementById('ind-label');
                const opt = currentOptions[currentOptionIndex];
                if (!opt) return;
                frac.innerText = `${currentOptionIndex + 1} / ${currentOptions.length}`;
                label.innerText = opt.label;

                clearHighlight();

            }
            function hideIndicator() { document.getElementById('ios-indicator').classList.remove('active'); clearHighlight(); }
            function buildGateOptions(i, j, dim) {
            const diff = i ^ j;
            const targetBit = (diff === 4) ? 0 : (diff === 2) ? 1 : 2;
            const otherBits = [0, 1, 2].filter(b => b !== targetBit);
            const options = [];


            if (lineMode === 4) {
                options.push({
                    gateType: `X_${targetBit}`,
                    label: `X Gate: q${targetBit}`,
                    highlightPairs: getAllPairs(2 - targetBit)
                });
            } else if (lineMode === 2) {
                otherBits.forEach(ctrlBit => {
                    const ctrlMask = 1 << (2 - ctrlBit);
                    const ctrlVal = (i & ctrlMask) ? 1 : 0;
                    const gateType = `CX_${ctrlVal}_${ctrlBit}_${targetBit}`;
                   
                    let pairs = [];
                    const bit = 1 << (2 - targetBit);
                    for (let k = 0; k < 8; k++) {
                        if ((k & bit) === 0 && ((k & ctrlMask) ? 1 : 0) === ctrlVal) {
                            pairs.push([k, k ^ bit]);
                        }
                    }


                    options.push({
                        gateType: gateType,
                        label: `CNOT: q${ctrlBit}=${ctrlVal} → q${targetBit}`,
                        highlightPairs: pairs
                    });
                });
            }
            return options;
        }
            function getAllPairs(dim){
                const bit=1<<dim, pairs=[];
                for(let k=0;k<8;k++) if((k&bit)===0) pairs.push([k,k^bit]);
                return pairs;
            }
            function highlightPairs(pairs){
                clearHighlight();
                pairs.forEach(([a,b])=>{
                    const el=document.getElementById(`line-${Math.min(a,b)}-${Math.max(a,b)}`);
                    if(el) el.classList.add('line-highlight');
                });
            }
            function clearHighlight(){ document.querySelectorAll('.connection-line').forEach(l=>l.classList.remove('line-highlight')); }
            function applyGate(type) {
                // 統一轉換成 level8 縮寫格式
                let gateStr = type.includes('_') ? convertToLevel8Format(type) : type;

                if (selectedIndices.length > 0) {
                    // --- 替換模式 ---
                    // 由大到小排序索引，避免 splice 導致索引偏移
                    selectedIndices.sort((a, b) => b - a);
                    
                    // 保留最前面的一個索引來放置新 Gate，其餘刪除
                    const replaceIdx = selectedIndices.pop();
                    selectedIndices.forEach(idx => gateHistory.splice(idx, 1));
                    
                    gateHistory[replaceIdx] = gateStr;
                    selectedIndices = []; // 清空選取
                } else {
                    // --- 新增模式 ---
                    gateHistory.push(gateStr);
                }
                if(typeof pop !== 'undefined' && pop.play) { pop.currentTime = 0; pop.play().catch(e=>{}); }
                recalculate(); // 重新計算魚的位置與更新 UI
            }

            // 格式轉換輔助
            function convertToLevel8Format(g) {
                let p = g.split('_');
                if (p[0] === 'X') return `X${p[1]}`;
                if (p[0] === 'CX') return (p[1] === "0" ? `C0X${p[2]}${p[3]}` : `CX${p[2]}${p[3]}`);
                if (p[0] === 'TOF') {
                    let p1 = (p[1] === "0" ? "p" : ""), p2 = (p[2] === "0" ? "p" : "");
                    return `TOF${p[3]}${p1}${p[4]}${p2}${p[5]}`;
                }
                return g;
            }
            function getPermutationForGate(gateString) {
                let parts = gateString.split('_');
                let type = parts[0];

                // 處理 SWAP 邏輯 (無論是單獨的 SWAP 還是 Gate 後綴的 SWAP)
                let swapPart = parts.find(p => p === 'SWAP');
                let swapIndices = [];
                if (swapPart) {
                    let sIdx = parts.indexOf('SWAP');
                    swapIndices = [parseInt(parts[sIdx + 1]), parseInt(parts[sIdx + 2])];
                }

                // 產生 8 節點的置換陣列
                let permutation = Array.from({ length: 8 }, (_, p) => {
                    let b = p.toString(2).padStart(3, '0').split('').map(Number);
                    
                    // 1. 處理 Gate 邏輯
                    if (type.startsWith('X')) {
                        b[parseInt(type[1])] ^= 1;
                    } 
                    else if (type.startsWith('CX')) {
                        // 格式範例: CX01 (控制位0, 目標1) 或 CX1p0 (控制位1反轉, 目標0)
                        // 簡化解析：level8 的 CX 格式通常是 CX[ctrl][target]，若是反轉會寫成 C0X
                        if (type.startsWith('C0X')) {
                            if (b[parseInt(type[3])] === 0) b[parseInt(type[4])] ^= 1;
                        } else {
                            if (b[parseInt(type[2])] === 1) b[parseInt(type[3])] ^= 1;
                        }
                    } 
                    else if (type.startsWith('TOF')) {
                        // 解析 level8 的 TOF 格式 (例如 TOF1p20)
                        // 規則：數字代表 index，後面接 'p' 代表控制值為 0，否則為 1
                        let s = type.replace('TOF', '');
                        let controls = [];
                        let target = -1;
                        
                        let tempParts = [];
                        for (let i = 0; i < s.length; i++) {
                            if (s[i + 1] === 'p') {
                                tempParts.push({ idx: parseInt(s[i]), val: 0 }); i++;
                            } else {
                                tempParts.push({ idx: parseInt(s[i]), val: 1 });
                            }
                        }
                        // 最後一個是 target
                        target = tempParts.pop().idx;
                        controls = tempParts;

                        let condition = controls.every(c => b[c.idx] === c.val);
                        if (condition) b[target] ^= 1;
                    }

                    let outIdx = parseInt(b.join(''), 2);
                    return outIdx;
                });

                // 2. 如果有 SWAP，在 Gate 運算後執行交換
                if (swapIndices.length === 2) {
                    let finalPerm = new Array(8);
                    // 先複製目前的映射
                    for(let i=0; i<8; i++) finalPerm[i] = permutation[i];
                    
                    // 執行 SWAP：這是在節點位置層級進行交換
                    // 注意：這裡的邏輯需與 executeLogic 配合
                    let [iA, iB] = swapIndices;
                    let pm = Array.from({ length: 8 }, (_, i) => i);
                    [pm[iA], pm[iB]] = [pm[iB], pm[iA]];
                    
                    return permutation.map(target => pm[target]);
                }

                return permutation;
            }
            function executeLogic(type) {
                let pm = getPermutationForGate(type);
                let newFish = new Array(8);
                for (let i = 0; i < 8; i++) newFish[pm[i]] = fishAtNode[i];
                fishAtNode = newFish;
            }


            function recalculate() {
                fishAtNode = [...initialFishAtNode];
                let h = [...gateHistory]; gateHistory = [];
                h.forEach(g => { executeLogic(g); gateHistory.push(g); });
                gateCount = gateHistory.length;

            }
            function finishMove() {
                document.getElementById('step-count').innerText = gateCount;
                updateTruthTable();

                } else {
                    updateFishUI();
                    updateFishVisibility();

                }
            }
            function updateFishUI() {
                for (let nI = 0; nI < 8; nI++) {
                    const f = document.getElementById(`fish-${fishAtNode[nI]}`);
                    const n = nodePositions[nI];
                    if (f && n) { f.style.top = (n.t + 78) + "px"; f.style.left = (n.l + 22) + "px"; }
                }
            }
           function renderCircuit() {
            const c = document.getElementById('circuit-content');
            const wrapper = document.getElementById('circuit-content-wrapper');
            c.innerHTML = '';


            // 1. Trace 狀態預計算邏輯
            let states = [];
            if (activeTraceInput !== null) {
                let curr = activeTraceInput;
                states.push(curr);
                for (let k = 0; k < gateHistory.length; k++) {
                    curr = getPermutationForGate(gateHistory[k])[curr];
                    states.push(curr);
                }
            }


            // 2. 繪製水平導線的函式 (整合 Trace 顏色變換)
            const drawWires = (parentUnit, stepIdx) => {
                for (let q = 0; q < 3; q++) {
                    let wire = document.createElement('div');
                    wire.style.position = 'absolute';
                    wire.style.left = '0';
                    wire.style.width = '100%';
                    wire.style.height = '4px';
                    wire.style.top = (30 + q * 40 - 0.5) + 'px';
                    wire.style.zIndex = '1';


                    if (activeTraceInput !== null) {
                        // 追蹤模式：根據 bit 狀態決定顏色
                        if (stepIdx <= currentTraceStep) {
                            let bit = (states[stepIdx] >> (2 - q)) & 1;
                            if (bit === 1) {
                                wire.style.background = '#ffc822';
                                wire.style.boxShadow = '0 0 8px #ffc822';
                            } else {
                                wire.style.background = '#8a6d1c';
                                wire.style.boxShadow = 'none';
                            }
                        } else {
                            wire.style.background = '#d1d5db';
                            wire.style.boxShadow = 'none';
                        }
                    } else {
                        // 一般模式：純黑導線
                        wire.style.background = '#000';
                    }
                    parentUnit.appendChild(wire);
                }
            };


            // 3. 建立起點單位
            const startU = document.createElement('div');
            startU.className = 'circuit-unit';
            startU.style.minWidth = '30px';
            startU.style.cursor = 'default';
            drawWires(startU, 0);
            c.appendChild(startU);


            // 4. 遍歷 gateHistory 繪製所有閘
            gateHistory.forEach((g, idx) => {
                const u = document.createElement('div');
                u.className = 'circuit-unit' + (selectedIndices.includes(idx) ? ' selected-gate' : '');
                u.draggable = true;


                if (activeTraceInput !== null) {

                    else if (idx >= currentTraceStep) u.style.opacity = '0.2';
                }


                drawWires(u, idx + 1);


                // 拖拽與點擊事件
                u.addEventListener('dragstart', (e) => handleDragStart(e, idx));
                u.addEventListener('dragover', (e) => handleDragOver(e));
                u.addEventListener('drop', (e) => handleDrop(e, idx));
                u.addEventListener('dragend', (e) => { e.target.style.opacity = '1'; draggedIndex = null; });
                u.onmouseenter = () => { if(typeof highlightByGate === 'function') highlightByGate(g); };
                u.onmouseleave = () => { if(typeof clearHighlight === 'function') clearHighlight(); };
            
                u.onclick = (e) => {
                    if (e.ctrlKey || e.metaKey) {
                        const sIdx = selectedIndices.indexOf(idx);
                        if (sIdx > -1) selectedIndices.splice(sIdx, 1);
                        else selectedIndices.push(idx);
                        renderCircuit();
                    } else {
                        if(typeof pop !== 'undefined' && pop.play) { pop.currentTime = 0; pop.play().catch(e=>{}); }
                        const removed = gateHistory[idx];
                        actionStack.push({ type: 'delete', index: idx, oldGates: [removed] });
                        gateHistory.splice(idx, 1);
                        selectedIndices = [];
                        recalculate();
                    }
                };


                // --- 5. 核心邏輯解析 (新版 '_' 格式) ---
                        let typePart = g.split('_')[0];
                let ctrl = [], target = -1, zero = [];

                if (typePart.startsWith('X')) {
                    target = parseInt(typePart[1]);
                } else if (typePart.startsWith('CX')) {
                    let c = parseInt(typePart[2]), t = parseInt(typePart[3]);
                    ctrl.push(c); target = t;
                } else if (typePart.startsWith('C0X')) {
                    let c = parseInt(typePart[3]), t = parseInt(typePart[4]);
                    ctrl.push(c); zero.push(c); target = t;
                } else if (typePart.startsWith('TOF')) {
                    let s = typePart.replace('TOF', '');
                    let tokens = [];
                    for (let i = 0; i < s.length; i++) {
                        if (s[i + 1] === 'p') {
                            tokens.push({ v: parseInt(s[i]), z: true }); i++;
                        } else tokens.push({ v: parseInt(s[i]), z: false });
                    }
                    let tObj = tokens.pop();
                    target = tObj.v;
                    tokens.forEach(tok => {
                        ctrl.push(tok.v);
                        if (tok.z) zero.push(tok.v);
                    });
                }

                // 繪製垂直線與控制點
                if (ctrl.length > 0) {
                    let min = Math.min(...ctrl, target), max = Math.max(...ctrl, target);
                    const v = document.createElement('div');
                    v.className = 'connection-v-line';
                    v.style.cssText = `top:${30 + min * 40}px; height:${(max - min) * 40}px; z-index: 5;`;
                    u.appendChild(v);


                    ctrl.forEach(cl => {
                        const d = document.createElement('div');
                        d.className = 'control-dot';
                        d.style.top = (24 + cl * 40) + 'px';
                        d.style.zIndex = '6';
                        if (zero.includes(cl)) {
                            d.style.background = '#fff'; d.style.border = '2.5px solid #000';
                        }
                        u.appendChild(d);
                    });
                }


                // 繪製目標點 (Circle)
                if (target !== -1) {
                    const t = document.createElement('div');
                    t.className = 'circuit-target';
                    t.style.top = (31 + target * 40) + 'px';
                    t.style.zIndex = '6';
                    u.appendChild(t);
                }


                c.appendChild(u);
            });


            // 6. 建立終點單位 (延伸導線)
            const endU = document.createElement('div');
            endU.className = 'circuit-unit';
            endU.style.minWidth = '50px';
            endU.style.flexGrow = '1';
            endU.style.cursor = 'default';
            drawWires(endU, states.length > 0 ? states.length - 1 : 0);
            c.appendChild(endU);


            updateUndoStatus();


            // 7. 自動捲動 (僅在非拖拽與非追蹤時)
            if (selectedIndices.length === 0 && gateHistory.length > 0 && typeof draggedIndex === 'undefined' || draggedIndex === null) {
                if (activeTraceInput === null) {
                    setTimeout(() => wrapper && wrapper.scrollTo({ left: wrapper.scrollWidth, behavior: 'smooth' }), 50);
                }
            }
        }
        function undo() {
            if (actionStack.length === 0) return;
            if(typeof pop !== 'undefined' && pop.play) { pop.currentTime = 0; pop.play().catch(e=>{}); }
            const action = actionStack.pop();
            if (action.type === 'add') { gateHistory.splice(action.index, 1); }
            else if (action.type === 'delete') { gateHistory.splice(action.index, 0, ...action.oldGates); }
            else if (action.type === 'replace') {
                if (action.newGate === null) gateHistory = [...action.oldGates];
                else gateHistory.splice(action.index, 1, ...action.oldGates);
            }
            selectedIndices = []; recalculate();
        }
        function resetCircuit() {
            if(typeof pop !== 'undefined' && pop.play) { pop.currentTime = 0; pop.play().catch(e=>{}); }
            gateHistory = []; actionStack = []; selectedIndices = [];
            recalculate();
        }
        function updateUndoStatus() {
            const isActive = actionStack.length > 0;
            const btn = document.getElementById('undo-btn');
            if (btn) btn.classList.toggle('active', isActive);
        }
        function shareCircuit() {
            if (gateHistory.length === 0) {
                alert("The circuit is empty and cannot be shared.");
                return;
            }
            const circuitData = gateHistory.join(',');
            const shareUrl = `${window.location.origin}${window.location.pathname}?circuit=${encodeURIComponent(circuitData)}`;
            navigator.clipboard.writeText(shareUrl).then(() => {
                alert("Circuit sharing link copied! Send it to a friend to open this circuit.");
            }).catch(err => {
                console.error('Failed to copy link', err);
                alert("Link: " + shareUrl);
            });
        }
    </script>
</body>
