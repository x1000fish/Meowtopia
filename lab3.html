<body id="body-root" class="mini-mode">
    <div id="quantum-toggle" class="mode-toggle-fixed" onclick="toggleQuantumMode()" style="top: 105px; right: 25px; font-size: 26px;">⚛️</div>
    <button onclick="navWithSound('lab4.html')" class="nav-fab" title="Go to 4-Bit">4</button>
    <div class="w-full max-w-5xl">
        <div class="flex w-full px-4 mb-4 items-center">
            <div class="text-3xl font-black">GATE COUNT: <span id="step-count">0</span></div>

    <script>
        let initialFishAtNode = Array.from({ length: 8 }, (_, i) => i);
        let isQuantumMode = false;
        let isTraceMode = false;
        let activeTraceInput = null;
        let currentTraceStep = 0;
        let gateCount = 0, gateHistory = [];
        let selectedIndices = [], actionStack = [];
        let fishAtNode = [];
        let lineMode = 1, hoverLine = null;
        let lockedLineId = null;
        let currentOptionIndex = 0, currentOptions = [], draggedIndex = null;
        let mobileDragging = false;
        let mDragIndex = null;
        let dragGhost = null;
        let originalDragEl = null;
        let isTouchDevice = false;
        let activeMobileLine = null;
        let touchStartY = 0;
        let lastSwipeTime = 0;
        let lastTiltDirection = 0;
        let canvasTouchStartX = 0, canvasTouchStartY = 0;
        let lastCanvasX = 0, lastCanvasY = 0;
        let isCanvasSwiping = false;
        const TILT_THRESHOLD = 15;
        const RETURN_THRESHOLD = 10;
        let gyroPermissionGranted = false;
        const pop = new Audio('pop.m4a');
        const baseOffsetY = 130;
        const side = 220;
        const offsetPro = 165;
        const nodePositions = Array.from({ length: 8 }, (_, i) => {
            let x = (i & 1) ? side : 0;
            let y = (i & 2) ? side : 0;
            if (i & 4) {
                x += (i & 1) ? 160 : -140;
                y += (i & 2) ? 110 : -110;
            }
            const pos = { t: y + baseOffsetY, relX: x };
            Object.defineProperty(pos, 'l', { get: () => pos.relX + offsetPro });
            return pos;
        });
        let autoScrollRAF = null;
        let scrollDirection = 0;
        let autoScrollWrapper = null;
        let lastTouchX = 0;
        let lastTouchY = 0;
        let circuitEdgeScrollRAF = null;
        let circuitEdgeScrollDirection = 0;
        let circuitEdgeScrollWrapper = null;
        const CIRCUIT_EDGE_THRESHOLD = 85;
        const CIRCUIT_EDGE_SCROLL_SPEED = 4;
        function handleAutoScroll() {
            if (!autoScrollWrapper || scrollDirection === 0) {
                autoScrollRAF = null;
                return;
            }
            autoScrollWrapper.scrollLeft += scrollDirection * 8; 
            let targetEl = document.elementFromPoint(lastTouchX, lastTouchY);
            let dropUnit = targetEl ? targetEl.closest('.circuit-unit') : null;
            document.querySelectorAll('.drag-target').forEach(el => el.classList.remove('drag-target'));
            let isDraggedEl = false;
            if (draggedIndex !== null && dropUnit && dropUnit.dataset.index !== undefined) {
                if (parseInt(dropUnit.dataset.index) === draggedIndex) {
                    isDraggedEl = true;
                }
            }
            if (dropUnit && dropUnit !== originalDragEl && !isDraggedEl && dropUnit.dataset.index !== undefined) {
                dropUnit.classList.add('drag-target');
            }
            autoScrollRAF = requestAnimationFrame(handleAutoScroll);
        }
        function runCircuitEdgeScroll() {
            if (!circuitEdgeScrollWrapper || circuitEdgeScrollDirection === 0) {
                circuitEdgeScrollRAF = null;
                return;
            }
            const maxScroll = circuitEdgeScrollWrapper.scrollWidth - circuitEdgeScrollWrapper.clientWidth;
            if (maxScroll <= 0) {
                stopCircuitEdgeScroll();
                return;
            }
            const before = circuitEdgeScrollWrapper.scrollLeft;
            circuitEdgeScrollWrapper.scrollLeft = Math.max(
                0,

        function createLine(i, j, dim) {

            const y1 = n1.t + 60;
            const x2 = n2.l + 65;
            const y2 = n2.t + 60;
            const len = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
            const ang = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;
            const line = document.createElement('div');
            line.className = 'connection-line';
            line.id = `line-${Math.min(i, j)}-${Math.max(i, j)}`;
            line.style.cssText = `width:${len}px; height:4px; background:#463438; left:${x1}px; top:${y1}px; transform:rotate(${ang}deg); transform-origin:0 50%;`;
            
            line.onmouseenter = () => {
                if (isTouchDevice || isTraceMode || lockedLineId) return;

                if (lineMode === 4) {
                    const targetBit = 2 - dim;
                    highlightPairs(getAllPairs(dim));
                    highlightGateButton(`X_${targetBit}`);
                } else if (lineMode === 1) {
                    const targetBit = 2 - dim;
                    const otherBits = [0, 1, 2].filter(b => b !== targetBit);
                    const cv1 = (i & (1 << (2 - otherBits[0]))) ? 1 : 0;
                    const cv2 = (i & (1 << (2 - otherBits[1]))) ? 1 : 0;
                    const gateType = `TOF_${cv1}_${cv2}_${otherBits[0]}_${otherBits[1]}_${targetBit}`;

                    highlightPairs([[i, j]]);
                    highlightGateButton(gateType);
                } else {
                    highlightPairs([[i, j]]);

            line.onmouseleave = () => {
                if (isTouchDevice || lockedLineId) return;

                hideIndicator();

                e.stopPropagation();

                if (lineMode === 1) {
                    const targetBit = 2 - dim;
                    const otherBits = [0, 1, 2].filter(b => b !== targetBit);
                    const cv1 = (i & (1 << (2 - otherBits[0]))) ? 1 : 0;
                    const cv2 = (i & (1 << (2 - otherBits[1]))) ? 1 : 0;
                    applyGate(`TOF_${cv1}_${cv2}_${otherBits[0]}_${otherBits[1]}_${targetBit}`);

                if (lineMode === 4 && !isTouchDevice) {

        function buildGateOptions(i, j, dim) {
            const diff = i ^ j;
            const targetBit = diff === 4 ? 0 : diff === 2 ? 1 : 2;
            const otherBits = [0, 1, 2].filter(b => b !== targetBit);
            const options = [];
            if (lineMode === 4) {
                options.push({ gateType: `X_${targetBit}`, label: `X Gate: q${targetBit}`, highlightPairs: getAllPairs(dim) });
            } else if (lineMode === 2) {
                otherBits.forEach(ctrlBit => {
                    const ctrlMask = 1 << (2 - ctrlBit);
                    const ctrlVal = (i & ctrlMask) ? 1 : 0;
                    const gateType = `CX_${ctrlVal}_${ctrlBit}_${targetBit}`;
                    let pairs = [];
                    const bit = 1 << (2 - targetBit);
                    for (let k = 0; k < 8; k++) {
                        if ((k & bit) === 0 && ((k & ctrlMask) ? 1 : 0) === ctrlVal) pairs.push([k, k ^ bit]);
                    }
                    options.push({ gateType, label: `CNOT: q${ctrlBit}=${ctrlVal} → q${targetBit}`, highlightPairs: pairs });
                });

        function getAllPairs(dim) {

        function applyGate(type) {

        }
        function convertToLevel8Format(g) {
            const p = g.split('_');
            if (p[0] === 'X') return `X${p[1]}`;
            if (p[0] === 'CX') return p[1] === '0' ? `C0X${p[2]}${p[3]}` : `CX${p[2]}${p[3]}`;
            if (p[0] === 'TOF') {
                const p1 = p[1] === '0' ? 'p' : '';
                const p2 = p[2] === '0' ? 'p' : '';
                return `TOF${p[3]}${p1}${p[4]}${p2}${p[5]}`;
            }
            return g;
        }
        function normalizeGateType(type) {
            return type.includes('_') ? convertToLevel8Format(type) : type;
        }
        function parseGateSpec(type) {
            const gate = normalizeGateType(type);
            let ctrl = [];
            let target = -1;
            let zero = [];
            if (gate.startsWith('X')) {
                target = parseInt(gate[1]);
            } else if (gate.startsWith('C0X')) {
                ctrl = [parseInt(gate[3])];
                target = parseInt(gate[4]);
                zero = [parseInt(gate[3])];
            } else if (gate.startsWith('CX')) {
                ctrl = [parseInt(gate[2])];
                target = parseInt(gate[3]);
            } else if (gate.startsWith('TOF')) {
                const s = gate.replace('TOF', '');
                let parts = [];
                for (let i = 0; i < s.length; i++) {
                    if (s[i + 1] === 'p') {
                        parts.push({ v: parseInt(s[i]), z: true });
                        i++;
                    } else {
                        parts.push({ v: parseInt(s[i]), z: false });
                    }
                }
                target = parts.pop().v;
                parts.forEach(p => {
                    ctrl.push(p.v);
                    if (p.z) zero.push(p.v);
                });
            }
            return { gate, ctrl, target, zero };
        }
        function getPermutationForGate(type) {
            if (type.startsWith('SWAP_')) {
                const p = type.split('_');
                const iA = parseInt(p[1]);
                const iB = parseInt(p[2]);
                const pm = Array.from({ length: 8 }, (_, i) => i);
                [pm[iA], pm[iB]] = [pm[iB], pm[iA]];
                return pm;
            }
            const gate = normalizeGateType(type);
            return Array.from({ length: 8 }, (_, p) => {
                let b = p.toString(2).padStart(3, '0').split('').map(Number);
                if (gate.startsWith('X')) {
                    b[parseInt(gate[1])] ^= 1;
                } else if (gate.startsWith('C0X')) {
                    const c = parseInt(gate[3]);
                    const t = parseInt(gate[4]);
                    if (b[c] === 0) b[t] ^= 1;
                } else if (gate.startsWith('CX')) {
                    const c = parseInt(gate[2]);
                    const t = parseInt(gate[3]);
                    if (b[c] === 1) b[t] ^= 1;
                } else if (gate.startsWith('TOF')) {
                    const { ctrl, target, zero } = parseGateSpec(gate);
                    const ok = ctrl.every(bit => zero.includes(bit) ? b[bit] === 0 : b[bit] === 1);
                    if (ok) b[target] ^= 1;
                }

            });
        }
        function executeLogic(type) {
            const pm = getPermutationForGate(type);

                            const d = document.createElement('div');
                            d.className = 'control-dot';
                            d.style.top = `${24 + cl * 40}px`;
                            d.style.zIndex = '6';
                            if (zero.includes(cl)) {
                                d.style.background = '#fff';
                                d.style.border = '2.5px solid #463438';
                            }
                            visuals.appendChild(d);
                        });
                    }
                    if (target !== -1) {
                        const t = document.createElement('div');
                        t.className = 'circuit-target';
                        t.style.top = `${31 + target * 40}px`;
                        t.style.zIndex = '6';
                        visuals.appendChild(t);
                    }
                }
                u.appendChild(visuals);
                if (!isTouchDevice && activeTraceInput === null) {
                    let dragClone = null;
                    u.ondragstart = (e) => { 
                        draggedIndex = idx; 
                        e.dataTransfer.effectAllowed = 'move'; 
                        dragClone = u.cloneNode(true);
                        dragClone.querySelectorAll('.horizontal-wire').forEach(w => w.remove());
                        dragClone.style.position = 'absolute';
                        dragClone.style.top = '-9999px';
                        dragClone.style.left = '-9999px';
                        const style = getComputedStyle(u);
                        const gateBg = style.getPropertyValue('--gate-bg-color');
                        dragClone.style.backgroundColor = gateBg;
                        dragClone.style.borderRadius = '12px';
                        dragClone.style.boxSizing = 'border-box';
                        dragClone.style.border = 'none';
                        document.body.appendChild(dragClone);
                        const rect = u.getBoundingClientRect();
                        const offsetX = e.clientX - rect.left;
                        const offsetY = e.clientY - rect.top;
                        e.dataTransfer.setDragImage(dragClone, offsetX, offsetY);
                        setTimeout(() => {
                            if (document.body.contains(dragClone)) dragClone.remove();
                            visuals.style.opacity = '0.35';
                        }, 0);
                    };
                    u.ondragover = (e) => { 
                        e.preventDefault(); 
                        e.dataTransfer.dropEffect = 'move';
                        document.querySelectorAll('.drag-target').forEach(el => el.classList.remove('drag-target'));
                        if (draggedIndex !== null && draggedIndex !== idx) {
                            u.classList.add('drag-target');
                        }
                        return false; 
                    };
                    u.ondragleave = (e) => { u.classList.remove('drag-target'); };
                    u.ondrop = (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        const sourceIdx = draggedIndex;
                        clearCircuitDragState();
                        if (sourceIdx === null || sourceIdx === idx) return;
                        pop.currentTime = 0; pop.play();
                        const oldHistory = [...gateHistory];
                        const movedGate = gateHistory.splice(sourceIdx, 1)[0];
                        gateHistory.splice(idx, 0, movedGate);
                        actionStack.push({ type: 'replace', index: 0, oldGates: oldHistory, newGate: null });
                        selectedIndices = []; recalculate();
                    };
                    u.ondragend = (e) => { 
                        if (dragClone && document.body.contains(dragClone)) dragClone.remove();
                        clearCircuitDragState();
                    };
                }

                let touchTimer = null;
                let startX, startY;

                u.addEventListener('touchstart', (e) => {
                    if (activeTraceInput !== null || e.touches.length > 1) return;
                    u.draggable = false; 
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                    touchTimer = setTimeout(() => {
                        touchTimer = null;
                        startMobileDrag(e.touches[0], u, idx);
                    }, 300); 
                }, {passive: true});

                u.addEventListener('touchmove', (e) => {
                    let dx = e.touches[0].clientX - startX;
                    let dy = e.touches[0].clientY - startY;
                    lastTouchX = e.touches[0].clientX;
                    lastTouchY = e.touches[0].clientY;

                    if (mobileDragging) {
                        if (e.cancelable) e.preventDefault();
                        moveMobileDrag(e.touches[0]);

                        const wrapper = document.getElementById('circuit-content-wrapper');
                        const wrapperRect = wrapper.getBoundingClientRect();
                        const threshold = 60; 

                        if (lastTouchX < wrapperRect.left + threshold) {
                            scrollDirection = -1;
                            autoScrollWrapper = wrapper;
                            if (!autoScrollRAF) autoScrollRAF = requestAnimationFrame(handleAutoScroll);
                        } else if (lastTouchX > wrapperRect.right - threshold) {
                            scrollDirection = 1;  
                            autoScrollWrapper = wrapper;
                            if (!autoScrollRAF) autoScrollRAF = requestAnimationFrame(handleAutoScroll);
                        } else {
                            scrollDirection = 0;  
                            if (autoScrollRAF) {
                                cancelAnimationFrame(autoScrollRAF);
                                autoScrollRAF = null;
                            }
                        }

                        let targetEl = document.elementFromPoint(lastTouchX, lastTouchY);
                        let dropUnit = targetEl ? targetEl.closest('.circuit-unit') : null;
                        
                        document.querySelectorAll('.drag-target').forEach(el => el.classList.remove('drag-target'));
                        
                        if (dropUnit && dropUnit !== u && dropUnit.dataset.index !== undefined) {
                            dropUnit.classList.add('drag-target');
                        }
                    } else {
                        if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 5 && e.cancelable) {
                            e.preventDefault();
                        }
                        if (touchTimer) {
                            if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
                                clearTimeout(touchTimer);
                                touchTimer = null;
                            }
                        }
                    }
                }, {passive: false});

                u.addEventListener('touchend', (e) => {
                    if (touchTimer) { clearTimeout(touchTimer); touchTimer = null; }
                    
                    scrollDirection = 0;
                    if (autoScrollRAF) { cancelAnimationFrame(autoScrollRAF); autoScrollRAF = null; }

                    if (mobileDragging) {
                        if (e.cancelable) e.preventDefault();
                        endMobileDrag(e.changedTouches[0]);
                    } else if (activeTraceInput === null) {
                        let endX = e.changedTouches[0].clientX;
                        let endY = e.changedTouches[0].clientY;
                        let dx = endX - startX;
                        let dy = endY - startY;

                        if (Math.abs(dy) > 30 && Math.abs(dy) > Math.abs(dx)) {
                            if (dy < 0) {
                                if (typeof pop !== 'undefined' && pop.play) { pop.currentTime = 0; pop.play().catch(err => {}); }
                                const removed = gateHistory[idx];
                                actionStack.push({ type: 'delete', index: idx, oldGates: [removed] });
                                gateHistory.splice(idx, 1);
                                selectedIndices = [];
                                recalculate();
                                hideIndicator();
                            } else {
                                const sIdx = selectedIndices.indexOf(idx);
                                if (sIdx > -1) selectedIndices.splice(sIdx, 1);
                                else selectedIndices.push(idx);
                                renderCircuit();
                            }
                        }
                    }

                    if (activeTraceInput === null) setTimeout(() => { u.draggable = true; }, 100);
                });

                u.addEventListener('touchcancel', (e) => {
                    if (touchTimer) { clearTimeout(touchTimer); touchTimer = null; }
                    scrollDirection = 0;
                    if (autoScrollRAF) { cancelAnimationFrame(autoScrollRAF); autoScrollRAF = null; }

                    if (mobileDragging) endMobileDrag(e.changedTouches[0]);
                    if (activeTraceInput === null) setTimeout(() => { u.draggable = true; }, 100);
                });

                u.onmouseenter = () => { if (typeof highlightByGate === 'function') highlightByGate(g); };
                u.onmouseleave = () => { if (typeof clearHighlight === 'function') clearHighlight(); };
                u.onclick = e => {
                    if (mobileDragging || activeTraceInput !== null) return;
                    if (e.ctrlKey || e.metaKey) {
                        const sIdx = selectedIndices.indexOf(idx);
                        if (sIdx > -1) selectedIndices.splice(sIdx, 1);
                        else selectedIndices.push(idx);
                        renderCircuit();
                    } else {
                        if (typeof pop !== 'undefined' && pop.play) { pop.currentTime = 0; pop.play().catch(e => {}); }
                        const removed = gateHistory[idx];
                        actionStack.push({ type: 'delete', index: idx, oldGates: [removed] });
                        gateHistory.splice(idx, 1);
                        selectedIndices = [];
                        recalculate();
                        hideIndicator();
                    }
                };
                c.appendChild(u);
            });

            // --- 建立尾部感應區 ---
            const endPad = document.createElement('div');
            endPad.className = 'circuit-unit';
            endPad.style.cursor = 'default';
            endPad.dataset.index = gateHistory.length;
            
            // 根據模式決定尾部空白的大小或隱藏
            if (!isQuantumMode) {
                if (activeTraceInput !== null) {
                    endPad.style.display = 'none'; // Trace模式完全隱藏
                } else {
                    endPad.style.setProperty('min-width', '20px', 'important');
                    endPad.style.setProperty('flex-grow', '1', 'important');
                }
            } else {
                endPad.style.setProperty('min-width', '50px', 'important');
                endPad.style.setProperty('flex-grow', '1', 'important');
            }
            drawWires(endPad, states.length > 0 ? states.length - 1 : 0);
            if (!isTouchDevice && activeTraceInput === null) {
                endPad.ondragover = (e) => {
                    if (draggedIndex === null) return;
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    document.querySelectorAll('.drag-target').forEach(el => el.classList.remove('drag-target'));
                    if (draggedIndex !== gateHistory.length - 1) endPad.classList.add('drag-target');
                    return false;
                };
                endPad.ondragleave = () => endPad.classList.remove('drag-target');
                endPad.ondrop = (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    const sourceIdx = draggedIndex;
                    clearCircuitDragState();
                    if (sourceIdx === null || sourceIdx === gateHistory.length - 1) return;
                    pop.currentTime = 0; pop.play();
                    const oldHistory = [...gateHistory];
                    const movedGate = gateHistory.splice(sourceIdx, 1)[0];
                    gateHistory.splice(gateHistory.length, 0, movedGate); 
                    actionStack.push({ type: 'replace', index: 0, oldGates: oldHistory, newGate: null });
                    selectedIndices = []; recalculate();
                };
            }
            c.appendChild(endPad);

            updateUndoStatus();
            if ((selectedIndices.length === 0 && gateHistory.length > 0 && typeof draggedIndex === 'undefined') || draggedIndex === null) {
                if (activeTraceInput === null) setTimeout(() => wrapper && wrapper.scrollTo({ left: wrapper.scrollWidth, behavior: 'smooth' }), 50);
            }
        }
        function undo() {
            if (actionStack.length === 0) return;
            if (typeof pop !== 'undefined' && pop.play) {
                pop.currentTime = 0;
                pop.play().catch(e => {});
            }
            const action = actionStack.pop();
            if (action.type === 'add') gateHistory.splice(action.index, 1);
            else if (action.type === 'delete') gateHistory.splice(action.index, 0, ...action.oldGates);
            else if (action.type === 'replace') {
                if (action.newGate === null) gateHistory = [...action.oldGates];
                else gateHistory.splice(action.index, 1, ...action.oldGates);
            }
            selectedIndices = [];
            recalculate();
        }
        function resetCircuit() {
            if (typeof pop !== 'undefined' && pop.play) {
                pop.currentTime = 0;
                pop.play().catch(e => {});
            }
            gateHistory = [];
            actionStack = [];
            selectedIndices = [];
            recalculate();
        }
        function updateUndoStatus() {
            const isActive = actionStack.length > 0;
            const btn = document.getElementById('undo-btn');
            if (btn) btn.classList.toggle('active', isActive);
        }
        function shareCircuit() {
            if (gateHistory.length === 0) {
                alert('The circuit is empty and cannot be shared.');
                return;
            }
            const circuitData = gateHistory.join(',');
            const shareUrl = `${window.location.origin}${window.location.pathname}?circuit=${encodeURIComponent(circuitData)}`;
            navigator.clipboard.writeText(shareUrl).then(() => {
                alert('Circuit sharing link copied! Send it to a friend to open this circuit.');
            }).catch(err => {
                console.error('Failed to copy link', err);
                alert('Link: ' + shareUrl);
            });
        }
    </script>
</body>
