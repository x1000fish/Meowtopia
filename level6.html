<html lang="zh-TW">

    <style>

        .gate-target-circle::before { content: ''; position: absolute; width: 100%; height: 1.5px; top: 50%; left: 0; transform: translateY(-50%); background: #463438; }
        .gate-target-circle::after { content: ''; position: absolute; height: 100%; width: 1.5px; left: 50%; top: 0; transform: translateX(-50%); background: #463438; }
        .func-btn { width: 100%; margin-top: 5px; padding: 14px; border-radius: 35px; font-weight: 900; font-size: 16px; border: 2.5px solid #463438; cursor: pointer; box-shadow: 0 4px 0 rgba(70,52,56,0.1); color: #463438; background: #fff;}

        .circuit-unit.selected { background: rgba(153, 196, 77, 0.3) !important; border-radius: 12px; box-shadow: inset 0 0 0 2px #99C44D !important; }

        .circuit-target::before { content: ""; position: absolute; width: 2.5px; height: 100%; background: #463438; left: 50%; transform: translateX(-50%); }
        .circuit-target::after { content: ""; position: absolute; width: 100%; height: 2.5px; background: #463438; top: 50%; transform: translateY(-50%); }
        .mode-toggle-fixed { position: fixed; top: 20px; right: 20px; width: 70px; height: 70px; background: #fff; border: 5px solid #463438; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; box-shadow: 0 4px 0 #463438; z-index: 500; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(70, 52, 56, 0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #FFF9F0; border: 8px solid #463438; border-radius: 40px; padding: 30px; text-align: center; width: 380px; box-shadow: 0 10px 0 #FFB7C5; color: #463438;}
        #gate-scroll-area { margin-top: 5px; max-height: 350px; overflow-y: auto; width: 100%; padding: 10px; -ms-overflow-style: none; scrollbar-width: none; }
        #gate-scroll-area::-webkit-scrollbar { display: none; }
        :root { --cube-offset-x: 175px; }
        .pro-active { --cube-offset-x: 42px; }
        #ios-indicator { position: absolute; top: 0; left: 0; transform: translate(-50%, -120%) scale(0.8); background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(15px); border-radius: 50px; padding: 6px 18px; display: flex; align-items: center; box-shadow: 0 8px 24px rgba(70,52,56,0.12); opacity: 0; transition: opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1), transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1000; pointer-events: none; border: 1px solid rgba(70,52,56,0.35); }
        #ios-indicator.active { opacity: 1; transform: translate(-50%, -120%) scale(1); }
        .ind-fraction { color: #463438; font-size: 18px; font-weight: 900; }
        #canvas-bottom-btns {position: absolute;bottom: 20px;right: 30px; display: flex;flex-direction: column; gap: 10px;z-index: 100;}
        #canvas-bottom-btns .func-btn { margin-top: 0; width: 90px; font-size: 14px;padding: 8px 5px; text-transform: uppercase; border-width: 3px;}
        .pro-active #canvas-bottom-btns {display: none !important;}
        canvas, .game-canvas, .circuit-unit, .node, .gate-btn-v2 { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; touch-action: manipulation; } 
        #shake-toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%) scale(0.8); background: #99C44D; color: #463438; padding: 15px 40px; border-radius: 50px; font-weight: 900; font-size: 24px; z-index: 10000; opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none; border: 4px solid #463438; box-shadow: 0 0 20px rgba(153, 196, 77, 0.6), 0 8px 0 #463438; }
        #shake-toast.show { opacity: 1; transform: translateX(-50%) scale(1); }
        @keyframes pulse-toast { 0%, 100% { transform: translateX(-50%) scale(1); box-shadow: 0 0 20px rgba(153, 196, 77, 0.6), 0 8px 0 #463438; } 50% { transform: translateX(-50%) scale(1.1); box-shadow: 0 0 30px #99C44D, 0 8px 0 #463438; } }
        .toast-highlight { animation: pulse-toast 1s infinite !important; background: #99C44D !important; color: white !important; }
    </style>
</head>
<body id="body-root">
    <div id="shake-toast">Ctrl Mode: ON</div>

    <div id="mode-toggle" class="mode-toggle-fixed" onclick="togglePro()">👁️</div>
    <div id="leaderboard-wrapper">
        <div class="side-leaderboard-content">
            <h2 class="text-xl font-black mb-3 text-center" style="color: #463438;">🏆 TOP CATS</h2>
            <div class="flex gap-2 mb-3">
                <button onclick="renderRank('steps')" id="tab-steps" class="rank-tab active">STEPS</button>
                <button onclick="renderRank('time')" id="tab-time" class="rank-tab">TIME</button>
            </div>
            <div id="rankList" class="flex-grow overflow-y-auto space-y-1 pr-1">

        <div class="bookmark-tab" onclick="toggleLeaderboard()">
            <div class="bookmark-text">RANK</div>

    </div>
    <div class="w-full max-w-5xl">
        <div class="flex justify-between w-full px-4 mb-4 items-center mt-6">
            <div class="text-3xl font-black" style="color: #463438;">STEPS: <span id="step-count">0</span> | TIME: <span id="timer">0</span>s</div>
            <div class="flex items-center gap-12 ml-auto">
                <button id="mode-btn" class="multi-toggle-btn" onclick="cycleLineMode()">Mode: 1</button>
            <div class="text-3xl font-black" style="color: #7bc202;">LEVEL 6</div>
            </div>
        </div>
        <div class="main-layout">
            <div id="pro-panel">
                <div class="panel-section-title">Quantum Gates</div>
                <div id="gate-scroll-area">
                    <div class="grid grid-cols-4 gap-3 w-full justify-items-center" id="gate-grid"></div>
                </div>
                <div class="panel-section-title mt-2">Control</div>
                <button class="func-btn btn-reset" onclick="resetCircuit()">Reset Circuit</button>
                <button id="undo-btn" class="func-btn btn-undo" onclick="undo()">Undo Step</button>
            </div>
            <div class="game-canvas" id="main-canvas">
                <div id="ios-indicator">
                    <span class="ind-fraction" id="ind-fraction">1 / 2</span>
                </div>
                <div id="lines-layer"></div>
                <div id="nodes-layer"></div>
                <div id="fishes-layer"></div>
                
                <div id="canvas-bottom-btns">
                    <button class="func-btn btn-reset" onclick="resetCircuit()">RESET</button>
                    <button id="undo-btn-bottom" class="func-btn btn-undo" onclick="undo()">UNDO</button>
                </div>
            </div>
        </div>
        <div id="circuit-area" class="mx-auto">
            <div class="circuit-title font-black text-xl text-center">Circuit Diagram</div>
            <div class="qubit-label" style="top: 60px;">q0</div>
            <div class="qubit-label" style="top: 100px;">q1</div>
            <div class="qubit-label" style="top: 140px;">q2</div>
            <div id="circuit-content-wrapper"><div id="circuit-content"></div></div>
        </div>
        <div class="w-full text-center mt-6 mb-6">
            <a href="index.html" class="game-btn btn-red px-16">GIVE UP</a>
        </div>
    </div>
    <div id="victoryModal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-5xl font-black mb-4" style="color: #463438;">MEOW!</h2>
            <h2 class="text-5xl font-black mb-4" style="color: #463438;">🐾</h2>
            <p id="victoryMsg" class="text-xl font-bold mb-6"></p>
            <button onclick="location.href='index.html'" class="game-btn btn-green w-full mb-4">KEEP GOING</button>
            <button onclick="viewInLab().style.display='none'" class="game-btn btn-red w-full">View Circuit</button>
        </div>
    </div>
    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzR0J0VXyl5ayKwDXlHimc4WS1FjvGEb2-gTBMhum8APQKfDHxc5wsiWRkNqkxJrocMOw/exec';
        let steps = 0,
            time = 0,
            isPro = false,
            timerInterval,
            gateHistory = [],
            historyStack = [[]],
            selectedIndices = [],
            fishAtNode = [1, 0, 3, 2, 5, 7, 4, 6], 
            isSolved = false,
            lineMode = 1,
            hoverLine = null,
            currentOptionIndex = 0,
            currentOptions = [],
            draggedIdx = null;
        let leaderboardData; 
        let isShakeCtrlActive = false; 
        let lastShakeTime = 0;
        let shakePermissionRequested = false;
        let mobileDragging = false;
        let mDragIndex = null;
        let dragGhost = null;
        let isTouchDevice = false;
        let activeMobileLine = null;
        let touchStartY = 0;
        let lastSwipeTime = 0; 
        let lastTiltDirection = 0;
        const TILT_THRESHOLD = 15;
        const RETURN_THRESHOLD = 10;
        let gyroPermissionGranted = false;
        const pop = new Audio('pop.m4a'),
            meow = new Audio('meow.m4a'),
            getDynamicOffset = () => parseInt(getComputedStyle(document.body).getPropertyValue('--cube-offset-x')) || 0;
        const nodePositions = [
            { t: 150, get l() { return 135 + getDynamicOffset() } },
            { t: 150, get l() { return 350 + getDynamicOffset() } },
            { t: 330, get l() { return 135 + getDynamicOffset() } },
            { t: 330, get l() { return 350 + getDynamicOffset() } },
            { t: 20,  get l() { return -10 + getDynamicOffset() } },
            { t: 20,  get l() { return 510 + getDynamicOffset() } },
            { t: 460, get l() { return -10 + getDynamicOffset() } },
            { t: 460, get l() { return 510 + getDynamicOffset() } }
        ];
        const edges = [[0, 1], [1, 3], [3, 2], [2, 0], [4, 5], [5, 7], [7, 6], [6, 4], [0, 4], [1, 5], [2, 6], [3, 7]];
        function handleMotion(event) {
            const acc = event.accelerationIncludingGravity;
            if (!acc) return;
            const threshold = 20;
            const delta = Math.sqrt(acc.x ** 2 + acc.y ** 2 + acc.z ** 2);
            if (delta > threshold) {
                const now = Date.now();
                if (now - lastShakeTime > 1000) { 
                    isShakeCtrlActive = !isShakeCtrlActive;
                    lastShakeTime = now;
                    if (navigator.vibrate) navigator.vibrate([100]);
                    const toast = document.getElementById('shake-toast');
                    if (toast) {
                        toast.style.background = isShakeCtrlActive ? "#99C44D" : "#FFB7C5";
                        toast.style.color = isShakeCtrlActive ? "white" : "#463438";
                        toast.innerText = isShakeCtrlActive ? "CTRL MODE: ON" : "CTRL MODE: OFF";
                        toast.classList.add('show');
                        setTimeout(() => { 
                            toast.classList.remove('show'); 
                        }, 4000);
                    }
                }
            }
        }
        function requestShakePermission() {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(state => {
                        if (state === 'granted') {
                            window.addEventListener('devicemotion', handleMotion);
                        }
                    }).catch(console.error);
            } else {
                window.addEventListener('devicemotion', handleMotion);
            }
        }
        window.onload = () => {
            initGameLayout();
            initGates();
            drawStaticLines();
            updateFishUI();
            updateUndoStatus();
            fetchLeaderboard();
            timerInterval = setInterval(() => {
                time++;
                document.getElementById('timer').innerText = time;
            }, 1000);
            const requestGyroPermission = async () => {
                if (!gyroPermissionGranted && typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try {
                        const permission = await DeviceOrientationEvent.requestPermission();
                        if (permission === 'granted') {
                            gyroPermissionGranted = true;
                        }
                    } catch (error) {
                        console.log("Gyroscope access request denied:", error);
                    }
                } else {
                    gyroPermissionGranted = true;
                }
                window.removeEventListener('click', requestGyroPermission);
                window.removeEventListener('touchstart', requestGyroPermission);
            };
            window.addEventListener('click', requestGyroPermission);
            window.addEventListener('touchstart', requestGyroPermission);
            const btnPro = document.getElementById('mode-toggle'); 
            const btnMode = document.getElementById('mode-btn');   
            if (btnPro) btnPro.addEventListener('click', requestGyroPermission);
            if (btnMode) btnMode.addEventListener('click', requestGyroPermission);
            document.getElementById('circuit-content-wrapper').addEventListener('wheel', (e) => {
                e.preventDefault();
                e.currentTarget.scrollLeft += e.deltaY;
            });
            document.addEventListener('wheel', (e) => {
                if (!hoverLine || lineMode === 1) return;
                e.preventDefault();
                if (e.deltaY > 0) {
                    currentOptionIndex = (currentOptionIndex + 1) % currentOptions.length;
                } else {
                    currentOptionIndex = (currentOptionIndex - 1 + currentOptions.length) % currentOptions.length;
                }
                showIndicator();
            }, { passive: false });
            window.addEventListener('touchstart', () => { isTouchDevice = true; }, {once: true});
            const canvas = document.getElementById('main-canvas');
            canvas.addEventListener('touchstart', (e) => {
                if (!e.target.classList.contains('connection-line')) {
                    activeMobileLine = null;
                    hoverLine = null;
                    hideIndicator();
                }
            });
            canvas.addEventListener('touchstart', (e) => {

        function buildGateOptions3Bit(idxA, idxB) {
            const diff = idxA ^ idxB;
            const targetBit = (diff === 4) ? 0 : (diff === 2) ? 1 : 2;
            const otherBits = [0, 1, 2].filter(b => b !== targetBit);
            const options = [];
            if (lineMode === 4) {
                options.push({
                    gateType: `X${targetBit}`,
                    highlightPairs: edges.filter(([u, v]) => (u ^ v) === diff).map(([u, v]) => [u, v])
                });
            } else if (lineMode === 2) {
                const ctrlBit = otherBits[0];
                const ctrlMask = 1 << (2 - ctrlBit);
                const ctrlVal = ((idxA & ctrlMask) !== 0) ? 1 : 0;
                const gateA = ctrlVal ? `CX${ctrlBit}${targetBit}` : `C0X${ctrlBit}${targetBit}`;
                const pairsA = edges.filter(([u, v]) => {
                    if ((u ^ v) !== diff) return false;
                    return (u & ctrlMask) === (idxA & ctrlMask);
                }).map(([u, v]) => [u, v]);
                const otherCtrlBit = otherBits[1];
                const otherCtrlMask = 1 << (2 - otherCtrlBit);
                const otherCtrlVal = ((idxA & otherCtrlMask) !== 0) ? 1 : 0;
                const gateB = otherCtrlVal ? `CX${otherCtrlBit}${targetBit}` : `C0X${otherCtrlBit}${targetBit}`;
                const pairsB = edges.filter(([u, v]) => {
                    if ((u ^ v) !== diff) return false;
                    return (u & otherCtrlMask) === (idxA & otherCtrlMask);
                }).map(([u, v]) => [u, v]);
                options.push(
                    { gateType: gateA, highlightPairs: pairsA },
                    { gateType: gateB, highlightPairs: pairsB }

        function previewGate(gateType) {
            if (isSolved) return;
            let targetBit = -1, ctrlBit = -1, ctrlVal = -1, tofBits = [];
            if (gateType.startsWith('X')) {
                targetBit = parseInt(gateType[1]);

                ctrlBit = parseInt(gateType[2]);
                targetBit = parseInt(gateType[3]);
                ctrlVal = 1;
            } else if (gateType.startsWith('C0X')) {
                ctrlBit = parseInt(gateType[3]);
                targetBit = parseInt(gateType[4]);
                ctrlVal = 0;
            } else if (gateType.startsWith('TOF')) {
                let s = gateType.replace('TOF', '');
                let parts = [];
                for (let i = 0; i < s.length; i++) {
                    if (s[i + 1] === 'p') {
                        parts.push({ v: parseInt(s[i]), p: true });

                    } else parts.push({ v: parseInt(s[i]), p: false });
                }
                let targetPart = parts.pop();
                targetBit = targetPart.v;
                tofBits = parts;
            }
            const diff = (targetBit === 0) ? 4 : (targetBit === 1) ? 2 : 1;
            const pairs = edges.filter(([u, v]) => {
                if ((u ^ v) !== diff) return false;
                if (ctrlBit !== -1) {
                    const mask = 1 << (2 - ctrlBit);
                    const val = (u & mask) ? 1 : 0;
                    return val === ctrlVal;
                }
                if (tofBits.length > 0) {
                    return tofBits.every(ctrl => {

	function flashGateLines(type) {

            const diff = (targetBit === 0) ? 4 : (targetBit === 1) ? 2 : 1;
            const pairs = edges.filter(([u, v]) => {

                        return ctrl.p ? val === 0 : val === 1;
                    });

        function executeLogic(type) {

                let temp = fishAtNode[iA];

            }
            let pm = Array.from({ length: 8 }, (_, p) => {
                let b = p.toString(2).padStart(3, '0').split('').map(Number);
                if (type === 'X0') b[0] ^= 1;
                else if (type === 'X1') b[1] ^= 1;
                else if (type === 'X2') b[2] ^= 1;
                else if (type === 'CX01' && b[0]) b[1] ^= 1;
                else if (type === 'CX10' && b[1]) b[0] ^= 1;
                else if (type === 'CX02' && b[0]) b[2] ^= 1;

                else if (type === 'C0X10' && !b[1]) b[0] ^= 1;
                else if (type === 'C0X02' && !b[0]) b[2] ^= 1;
                else if (type === 'C0X20' && !b[2]) b[0] ^= 1;
                else if (type === 'C0X12' && !b[1]) b[2] ^= 1;
                else if (type === 'C0X21' && !b[2]) b[1] ^= 1;
                else if (type === 'TOF012' && b[0] && b[1]) b[2] ^= 1;
                else if (type === 'TOF0p1p2' && !b[0] && !b[1]) b[2] ^= 1;
                else if (type === 'TOF0p12' && !b[0] && b[1]) b[2] ^= 1;
                else if (type === 'TOF01p2' && b[0] && !b[1]) b[2] ^= 1;
                else if (type === 'TOF021' && b[0] && b[2]) b[1] ^= 1;
                else if (type === 'TOF0p2p1' && !b[0] && !b[2]) b[1] ^= 1;
                else if (type === 'TOF0p21' && !b[0] && b[2]) b[1] ^= 1;
                else if (type === 'TOF02p1' && b[0] && !b[2]) b[1] ^= 1;
                else if (type === 'TOF120' && b[1] && b[2]) b[0] ^= 1;
                else if (type === 'TOF1p2p0' && !b[1] && !b[2]) b[0] ^= 1;
                else if (type === 'TOF1p20' && !b[1] && b[2]) b[0] ^= 1;
                else if (type === 'TOF12p0' && b[1] && !b[2]) b[0] ^= 1;
                return parseInt(b.join(''), 2);
            });
            let newFishAtNode = new Array(8);
            for (let oldIdx = 0; oldIdx < 8; oldIdx++) {
                let newIdx = pm[oldIdx];
                newFishAtNode[newIdx] = fishAtNode[oldIdx];
            }
            fishAtNode = newFishAtNode;
        }
        function recalculate() {
            fishAtNode = [1, 0, 3, 2, 5, 7, 4, 6];
            let h = [...gateHistory];
            gateHistory = [];
            h.forEach(g => {
                executeLogic(g);
                gateHistory.push(g);
            });
            steps = gateHistory.length;
            finishMove();
        }
        function finishMove() {
            document.getElementById('step-count').innerText = steps;
            updateFishUI();
            renderCircuit();
            checkWin();
        }
        function updateFishUI() {
            for (let nI = 0; nI < 8; nI++) {
                const fI = fishAtNode[nI],
                    f = document.getElementById(`fish-${fI}`),
                    n = nodePositions[nI];
                if (f && n) {
                    f.style.top = (n.t + 78) + "px";
                    f.style.left = (n.l + 22) + "px";
                }
            }
        }
        function renderCircuit() {
            const c = document.getElementById('circuit-content');
            c.innerHTML = '';
            gateHistory.forEach((g, idx) => {
                const u = document.createElement('div');
                u.className = 'circuit-unit' + (selectedIndices.includes(idx) ? ' selected' : '');
                u.draggable = true;
                u.oncontextmenu = (e) => { e.preventDefault(); return false; };
                u.ondragstart = (e) => { draggedIdx = idx; e.dataTransfer.effectAllowed = 'move'; e.target.style.opacity = '0.5'; };
                u.ondragover = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; return false; };
                u.ondrop = (e) => {
                    if (isSolved || draggedIdx === null || draggedIdx === idx) return;
                    pop.currentTime = 0; pop.play();
                    const movedGate = gateHistory.splice(draggedIdx, 1)[0];
                    gateHistory.splice(idx, 0, movedGate);
                    historyStack.push([...gateHistory]); selectedIndices = []; recalculate(); draggedIdx = null;
                };
                u.ondragend = (e) => { e.target.style.opacity = '1'; draggedIdx = null; };
                let touchTimer = null;
                let startX, startY;
                u.addEventListener('touchstart', (e) => {
                    if(isSolved || e.touches.length > 1) return;
                    u.draggable = false; 
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                    touchTimer = setTimeout(() => {
                        touchTimer = null;
                        startMobileDrag(e.touches[0], u, idx);
                    }, 300); 
                }, {passive: true});
                u.addEventListener('touchmove', (e) => {
                    if (mobileDragging) {
                        if (e.cancelable) e.preventDefault(); 
                        moveMobileDrag(e.touches[0]);
                    } else if (touchTimer) {
                        let dx = e.touches[0].clientX - startX;
                        let dy = e.touches[0].clientY - startY;
                        if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
                            clearTimeout(touchTimer);
                            touchTimer = null;
                        }
                    }
                }, {passive: false});
                u.addEventListener('touchend', (e) => {
                    if (touchTimer) { clearTimeout(touchTimer); touchTimer = null; }
                    if (mobileDragging) {
                        if (e.cancelable) e.preventDefault();
                        endMobileDrag(e.changedTouches[0]);
                    }
                    setTimeout(() => { u.draggable = true; }, 100);
                });
                u.addEventListener('touchcancel', (e) => {
                    if (touchTimer) { clearTimeout(touchTimer); touchTimer = null; }
                    if (mobileDragging) endMobileDrag(e.changedTouches[0]);
                    setTimeout(() => { u.draggable = true; }, 100);
                });
                u.onmouseenter = () => previewGate(g);
                u.onmouseleave = () => hideIndicator();
                u.onclick = (e) => {
                    if (isSolved || mobileDragging) return;
                    pop.currentTime = 0; pop.play();
                    if (e.ctrlKey || e.metaKey || isShakeCtrlActive) {
                        if (selectedIndices.includes(idx)) {
                            selectedIndices = selectedIndices.filter(i => i !== idx);
                        } else {
                            selectedIndices.push(idx);
                        }
                        renderCircuit();
                    } else {
                        selectedIndices = [];
                        gateHistory.splice(idx, 1);
                        historyStack.push([...gateHistory]);
                        recalculate();
                        hideIndicator();
                    }
                };
                let ctrl = [], target = -1, zero = [];
                if (g.startsWith('X')) target = parseInt(g[1]);
                else if (g.startsWith('CX')) {
                    ctrl = [parseInt(g[2])]; target = parseInt(g[3]);
                } else if (g.startsWith('C0X')) {
                    ctrl = [parseInt(g[3])]; target = parseInt(g[4]); zero = [parseInt(g[3])];
                } else if (g.startsWith('TOF')) {
                    let s = g.split('_')[0].replace('TOF', ''), parts = [];
                    for (let i = 0; i < s.length; i++) {
                        if (s[i + 1] === 'p') {
                            parts.push({ v: parseInt(s[i]), p: true }); i++;
                        } else parts.push({ v: parseInt(s[i]), p: false });
                    }
                    target = parts.pop().v;
                    parts.forEach(p => {
                        ctrl.push(p.v);
                        if (p.p) zero.push(p.v);
                    });
                }
                if (ctrl.length > 0) {
                    let min = Math.min(...ctrl, target), max = Math.max(...ctrl, target);
                    const v = document.createElement('div');
                    v.className = 'connection-v-line';
                    v.style.cssText = `top:${30+min*40}px; height:${(max-min)*40}px;`;
                    u.appendChild(v);
                    ctrl.forEach(cl => {
                        const d = document.createElement('div');
                        d.className = 'control-dot';
                        d.style.top = (24 + cl * 40) + 'px';
                        if (zero.includes(cl)) {
                            d.style.background = '#fff'; d.style.border = '2.5px solid #463438';
                        }
                        u.appendChild(d);
                    });
                }
                const t = document.createElement('div');
                t.className = 'circuit-target';
                t.style.top = (31 + target * 40) + 'px';
                u.appendChild(t);
                c.appendChild(u);
            });
            updateUndoStatus();
            const w = document.getElementById('circuit-content-wrapper');
            if (draggedIdx === null) {
                setTimeout(() => w && w.scrollTo({ left: w.scrollWidth, behavior: 'smooth' }), 100);
            }
        }
        function undo() {
            if (isSolved || historyStack.length <= 1) return;
            pop.currentTime = 0; pop.play();
            historyStack.pop();
            gateHistory = [...historyStack[historyStack.length - 1]];
            selectedIndices = [];
            recalculate();
        }
        function resetCircuit() {
            if (isSolved) return;
            pop.currentTime = 0; pop.play();
            gateHistory = [];
            historyStack = [[]];
            selectedIndices = [];
            recalculate();
        }
        function updateUndoStatus() {
            const isActive = historyStack.length > 1 && !isSolved;
            const topUndo = document.getElementById('undo-btn');
            if(topUndo) {
                if(isActive) { topUndo.classList.add('active'); topUndo.style.pointerEvents="auto"; }
                else { topUndo.classList.remove('active'); topUndo.style.pointerEvents="none"; }
            }
            const bottomUndo = document.getElementById('undo-btn-bottom');
            if(bottomUndo) {
                if(isActive) { bottomUndo.classList.add('active'); bottomUndo.style.pointerEvents="auto"; }
                else { bottomUndo.classList.remove('active'); bottomUndo.style.pointerEvents="none"; }
            }
        }
        async function checkWin() {
            if (fishAtNode.every((pos, i) => pos === i)) {
                isSolved = true;
                updateUndoStatus();
                if (timerInterval) clearInterval(timerInterval);
                const ft = time, st = steps, u = sessionStorage.getItem('currentUser');
                const savedLevel = parseInt(sessionStorage.getItem('currentLevel')) || 1;
                if (savedLevel < 7) sessionStorage.setItem('currentLevel', 7);
                setTimeout(() => {
                    if(typeof meow !== 'undefined') { meow.currentTime = 0; meow.play(); }
                    document.getElementById('victoryMsg').innerText = `STEP：${st} | TIME：${ft}s`;
                    document.getElementById('victoryModal').style.display = 'flex';
                }, 800);
                if (u) {
                    fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ action: 'saveRecord', username: u, level: 6, steps: st, time: ft, circuit: gateHistory.join(',') })
                    }).then(() => setTimeout(fetchLeaderboard, 1200));
                }
            }
        }
        function viewInLab() {
            const circuitData = gateHistory.join(',');
            window.location.href = `lab3.html?circuit=${encodeURIComponent(circuitData)}`;
        }
    </script>
