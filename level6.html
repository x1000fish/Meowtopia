<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, user-scalable=no, viewport-fit=cover">
    <title>Meowtopia - Level 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Gaegu:wght@700&family=Titan+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Shrikhand&family=Alfa+Slab+One&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #FFF9F0; background-image: linear-gradient(45deg, #fce4ec 25%, transparent 25%, transparent 50%, #fce4ec 50%, #fce4ec 75%, transparent 75%, transparent); background-size: 100px 100px; color: #463438; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
        .hidden { display: none !important; }
        .main-layout { display: flex; align-items: flex-start; justify-content: center; gap: 20px; margin-top: 20px; }
        .game-canvas { position: relative; width: 1950px; height: 628px; background: #fffaf5; border: 8px solid #463438; border-radius: 40px; overflow: hidden; box-shadow: 15px 15px 0px #FFB7C5;}
        #leaderboard-wrapper {position: fixed;left: -220px;top: 50px;transform: none;display: flex;z-index: 150;transition: left 0.5s cubic-bezier(0.16, 1, 0.3, 1);}
        #leaderboard-wrapper.expanded { left: 0; }
        .side-leaderboard-content { width: 220px;background: white;border: 6px solid #463438;border-left: none;border-radius: 0 30px 30px 0;padding: 15px;display: flex;flex-direction: column; max-height: 80vh; position: relative; z-index: 2; }
        .bookmark-tab {position: absolute;right: -45px;  top: 40px; width: 45px; height: 130px;background: #463438;border: 5px solid #463438; border-left: none; border-radius: 0 15px 15px 0; cursor: pointer; display: flex; align-items: center;justify-content: center;transition: background 0.2s, right 0.2s, width 0.2s; z-index: 1;}
        .bookmark-tab:hover {background: #FFB7C5; width: 55px;right: -55px;}  
        .bookmark-text { writing-mode: vertical-lr; color: white; font-weight: 900;font-size: 20px;text-shadow: 2px 2px 0 #463438;letter-spacing: 4px; user-select: none; }
        #rankList::-webkit-scrollbar { width: 6px; }
        #rankList::-webkit-scrollbar-thumb { background-color: #FFB7C5; border-radius: 10px; }
        .rank-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 2px dashed #fce4ec; font-weight: 900; font-size: 14px; color: #463438; }
        .rank-tab { flex: 1; padding: 4px; font-size: 12px; font-weight: 900; border: 3px solid #463438; border-radius: 12px; cursor: pointer; transition: all 0.1s; text-align: center; background: #fff; color: #463438;}
        .rank-tab.active { background: #463438; color: #fff; }      
        .node { width: 130px; height: 130px; background: white; border: 6px solid #463438; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: absolute; box-shadow: 3px 3px 0 #463438; z-index: 20; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .node img { width: 100px; height: auto; pointer-events: none; transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .fixed-number { position: absolute; bottom: -4px; right: 38px; font-size: 20px; font-weight: 900; color: #463438; pointer-events: none; z-index: 25; display: flex; gap: 1px; transition: opacity 0.3s, transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .bit { display: inline-block; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); padding: 0 1px; border-radius: 4px; }
        .connection-line { position: absolute; background: #463438; z-index: 10; cursor: pointer; transition: all 0.2s ease; opacity: 1; touch-action: none; }
        .connection-line::after { content: ''; position: absolute; top: -20px; bottom: -20px; left: 0; right: 0; background-color: transparent; z-index: 10; }
        @media (hover: hover) { .connection-line:hover { background: var(--hl-bg, #99C44D) !important; box-shadow: 0 0 15px var(--hl-shadow, rgba(153, 196, 77, 0.8)); height: 10px !important; z-index: 16; opacity: 1 !important; } }
        .line-highlight { background: var(--hl-bg, #99C44D) !important; box-shadow: 0 0 15px var(--hl-shadow, rgba(153, 196, 77, 0.8)) !important; height: 8px !important; z-index: 15; opacity: 1 !important; }
        .swap-active { background: var(--hl-bg, #99C44D) !important; box-shadow: 0 0 15px var(--hl-shadow, rgba(153, 196, 77, 0.8)) !important; height: 8px !important; z-index: 15 !important; opacity: 1 !important; border-top: none !important;}  
        .fish-wrapper { position: absolute; width: 80px; height: 80px; pointer-events: none; z-index: 30; display: flex; justify-content: center; align-items: center; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .fish-wrapper img.fish-img { width: 70px; height: auto; position: absolute; z-index: 2; top: 50%; transform: translateY(-50%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .fish-wrapper img.fish-bg-shape { width: 70px; height: auto; position: absolute; z-index: 1; filter: brightness(0) invert(1); opacity: 1; top: 50%; transform: translateY(-50%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .fish-label { background: rgba(70, 52, 56, 0.8); color: #fff; padding: 2px 5px; height: 26px; border-radius: 13px; display: flex; gap: 1px; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; z-index: 5; position: absolute; transition: opacity 0.3s, transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }       
        .hide-labels .fixed-number { opacity: 0; pointer-events: none; transform: scale(0.5); }
        .hide-labels .fish-label { opacity: 0; pointer-events: none; transform: scale(0.5); }
        .hide-labels .node > img { transform: scale(1.15); }
        .hide-labels .fish-wrapper > img.fish-img, .hide-labels .fish-wrapper > img.fish-bg-shape { transform: scale(1.15) translateY(-40%); }      
        .node img { transform: scale(1.05) translateY(-5px); }
        .fish-wrapper img.fish-img, .fish-wrapper img.fish-bg-shape { transform: scale(1.05) translateY(-50%); }
        body.labels-colorful .bit-2 { color: #629eed; } 
        body.labels-colorful .node .bit-1 { color: #555555; } 
        body.labels-colorful .fish-wrapper .bit-1 { color: #dddddd; } 
        body.labels-colorful .bit-0 { color: #FFB7C5; } 
        .mode-toggle-inline { width: 44px; height: 44px; background: #ffffff; border: 3px solid #463438; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; box-shadow: 0 3px 0 #463438; transition: all 0.1s; }
        .mode-toggle-inline:hover { transform: translateY(-2px); box-shadow: 0 5px 0 #463438; }
        .mode-toggle-inline:active { transform: translateY(2px); box-shadow: 0 1px 0 #463438; }
        #pro-panel { width: 0; opacity: 0; height: 628px; overflow: hidden; background: #fff; border: 0px solid #463438; border-radius: 40px; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .pro-active #pro-panel { width: 650px; opacity: 1; border: 8px solid #463438; padding: 20px; box-shadow: 10px 10px 0px #99C44D;}
        .panel-section-title { font-weight: 900; font-size: 18px; margin: 10px 0 1px; color: #463438; text-align: center; white-space: nowrap; }
        .game-btn { cursor: pointer; border: 5px solid #463438; border-radius: 60px; padding: 12px; font-size: 26px; font-weight: 900; color: #fff; text-shadow: 2px 2px 0 #463438; box-shadow: 0 6px 0 #463438; position: relative; transition: all 0.1s; display: inline-block; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
        .game-btn:active { top: 6px; box-shadow: 0 2px 0 #463438; }
        .btn-red { background: #FFB7C5; }
        .btn-green { background: #99C44D; }
        .multi-toggle-btn { background: #e2de6e; border: 4px solid #463438; border-radius: 20px; padding: 5px 15px; font-weight: 900; font-size: 20px; color: white; cursor: pointer; box-shadow: 0 4px 0 #463438; transition: all 0.1s; min-width: 140px; text-shadow: 2px 2px 0 #463438; }
        .multi-toggle-btn.mode-2 { background: #629eed; }
        .multi-toggle-btn.mode-4 { background: #b583e5; }
        .multi-toggle-btn:hover, .game-btn:hover, .mode-toggle-fixed:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #463438;}
        .multi-toggle-btn:active, .mode-toggle-fixed:active { transform: translateY(2px); box-shadow: 0 2px 0 #463438;}
        .func-btn { width: 100%; margin-top: 5px; padding: 14px; border-radius: 35px; font-weight: 900; font-size: 16px; border: 2.5px solid #463438; cursor: pointer; box-shadow: 0 4px 0 rgba(70,52,56,0.1); color: #463438; background: #fff;}
        .btn-reset { background: #FFF9F0; color: #463438; }
        .btn-undo { background: #FFB7C5 !important; color: #fff !important; border: 2.5px solid #463438 !important; opacity: 0.6; cursor: not-allowed; pointer-events: none;}
        .btn-undo.active { background: #FFB7C5 !important; border-color: #463438 !important; color: #fff !important; opacity: 1; cursor: pointer; box-shadow: 0 4px 0 #463438; pointer-events: auto;}
        .btn-undo.active:hover { background-color: #ff9fb2 !important; transform: translateY(-2px); box-shadow: 0 6px 0 #463438; }
        .func-btn:hover { background-color: #FFB7C5 !important; color: #fff !important; border-color: #463438 !important; transform: translateY(-2px); box-shadow: 0 3px 0 #463438; }
        #circuit-area { width: 1024px; height: 0; opacity: 0; background: #fff; border: 0px solid #463438; border-radius: 30px; margin-top: 20px; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); position: relative; overflow: hidden; }
        .pro-active #circuit-area { height: 210px; opacity: 1; border: 8px solid #463438; padding: 15px; box-shadow: 10px 10px 0px #FFB7C5;}
        #circuit-content-wrapper { position: relative; height: 150px; overflow-x: auto; margin-left: 45px; -ms-overflow-style: none; scrollbar-width: none; touch-action: pan-x; }
        #circuit-content-wrapper::-webkit-scrollbar { display: none; }
        #circuit-content { display: flex; height: 100%; padding: 0 10px 0 0; min-width: 100%; width: max-content; position: relative; background-image: linear-gradient(#463438,#463438), linear-gradient(#463438,#463438), linear-gradient(#463438,#463438); background-size: 100% 3px; background-repeat: no-repeat; background-position: 0 30px, 0 70px, 0 110px; }
        .mini-mode #circuit-content { background-image: none !important; }   
        .qubit-label { position: absolute; left: 0px; font-weight: 900; font-size: 16px; color: #463438; width: 35px; text-align: right; display: flex; align-items: center; justify-content: flex-end;}  
        .circuit-unit { box-sizing: content-box !important; min-width: 55px; width: 55px; max-width: 55px; flex: 0 0 55px; height: 140px; display: flex; flex-direction: column; position: relative; cursor: pointer; background-color: transparent !important; background-clip: padding-box; border-left: 0px solid transparent; border-right: 0px solid transparent; margin-left: 0px; margin-right: 0px; transition: background-color 0.2s ease, box-shadow 0.2s ease, border-left-width 0.25s cubic-bezier(0.2, 0.8, 0.2, 1), border-right-width 0.25s cubic-bezier(0.2, 0.8, 0.2, 1), transform 0.2s ease, opacity 0.2s ease; } 
        .mini-mode .circuit-unit { min-width: 110px; width: 110px; max-width: 110px; flex: 0 0 110px; height: 140px; margin-top: 0px; padding: 0 5px; }
        .circuit-unit:hover { background-color: var(--bg-hover) !important; border-radius: 12px; }
        .circuit-unit.selected-gate { background-color: var(--bg-hover) !important; border-radius: 12px; box-shadow: inset 0 0 0 3px var(--border-color) !important; }
        .control-dot { width: 14px; height: 14px; background: #463438; border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); z-index: 5; }
        .connection-v-line { position: absolute; width: 2.5px; background: #463438; left: 50%; transform: translateX(-50%); z-index: 3; }
        .circuit-target { position: absolute; width: 24px; height: 24px; border-radius: 50%; background: #fff; border: 2.5px solid #463438; left: 50%; transform: translate(-50%, -50%); z-index: 15; }
        .circuit-target::before { content: ""; position: absolute; width: 2.5px; height: 100%; background: #463438; left: 50%; transform: translateX(-50%); }
        .circuit-target::after { content: ""; position: absolute; width: 100%; height: 2.5px; background: #463438; top: 50%; transform: translateY(-50%); }        
        .mode-toggle-fixed { position: fixed; top: 20px; right: 20px; width: 70px; height: 70px; background: #fff; border: 5px solid #463438; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; box-shadow: 0 4px 0 #463438; z-index: 500; }
        #gate-scroll-area { position: relative; margin-top: 5px; flex: 1; min-height: 0; overflow-y: auto; width: 100%; padding: 10px; -ms-overflow-style: none; scrollbar-width: none; }
        #gate-scroll-area::-webkit-scrollbar { display: none; }
        :root { --cube-offset-x: 175px; }
        .pro-active { --cube-offset-x: 42px; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(70, 52, 56, 0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #FFF9F0; border: 8px solid #463438; border-radius: 40px; padding: 30px; text-align: center; width: 380px; box-shadow: 0 10px 0 #FFB7C5; color: #463438;}      
        #ios-indicator { position: absolute; top: 0; left: 0; transform: translate(-50%, -120%) scale(0.8); background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(15px); border-radius: 50px; padding: 6px 18px; display: flex; align-items: center; box-shadow: 0 8px 24px rgba(70,52,56,0.12); opacity: 0; transition: opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1), transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1000; pointer-events: none; border: 1px solid rgba(70,52,56,0.35); }
        #ios-indicator.active { opacity: 1; transform: translate(-50%, -120%) scale(1); }
        .ind-fraction { color: #463438; font-size: 16px; font-weight: 900; }       
        .gate-btn-v2 { position: relative; height: 75px; width: 60px; display: flex; align-items: center; justify-content: center; padding: 0; border: 2px solid #463438; border-radius: 8px; cursor: pointer; transition: all 0.2s; box-shadow: 0 3px 6px rgba(0,0,0,0.1); background-size: 60% 1.5px; background-repeat: no-repeat; background-position: center 18px, center 36.5px, center 55px; margin: auto;}
        .gate-btn-v2:hover { background-color: #FFB7C5 !important; filter: brightness(1.05); transform: scale(1.05); z-index: 10; }
        .btn-highlight { transform: scale(1.15); box-shadow: 0 0 10px rgba(0,0,0,0.3); border: 4px solid #99C44D !important; z-index: 10; filter: brightness(1.1); background-color: #FFB7C5 !important; }        
        .hyper-line { stroke: #463438; stroke-width: 0.6; opacity: 0.3; }
        .hyper-line-hi { stroke: #FFB7C5; stroke-width: 2.5; opacity: 1; transition: stroke 0.2s; }
        .gate-btn-v2 .hyper-line-hi { stroke: #f78790; }
        .gate-btn-v2:hover .hyper-line-hi { stroke: #ffffff !important; }
        .btn-highlight .hyper-line-hi { stroke: #ffffff !important; }
        .circuit-unit:hover .hyper-line-hi, .circuit-unit.selected-gate .hyper-line-hi { stroke: #99C44D !important; }      
        .gate-v-line { position: absolute; width: 1.5px; background: #463438; left: 50%; transform: translateX(-50%); z-index: 1; }
        .gate-dot { position: absolute; width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid #463438; left: 50%; transform: translate(-50%, -50%); z-index: 2; }
        .gate-dot.fill { background: #463438; }
        .gate-dot.empty { background: #fff; }
        .gate-target-circle { position: absolute; width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid #463438; background: #fff; left: 50%; transform: translate(-50%, -50%); z-index: 3; }
        .gate-target-circle::before { content: ''; position: absolute; width: 100%; height: 1.5px; top: 50%; left: 0; transform: translateY(-50%); background: #463438; }
        .gate-target-circle::after { content: ''; position: absolute; height: 100%; width: 1.5px; left: 50%; top: 0; transform: translateX(-50%); background: #463438; }      
        #canvas-bottom-btns {position: absolute;bottom: 20px;right: 30px; display: flex;flex-direction: column; gap: 10px;z-index: 100;}
        #canvas-bottom-btns .func-btn { margin-top: 0; width: 90px; font-size: 14px;padding: 8px 5px; text-transform: uppercase; border-width: 3px;}
        .pro-active #canvas-bottom-btns {display: none !important;}
        canvas, .game-canvas, .circuit-unit, .node, .gate-btn-v2 { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; touch-action: manipulation; }       
        .drag-target { border-left-width: 35px !important; position: relative; }
        .drag-target.right { border-left-width: 0px !important; border-right-width: 35px !important; }
        .circuit-unit::before { content: ''; position: absolute; top: 10px; bottom: 10px; width: 4px; background-color: #FFB7C5; border-radius: 4px; z-index: 200; pointer-events: none; opacity: 0; transition: opacity 0.2s ease; }
        .drag-target::before { opacity: 1; left: -19.5px; right: auto; }
        .drag-target.right::before { opacity: 1; left: auto; right: -19.5px; }
    </style>
</head>
<body id="body-root" class="mini-mode hide-labels">
    <div id="mode-toggle" class="mode-toggle-fixed" onclick="toggleProMode()">👁️</div>
    <div id="hyper-toggle" class="mode-toggle-fixed hidden" onclick="toggleMiniHypercube()" style="top: 100px;">🧊</div>
    <div id="logic-toggle" class="mode-toggle-fixed hidden" onclick="toggleQuantumMode()" style="top: 180px;">🪄</div>   
    <div id="leaderboard-wrapper">
        <div class="side-leaderboard-content">
            <h2 class="text-xl font-black mb-3 text-center" style="color: #463438;">🏆 TOP CATS</h2>
            <div class="flex gap-2 mb-3">
                <button onclick="renderRank('steps')" id="tab-steps" class="rank-tab active">STEPS</button>
                <button onclick="renderRank('time')" id="tab-time" class="rank-tab">TIME</button>
            </div>
            <div id="rankList" class="flex-grow overflow-y-auto space-y-1 pr-1">
                <p class="text-center italic text-gray-400 mt-10 text-sm">Loading...</p>
            </div>
        </div>
        <div class="bookmark-tab" onclick="toggleLeaderboard()">
            <div class="bookmark-text">RANK</div>
        </div>
    </div>
    <div class="w-full max-w-5xl">
        <div class="flex justify-between w-full px-4 mb-4 items-center mt-6">
            <div class="text-3xl font-black" style="color: #463438;">STEPS: <span id="step-count">0</span> | TIME: <span id="timer">0</span>s</div>
            <div class="flex items-center gap-4 ml-auto">
                <button id="label-toggle-inline" class="mode-toggle-inline" onclick="toggleLabels()">🌈</button>
                <button id="mode-btn" class="multi-toggle-btn" onclick="cycleLineMode()">Mode: 1</button>
                <div class="text-3xl font-black ml-8" style="color: #7bc202;">LEVEL 6</div>
            </div>
        </div>
        <div class="main-layout">
            <div id="pro-panel">
                <div id="panel-gate-title" class="panel-section-title">Transformations</div>
                <div id="gate-scroll-area">
                    <div class="flex flex-col gap-2 w-full" id="gate-grid"></div>
                </div>
                <div class="panel-section-title mt-2">Control</div>
                <button class="func-btn btn-reset" onclick="resetCircuit()">Reset Circuit</button>
                <button id="undo-btn" class="func-btn btn-undo" onclick="undo()">Undo Step</button>
            </div>
            <div class="game-canvas" id="main-canvas">
                <div id="ios-indicator">
                    <span class="ind-fraction" id="ind-fraction">1 / 2</span>
                    <span class="ind-label" id="ind-label"></span>
                </div>
                <div id="lines-layer"></div>
                <div id="nodes-layer"></div>
                <div id="fishes-layer"></div>
                <div id="canvas-bottom-btns">
                    <button class="func-btn btn-reset" onclick="resetCircuit()">RESET</button>
                    <button id="undo-btn-bottom" class="func-btn btn-undo" onclick="undo()">UNDO</button>
                </div>
            </div>
        </div>
        <div id="circuit-area" class="mx-auto">
            <div id="circuit-diagram-title" class="circuit-title font-black text-xl text-center" style="color: #463438;">Paths</div>
            <div id="q0-label" class="qubit-label" style="top: 60px;">d1</div>
            <div id="q1-label" class="qubit-label" style="top: 100px;">d2</div>
            <div id="q2-label" class="qubit-label" style="top: 140px;">d3</div>
            <div id="circuit-content-wrapper"><div id="circuit-content"></div></div>
        </div>
        <div class="w-full text-center mt-6 mb-6">
            <a href="index.html" class="game-btn btn-red px-16">GIVE UP</a>
        </div>
    </div>
    <div id="victoryModal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-5xl font-black mb-4" style="color: #463438;">MEOW!</h2>
            <h2 class="text-5xl font-black mb-4" style="color: #463438;">🐾</h2>
            <p id="victoryMsg" class="text-xl font-bold mb-6"></p>
            <button onclick="location.href='index.html'" class="game-btn btn-green w-full mb-4">KEEP GOING</button>
            <button onclick="viewInLab().style.display='none'" class="game-btn btn-red w-full">View Circuit</button>
        </div>
    </div>
    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzR0J0VXyl5ayKwDXlHimc4WS1FjvGEb2-gTBMhum8APQKfDHxc5wsiWRkNqkxJrocMOw/exec';
        let steps = 0, time = 0, isPro = false, showMiniHypercube = true, isKidsMode = true, labelState = 0, timerInterval, gateHistory = [], isSolved = false;
        let selectedIndices = [];
        let actionStack = [];
        let fishAtNode = [1, 0, 3, 2, 5, 7, 4, 6];
        let lineMode = 1;
        let hoverLine = null;
        let currentOptionIndex = -1;
        let currentOptions = [];
        let draggedIndex = null;
        let leaderboardData;
        let mobileDragging = false;
        let dragGhost = null;
        let originalDragEl = null;
        let mDragIndex = null;
        let isTouchDevice = ('ontouchstart' in window || navigator.maxTouchPoints > 0);
        let lockedLineId = null;
        let hasScrolled = false;
        let lastTiltDirection = 0;
        const TILT_THRESHOLD = 15;
        const RETURN_THRESHOLD = 10;
        let gyroPermissionGranted = false;
        let lastSwipeTime = 0;
        let canvasTouchStartX = 0, canvasTouchStartY = 0;
        let lastCanvasX = 0, lastCanvasY = 0;
        let isCanvasSwiping = false;
        let targetScrollSpeed = 0, currentScrollSpeed = 0, autoScrollRAF = null;
        let targetGateScrollSpeed = 0, currentGateScrollSpeed = 0, gateAutoScrollRAF = null;

            gateScrollArea.addEventListener('dragenter', () => { gateRectCache = gateScrollArea.getBoundingClientRect(); });
            gateScrollArea.addEventListener('dragover', (e) => { if (draggedIndex !== null) { e.preventDefault(); handleGateScroll(e); } });
            gateScrollArea.addEventListener('dragleave', () => { targetGateScrollSpeed = 0; });
            gateScrollArea.addEventListener('drop', () => { targetGateScrollSpeed = 0; gateRectCache = null; });            
            canvas.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    canvasTouchStartX = e.touches[0].clientX;
                    canvasTouchStartY = e.touches[0].clientY;
                    lastCanvasX = canvasTouchStartX;
                    lastCanvasY = canvasTouchStartY;
                    isCanvasSwiping = false;
                } else if (lockedLineId && e.touches.length >= 2) {
                    e.preventDefault();
                    if (lineMode === 4 && hoverLine) applyGate(`X${2 - hoverLine.dim}`);
                    else if (lineMode === 1 && hoverLine) applyGate(`SWAP_${hoverLine.i}_${hoverLine.j}`);
                    else if (hasScrolled && currentOptions[currentOptionIndex]) applyGate(currentOptions[currentOptionIndex].gateType);
                }
            }, { passive: false });
            canvas.addEventListener('touchmove', (e) => {
                if (e.touches.length === 1 && lockedLineId && lineMode !== 1 && lineMode !== 4) {
                    let currentX = e.touches[0].clientX, currentY = e.touches[0].clientY;
                    let diffX = currentX - lastCanvasX, diffY = currentY - lastCanvasY;
                    if (Math.abs(currentX - canvasTouchStartX) > 8 || Math.abs(currentY - canvasTouchStartY) > 8) {
                        isCanvasSwiping = true;
                        if (e.cancelable) e.preventDefault();
                    }
                    if (isCanvasSwiping) {
                        if (Math.abs(diffX) > Math.abs(diffY)) {
                            let steps = Math.floor(Math.abs(diffX) / 80);
                            if (steps > 0) {
                                let dir = diffX > 0 ? 1 : -1;
                                let shift = (dir * steps) % currentOptions.length;
                                currentOptionIndex = (((currentOptionIndex + shift) % currentOptions.length) + currentOptions.length) % currentOptions.length;
                                lastCanvasX += dir * steps * 80;
                                hasScrolled = true;
                                showIndicatorScrolled();
                            }
                        } else {
                            let steps = Math.floor(Math.abs(diffY) / 80);
                            if (steps > 0) {
                                let dir = diffY > 0 ? 1 : -1;
                                let shift = (dir * steps) % currentOptions.length;
                                currentOptionIndex = (((currentOptionIndex + shift) % currentOptions.length) + currentOptions.length) % currentOptions.length;
                                lastCanvasY += dir * steps * 80;
                                hasScrolled = true;
                                showIndicatorScrolled();
                            }
                        }
                    }
                }
            }, { passive: false });
            canvas.addEventListener('touchend', (e) => {
                if (!isCanvasSwiping && lockedLineId && e.changedTouches.length === 1) {
                    const target = document.elementFromPoint(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
                    if (target && !target.classList.contains('connection-line')) {
                        cancelLock();
                    }
                }
                isCanvasSwiping = false;
            });
            canvas.addEventListener('mousemove', (e) => { if (indicator.classList.contains('active') && !isTouchDevice) { const rect = canvas.getBoundingClientRect(); indicator.style.left = (e.clientX - rect.left) + 'px'; indicator.style.top = (e.clientY - rect.top - 25) + 'px'; } });
            canvas.addEventListener('mousedown', (e) => { if (lockedLineId && !isTouchDevice && e.button === 0 && !e.target.classList.contains('connection-line')) cancelLock(); });
            canvas.addEventListener('contextmenu', (e) => { if (lockedLineId && !isTouchDevice) { e.preventDefault(); if (lineMode === 4 && hoverLine) applyGate(`X${2 - hoverLine.dim}`); else if (lineMode === 1 && hoverLine) applyGate(`SWAP_${hoverLine.i}_${hoverLine.j}`); else if (currentOptions[currentOptionIndex]) applyGate(currentOptions[currentOptionIndex].gateType); } });
            document.addEventListener('wheel', (e) => { if (!lockedLineId || lineMode === 1 || lineMode === 4 || isTouchDevice) return; if (!e.target.closest('#gate-scroll-area') && !e.target.closest('#circuit-content-wrapper')) { e.preventDefault(); if (e.deltaY > 0) currentOptionIndex = (currentOptionIndex + 1) % currentOptions.length; else currentOptionIndex = (currentOptionIndex - 1 + currentOptions.length) % currentOptions.length; hasScrolled = true; showIndicatorScrolled(); } }, { passive: false });
        };
    </script>
