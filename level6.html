<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meowtopia - Level 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #FEF3C7; color: #000; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; }
        .hidden { display: none !important; }
        .main-layout { display: flex; align-items: flex-start; justify-content: center; gap: 20px; margin-top: 20px; }
        .game-canvas { position: relative; width: 1950px; height: 628px; background: #EEE8D3; border: 8px solid #000; border-radius: 40px; overflow: hidden; }
        .node { width: 130px; height: 130px; background: white; border: 6px solid #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: absolute; box-shadow: 3px 3px 0 #000; z-index: 20; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .node img { width: 100px; height: auto; pointer-events: none; }
        .fixed-number { position: absolute; bottom: -4px; right: 41px; font-size: 20px; font-weight: 900; color: #000; pointer-events: none; z-index: 25; }
        .connection-line { position: absolute; background: #000; z-index: 10; cursor: pointer; transition: all 0.2s ease; opacity: 1; }
        .connection-line:hover { background: #ffc822 !important; box-shadow: 0 0 15px rgba(251, 191, 36, 0.8); height: 10px !important; z-index: 16; }
        .fish-wrapper { position: absolute; width: 80px; pointer-events: none; z-index: 30; display: flex; flex-direction: column; align-items: center; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .fish-wrapper img { width: 70px; height: auto; }
        .fish-label { background: #000000b6; color: #fff; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; margin-bottom: -45px; z-index: 5; position: relative; top: -8px; }
        #pro-panel { width: 0; opacity: 0; height: 628px; overflow: hidden; background: #fff; border: 0px solid #000; border-radius: 40px; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .pro-active #pro-panel { width: 650px; opacity: 1; border: 8px solid #000; padding: 20px; }
        .panel-section-title { font-weight: 900; font-size: 18px; margin: 10px 0 1px; color: #000; text-align: center; white-space: nowrap; }
        .game-btn { cursor: pointer; border: 5px solid #000; border-radius: 60px; padding: 12px; font-size: 26px; font-weight: 900; color: #fff; text-shadow: 2px 2px 0 #000; box-shadow: 0 4px 0 #000; position: relative; transition: all 0.1s; display: inline-block; }
        .game-btn:active { top: 6px; box-shadow: 0 2px 0 #000; }
        .btn-red { background: #EF4444; }
        .btn-green { background: #22C55E; }
        .gate-btn-v2 { background: #e0e0e0; border: 2.5px solid #000; border-radius: 30px; padding: 5px; font-weight: 800; font-size: 12px; color: #000; cursor: pointer; box-shadow: 0 3px 6px rgba(0,0,0,0.1); transition: all 0.1s; text-align: center; }
        .gate-btn-v2:active { transform: translateY(2px); box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .gate-btn-v2:hover, .func-btn:hover { background-color: #fee58b !important; border-color: #000 !important; color: #000 !important; box-shadow: 0 0 5px rgba(0,0,0,0.7), 0 3px 0 #000 !important; transform: translateY(-2px); }
        .func-btn { width: 100%; margin-top: 5px; padding: 14px; border-radius: 35px; font-weight: 900; font-size: 16px; border: 2.5px solid #000; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.1); }
        .btn-reset { background: #e0e0e0; color: #000; }
        .btn-undo { background: #e8a098 !important; color: #fff !important; border: 2.5px solid #cb867d !important; opacity: 0.6; cursor: not-allowed; }
        .btn-undo.active { background: #EF4444 !important; border-color: #000 !important; color: #fff !important; opacity: 1; cursor: pointer; box-shadow: 0 4px 0 #000; }
        #circuit-area { width: 1024px; height: 0; opacity: 0; background: #fff; border: 0px solid #000; border-radius: 30px; margin-top: 20px; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); position: relative; overflow: hidden; }
        .pro-active #circuit-area { height: 210px; opacity: 1; border: 8px solid #000; padding: 15px; }
        #circuit-content-wrapper { position: relative; height: 150px; overflow-x: auto; margin-left: 45px; -ms-overflow-style: none; scrollbar-width: none; }
        #circuit-content-wrapper::-webkit-scrollbar { display: none; }
        #circuit-content { display: flex; height: 100%; padding: 0 10px; min-width: 100%; width: max-content; position: relative; background-image: linear-gradient(#000,#000), linear-gradient(#000,#000), linear-gradient(#000,#000); background-size: 100% 3px; background-repeat: no-repeat; background-position: 0 30px, 0 70px, 0 110px; }
        .qubit-label { position: absolute; left: 18px; font-weight: 900; font-size: 16px; color: #000; }
        .circuit-unit { min-width: 55px; height: 140px; display: flex; flex-direction: column; position: relative; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
        .circuit-unit:hover { background: rgba(239, 68, 68, 0.15); border-radius: 12px; }
        .circuit-unit.selected { background: rgba(40, 180, 255, 0.3) !important; border-radius: 12px; box-shadow: inset 0 0 0 2px #2a5cad; }
        .control-dot { width: 14px; height: 14px; background: #000; border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); z-index: 5; }
        .connection-v-line { position: absolute; width: 2.5px; background: #000; left: 50%; transform: translateX(-50%); z-index: 3; }
        .circuit-target { position: absolute; width: 24px; height: 24px; border-radius: 50%; background: #fff; border: 2.5px solid #000; left: 50%; transform: translate(-50%, -50%); z-index: 15; }
        .circuit-target::before { content: ""; position: absolute; width: 2.5px; height: 100%; background: #000; left: 50%; transform: translateX(-50%); }
        .circuit-target::after { content: ""; position: absolute; width: 100%; height: 2.5px; background: #000; top: 50%; transform: translateY(-50%); }
        .mode-toggle-fixed { position: fixed; top: 20px; right: 20px; width: 70px; height: 70px; background: #fff; border: 5px solid #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; box-shadow: 0 4px 0 #000; z-index: 500; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #F8F3DC; border: 8px solid #000; border-radius: 40px; padding: 30px; text-align: center; width: 380px; box-shadow: 0 10px 0 #000; }
        #gate-scroll-area { margin-top: 5px; max-height: 350px; overflow-y: auto; width: 100%; padding: 10px; -ms-overflow-style: none; scrollbar-width: none; }
        #gate-scroll-area::-webkit-scrollbar { display: none; }
        :root { --cube-offset-x: 175px; }
        .pro-active { --cube-offset-x: 42px; }
    </style>
</head>
<body id="body-root">
    <div id="mode-toggle" class="mode-toggle-fixed" onclick="togglePro()">👁️</div>
    <div class="w-full max-w-5xl">
        <div class="flex justify-between w-full px-4 mb-4">
            <div class="text-3xl font-black">STEPS: <span id="step-count">0</span> | TIME: <span id="timer">0</span></div>
            <div class="text-3xl font-black text-green-600">LEVEL 6</div>
        </div>
        <div class="main-layout">
            <div id="pro-panel">
                <div class="panel-section-title">Quantum Gates</div>
                <div id="gate-scroll-area">
                    <div class="grid grid-cols-2 gap-1 w-full">
                        <button class="gate-btn-v2 col-span-2 bg-blue-100" onclick="applyGate('X0')">X q0</button>
                        <button class="gate-btn-v2 col-span-2 bg-blue-100" onclick="applyGate('X1')">X q1</button>
                        <button class="gate-btn-v2 col-span-2 bg-blue-100" onclick="applyGate('X2')">X q2</button>
                        <button class="gate-btn-v2" onclick="applyGate('CX01')">CNOT 0→1</button>
                        <button class="gate-btn-v2" onclick="applyGate('CX10')">CNOT 1→0</button>
                        <button class="gate-btn-v2" onclick="applyGate('CX02')">CNOT 0→2</button>
                        <button class="gate-btn-v2" onclick="applyGate('CX20')">CNOT 2→0</button>
                        <button class="gate-btn-v2" onclick="applyGate('CX12')">CNOT 1→2</button>
                        <button class="gate-btn-v2" onclick="applyGate('CX21')">CNOT 2→1</button>
                        <button class="gate-btn-v2" onclick="applyGate('C0X01')">0CNOT 0→1</button>
                        <button class="gate-btn-v2" onclick="applyGate('C0X10')">0CNOT 1→0</button>
                        <button class="gate-btn-v2" onclick="applyGate('C0X02')">0CNOT 0→2</button>
                        <button class="gate-btn-v2" onclick="applyGate('C0X20')">0CNOT 2→0</button>
                        <button class="gate-btn-v2" onclick="applyGate('C0X12')">0CNOT 1→2</button>
                        <button class="gate-btn-v2" onclick="applyGate('C0X21')">0CNOT 2→1</button>
                        <button class="gate-btn-v2" onclick="applyGate('TOF012')">TOF(0,1,2)</button>
                        <button class="gate-btn-v2" onclick="applyGate('TOF0p1p2')">TOF(0',1',2)</button>
                        <button class="gate-btn-v2" onclick="applyGate('TOF0p12')">TOF(0',1,2)</button>
                        <button class="gate-btn-v2" onclick="applyGate('TOF01p2')">TOF(0,1',2)</button>
                        <button class="gate-btn-v2" onclick="applyGate('TOF021')">TOF(0,2,1)</button>
                        <button class="gate-btn-v2" onclick="applyGate('TOF0p2p1')">TOF(0',2',1)</button>
                        <button class="gate-btn-v2" onclick="applyGate('TOF0p21')">TOF(0',2,1)</button>
                        <button class="gate-btn-v2" onclick="applyGate('TOF02p1')">TOF(0,2',1)</button>
                        <button class="gate-btn-v2" onclick="applyGate('TOF120')">TOF(1,2,0)</button>
                        <button class="gate-btn-v2" onclick="applyGate('TOF1p2p0')">TOF(1',2',0)</button>
                        <button class="gate-btn-v2" onclick="applyGate('TOF1p20')">TOF(1',2,0)</button>
                        <button class="gate-btn-v2" onclick="applyGate('TOF12p0')">TOF(1,2',0)</button>
                    </div>
                </div>
                <div class="panel-section-title mt-2">Control</div>
                <button class="func-btn btn-reset" onclick="resetCircuit()">Reset Circuit</button>
                <button id="undo-btn" class="func-btn btn-undo" onclick="undo()">Undo Step</button>
            </div>
            <div class="game-canvas" id="main-canvas">
                <div id="lines-layer"></div>
                <div id="nodes-layer"></div>
                <div id="fishes-layer"></div>
            </div>
        </div>
        <div id="circuit-area" class="mx-auto">
            <div class="circuit-title font-black text-xl text-center">Circuit Diagram</div>
            <div class="qubit-label" style="top: 60px;">q0</div>
            <div class="qubit-label" style="top: 100px;">q1</div>
            <div class="qubit-label" style="top: 140px;">q2</div>
            <div id="circuit-content-wrapper"><div id="circuit-content"></div></div>
        </div>
        <div class="w-full text-center mt-6 mb-6">
            <a href="index.html" class="game-btn btn-red px-16">GIVE UP</a>
        </div>
    </div>
    <div id="victoryModal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-5xl font-black mb-4">MEOW!</h2>
            <h2 class="text-5xl font-black mb-4">🐾</h2>
            <p id="victoryMsg" class="text-xl font-bold mb-6"></p>
            <button onclick="location.href='index.html'" class="game-btn btn-green w-full mb-4">KEEP GOING</button>
            <button onclick="document.getElementById('victoryModal').style.display='none'" class="game-btn btn-red w-full">VIEW CIRCUIT</button>
        </div>
    </div>
    <script>
        let steps = 0,
            time = 0,
            isPro = false,
            timerInterval,
            gateHistory = [],
            historyStack = [[]],
            selectedIndices = [],
            fishAtNode = [1, 0, 3, 2, 5, 7, 4, 6],
            isSolved = false;
        const pop = new Audio('pop.m4a'),
            meow = new Audio('meow.m4a'),
            getDynamicOffset = () => parseInt(getComputedStyle(document.body).getPropertyValue('--cube-offset-x')) || 0;
        const nodePositions = [
            { t: 150, get l() { return 135 + getDynamicOffset() } },
            { t: 150, get l() { return 350 + getDynamicOffset() } },
            { t: 330, get l() { return 135 + getDynamicOffset() } },
            { t: 330, get l() { return 350 + getDynamicOffset() } },
            { t: 20,  get l() { return -10 + getDynamicOffset() } },
            { t: 20,  get l() { return 510 + getDynamicOffset() } },
            { t: 460, get l() { return -10 + getDynamicOffset() } },
            { t: 460, get l() { return 510 + getDynamicOffset() } }
        ];
        window.onload = () => {
            initGameLayout();
            drawStaticLines();
            updateFishUI();
            updateUndoStatus();
            timerInterval = setInterval(() => {
                time++;
                document.getElementById('timer').innerText = time;
            }, 1000);
            document.getElementById('circuit-content-wrapper').addEventListener('wheel', (e) => {
                e.preventDefault();
                e.currentTarget.scrollLeft += e.deltaY;
            });
        };
        function initGameLayout() {
            const nL = document.getElementById('nodes-layer'),
                fL = document.getElementById('fishes-layer');
            for (let i = 0; i < 8; i++) {
                let bin = i.toString(2).padStart(3, '0');
                nL.innerHTML += `<div class="node" id="node-${i}" style="top:${nodePositions[i].t}px; left:${nodePositions[i].l}px;"><div class="fixed-number">${bin}</div><img src="./image/Cat${i+1}.svg"></div>`;
                fL.innerHTML += `<div id="fish-${i}" class="fish-wrapper"><div class="fish-label">${bin}</div><img src="./image/Fish${i+1}.svg"></div>`;
            }
        }
        function drawStaticLines() {
            const layer = document.getElementById('lines-layer');
            layer.innerHTML = '';
            [[0, 1], [1, 3], [3, 2], [2, 0], [4, 5], [5, 7], [7, 6], [6, 4], [0, 4], [1, 5], [2, 6], [3, 7]].forEach(e => createLine(e[0], e[1]));
        }
        function createLine(i, j) {
            const n1 = nodePositions[i],
                n2 = nodePositions[j],
                x1 = n1.l + 52,
                y1 = n1.t + 52,
                x2 = n2.l + 52,
                y2 = n2.t + 52;
            const len = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2),
                ang = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;
            const line = document.createElement('div');
            line.className = 'connection-line';
            line.style.cssText = `width:${len}px; height:4px; left:${x1}px; top:${y1}px; transform:rotate(${ang}deg); transform-origin:0 50%;`;
            line.onclick = () => swapNodes(i, j);
            document.getElementById('lines-layer').appendChild(line);
        }
        function swapNodes(idxA, idxB) {
            if (isSolved) return;
            pop.play();
            let target = (idxA ^ idxB === 4) ? 0 : (idxA ^ idxB === 2) ? 1 : 2;
            let ctrl = [0, 1, 2].filter(c => c !== target);
            let b = idxA.toString(2).padStart(3, '0').split('').map(Number);
            const gateStr = `TOF${ctrl[0]}${b[ctrl[0]] ? '' : 'p'}${ctrl[1]}${b[ctrl[1]] ? '' : 'p'}${target}_SWAP_${idxA}_${idxB}`;
            if(selectedIndices.length > 0) {
                replaceLogic(gateStr);
            } else {
                gateHistory.push(gateStr);
                historyStack.push([...gateHistory]);
                let temp = fishAtNode[idxA];
                fishAtNode[idxA] = fishAtNode[idxB];
                fishAtNode[idxB] = temp;
                steps = gateHistory.length;
                finishMove();
            }
        }
        function togglePro() {
            isPro = !isPro;
            document.getElementById('body-root').classList.toggle('pro-active', isPro);
            document.getElementById('mode-toggle').innerText = isPro ? "⚡️" : "👁️";
            let start = Date.now(),
                loop = () => {
                    updateNodePositionsUI();
                    drawStaticLines();
                    updateFishUI();
                    if (Date.now() - start < 600) requestAnimationFrame(loop);
                };
            requestAnimationFrame(loop);
        }
        function updateNodePositionsUI() {
            for (let i = 0; i < 8; i++) {
                let n = document.getElementById(`node-${i}`);
                if (n) {
                    n.style.top = nodePositions[i].t + "px";
                    n.style.left = nodePositions[i].l + "px";
                }
            }
        }
        function replaceLogic(newGate) {
            let targetIdx = Math.min(...selectedIndices);
            let newHistory = [];
            for(let i=0; i<gateHistory.length; i++) {
                if (i === targetIdx) {
                    newHistory.push(newGate);
                } else if (!selectedIndices.includes(i)) {
                    newHistory.push(gateHistory[i]);
                }
            }
            gateHistory = newHistory;
            selectedIndices = [];
            historyStack.push([...gateHistory]);
            recalculate();
        }
        function applyGate(type) {
            if (isSolved) return;
            pop.currentTime = 0; pop.play();
            if (selectedIndices.length > 0) {
                replaceLogic(type);
            } else {
                executeLogic(type);
                gateHistory.push(type);
                historyStack.push([...gateHistory]);
                steps = gateHistory.length;
                finishMove();
            }
        }
        function executeLogic(type) {
            if (type.includes('_SWAP_')) {
                let p = type.split('_'),
                    iA = parseInt(p[2]),
                    iB = parseInt(p[3]);
                let temp = fishAtNode[iA];
                fishAtNode[iA] = fishAtNode[iB];
                fishAtNode[iB] = temp;
                return;
            }
            let pm = Array.from({ length: 8 }, (_, p) => {
                let b = p.toString(2).padStart(3, '0').split('').map(Number);
                if (type === 'X0') b[0] ^= 1;
                else if (type === 'X1') b[1] ^= 1;
                else if (type === 'X2') b[2] ^= 1;
                else if (type === 'CX01' && b[0]) b[1] ^= 1;
                else if (type === 'CX10' && b[1]) b[0] ^= 1;
                else if (type === 'CX02' && b[0]) b[2] ^= 1;
                else if (type === 'CX20' && b[2]) b[0] ^= 1;
                else if (type === 'CX12' && b[1]) b[2] ^= 1;
                else if (type === 'CX21' && b[2]) b[1] ^= 1;
                else if (type === 'C0X01' && !b[0]) b[1] ^= 1;
                else if (type === 'C0X10' && !b[1]) b[0] ^= 1;
                else if (type === 'C0X02' && !b[0]) b[2] ^= 1;
                else if (type === 'C0X20' && !b[2]) b[0] ^= 1;
                else if (type === 'C0X12' && !b[1]) b[2] ^= 1;
                else if (type === 'C0X21' && !b[2]) b[1] ^= 1;
                else if (type === 'TOF012' && b[0] && b[1]) b[2] ^= 1;
                else if (type === 'TOF0p1p2' && !b[0] && !b[1]) b[2] ^= 1;
                else if (type === 'TOF0p12' && !b[0] && b[1]) b[2] ^= 1;
                else if (type === 'TOF01p2' && b[0] && !b[1]) b[2] ^= 1;
                else if (type === 'TOF021' && b[0] && b[2]) b[1] ^= 1;
                else if (type === 'TOF0p2p1' && !b[0] && !b[2]) b[1] ^= 1;
                else if (type === 'TOF0p21' && !b[0] && b[2]) b[1] ^= 1;
                else if (type === 'TOF02p1' && b[0] && !b[2]) b[1] ^= 1;
                else if (type === 'TOF120' && b[1] && b[2]) b[0] ^= 1;
                else if (type === 'TOF1p2p0' && !b[1] && !b[2]) b[0] ^= 1;
                else if (type === 'TOF1p20' && !b[1] && b[2]) b[0] ^= 1;
                else if (type === 'TOF12p0' && b[1] && !b[2]) b[0] ^= 1;
                return parseInt(b.join(''), 2);
            });
            let newFishAtNode = new Array(8);
            for (let oldIdx = 0; oldIdx < 8; oldIdx++) {
                let newIdx = pm[oldIdx];
                newFishAtNode[newIdx] = fishAtNode[oldIdx];
            }
            fishAtNode = newFishAtNode;
        }
        function recalculate() {
            fishAtNode = [1, 0, 3, 2, 5, 7, 4, 6];
            let h = [...gateHistory];
            gateHistory = [];
            h.forEach(g => {
                executeLogic(g);
                gateHistory.push(g);
            });
            steps = gateHistory.length;
            finishMove();
        }
        function finishMove() {
            document.getElementById('step-count').innerText = steps;
            updateFishUI();
            renderCircuit();
            checkWin();
        }
        function updateFishUI() {
            for (let nI = 0; nI < 8; nI++) {
                const fI = fishAtNode[nI],
                    f = document.getElementById(`fish-${fI}`),
                    n = nodePositions[nI];
                if (f && n) {
                    f.style.top = (n.t + 78) + "px";
                    f.style.left = (n.l + 22) + "px";
                }
            }
        }
        function renderCircuit() {
            const c = document.getElementById('circuit-content');
            c.innerHTML = '';
            gateHistory.forEach((g, idx) => {
                const u = document.createElement('div');
                u.className = 'circuit-unit' + (selectedIndices.includes(idx) ? ' selected' : '');
                u.onclick = (e) => {
                    if (isSolved) return;
                    pop.currentTime = 0; pop.play();
                    if (e.ctrlKey) {
                        if (selectedIndices.includes(idx)) {
                            selectedIndices = selectedIndices.filter(i => i !== idx);
                        } else {
                            selectedIndices.push(idx);
                        }
                        renderCircuit();
                    } else {
                        selectedIndices = [];
                        gateHistory.splice(idx, 1);
                        historyStack.push([...gateHistory]);
                        recalculate();
                    }
                };
                let ctrl = [],
                    target = -1,
                    zero = [];
                if (g.startsWith('X')) target = parseInt(g[1]);
                else if (g.startsWith('CX')) {
                    ctrl = [parseInt(g[2])];
                    target = parseInt(g[3]);
                } else if (g.startsWith('C0X')) {
                    ctrl = [parseInt(g[3])];
                    target = parseInt(g[4]);
                    zero = [parseInt(g[3])];
                } else if (g.startsWith('TOF')) {
                    let s = g.split('_')[0].replace('TOF', ''),
                        parts = [];
                    for (let i = 0; i < s.length; i++) {
                        if (s[i + 1] === 'p') {
                            parts.push({ v: parseInt(s[i]), p: true });
                            i++;
                        } else parts.push({ v: parseInt(s[i]), p: false });
                    }
                    target = parts.pop().v;
                    parts.forEach(p => {
                        ctrl.push(p.v);
                        if (p.p) zero.push(p.v);
                    });
                }
                if (ctrl.length > 0) {
                    let min = Math.min(...ctrl, target),
                        max = Math.max(...ctrl, target);
                    const v = document.createElement('div');
                    v.className = 'connection-v-line';
                    v.style.cssText = `top:${30+min*40}px; height:${(max-min)*40}px;`;
                    u.appendChild(v);
                    ctrl.forEach(cl => {
                        const d = document.createElement('div');
                        d.className = 'control-dot';
                        d.style.top = (24 + cl * 40) + 'px';
                        if (zero.includes(cl)) {
                            d.style.background = '#fff';
                            d.style.border = '2.5px solid #000';
                        }
                        u.appendChild(d);
                    });
                }
                const t = document.createElement('div');
                t.className = 'circuit-target';
                t.style.top = (29 + target * 40) + 'px';
                u.appendChild(t);
                c.appendChild(u);
            });
            updateUndoStatus();
            const w = document.getElementById('circuit-content-wrapper');
            setTimeout(() => w && w.scrollTo({ left: w.scrollWidth, behavior: 'smooth' }), 100);
        }
        function undo() {
            if (isSolved || historyStack.length <= 1) return;
            pop.currentTime = 0; pop.play();
            historyStack.pop();
            gateHistory = [...historyStack[historyStack.length - 1]];
            selectedIndices = [];
            recalculate();
        }
        function resetCircuit() {
            if (isSolved) return;
            pop.currentTime = 0; pop.play();
            gateHistory = [];
            historyStack = [[]];
            selectedIndices = [];
            recalculate();
        }
        function updateUndoStatus() {
            const ub = document.getElementById('undo-btn'); if(!ub) return;
            if(historyStack.length > 1 && !isSolved){ ub.classList.add('active'); ub.style.pointerEvents="auto"; } 
            else { ub.classList.remove('active'); ub.style.pointerEvents="none"; }
        }
        function checkWin() {
            if (fishAtNode.every((pos, i) => pos === i)) {
                isSolved = true;
                selectedIndices = [];
                updateUndoStatus();
                if (timerInterval) clearInterval(timerInterval);
                const user = sessionStorage.getItem('currentUser');
                if (user) {
                    let d = JSON.parse(localStorage.getItem(user));
                    if (d && (d.level || 1) < 7) {
                        d.level = 6;
                        localStorage.setItem(user, JSON.stringify(d));
                    }
                }
                setTimeout(() => {
                    meow.currentTime = 0;
                    meow.play();
                    document.getElementById('victoryMsg').innerText = `STEP：${document.getElementById('step-count').innerText} | TIME：${document.getElementById('timer').innerText}s`;
                    document.getElementById('victoryModal').style.display = 'flex';
                }, 600);
            }
        }
    </script>
</body>
</html>
