<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meowtopia - Level 7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #FEF3C7; color: #000; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; }
        .hidden { display: none !important; }
        .main-layout { display: flex; align-items: flex-start; justify-content: center; gap: 20px; margin-top: 20px; }
        .game-canvas { position: relative; width: 1950px; height: 628px; background: #EEE8D3; border: 8px solid #000; border-radius: 40px; overflow: hidden; }
        #leaderboard-wrapper { position: fixed;left: -220px;top: 50px;transform: none;display: flex; z-index: 150;transition: left 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        #leaderboard-wrapper.expanded {left: 0;}  
        .side-leaderboard-content { width: 220px;background: white;border: 6px solid #000;border-left: none;border-radius: 0 30px 30px 0;padding: 15px;display: flex;flex-direction: column; max-height: 80vh; position: relative; z-index: 2; }
        .bookmark-tab {position: absolute;right: -45px;  top: 40px; width: 45px; height: 130px;background: #000;border: 5px solid #000; border-left: none; border-radius: 0 15px 15px 0; cursor: pointer; display: flex; align-items: center;justify-content: center;transition: background 0.2s, right 0.2s, width 0.2s; z-index: 1;}
        .bookmark-tab:hover {background: #333; width: 55px; right: -55px;}    
        .bookmark-text { writing-mode: vertical-lr; /* 文字轉為直向，底部朝左 */color: white;font-weight: 900;font-size: 20px;text-shadow: 2px 2px 0 #000;letter-spacing: 4px;user-select: none;}
        #rankList::-webkit-scrollbar { width: 6px; }
        #rankList::-webkit-scrollbar-thumb { background-color: #ddd; border-radius: 10px; }
        .rank-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 2px solid #eee; font-weight: 900; font-size: 14px; }
        .rank-tab { flex: 1; padding: 4px; font-size: 12px; font-weight: 900; border: 3px solid #000; border-radius: 12px; cursor: pointer; transition: all 0.1s; text-align: center; }
        .rank-tab.active { background: #000; color: #fff; }
        .node { width: 130px; height: 130px; background: white; border: 6px solid #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: absolute; box-shadow: 3px 3px 0 #000; z-index: 20; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .node img { width: 100px; height: auto; pointer-events: none; }
        .fixed-number { position: absolute; bottom: -4px; right: 41px; font-size: 20px; font-weight: 900; color: #000; pointer-events: none; z-index: 25; }
        .connection-line { position: absolute; background: #000; z-index: 10; cursor: pointer; transition: all 0.2s ease; opacity: 1; }
        .connection-line:hover { background: #ffc822 !important; box-shadow: 0 0 15px rgba(251, 191, 36, 0.8); height: 10px !important; z-index: 16; }
        .line-highlight { background: #ffc822 !important; box-shadow: 0 0 15px rgba(251, 191, 36, 0.8) !important; height: 8px !important; z-index: 15; }
        .fish-wrapper { position: absolute; width: 80px; pointer-events: none; z-index: 30; display: flex; flex-direction: column; align-items: center; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .fish-wrapper img { width: 70px; height: auto; }
        .fish-label { background: #000000b6; color: #fff; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; margin-bottom: -45px; z-index: 5; position: relative; top: -8px; }
        #pro-panel { width: 0; opacity: 0; height: 628px; overflow: hidden; background: #fff; border: 0px solid #000; border-radius: 40px; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .pro-active #pro-panel { width: 650px; opacity: 1; border: 8px solid #000; padding: 20px; }
        .panel-section-title { font-weight: 900; font-size: 18px; margin: 10px 0 1px; color: #000; text-align: center; white-space: nowrap; }
        .game-btn { cursor: pointer; border: 5px solid #000; border-radius: 60px; padding: 12px; font-size: 26px; font-weight: 900; color: #fff; text-shadow: 2px 2px 0 #000; box-shadow: 0 4px 0 #000; position: relative; transition: all 0.1s; display: inline-block; }
        .game-btn:active { top: 6px; box-shadow: 0 2px 0 #000; }
        .btn-red { background: #EF4444; }
        .btn-green { background: #22C55E; }
        .multi-toggle-btn { background: #c76419; border: 4px solid #000; border-radius: 20px; padding: 5px 15px; font-weight: 900; font-size: 20px; color: white; cursor: pointer; box-shadow: 0 4px 0 #000; transition: all 0.1s; min-width: 140px; }
        .multi-toggle-btn.mode-2 { background: #2b66e5; }
        .multi-toggle-btn.mode-4 { background: #A855F7; }
        .multi-toggle-btn:hover,
        .game-btn:hover,
        .mode-toggle-fixed:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #000;}
        .multi-toggle-btn:active,
        .mode-toggle-fixed:active { transform: translateY(2px); box-shadow: 0 2px 0 #000;}
        .gate-btn-v2 { position: relative; height: 60px; width: 45px; display: flex; align-items: center; justify-content: center; background-image: linear-gradient(#000,#000), linear-gradient(#000,#000), linear-gradient(#000,#000); background-size: 60% 1.5px; background-repeat: no-repeat; background-position: center 15px, center 30px, center 45px; padding: 0; border: 2px solid #000; cursor: pointer; transition: all 0.2s; border-radius: 8px; margin: auto; }
        .gate-btn-v2:hover { background-color: #f0f0f0; transform: scale(1.05); z-index: 10; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .gate-v-line { position: absolute; width: 1.5px; background: #000; left: 50%; transform: translateX(-50%); z-index: 1; }
        .gate-dot { position: absolute; width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid #000; left: 50%; transform: translate(-50%, -50%); z-index: 2; }
        .gate-dot.fill { background: #000; }
        .gate-dot.empty { background: #fff; }
        .gate-target-circle { position: absolute; width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid #000; background: #fff; left: 50%; transform: translate(-50%, -50%); z-index: 3; }
        .gate-target-circle::before { content: ''; position: absolute; width: 100%; height: 1.5px; top: 50%; left: 0; transform: translateY(-50%); background: #000; }
        .gate-target-circle::after { content: ''; position: absolute; height: 100%; width: 1.5px; left: 50%; top: 0; transform: translateX(-50%); background: #000; }
        .func-btn { width: 100%; margin-top: 5px; padding: 14px; border-radius: 35px; font-weight: 900; font-size: 16px; border: 2.5px solid #000; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.1); }
        .btn-reset { background: #e0e0e0; color: #000; }
        .btn-undo { background: #e8a098 !important; color: #fff !important; border: 2.5px solid #cb867d !important; opacity: 0.6; cursor: not-allowed; }
        .btn-undo.active { background: #EF4444 !important; border-color: #000 !important; color: #fff !important; opacity: 1; cursor: pointer; box-shadow: 0 4px 0 #000; }
        .btn-undo.active:hover, .btn-reset:hover { background-color: #fee58b !important; transform: translateY(-2px); box-shadow: 0 3px 0 #000; border-color: #000 !important; color: #000 !important; }
        #circuit-area { width: 1024px; height: 0; opacity: 0; background: #fff; border: 0px solid #000; border-radius: 30px; margin-top: 20px; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); position: relative; overflow: hidden; }
        .pro-active #circuit-area { height: 210px; opacity: 1; border: 8px solid #000; padding: 15px; }
        #circuit-content-wrapper { position: relative; height: 150px; overflow-x: auto; margin-left: 45px; -ms-overflow-style: none; scrollbar-width: none; }
        #circuit-content-wrapper::-webkit-scrollbar { display: none; }
        #circuit-content { display: flex; height: 100%; padding: 0 10px; min-width: 100%; width: max-content; position: relative; background-image: linear-gradient(#000,#000), linear-gradient(#000,#000), linear-gradient(#000,#000); background-size: 100% 3px; background-repeat: no-repeat; background-position: 0 30px, 0 70px, 0 110px; }
        .qubit-label { position: absolute; left: 18px; font-weight: 900; font-size: 16px; color: #000; }
        .circuit-unit { min-width: 55px; height: 140px; display: flex; flex-direction: column; position: relative; cursor: pointer; transition: all 0.2s; }
        .circuit-unit:hover { background: rgba(239, 68, 68, 0.15); border-radius: 12px; }
        .circuit-unit.selected { background: rgba(40, 180, 255, 0.3) !important; border-radius: 12px; box-shadow: inset 0 0 0 2px #2a5cad; }
        .control-dot { width: 14px; height: 14px; background: #000; border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); z-index: 5; }
        .connection-v-line { position: absolute; width: 2.5px; background: #000; left: 50%; transform: translateX(-50%); z-index: 3; }
        .circuit-target { position: absolute; width: 24px; height: 24px; border-radius: 50%; background: #fff; border: 2.5px solid #000; left: 50%; transform: translate(-50%, -50%); z-index: 15; }
        .circuit-target::before { content: ""; position: absolute; width: 2.5px; height: 100%; background: #000; left: 50%; transform: translateX(-50%); }
        .circuit-target::after { content: ""; position: absolute; width: 100%; height: 2.5px; background: #000; top: 50%; transform: translateY(-50%); }
        .mode-toggle-fixed { position: fixed; top: 20px; right: 20px; width: 70px; height: 70px; background: #fff; border: 5px solid #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; box-shadow: 0 4px 0 #000; z-index: 500; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #F8F3DC; border: 8px solid #000; border-radius: 40px; padding: 30px; text-align: center; width: 380px; box-shadow: 0 10px 0 #000; }
        #gate-scroll-area { margin-top: 5px; max-height: 350px; overflow-y: auto; width: 100%; padding: 10px; -ms-overflow-style: none; scrollbar-width: none; }
        #gate-scroll-area::-webkit-scrollbar { display: none; }
        :root { --cube-offset-x: 175px; }
        .pro-active { --cube-offset-x: 42px; }
        #ios-indicator { position: absolute; top: 0; left: 0; transform: translate(-50%, -120%) scale(0.8); background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(15px); border-radius: 50px; padding: 6px 18px; display: flex; align-items: center; box-shadow: 0 8px 24px rgba(0,0,0,0.12); opacity: 0; transition: opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1), transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1000; pointer-events: none; border: 1px solid rgba(255,255,255,0.35); }
        #ios-indicator.active { opacity: 1; transform: translate(-50%, -120%) scale(1); }
        .ind-fraction { color: #000; font-size: 18px; font-weight: 900; }
        #canvas-bottom-btns {position: absolute;bottom: 20px;right: 30px; display: flex;flex-direction: column; gap: 10px;z-index: 100;}
        #canvas-bottom-btns .func-btn { margin-top: 0; width: 90px; font-size: 14px;padding: 8px 5px; text-transform: uppercase; border-width: 3px;}
        .pro-active #canvas-bottom-btns {display: none !important;}
    </style>
</head>
<body id="body-root">
    <div id="mode-toggle" class="mode-toggle-fixed" onclick="togglePro()">👁️</div>
   
    <div id="leaderboard-wrapper">
        <div class="side-leaderboard-content">
            <h2 class="text-xl font-black mb-3 text-center">🏆 TOP CATS</h2>
            <div class="flex gap-2 mb-3">
                <button onclick="renderRank('steps')" id="tab-steps" class="rank-tab active">STEPS</button>
                <button onclick="renderRank('time')" id="tab-time" class="rank-tab">TIME</button>
            </div>
            <div id="rankList" class="flex-grow overflow-y-auto space-y-1 pr-1">
                <p class="text-center italic text-gray-400 mt-10 text-sm">Loading...</p>
            </div>
        </div>
        <div class="bookmark-tab" onclick="toggleLeaderboard()">
            <div class="bookmark-text">RANK</div>
        </div>
    </div>
    <div class="w-full max-w-5xl">
        <div class="flex justify-between w-full px-4 mb-4 items-center">
            <div class="text-3xl font-black">STEPS: <span id="step-count">0</span> | TIME: <span id="timer">0</span></div>
            <div class="flex items-center gap-12 ml-auto">
                <button id="mode-btn" class="multi-toggle-btn" onclick="cycleLineMode()">Mode: 1</button>
            <div class="text-3xl font-black text-green-600">LEVEL 7</div>
            </div>
        </div>
        <div class="main-layout">
            <div id="pro-panel">
                <div class="panel-section-title">Quantum Gates</div>
                <div id="gate-scroll-area">
                    <div class="grid grid-cols-4 gap-3 w-full justify-items-center" id="gate-grid"></div>
                </div>
                <div class="panel-section-title mt-2">Control</div>
                <button class="func-btn btn-reset" onclick="resetCircuit()">Reset Circuit</button>
                <button id="undo-btn" class="func-btn btn-undo" onclick="undo()">Undo Step</button>
            </div>
            <div class="game-canvas" id="main-canvas">
                <div id="ios-indicator">
                    <span class="ind-fraction" id="ind-fraction">1 / 2</span>
                </div>
                <div id="lines-layer"></div>
                <div id="nodes-layer"></div>
                <div id="fishes-layer"></div>
               
                <div id="canvas-bottom-btns">
                    <button class="func-btn btn-reset" onclick="resetCircuit()">RESET</button>
                    <button id="undo-btn-bottom" class="func-btn btn-undo" onclick="undo()">UNDO</button>
                </div>
            </div>
        </div>
        <div id="circuit-area" class="mx-auto">
            <div class="circuit-title font-black text-xl text-center">Circuit Diagram</div>
            <div class="qubit-label" style="top: 60px;">q0</div>
            <div class="qubit-label" style="top: 100px;">q1</div>
            <div class="qubit-label" style="top: 140px;">q2</div>
            <div id="circuit-content-wrapper"><div id="circuit-content"></div></div>
        </div>
        <div class="w-full text-center mt-6 mb-6">
            <a href="index.html" class="game-btn btn-red px-16">GIVE UP</a>
        </div>
    </div>
    <div id="victoryModal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-5xl font-black mb-4">MEOW!</h2>
            <h2 class="text-5xl font-black mb-4">🐾</h2>
            <p id="victoryMsg" class="text-xl font-bold mb-6"></p>
            <button onclick="location.href='index.html'" class="game-btn btn-green w-full mb-4">KEEP GOING</button>
            <button onclick="viewInLab().style.display='none'" class="game-btn btn-red w-full">View Circuit</button>
        </div>
    </div>
    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzR0J0VXyl5ayKwDXlHimc4WS1FjvGEb2-gTBMhum8APQKfDHxc5wsiWRkNqkxJrocMOw/exec';
        let steps = 0,
            time = 0,
            isPro = false,
            timerInterval,
            gateHistory = [],
            historyStack = [[]],
            selectedIndices = [],
            fishAtNode = [0, 1, 2, 4, 3, 5, 6, 7],
            isSolved = false,
            lineMode = 1,
            hoverLine = null,
            currentOptionIndex = 0,
            currentOptions = [],
            draggedIdx = null;
        let leaderboardData; // 宣告排行榜資料變數
        const pop = new Audio('pop.m4a'),
            meow = new Audio('meow.m4a'),
            getDynamicOffset = () => parseInt(getComputedStyle(document.body).getPropertyValue('--cube-offset-x')) || 0;
        const nodePositions = [
            { t: 150, get l() { return 135 + getDynamicOffset() } },
            { t: 150, get l() { return 350 + getDynamicOffset() } },
            { t: 330, get l() { return 135 + getDynamicOffset() } },
            { t: 330, get l() { return 350 + getDynamicOffset() } },
            { t: 20,  get l() { return -10 + getDynamicOffset() } },
            { t: 20,  get l() { return 510 + getDynamicOffset() } },
            { t: 460, get l() { return -10 + getDynamicOffset() } },
            { t: 460, get l() { return 510 + getDynamicOffset() } }
        ];
        const edges = [[0, 1], [1, 3], [3, 2], [2, 0], [4, 5], [5, 7], [7, 6], [6, 4], [0, 4], [1, 5], [2, 6], [3, 7]];








        window.onload = () => {
            initGameLayout();
            initGates();
            drawStaticLines();
            updateFishUI();
            updateUndoStatus();
            fetchLeaderboard();
            timerInterval = setInterval(() => {
                time++;
                document.getElementById('timer').innerText = time;
            }, 1000);
            document.getElementById('circuit-content-wrapper').addEventListener('wheel', (e) => {
                e.preventDefault();
                e.currentTarget.scrollLeft += e.deltaY;
            });
            document.addEventListener('wheel', (e) => {
                if (!hoverLine || lineMode === 1) return;
                e.preventDefault();
                if (e.deltaY > 0) {
                    currentOptionIndex = (currentOptionIndex + 1) % currentOptions.length;
                } else {
                    currentOptionIndex = (currentOptionIndex - 1 + currentOptions.length) % currentOptions.length;
                }
                showIndicator();
            }, { passive: false });
            const canvas = document.getElementById('main-canvas');
            const indicator = document.getElementById('ios-indicator');
            canvas.addEventListener('mousemove', (e) => {
                if (!indicator.classList.contains('active')) return;
                const rect = canvas.getBoundingClientRect();
                indicator.style.left = (e.clientX - rect.left) + 'px';
                indicator.style.top = (e.clientY - rect.top - 12) + 'px';
            });
        };








        // 切換排行榜展開/收合狀態
        function toggleLeaderboard() {
            const wrapper = document.getElementById('leaderboard-wrapper');
            wrapper.classList.toggle('expanded');
        }








        function initGates() {
            const grid = document.getElementById('gate-grid');
            let html = '';
            const getGateIcon = (type) => {
                let ctrl = [], target = -1, zero = [];
                if (type.startsWith('X')) target = parseInt(type[1]);
                else if (type.startsWith('CX')) {
                    ctrl = [parseInt(type[2])]; target = parseInt(type[3]);
                } else if (type.startsWith('C0X')) {
                    ctrl = [parseInt(type[3])]; target = parseInt(type[4]); zero = [parseInt(type[3])];
                } else if (type.startsWith('TOF')) {
                    let s = type.split('_')[0].replace('TOF', ''), parts = [];
                    for (let i = 0; i < s.length; i++) {
                        if (s[i + 1] === 'p') {
                            parts.push({ v: parseInt(s[i]), p: true }); i++;
                        } else parts.push({ v: parseInt(s[i]), p: false });
                    }
                    target = parts.pop().v;
                    parts.forEach(p => { ctrl.push(p.v); if (p.p) zero.push(p.v); });
                }
                let content = '';
                const getY = (q) => 15 + q * 15;
                if (ctrl.length > 0) {
                    const allQs = [target, ...ctrl];
                    const minQ = Math.min(...allQs), maxQ = Math.max(...allQs);
                    content += `<div class="gate-v-line" style="top:${getY(minQ)}px; height:${(maxQ-minQ)*15}px;"></div>`;
                }
                ctrl.forEach(q => {
                    const isZero = zero.includes(q);
                    content += `<div class="gate-dot ${isZero ? 'empty' : 'fill'}" style="top:${getY(q)}px;"></div>`;
                });
                if (target !== -1) {
                    content += `<div class="gate-target-circle" style="top:${getY(target)}px;"></div>`;
                }
                return content;
            };
            const wrapBtn = (type, extraClass = "") => {
                return `<button class="gate-btn-v2 ${extraClass}"
                    onmouseenter="previewGate('${type}')"
                    onmouseleave="hideIndicator()"
                    onclick="applyGate('${type}')">${getGateIcon(type)}</button>`;
            };
            for(let i=0; i<3; i++) html += wrapBtn(`X${i}`, "bg-purple-100");
            html += `<div style="width: 45px"></div>`;
            for(let i=0; i<3; i++) {
                for(let j=0; j<3; j++) {
                    if(i !== j) {
                        html += wrapBtn(`CX${i}${j}`, "bg-white");
                        html += wrapBtn(`C0X${i}${j}`, "bg-gray-100");
                    }
                }
            }
            const tofs = [ [0,1,2], [0,2,1], [1,2,0] ];
            tofs.forEach(([c1,c2,t]) => {
                html += wrapBtn(`TOF${c1}${c2}${t}`, `bg-green-50`);
                html += wrapBtn(`TOF${c1}p${c2}p${t}`, `bg-green-50`);
                html += wrapBtn(`TOF${c1}p${c2}${t}`, `bg-green-50`);
                html += wrapBtn(`TOF${c1}${c2}p${t}`, `bg-green-50`);
            });
            grid.innerHTML = html;
        }








        async function fetchLeaderboard() {
            const listArea = document.getElementById('rankList');
            try {
                const response = await fetch(`${SCRIPT_URL}?action=getLeaderboard&level=7`);
                const data = await response.json();
                if (data && Array.isArray(data) && data.length > 0) {
                    leaderboardData = data;
                    renderRank('steps');
                } else {
                    listArea.innerHTML = '<p class="text-center italic text-gray-400 mt-10 text-sm">No records yet</p>';
                }
            } catch (e) {
                console.error("Leaderboard Error:", e);
                listArea.innerHTML = '<p class="text-center italic text-red-400 mt-10 text-sm">Load Error</p>';
            }
        }
        function renderRank(type) {
            const tabSteps = document.getElementById('tab-steps');
            const tabTime = document.getElementById('tab-time');
            const listArea = document.getElementById('rankList');
            if (type === 'steps') {
                tabSteps.className = 'rank-tab active';
                tabTime.className = 'rank-tab bg-gray-100';
            } else {
                tabSteps.className = 'rank-tab bg-gray-100';
                tabTime.className = 'rank-tab active';
            }
            if (!leaderboardData || leaderboardData.length === 0) return;
            const sorted = [...leaderboardData].sort((a, b) => a[type] - b[type]);
            let html = "";
            sorted.slice(0, 10).forEach((item, index) => {
                const medal = index === 0 ? "🥇" : index === 1 ? "🥈" : index === 2 ? "🥉" : (index + 1) + ".";
                const displayName = item.username || item.name || 'Anonymous';
                const displayValue = type === 'steps' ? item.steps + '🐾' : item.time + 's';
                html += `
                    <div class="rank-item">
                        <span class="truncate" style="max-width: 90px;">${medal} ${displayName}</span>
                        <span class="text-blue-600">${displayValue}</span>
                    </div>`;
            });
            listArea.innerHTML = html;
        }
        function cycleLineMode() {
            pop.currentTime = 0;
            pop.play();
            if (lineMode === 1) lineMode = 2;
            else if (lineMode === 2) lineMode = 4;
            else lineMode = 1;
            const btn = document.getElementById('mode-btn');
            btn.innerText = `Mode: ${lineMode}`;
            btn.classList.remove('mode-2', 'mode-4');
            if (lineMode === 2) btn.classList.add('mode-2');
            else if (lineMode === 4) btn.classList.add('mode-4');
            hideIndicator();
        }
        function highlightPairs(pairs) {
            clearHighlight();
            pairs.forEach(([a, b]) => {
                const key = Math.min(a, b) + '-' + Math.max(a, b);
                edges.forEach((edge, index) => {
                    const edgeKey = Math.min(edge[0], edge[1]) + '-' + Math.max(edge[0], edge[1]);
                    if (edgeKey === key) {
                        const lineEl = document.getElementById(`line-edge-${index}`);
                        if (lineEl) lineEl.classList.add('line-highlight');
                    }
                });
            });
        }
        function buildGateOptions3Bit(idxA, idxB) {
            const diff = idxA ^ idxB;
            const targetBit = (diff === 4) ? 0 : (diff === 2) ? 1 : 2;
            const otherBits = [0, 1, 2].filter(b => b !== targetBit);
            const options = [];
            if (lineMode === 4) {
                options.push({
                    gateType: `X${targetBit}`,
                    highlightPairs: edges.filter(([u, v]) => (u ^ v) === diff).map(([u, v]) => [u, v])
                });
            } else if (lineMode === 2) {
                const ctrlBit = otherBits[0];
                const ctrlMask = 1 << (2 - ctrlBit);
                const ctrlVal = ((idxA & ctrlMask) !== 0) ? 1 : 0;
                const gateA = ctrlVal ? `CX${ctrlBit}${targetBit}` : `C0X${ctrlBit}${targetBit}`;
                const pairsA = edges.filter(([u, v]) => {
                    if ((u ^ v) !== diff) return false;
                    return (u & ctrlMask) === (idxA & ctrlMask);
                }).map(([u, v]) => [u, v]);
                const otherCtrlBit = otherBits[1];
                const otherCtrlMask = 1 << (2 - otherCtrlBit);
                const otherCtrlVal = ((idxA & otherCtrlMask) !== 0) ? 1 : 0;
                const gateB = otherCtrlVal ? `CX${otherCtrlBit}${targetBit}` : `C0X${otherCtrlBit}${targetBit}`;
                const pairsB = edges.filter(([u, v]) => {
                    if ((u ^ v) !== diff) return false;
                    return (u & otherCtrlMask) === (idxA & otherCtrlMask);
                }).map(([u, v]) => [u, v]);
                options.push(
                    { gateType: gateA, highlightPairs: pairsA },
                    { gateType: gateB, highlightPairs: pairsB }
                );
            }
            return options;
        }
        function clearHighlight() {
            document.querySelectorAll('.connection-line').forEach(line => {
                line.classList.remove('line-highlight');
            });
        }
        function showIndicator() {
            const pill = document.getElementById('ios-indicator');
            const frac = document.getElementById('ind-fraction');
            const opt = currentOptions[currentOptionIndex];
            if (!opt) return;
            frac.innerText = `${currentOptionIndex + 1} / ${currentOptions.length}`;
            pill.classList.add('active');
            clearHighlight();
            highlightPairs(opt.highlightPairs);
        }
        function hideIndicator() {
            document.getElementById('ios-indicator').classList.remove('active');
            clearHighlight();
        }
        function previewGate(gateType) {
            if (isSolved) return;
            let targetBit = -1, ctrlBit = -1, ctrlVal = -1, tofBits = [];
            if (gateType.startsWith('X')) {
                targetBit = parseInt(gateType[1]);
            } else if (gateType.startsWith('CX')) {
                ctrlBit = parseInt(gateType[2]);
                targetBit = parseInt(gateType[3]);
                ctrlVal = 1;
            } else if (gateType.startsWith('C0X')) {
                ctrlBit = parseInt(gateType[3]);
                targetBit = parseInt(gateType[4]);
                ctrlVal = 0;
            } else if (gateType.startsWith('TOF')) {
                let s = gateType.replace('TOF', '');
                let parts = [];
                for (let i = 0; i < s.length; i++) {
                    if (s[i + 1] === 'p') {
                        parts.push({ v: parseInt(s[i]), p: true });
                        i++;
                    } else parts.push({ v: parseInt(s[i]), p: false });
                }
                let targetPart = parts.pop();
                targetBit = targetPart.v;
                tofBits = parts;
            }
            const diff = (targetBit === 0) ? 4 : (targetBit === 1) ? 2 : 1;
            const pairs = edges.filter(([u, v]) => {
                if ((u ^ v) !== diff) return false;
                if (ctrlBit !== -1) {
                    const mask = 1 << (2 - ctrlBit);
                    const val = (u & mask) ? 1 : 0;
                    return val === ctrlVal;
                }
                if (tofBits.length > 0) {
                    return tofBits.every(ctrl => {
                        const mask = 1 << (2 - ctrl.v);
                        const val = (u & mask) ? 1 : 0;
                        return ctrl.p ? val === 0 : val === 1;
                    });
                }
                return true;
            }).map(([u, v]) => [u, v]);
            highlightPairs(pairs);
        }








        function initGameLayout() {
            const nL = document.getElementById('nodes-layer'),
                fL = document.getElementById('fishes-layer');
            for (let i = 0; i < 8; i++) {
                let bin = i.toString(2).padStart(3, '0');
                nL.innerHTML += `<div class="node" id="node-${i}" style="top:${nodePositions[i].t}px; left:${nodePositions[i].l}px;"><div class="fixed-number">${bin}</div><img src="./image/Cat${i+1}.svg"></div>`;
                fL.innerHTML += `<div id="fish-${i}" class="fish-wrapper"><div class="fish-label">${bin}</div><img src="./image/Fish${i+1}.svg"></div>`;
            }
        }
        function drawStaticLines() {
            const layer = document.getElementById('lines-layer');
            layer.innerHTML = '';
            edges.forEach((e, index) => createLine(e[0], e[1], index));
        }
        function createLine(i, j, index) {
            const n1 = nodePositions[i],
                n2 = nodePositions[j],
                x1 = n1.l + 52,
                y1 = n1.t + 52,
                x2 = n2.l + 52,
                y2 = n2.t + 52;
            const len = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2),
                ang = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;
            const line = document.createElement('div');
            line.className = 'connection-line';
            line.id = `line-edge-${index}`;
            line.style.cssText = `width:${len}px; height:4px; left:${x1}px; top:${y1}px; transform:rotate(${ang}deg); transform-origin:0 50%;`;
            line.onmouseenter = () => {
                if (isSolved) return;
                hoverLine = { i, j };
                if (lineMode === 1) return;
                currentOptions = buildGateOptions3Bit(i, j);
                currentOptionIndex = 0;
                showIndicator();
            };
            line.onmouseleave = () => {
                hoverLine = null;
                hideIndicator();
            };
            line.onclick = () => handleLineClick(i, j);
            document.getElementById('lines-layer').appendChild(line);
        }
        function handleLineClick(idxA, idxB) {
            if (isSolved) return;
            if (lineMode === 1) {
                swapNodes(idxA, idxB);
                return;
            }
            if (currentOptions[currentOptionIndex]) {
                applyGate(currentOptions[currentOptionIndex].gateType);
            }
        }
        function swapNodes(idxA, idxB) {
            if (isSolved) return;
            pop.currentTime = 0; pop.play();
            let target = (idxA ^ idxB === 4) ? 0 : (idxA ^ idxB === 2) ? 1 : 2;
            let ctrl = [0, 1, 2].filter(c => c !== target);
            let b = idxA.toString(2).padStart(3, '0').split('').map(Number);
            const gateStr = `TOF${ctrl[0]}${b[ctrl[0]] ? '' : 'p'}${ctrl[1]}${b[ctrl[1]] ? '' : 'p'}${target}_SWAP_${idxA}_${idxB}`;
            if(selectedIndices.length > 0) {
                replaceLogic(gateStr);
            } else {
                gateHistory.push(gateStr);
                let temp = fishAtNode[idxA];
                fishAtNode[idxA] = fishAtNode[idxB];
                fishAtNode[idxB] = temp;
                historyStack.push([...gateHistory]);
                steps = gateHistory.length;
                finishMove();
            }
        }
        function togglePro() {
            pop.currentTime = 0;
            pop.play();
            isPro = !isPro;
            document.getElementById('body-root').classList.toggle('pro-active', isPro);
            document.getElementById('mode-toggle').innerText = isPro ? "⚡️" : "👁️";
            let start = Date.now(),
                loop = () => {
                    updateNodePositionsUI();
                    drawStaticLines();
                    updateFishUI();
                    if (Date.now() - start < 600) requestAnimationFrame(loop);
                };
            requestAnimationFrame(loop);
        }
        function updateNodePositionsUI() {
            for (let i = 0; i < 8; i++) {
                let n = document.getElementById(`node-${i}`);
                if (n) {
                    n.style.top = nodePositions[i].t + "px";
                    n.style.left = nodePositions[i].l + "px";
                }
            }
        }
        function replaceLogic(newGate) {
            let targetIdx = Math.min(...selectedIndices);
            let newHistory = [];
            for(let i=0; i<gateHistory.length; i++) {
                if (i === targetIdx) {
                    newHistory.push(newGate);
                } else if (!selectedIndices.includes(i)) {
                    newHistory.push(gateHistory[i]);
                }
            }
            gateHistory = newHistory;
            selectedIndices = [];
            historyStack.push([...gateHistory]);
            recalculate();
        }
        function applyGate(type) {
            if (isSolved) return;
            pop.currentTime = 0; pop.play();
            if (selectedIndices.length > 0) {
                replaceLogic(type);
            } else {
                executeLogic(type);
                gateHistory.push(type);
                historyStack.push([...gateHistory]);
                steps = gateHistory.length;
                finishMove();
            }
        }
        function executeLogic(type) {
            if (type.includes('_SWAP_')) {
                let p = type.split('_'), iA = parseInt(p[2]), iB = parseInt(p[3]);
                let temp = fishAtNode[iA];
                fishAtNode[iA] = fishAtNode[iB];
                fishAtNode[iB] = temp;
                return;
            }
            let pm = Array.from({ length: 8 }, (_, p) => {
                let b = p.toString(2).padStart(3, '0').split('').map(Number);
                if (type === 'X0') b[0] ^= 1;
                else if (type === 'X1') b[1] ^= 1;
                else if (type === 'X2') b[2] ^= 1;
                else if (type === 'CX01' && b[0]) b[1] ^= 1;
                else if (type === 'CX10' && b[1]) b[0] ^= 1;
                else if (type === 'CX02' && b[0]) b[2] ^= 1;
                else if (type === 'CX20' && b[2]) b[0] ^= 1;
                else if (type === 'CX12' && b[1]) b[2] ^= 1;
                else if (type === 'CX21' && b[2]) b[1] ^= 1;
                else if (type === 'C0X01' && !b[0]) b[1] ^= 1;
                else if (type === 'C0X10' && !b[1]) b[0] ^= 1;
                else if (type === 'C0X02' && !b[0]) b[2] ^= 1;
                else if (type === 'C0X20' && !b[2]) b[0] ^= 1;
                else if (type === 'C0X12' && !b[1]) b[2] ^= 1;
                else if (type === 'C0X21' && !b[2]) b[1] ^= 1;
                else if (type === 'TOF012' && b[0] && b[1]) b[2] ^= 1;
                else if (type === 'TOF0p1p2' && !b[0] && !b[1]) b[2] ^= 1;
                else if (type === 'TOF0p12' && !b[0] && b[1]) b[2] ^= 1;
                else if (type === 'TOF01p2' && b[0] && !b[1]) b[2] ^= 1;
                else if (type === 'TOF021' && b[0] && b[2]) b[1] ^= 1;
                else if (type === 'TOF0p2p1' && !b[0] && !b[2]) b[1] ^= 1;
                else if (type === 'TOF0p21' && !b[0] && b[2]) b[1] ^= 1;
                else if (type === 'TOF02p1' && b[0] && !b[2]) b[1] ^= 1;
                else if (type === 'TOF120' && b[1] && b[2]) b[0] ^= 1;
                else if (type === 'TOF1p2p0' && !b[1] && !b[2]) b[0] ^= 1;
                else if (type === 'TOF1p20' && !b[1] && b[2]) b[0] ^= 1;
                else if (type === 'TOF12p0' && b[1] && !b[2]) b[0] ^= 1;
                return parseInt(b.join(''), 2);
            });
            let newFishAtNode = new Array(8);
            for (let oldIdx = 0; oldIdx < 8; oldIdx++) {
                let newIdx = pm[oldIdx];
                newFishAtNode[newIdx] = fishAtNode[oldIdx];
            }
            fishAtNode = newFishAtNode;
        }
        function recalculate() {
            fishAtNode = [0, 1, 2, 4, 3, 5, 6, 7];
            let h = [...gateHistory];
            gateHistory = [];
            h.forEach(g => {
                executeLogic(g);
                gateHistory.push(g);
            });
            steps = gateHistory.length;
            finishMove();
        }
        function finishMove() {
            document.getElementById('step-count').innerText = steps;
            updateFishUI();
            renderCircuit();
            checkWin();
        }
        function updateFishUI() {
            for (let nI = 0; nI < 8; nI++) {
                const fI = fishAtNode[nI],
                    f = document.getElementById(`fish-${fI}`),
                    n = nodePositions[nI];
                if (f && n) {
                    f.style.top = (n.t + 78) + "px";
                    f.style.left = (n.l + 22) + "px";
                }
            }
        }
        function renderCircuit() {
            const c = document.getElementById('circuit-content');
            c.innerHTML = '';
            gateHistory.forEach((g, idx) => {
                const u = document.createElement('div');
                u.className = 'circuit-unit' + (selectedIndices.includes(idx) ? ' selected' : '');
                u.draggable = true;
                u.ondragstart = (e) => handleDragStart(e, idx);
                u.ondragover = (e) => handleDragOver(e);
                u.ondrop = (e) => handleDrop(e, idx);
                u.ondragend = (e) => { e.target.style.opacity = '1'; draggedIdx = null; };
                u.onmouseenter = () => previewGate(g);
                u.onmouseleave = () => hideIndicator();
                u.onclick = (e) => {
                    if (isSolved) return;
                    pop.currentTime = 0; pop.play();
                    if (e.ctrlKey) {
                        if (selectedIndices.includes(idx)) {
                            selectedIndices = selectedIndices.filter(i => i !== idx);
                        } else {
                            selectedIndices.push(idx);
                        }
                        renderCircuit();
                    } else {
                        selectedIndices = [];
                        gateHistory.splice(idx, 1);
                        historyStack.push([...gateHistory]);
                        recalculate();
                        hideIndicator();
                    }
                };
                let ctrl = [], target = -1, zero = [];
                if (g.startsWith('X')) target = parseInt(g[1]);
                else if (g.startsWith('CX')) {
                    ctrl = [parseInt(g[2])]; target = parseInt(g[3]);
                } else if (g.startsWith('C0X')) {
                    ctrl = [parseInt(g[3])]; target = parseInt(g[4]); zero = [parseInt(g[3])];
                } else if (g.startsWith('TOF')) {
                    let s = g.split('_')[0].replace('TOF', ''), parts = [];
                    for (let i = 0; i < s.length; i++) {
                        if (s[i + 1] === 'p') {
                            parts.push({ v: parseInt(s[i]), p: true }); i++;
                        } else parts.push({ v: parseInt(s[i]), p: false });
                    }
                    target = parts.pop().v;
                    parts.forEach(p => {
                        ctrl.push(p.v);
                        if (p.p) zero.push(p.v);
                    });
                }
                if (ctrl.length > 0) {
                    let min = Math.min(...ctrl, target), max = Math.max(...ctrl, target);
                    const v = document.createElement('div');
                    v.className = 'connection-v-line';
                    v.style.cssText = `top:${30+min*40}px; height:${(max-min)*40}px;`;
                    u.appendChild(v);
                    ctrl.forEach(cl => {
                        const d = document.createElement('div');
                        d.className = 'control-dot';
                        d.style.top = (24 + cl * 40) + 'px';
                        if (zero.includes(cl)) {
                            d.style.background = '#fff'; d.style.border = '2.5px solid #000';
                        }
                        u.appendChild(d);
                    });
                }
                const t = document.createElement('div');
                t.className = 'circuit-target';
                t.style.top = (31 + target * 40) + 'px';
                u.appendChild(t);
                c.appendChild(u);
            });
            updateUndoStatus();
            const w = document.getElementById('circuit-content-wrapper');
            if (draggedIdx === null) {
                setTimeout(() => w && w.scrollTo({ left: w.scrollWidth, behavior: 'smooth' }), 100);
            }
        }
        function undo() {
            if (isSolved || historyStack.length <= 1) return;
            pop.currentTime = 0; pop.play();
            historyStack.pop();
            gateHistory = [...historyStack[historyStack.length - 1]];
            selectedIndices = [];
            recalculate();
        }
        function resetCircuit() {
            if (isSolved) return;
            pop.currentTime = 0; pop.play();
            gateHistory = [];
            historyStack = [[]];
            selectedIndices = [];
            recalculate();
        }
        function updateUndoStatus() {
            const isActive = historyStack.length > 1 && !isSolved;
            const topUndo = document.getElementById('undo-btn');
            if(topUndo) {
                if(isActive) { topUndo.classList.add('active'); topUndo.style.pointerEvents="auto"; }
                else { topUndo.classList.remove('active'); topUndo.style.pointerEvents="none"; }
            }
            const bottomUndo = document.getElementById('undo-btn-bottom');
            if(bottomUndo) {
                if(isActive) { bottomUndo.classList.add('active'); bottomUndo.style.pointerEvents="auto"; }
                else { bottomUndo.classList.remove('active'); bottomUndo.style.pointerEvents="none"; }
            }
        }
        async function checkWin() {
            if (fishAtNode.every((pos, i) => pos === i)) {
                isSolved = true;
                updateUndoStatus();
                if (timerInterval) clearInterval(timerInterval);
                const ft = time, st = steps, u = sessionStorage.getItem('currentUser');
                const savedLevel = parseInt(sessionStorage.getItem('currentLevel')) || 1;
                if (savedLevel < 8) sessionStorage.setItem('currentLevel', 8);
                setTimeout(() => {
                    if(typeof meow !== 'undefined') { meow.currentTime = 0; meow.play(); }
                    document.getElementById('victoryMsg').innerText = `STEP：${st} | TIME：${ft}s`;
                    document.getElementById('victoryModal').style.display = 'flex';
                }, 800);
                if (u) {
                    fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ action: 'saveRecord', username: u, level: 7, steps: st, time: ft, circuit: gateHistory.join(',') })
                    }).then(() => setTimeout(fetchLeaderboard, 1200));
                }
            }
        }
        function viewInLab() {
            // 將電路陣列轉換為逗號分隔的字串
            const circuitData = gateHistory.join(',');
            // 跳轉到 lab3.html 並攜帶 circuit 參數
            window.location.href = `lab3.html?circuit=${encodeURIComponent(circuitData)}`;
        }
    </script>
