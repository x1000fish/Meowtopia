<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>Meowtopia - LAB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #FFF9F0; background-image: linear-gradient(45deg, #fce4ec 25%, transparent 25%, transparent 50%, #fce4ec 50%, #fce4ec 75%, transparent 75%, transparent); background-size: 100px 100px; color: #463438; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; }
        .hidden-el { display: none !important; }
        .node { width: 140px; height: 140px; background: white; border: 6px solid #463438; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: absolute; box-shadow: 3px 3px 0 #463438; z-index: 20; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .node img { width: 110px; height: auto; pointer-events: none; }
        .fixed-number { position: absolute; bottom: -5px; right: 50px; font-size: 22px; font-weight: 900; color: #463438; pointer-events: none; z-index: 25; }
        .connection-line { position: absolute; background: #463438; cursor: pointer; z-index: 10; transition: all 0.2s ease; opacity: 1; }
	.line-h::after { 
            content: ''; 
            position: absolute; 
            top: -10px; 
            bottom: -10px; 
            left: 0; 
            right: 0; 
            background-color: transparent; 
        }
	.line-v::after { 
            content: ''; 
            position: absolute; 
            top: 0; 
            bottom: 0; 
            left: -10px; 
            right: -10px; 
            background-color: transparent; 
        }
        .connection-line:hover { background: #99C44D !important; box-shadow: 0 0 15px rgba(153, 196, 77, 0.8); z-index: 16; }
        .line-highlight { background: #99C44D !important; box-shadow: 0 0 15px rgba(153, 196, 77, 0.8) !important; z-index: 15; }
        .line-h { height: 8px; width: 300px; }
        .line-v { width: 8px; height: 250px; }
        .trace-line-active { background: #99C44D !important; box-shadow: 0 0 15px rgba(153, 196, 77, 0.8) !important; z-index: 16 !important; opacity: 1 !important; }
        .trace-fish-active { filter: drop-shadow(0 0 12px #FFB7C5) drop-shadow(0 0 20px #FFB7C5) !important; transform: scale(1.15) !important; z-index: 45 !important; }
        .fish-wrapper { position: absolute; width: 80px; pointer-events: none; z-index: 30; display: flex; flex-direction: column; align-items: center; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .fish-wrapper img { width: 70px; height: auto; }
        .fish-label { background: #000000b6; color: #fff; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; margin-bottom: -47px; z-index: 5; position: relative; top: -10px; }
        .game-btn { cursor: pointer; border: 5px solid #463438; border-radius: 60px; padding: 12px; font-size: 26px; font-weight: 900; color: #fff; text-shadow: 2px 2px 0 #463438; box-shadow: 0 4px 0 #463438; position: relative; transition: all 0.1s; display: inline-block; }
        .game-btn:active { top: 6px; box-shadow: 0 2px 0 #463438; }
        .btn-red { background: #FFB7C5; }
        .multi-toggle-btn { background: #e2de6e; border: 4px solid #463438; border-radius: 20px; padding: 5px 15px; font-weight: 900; font-size: 20px; color: #fff; cursor: pointer; box-shadow: 0 4px 0 #463438; transition: all 0.1s; min-width: 140px; text-shadow: 2px 2px 0 #463438; }
        .trace-active-btn { background: #FFB7C5 !important; border-color: #463438 !important; }
        .mode2-active-btn { background: #629eed !important; border-color: #463438 !important; }
        .view-btn { background: #3d6183; }
        .multi-toggle-btn:hover, .mode-toggle-fixed:hover, .view-btn:hover, .game-btn:hover, .btn-share:hover {transform: translateY(-2px);box-shadow: 0 6px 0 #000; }
        .multi-toggle-btn:active, .mode-toggle-fixed:active, .view-btn:active, .game-btn:active, .btn-share:active {transform: translateY(2px); box-shadow: 0 2px 0 #000;}
        
        .gate-btn-v2 { position: relative; height: 76px; width: 72px; display: flex; align-items: center; justify-content: center; padding: 0; border: 2.5px solid #463438; border-radius: 8px; cursor: pointer; transition: all 0.2s; box-shadow: 0 3px 6px rgba(0,0,0,0.1); margin: auto; background-color: transparent;}
        .btn-not { background-color: rgba(226, 222, 110, 0.35) !important; }
        .btn-cnot { background-color: rgba(98, 158, 237, 0.35) !important; }
        .gate-btn-v2:hover { background-color: #FFB7C5 !important; filter: brightness(1.05); transform: scale(1.05); z-index: 10; border-color: #463438; }
        .btn-highlight { transform: scale(1.15) !important; box-shadow: 0 0 10px rgba(0,0,0,0.3) !important; border: 4px solid #99C44D !important; z-index: 10 !important; filter: brightness(1.1) !important; background-color: #FFB7C5 !important; }
        
        .func-btn { width: 100%; margin-top: 5px; padding: 14px; border-radius: 35px; font-weight: 900; font-size: 16px; border: 2.5px solid #463438; cursor: pointer; box-shadow: 0 4px 0 rgba(70,52,56,0.1); transition: all 0.2s; }
        .func-btn:hover { background-color: #ffb7c5 !important; border-color: #463438 !important; color: #fff !important; box-shadow: 0 3px 0 #463438 !important; transform: translateY(-2px); }
        
        .btn-reset { background: #FFF9F0; color: #463438; }
        .btn-undo { background: #FFB7C5 !important; color: #fff !important; border: 2.5px solid #463438 !important; opacity: 0.6; cursor: not-allowed; pointer-events: none; }
        .btn-undo.active { background: #FFB7C5 !important; border-color: #463438 !important; color: #fff !important; opacity: 1; cursor: pointer; box-shadow: 0 4px 0 #463438; pointer-events: auto; }
        
        #node-0, #node-2 { left: 65px !important; }
        #node-1, #node-3 { left: 405px !important; }
        .line-h { left: 130px !important; }
        .line-v:nth-of-type(3) { left: 130px !important; }
        .line-v:nth-of-type(4) { left: 470px !important; }
        .circuit-title { text-align: center; font-weight: 900; font-size: 1.25rem; margin-bottom: 8px; color: #463438; }
        .lab-shell { width: 915px; margin: 0 auto; }
        .lab-topbar { width: 915px; margin: 0 auto 16px auto; display: flex; align-items: center; justify-content: space-between; }
        .lab-topbar-right { display: flex; align-items: center; gap: 24px; }
        .main-layout { width: 915px; margin: 0 auto; display: flex; align-items: flex-start; justify-content: flex-start; gap: 20px; }
        #pro-panel { width: 270px; opacity: 1; height: 500px; background: #fff; border: 8px solid #463438; border-radius: 40px; padding: 16px 14px 14px 14px; display: flex; flex-direction: column; align-items: center; gap: 3px; flex-shrink: 0; box-sizing: border-box; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 10px 10px 0px #99C44D; }
        .panel-section-title { width: 100%; text-align: center; font-size: 20px; font-weight: 900; color: #463438; line-height: 1.1; margin: 0; white-space: nowrap; }
        .panel-section-title.gate-title { margin-top: 2px; margin-bottom: 12px; }
        .panel-section-title.control-title { margin-top: 12px; margin-bottom: 10px; }
        .game-canvas { position: relative; width: 625px; height: 500px; background: #fffaf5; border: 8px solid #463438; border-radius: 40px; overflow: hidden; box-shadow: 15px 15px 0px #FFB7C5; }
        
        /* 擴大 Circuit Area 接收範圍，防止禁止符號出現 */
        #circuit-area { width: 915px; height: 170px; opacity: 1; background: #fff; border: 8px solid #463438; border-radius: 30px; margin: 20px auto 0 auto; position: relative; padding: 15px; overflow: hidden; box-sizing: border-box; box-shadow: 10px 10px 0px #FFB7C5; }
        #circuit-content-wrapper { position: relative; height: 130px; overflow-x: auto !important; overflow-y: hidden; margin-left: 30px; margin-right: 30px; padding-top: 4px; scrollbar-width: none; }
        #circuit-content { display: flex; height: 100%; padding: 0 7px; min-width: 100%; width: max-content; position: relative; }
        
        .qubit-label { position: absolute; left: 12px; font-weight: 900; font-size: 16px; color: #463438; z-index: 5; width: 25px; text-align: center; transition: opacity 0.2s; }
        .qubit-label.right-side { left: auto !important; right: 15px !important; color: rgb(255, 151, 172) !important; font-weight: 900; background-color: #fff; padding: 2px 10px; z-index: 50; border-radius: 5px; transform: translateY(-50%); }
        
        .circuit-unit { min-width: 50px; height: 85px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; cursor: pointer; transition: all 0.2s ease, margin 0.2s cubic-bezier(0.16, 1, 0.3, 1); border: 3px solid transparent; }
        .circuit-unit:hover { background-color: var(--bg-hover, rgba(239, 68, 68, 0.2)) !important; border-radius: 12px; }
        .circuit-unit.selected { background-color: var(--bg-hover, rgba(153, 196, 77, 0.3)) !important; border: 3px solid var(--bg-selected, #99C44D) !important; border-radius: 12px; box-shadow: none; }
        .circuit-unit.trace-active { background: #bdfc507a !important; box-shadow:  0 0 0 3px #99C44D !important; border-radius: 12px; z-index: 100 !important; }
        
        .control-dot { width: 14px; height: 14px; background: #463438; border-radius: 50%; position: absolute; z-index: 5; transform: translate(-50%, -50%); }
        .connection-v-line { position: absolute; width: 2.5px; background: #463438; z-index: 3; transform: translateX(-50%); }
        .circuit-target { position: absolute; width: 22px; height: 22px; border-radius: 50%; background: #fff; border: 2.5px solid #463438; display: flex; align-items: center; justify-content: center; z-index: 15; transform: translate(-50%, -50%); }
        .circuit-target::before { content: ""; position: absolute; width: 2.5px; height: 100%; background-color: #463438; }
        .circuit-target::after { content: ""; position: absolute; width: 100%; height: 2.5px; background-color: #463438; }
        .wire-container { position: relative; width: 60%; max-width: 50px; height: 100%; background-image: linear-gradient(#463438, #463438), linear-gradient(#463438, #463438); background-size: 100% 3px; background-repeat: no-repeat; background-position: center 24px, center 52px; pointer-events: none; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        
        #tt-body { font-family: Arial, sans-serif; }
        #tt-body tr { transition: all 0.2s ease; }
        #tt-body td:first-child { border-top-left-radius: 12px; border-bottom-left-radius: 12px; }
        #tt-body td:last-child { border-top-right-radius: 12px; border-bottom-right-radius: 12px; }
        #tt-body tr:hover td { background-color: rgba(0, 0, 0, 0.05); cursor: pointer; }
        #tt-body tr.active-trace td { background-color: #a3cd5a9f !important; color: #463438 !important; font-weight: bold; }
        
        #trace-controls { display: flex; align-items: center; justify-content: space-between; background: #e7e5dc; border-radius: 40px; padding: 10px 4px; gap: 4px; margin-top: 8px; margin-bottom: 10px; border: 2.5px solid #000; }
        #trace-controls .func-btn { margin: 0; padding: 10px 8px; font-size: 11px; border-radius: 50px; background: #e7e5dc; color: white; }
        #trace-controls .btn-red { background: #FFB7C5; border-color: #463438; }
        #trace-step-text { color: #463438; font-family: 'Courier New', monospace; font-size: 24px; }
        
        .btn-share { background: #99C44D; border: 4px solid #463438; border-radius: 30px; padding: 5px 15px; font-weight: 900; font-size: 20px; color: white; cursor: pointer; box-shadow: 0 4px 0 #463438; transition: all 0.1s; min-width: 140px; }
        .btn-share:hover { background-color: #99C44D !important; }
        
        .nav-fab { position: fixed; top: 25px; right: 25px; width: 70px; height: 70px; background: #89CFF0; border: 5px solid #463438; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 900; color: white; cursor: pointer; box-shadow: 0 4px 0 #463438; z-index: 1000; transition: all 0.1s; text-shadow: 2px 2px 0 #463438; }
        .nav-fab:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #463438; }
        .nav-fab:active { transform: translateY(4px); box-shadow: 0 0px 0 #463438; }
        
        canvas, .game-canvas, .circuit-unit, .node { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; touch-action: manipulation; }
               
        /* 拖曳提示紅線與推擠動畫 */
        .drag-target { margin-left: 25px !important; }
        .drag-target-right { margin-right: 25px !important; }
        .drag-target::before, .drag-target-right::after {
            content: '';
            position: absolute;
            top: 10px;
            bottom: 10px;
            width: 4px;
            background-color: #f78790;
            border-radius: 4px;
            z-index: 200;
            pointer-events: none;
        }
        .drag-target::before { left: -14px; }
        .drag-target-right::after { right: -14px; }
        
        /* 讓被推開的 Wire 可以平滑伸縮避免斷線 */
        .horizontal-wire { transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .drag-target .horizontal-wire { left: -28px !important; width: calc(100% + 31px) !important; }
        .drag-target-right .horizontal-wire { width: calc(100% + 31px) !important; }

        .dragging-snapshot-frame { position: absolute; inset: 4px; border: 4px; border-radius: 12px; opacity: 0; z-index: 50; pointer-events: none; }
        .circuit-unit.during-snapshot .dragging-snapshot-frame { opacity: 1 !important; }
        
        .hyper-line { stroke: #463438; stroke-width: 2; opacity: 0.3; }
        .hyper-line-hi { stroke: #FFB7C5; stroke-width: 4.5; opacity: 1; transition: stroke 0.2s; }
        .gate-btn-v2 .hyper-line-hi { stroke: #f78790; }
        .gate-btn-v2:hover .hyper-line-hi { stroke: #ffffff !important; }
        .btn-highlight .hyper-line-hi { stroke: #ffffff !important; }
        .circuit-unit:hover .hyper-line-hi, .circuit-unit.selected .hyper-line-hi { stroke: #99C44D !important; }
        
        .mini-mode #circuit-content { background-image: none !important; }
        .mini-mode .circuit-unit { min-width: 85px !important; width: 85px !important; max-width: 85px !important; flex: 0 0 85px !important; padding: 0 !important; }
        .mode-toggle-fixed { position: fixed; top: 110px; right: 25px; width: 70px; height: 70px; background: white; border: 5px solid #463438; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; box-shadow: 0 4px 0 #463438; z-index: 500; transition: all 0.1s; }
    </style>
</head>
<body id="body-root" class="pro-active mini-mode">
    <button onclick="navWithSound('lab3.html')" class="nav-fab" title="Go to 3-Bit">3</button>
    <div id="quantum-toggle" class="mode-toggle-fixed" onclick="toggleQuantumMode()">⚛️</div>
    <div class="lab-shell">
        <div class="lab-topbar">
            <div class="text-3xl font-black">GATE COUNT: <span id="step-count">0</span></div>
            <div class="lab-topbar-right">
                <button id="view-toggle-btn" class="multi-toggle-btn view-btn" onclick="toggleTraceMode()">Trace: OFF</button>
                <button id="mode-2-btn" class="multi-toggle-btn" onclick="toggleMode2()">Mode: 1</button>
                <div class="text-3xl font-black" style="color: #7bc202;">LAB MODE</div>
            </div>
        </div>
        <div class="main-layout">
            <div id="pro-panel">
                <div id="gate-view-container" class="w-full flex-col flex h-full min-h-0">
                    <div class="panel-section-title gate-title">Transformations</div>
                    <div class="grid grid-cols-2 gap-2 w-10/12 mx-auto" id="gate-container">
                        <button id="gate-x0" class="gate-btn-v2 btn-not" onclick="applyGate('X0')" onmouseover="syncGateHighlight('X0', true)" onmouseout="syncGateHighlight('X0', false)"></button>
                        <button id="gate-x1" class="gate-btn-v2 btn-not" onclick="applyGate('X1')" onmouseover="syncGateHighlight('X1', true)" onmouseout="syncGateHighlight('X1', false)"></button>
                        <button id="gate-cx10" class="gate-btn-v2 btn-cnot" onclick="applyGate('CX10')" onmouseover="syncGateHighlight('CX10', true)" onmouseout="syncGateHighlight('CX10', false)"></button>
                        <button id="gate-cx01" class="gate-btn-v2 btn-cnot" onclick="applyGate('CX01')" onmouseover="syncGateHighlight('CX01', true)" onmouseout="syncGateHighlight('CX01', false)"></button>
                        <button id="gate-c0x10" class="gate-btn-v2 btn-cnot" onclick="applyGate('C0X10')" onmouseover="syncGateHighlight('C0X10', true)" onmouseout="syncGateHighlight('C0X10', false)"></button>
                        <button id="gate-c0x01" class="gate-btn-v2 btn-cnot" onclick="applyGate('C0X01')" onmouseover="syncGateHighlight('C0X01', true)" onmouseout="syncGateHighlight('C0X01', false)"></button>
                    </div>
                    <div class="mt-auto w-full pt-2">
                        <div class="panel-section-title control-title">Control</div>
                        <button id="reset-btn" class="func-btn btn-reset" onclick="resetCircuit()">Reset Circuit</button>
                        <button id="undo-btn" class="func-btn btn-undo" onclick="undo()">Undo Step</button>
                    </div>
                </div>
                <div id="tt-view-container" class="w-full flex-col hidden-el h-full flex" style="max-height: 100%; overflow: hidden;">
                    <div class="panel-section-title shrink-0 mt-2">Truth Table</div>
                    <div class="text-lg text-gray-400 text-center mb-2 mt-4 font-bold flex justify-between px-8 shrink-0 border-b border-black-100 pb-2">
                        <span class="w-1/2 text-left text-black">CAT</span>
                        <span class="w-1/2 text-right text-black">FISH</span>
                    </div>
                    <div class="overflow-y-auto w-full flex-grow px-2 mb-2 custom-scrollbar" style="scrollbar-width: none;">
                        <table class="w-full text-center text-lg border-separate border-spacing-y-1">
                            <tbody id="tt-body" class="font-bold"></tbody>
                        </table>
                    </div>
                </div>
                <div id="trace-controls" class="hidden-el shrink-0 w-full mt-auto flex gap-1 items-center bg-gray-100 p-2 rounded-2xl border-4 border-black shadow-[0_4px_0_0_rgba(0,0,0,0.1)] opacity-50 pointer-events-none transition-opacity">
                    <button class="func-btn btn-reset m-0 py-2 px-1 text-xs hover:bg-yellow-200 flex-1" style="box-shadow: 0 2px 0 #000;" onclick="traceMove(-1)">◀</button>
                    <div class="flex flex-col items-center justify-center px-1 min-w-[50px]">
                        <span class="text-[14px] font-black leading-none" style="color: #99C44D;">STEP</span>
                        <span id="trace-step-text" class="font-black text-lg leading-none">0</span>
                    </div>
                    <button class="func-btn btn-reset m-0 py-2 px-1 text-xs hover:bg-yellow-200 flex-1" style="box-shadow: 0 2px 0 #000;" onclick="traceMove(1)">▶</button>
                    <button class="func-btn btn-red m-0 py-2 px-1 text-xs text-white border-black flex-1" style="box-shadow: 0 2px 0 #000;" onclick="exitTrace()">EXIT</button>
                </div>
            </div>
            <div class="game-canvas" id="main-canvas">
                <div id="line-h-0" class="connection-line line-h" style="top: 95px;" onclick="handleLineClick(this.id)" onmouseover="syncHighlight(this.id, true)" onmouseout="syncHighlight(this.id, false)"></div>
                <div id="line-h-1" class="connection-line line-h" style="bottom: 90px;" onclick="handleLineClick(this.id)" onmouseover="syncHighlight(this.id, true)" onmouseout="syncHighlight(this.id, false)"></div>
                <div id="line-v-0" class="connection-line line-v" style="top: 150px;" onclick="handleLineClick(this.id)" onmouseover="syncHighlight(this.id, true)" onmouseout="syncHighlight(this.id, false)"></div>
                <div id="line-v-1" class="connection-line line-v" style="top: 150px;" onclick="handleLineClick(this.id)" onmouseover="syncHighlight(this.id, true)" onmouseout="syncHighlight(this.id, false)"></div>
                <div class="node" id="node-0" style="top: 25px;"><div class="fixed-number">00</div><img src="./image/Cat1.svg"></div>
                <div class="node" id="node-1" style="top: 25px;"><div class="fixed-number">01</div><img src="./image/Cat2.svg"></div>
                <div class="node" id="node-2" style="bottom: 25px;"><div class="fixed-number">10</div><img src="./image/Cat3.svg"></div>
                <div class="node" id="node-3" style="bottom: 25px;"><div class="fixed-number">11</div><img src="./image/Cat4.svg"></div>
                <div id="fish-0" class="fish-wrapper"><div class="fish-label">00</div><img src="./image/Fish1.svg"></div>
                <div id="fish-1" class="fish-wrapper"><div class="fish-label">01</div><img src="./image/Fish2.svg"></div>
                <div id="fish-2" class="fish-wrapper"><div class="fish-label">10</div><img src="./image/Fish3.svg"></div>
                <div id="fish-3" class="fish-wrapper"><div class="fish-label">11</div><img src="./image/Fish4.svg"></div>
            </div>
        </div>
        <div id="circuit-area" class="mx-auto">
            <div class="circuit-title">Paths</div>
            <div id="q-in-0" class="qubit-label" style="top: 62px;">d1</div>
            <div id="q-in-1" class="qubit-label" style="top: 102px;">d2</div>
            <div id="q-out-0" class="qubit-label right-side hidden-el" style="top: 75px;"></div>
            <div id="q-out-1" class="qubit-label right-side hidden-el" style="top: 115px;"></div>
            <div id="circuit-content-wrapper"><div id="circuit-content"></div></div>
        </div>
        <div class="w-full flex justify-center items-center gap-6 mt-6 mb-6">
            <a href="index.html" class="game-btn btn-red px-16">EXIT LAB</a>
            <button class="btn-share" onclick="shareCircuit()" style="padding: 12px 24px;">Share Circuit</button>
        </div>
    </div>
    <script>
        let initialFishAtNode = [0, 1, 2, 3];
        let fishAtNode = [0, 1, 2, 3];
        let gateHistory = [], historyStack = [[]];
        let selectedIndices = [], draggedIndex = null;
        let isMode2 = false;
        let isQuantumMode = false; 
        let isTraceMode = false;
        let activeTraceInput = null;
        let currentTraceStep = 0;
        const pop = new Audio('pop.m4a');
        let isTouchDevice = false;
        let mobileDragging = false;
        let mDragIndex = null;
        let dragGhost = null;
        let gyroPermissionGranted = false;
        window.addEventListener('touchstart', () => { isTouchDevice = true; }, {once: true});
        
        let autoScrollRAF = null;
        let scrollSpeed = 0;

        const gateLineMap = {
            X0: ['line-v-0', 'line-v-1'],
            X1: ['line-h-0', 'line-h-1'],
            C0X01: ['line-h-0'],
            CX01: ['line-h-1'],
            C0X10: ['line-v-0'],
            CX10: ['line-v-1']
        };

        function updateScrollSpeed(clientX) {
            const wrapper = document.getElementById('circuit-content-wrapper');
            if (!wrapper) return;
            const rect = wrapper.getBoundingClientRect();
            const edgeThreshold = 120;
            const maxSpeed = 13;

            if (clientX - rect.left < edgeThreshold) {
                let intensity = 1 - Math.max(0, clientX - rect.left) / edgeThreshold;
                scrollSpeed = -(maxSpeed * Math.pow(intensity, 1.5));
                if (!autoScrollRAF) autoScrollRAF = requestAnimationFrame(scrollLoop);
            } else if (rect.right - clientX < edgeThreshold) {
                let intensity = 1 - Math.max(0, rect.right - clientX) / edgeThreshold;
                scrollSpeed = maxSpeed * Math.pow(intensity, 1.5);
                if (!autoScrollRAF) autoScrollRAF = requestAnimationFrame(scrollLoop);
            } else {
                scrollSpeed = 0;
            }
        }

        function scrollLoop() {
            const wrapper = document.getElementById('circuit-content-wrapper');
            if (scrollSpeed !== 0) {
                wrapper.scrollLeft += scrollSpeed;
                autoScrollRAF = requestAnimationFrame(scrollLoop);
            } else {
                autoScrollRAF = null;
            }
        }

            return `rgba(${r}, ${g}, ${b}, ${alpha})`;

        function getHighlightPairsForGate(type) {
            let pairs = [];
            if (type === 'X0') pairs = [[0,2], [1,3]];
            else if (type === 'X1') pairs = [[0,1], [2,3]];
            else if (type === 'CX01') pairs = [[2,3]];
            else if (type === 'C0X01') pairs = [[0,1]];
            else if (type === 'CX10') pairs = [[1,3]];
            else if (type === 'C0X10') pairs = [[0,2]];
            return pairs;
        }

        function getMiniSquareSVG(type, activeState = null) {
            let pairs = getHighlightPairsForGate(type);
            const miniNodes = [
                { x: 20, y: 20 }, 
                { x: 80, y: 20 }, 
                { x: 20, y: 80 }, 
                { x: 80, y: 80 }  
            ];
            let svg = `<svg viewBox="0 0 100 100" style="width:100%; height:100%; pointer-events:none; display: block;" preserveAspectRatio="xMidYMid meet">`;
            const edges = [ [0, 1], [0, 2], [1, 3], [2, 3] ];
            edges.forEach(([i, j]) => {
                let n1 = miniNodes[i], n2 = miniNodes[j];
                let isHighlighted = pairs.some(p => (p[0] === i && p[1] === j) || (p[0] === j && p[1] === i));
                let lineClass = isHighlighted ? 'hyper-line-hi' : 'hyper-line';
                let strokeW = isHighlighted ? 4.5 : 2;
                svg += `<line x1="${n1.x}" y1="${n1.y}" x2="${n2.x}" y2="${n2.y}" class="${lineClass}" style="stroke-width: ${strokeW}" stroke-linecap="round"/>`;
            });
            for(let i=0; i<4; i++) {
                let n = miniNodes[i];
                let isTraceNode = (activeState !== null && i === activeState);
                if (isTraceNode) {
                    svg += `<circle cx="${n.x}" cy="${n.y}" r="9" fill="#f78790" stroke="#FFF9F0" stroke-width="2"/>`;
                } else {
                    svg += `<circle cx="${n.x}" cy="${n.y}" r="6" fill="#463438"/>`;
                }
            }
            svg += `</svg>`;
            return svg;
        }

            if (min === 0 && max === 1) return 'line-h-0';
            if (min === 2 && max === 3) return 'line-h-1';
            if (min === 0 && max === 2) return 'line-v-0';
            if (min === 1 && max === 3) return 'line-v-1';

        function renderTraceStep() {
            if (activeTraceInput === null) return;
            let prevNode = activeTraceInput;
            let currNode = activeTraceInput;
            for(let k = 0; k < currentTraceStep; k++) {
                prevNode = currNode;
                let pm = getPermutationForGate(gateHistory[k]);
                currNode = pm[currNode];
            }
            let trackedFishId = initialFishAtNode[activeTraceInput];
            let f = document.getElementById(`fish-${trackedFishId}`);
            let n = document.getElementById(`node-${currNode}`);

            document.querySelectorAll('.trace-fish-active').forEach(el => el.classList.remove('trace-fish-active'));
            if (f) f.classList.add('trace-fish-active');
            if (currentTraceStep > 0 && prevNode !== currNode) {
                let lineId = getLineId(prevNode, currNode);
                let lineEl = document.getElementById(lineId);

                let isActive = (activeTraceInput === i);
                let isChanged = (i !== stateMap[i]);
                let outColor = isActive ? '' : (isChanged ? 'text-[#99C44D] font-bold' : 'text-gray-300');
                let rowClass = isActive ? 'active-trace' : '';
                tbody.innerHTML += `
                    <tr class="${rowClass}" onclick="startTrace(${i})">
                        <td class="py-2 text-base w-1/2 text-left pl-6">${inStr}</td>
                        <td class="py-2 text-base w-1/2 text-right pr-6 ${outColor}">${outStr}</td>
                    </tr>`;
            }
        }

        function toggleMode2() {
            if(typeof pop !== 'undefined' && pop.play) { pop.currentTime = 0; pop.play().catch(e=>{}); }
            isMode2 = !isMode2;
            const btn = document.getElementById('mode-2-btn');
            btn.innerText = isMode2 ? "Mode: 2" : "Mode: 1";
            btn.classList.toggle('mode2-active-btn', isMode2);
            document.querySelectorAll('.connection-line').forEach(el => el.classList.remove('line-highlight'));
            document.querySelectorAll('.btn-highlight').forEach(el => el.classList.remove('btn-highlight'));
        }

        function toggleLineHighlight(lineIds, isOn) {
            lineIds.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.toggle('line-highlight', isOn);
            });
        }

        function getGateForLine(lineId) {
            if (isMode2) {
                if (lineId.includes('h')) return 'X1';
                if (lineId.includes('v')) return 'X0';
            } else {
                if (lineId === 'line-h-0') return 'C0X01';
                if (lineId === 'line-h-1') return 'CX01';
                if (lineId === 'line-v-0') return 'C0X10';
                if (lineId === 'line-v-1') return 'CX10';
            }
            return null;
        }

        function syncHighlight(lineId, isOn) {
            const gate = getGateForLine(lineId);
            if (!gate) return;
            toggleLineHighlight(gateLineMap[gate] || [], isOn);
            const btn = document.getElementById('gate-' + gate.toLowerCase());
            if (btn) {
                if (isOn) btn.classList.add('btn-highlight');
                else btn.classList.remove('btn-highlight');
            }
        }

        function syncGateHighlight(gate, isOn) {
            toggleLineHighlight(gateLineMap[gate] || [], isOn);
            const btn = document.getElementById('gate-' + gate.toLowerCase());
            if (btn) {
                if (isOn) btn.classList.add('btn-highlight');
                else btn.classList.remove('btn-highlight');
            }
        }

        function handleLineClick(lineId) {
            const gate = getGateForLine(lineId);
            if (gate) applyGate(gate);
        }

        function pushHistory() { historyStack.push([...gateHistory]); }

        function applyGate(g) {
            if(typeof pop !== 'undefined' && pop.play) { pop.currentTime = 0; pop.play().catch(e=>{}); }
            
            if (selectedIndices.length > 0) {
                let targetIdx = Math.min(...selectedIndices);
                let newHistory = [];
                for(let i=0; i<gateHistory.length; i++) {
                    if (i === targetIdx) newHistory.push(g);
                    else if (!selectedIndices.includes(i)) newHistory.push(gateHistory[i]);
                }
                gateHistory = newHistory;
                selectedIndices = [];
                pushHistory();
                recalculatePositions();
                finishMove();
            } else {
                gateHistory.push(g);
                pushHistory();
                recalculatePositions();
                finishMove();
            }

            // === 新增：手機版點擊後，強制消除 Highlight 防止卡住 ===
            if (isTouchDevice) {
                setTimeout(() => {
                    // 1. 強制關閉 Hypercube 線條與按鈕的 Highlight class
                    syncGateHighlight(g, false);
                    
                    // 2. 取消焦點，避免按鈕維持 CSS 的預設 hover/active 狀態
                    const btn = document.getElementById('gate-' + g.toLowerCase());
                    if (btn) btn.blur();
                }, 800); 
            }
        }

        function getPermutationForGate(g) {
            return [0, 1, 2, 3].map(pos => {
                let q0 = Math.floor(pos / 2), q1 = pos % 2;
                if (g === 'X0') q0 = 1 - q0;
                else if (g === 'X1') q1 = 1 - q1;
                else if (g === 'CX01' && q0 === 1) q1 = 1 - q1;
                else if (g === 'C0X01' && q0 === 0) q1 = 1 - q1;
                else if (g === 'CX10' && q1 === 1) q0 = 1 - q0;
                else if (g === 'C0X10' && q1 === 0) q0 = 1 - q0;
                return q0 * 2 + q1;
            });
        }

        function recalculatePositions() {
            let cp = [...initialFishAtNode]; 
            gateHistory.forEach(g => {
                const pm = getPermutationForGate(g); 
                const next = new Array(4);
                for (let oldNode = 0; oldNode < 4; oldNode++) {
                    const newNode = pm[oldNode];
                    next[newNode] = cp[oldNode];
                }
                cp = next;
            });
            fishAtNode = cp;
        }

        function finishMove() {
            document.getElementById('step-count').innerText = gateHistory.length;
            updateTruthTable();
            if (activeTraceInput !== null) {
                if (currentTraceStep > gateHistory.length) currentTraceStep = gateHistory.length;
                renderTraceStep();
            } else {
                updateFishUI();
                updateFishVisibility();
                renderCircuit();
            }
        }

        function updateFishUI() {
            for(let i=0; i<4; i++) {
                const f = document.getElementById(`fish-${fishAtNode[i]}`);
                const n = document.getElementById(`node-${i}`);
                if(f && n) {
                    f.style.top = (n.offsetTop + 90) + "px";
                    f.style.left = (n.offsetLeft + 30) + "px";
                }
            }
        }

        function renderCircuit() {
            const c = document.getElementById('circuit-content');
            const wrapper = document.getElementById('circuit-content-wrapper');
            c.innerHTML = '';
            let states = [];
            if (activeTraceInput !== null) {
                let curr = activeTraceInput;
                states.push(curr);
                for (let k = 0; k < gateHistory.length; k++) {
                    curr = getPermutationForGate(gateHistory[k])[curr];
                    states.push(curr);
                }
            }
            const drawWires = (parentUnit, stepIdx) => {
                if (!isQuantumMode) return;
                for (let q = 0; q < 2; q++) {
                    let wire = document.createElement('div');
                    wire.className = 'horizontal-wire';
                    wire.style.position = 'absolute';
                    wire.style.left = '-3px';
                    wire.style.width = 'calc(100% + 6px)';
                    wire.style.height = '3px';
                    wire.style.top = (q === 0 ? 13 : 60) + 'px';
                    wire.style.zIndex = '1';
                    if (activeTraceInput !== null) {
                        if (stepIdx <= currentTraceStep) {
                            let bit = (states[stepIdx] >> (1 - q)) & 1;
                            if (bit === 1) {
                                wire.style.background = '#FFB7C5';
                                wire.style.boxShadow = '0 0 8px #FFB7C5';
                            } else {
                                wire.style.background = '#8a6d1c';
                                wire.style.boxShadow = 'none';
                            }
                        } else {
                            wire.style.background = '#d1d5db';
                            wire.style.boxShadow = 'none';
                        }
                    } else {
                        wire.style.background = '#463438';
                    }
                    parentUnit.appendChild(wire);
                }
            };
            
            // --- 建立起點空間 (Start Unit) ---
            const startU = document.createElement('div');
            startU.className = 'circuit-unit';
            startU.style.minWidth = '30px';
            startU.style.cursor = 'default';
            startU.dataset.type = 'start';
            if (!isQuantumMode) startU.style.display = 'none';
            drawWires(startU, 0);
            c.appendChild(startU);
            
            gateHistory.forEach((g, idx) => {
                const u = document.createElement('div');
                u.className = 'circuit-unit' + (selectedIndices.includes(idx) ? ' selected' : '');
                u.dataset.type = 'gate';
                u.dataset.idx = idx;
                
                const hex = getGateColorMap(g);
                u.style.setProperty('--bg-hover', getRgba(hex, 0.35));
                u.style.setProperty('--bg-selected', hex);
                
                u.draggable = !isTouchDevice && (activeTraceInput === null);
                drawWires(u, idx + 1);
                
                const sFrame = document.createElement('div');
                sFrame.className = 'dragging-snapshot-frame';
                u.appendChild(sFrame);
                
                const visuals = document.createElement('div');
                visuals.className = 'gate-visuals';
                visuals.style.position = 'absolute';
                visuals.style.inset = '0';
                visuals.style.width = '100%';
                visuals.style.height = '100%';
                visuals.style.pointerEvents = 'none';
                
                if (activeTraceInput !== null) {
                    if (idx === currentTraceStep - 1) u.classList.add('trace-active');
                    else if (idx >= currentTraceStep) visuals.style.opacity = '0.35';
                }
                
                if (!isQuantumMode) {
                    let traceState = (activeTraceInput !== null) ? states[idx + 1] : null;
                    visuals.innerHTML = getMiniSquareSVG(g, traceState);
                } else {
                    if(g.startsWith('X')) {
                        const tQ = g==='X0'?0:1, tY = tQ===0?14.5:61.5, t = document.createElement('div');
                        t.className = 'circuit-target';
                        t.style.left = '50%';
                        t.style.top = (tY)+'px';
                        visuals.appendChild(t);
                    }
                    else {
                        const is01 = g.includes('01'), is0 = g.includes('C0'), cY = is01?14.5:61.5, tY = is01?61.5:14.5;
                        const v = document.createElement('div');
                        v.className = 'connection-v-line';
                        v.style.left = '50%';
                        v.style.top = Math.min(cY,tY)+'px';
                        v.style.height = '47px';
                        visuals.appendChild(v);
                        const d = document.createElement('div');
                        d.className = 'control-dot';
                        d.style.left = '50%';
                        d.style.top = (cY)+'px';
                        if(is0){
                            d.style.boxSizing = 'border-box';
                            d.style.background = 'white'; 
                            d.style.border = '2.5px solid #463438';
                        }
                        visuals.appendChild(d);
                        
                        const t = document.createElement('div');
                        t.className = 'circuit-target';
                        t.style.left = '50%';
                        t.style.top = (tY)+'px';
                        visuals.appendChild(t);
                    }
                }
                
                u.appendChild(visuals);
                
                if (!isTouchDevice && activeTraceInput === null) {
                    u.ondragstart = (e) => {
                        draggedIndex = idx;
                        e.dataTransfer.effectAllowed = 'move';
                        u.classList.add('during-snapshot'); 
                        const wires = u.querySelectorAll('.horizontal-wire');
                        wires.forEach(w => w.style.opacity = '0');
                        u.style.background = 'transparent'; 
                        visuals.style.opacity = '1';
                        setTimeout(() => {
                            u.classList.remove('during-snapshot'); 
                            wires.forEach(w => w.style.opacity = '1');
                            u.style.background = '';
                            visuals.style.opacity = '0.35';
                        }, 0);
                    };
                    u.ondragend = (e) => { 
                        visuals.style.opacity = '1';
                        draggedIndex = null;
                        document.querySelectorAll('.circuit-unit').forEach(unit => {
                            unit.classList.remove('drag-target', 'drag-target-right');
                        });
                    };
                }
                
                let touchTimer = null;
                let startX, startY;
                let swipeActionTriggered = false; // 防呆機制：滑動一次只觸發一次

                u.addEventListener('touchstart', (e) => {
                    if (activeTraceInput !== null || e.touches.length > 1) return;
                    u.draggable = false; 
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                    swipeActionTriggered = false;
                    
                    touchTimer = setTimeout(() => {
                        touchTimer = null;
                        startMobileDrag(e.touches[0], u, idx);
                    }, 300); 
                }, {passive: true});

                u.addEventListener('touchmove', (e) => {
                    if (mobileDragging) {
                        if (e.cancelable) e.preventDefault();
                        moveMobileDrag(e.touches[0]);
                        
                        // 動態偵測是否回到 circuit-area 以決定要不要顯示禁止符號
                        const wrapper = document.getElementById('circuit-content-wrapper');
                        const wrapperRect = wrapper.getBoundingClientRect();
                        
                        if (e.touches[0].clientX < wrapperRect.left) {
                            document.querySelectorAll('.circuit-unit').forEach(el => el.classList.remove('drag-target', 'drag-target-right'));
                        } else {
                            const targetEl = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
                            if (targetEl) {
                                const targetUnit = targetEl.closest('.circuit-unit');
                                if (targetUnit) {
                                    const type = targetUnit.dataset.type;
                                    const isSelf = type === 'gate' && parseInt(targetUnit.dataset.idx) === draggedIndex;
                                    if (!isSelf) {
                                        document.querySelectorAll('.circuit-unit').forEach(el => el.classList.remove('drag-target', 'drag-target-right'));
                                        const rect = targetUnit.getBoundingClientRect();
                                        const isAfter = (e.touches[0].clientX - rect.left) > (rect.width / 2);
                                        
                                        if (targetUnit.dataset.type === 'start') {
                                            targetUnit.classList.add('drag-target-right');
                                        } else if (targetUnit.dataset.type === 'end') {
                                            targetUnit.classList.add('drag-target');
                                        } else {
                                            if (isAfter) targetUnit.classList.add('drag-target-right');
                                            else targetUnit.classList.add('drag-target');
                                        }
                                    }
                                }
                            }
                        }

                    } else if (!swipeActionTriggered && (touchTimer !== null || startY !== undefined)) {
                        const dx = e.touches[0].clientX - startX;
                        const dy = e.touches[0].clientY - startY;

                        if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
                            if (touchTimer) { clearTimeout(touchTimer); touchTimer = null; }
                        }

                        // 判斷上下滑動
                        if (Math.abs(dy) > 30 && Math.abs(dy) > Math.abs(dx)) {
                            if (e.cancelable) e.preventDefault();

                            if (dy > 30) {
                                // 往下拉 -> 選取 (Select)
                                const sIdx = selectedIndices.indexOf(idx);
                                if (sIdx > -1) selectedIndices.splice(sIdx, 1); 
                                else selectedIndices.push(idx);
                                renderCircuit();
                                swipeActionTriggered = true;
                                startY = undefined;
                            } else if (dy < -30) {
                                // 往上推 -> 刪除 (Delete)
                                if (typeof pop !== 'undefined' && pop.play) { pop.currentTime = 0; pop.play().catch(err=>{}); }
                                syncGateHighlight(g, false);
                                selectedIndices = [];
                                deleteGate(idx);
                                swipeActionTriggered = true;
                                startY = undefined;
                            }
                        }
                    }
                }, {passive: false});

                u.addEventListener('touchend', (e) => {
                    if (touchTimer) { clearTimeout(touchTimer); touchTimer = null; }
                    if (mobileDragging) {
                        if (e.cancelable) e.preventDefault();
                        endMobileDrag(e.changedTouches[0]);
                    }
                    if (activeTraceInput === null) setTimeout(() => { u.draggable = true; }, 100);
                    swipeActionTriggered = false;
                });

                u.addEventListener('touchcancel', (e) => {
                    if (touchTimer) { clearTimeout(touchTimer); touchTimer = null; }
                    if (mobileDragging) endMobileDrag(e.changedTouches[0]);
                    if (activeTraceInput === null) setTimeout(() => { u.draggable = true; }, 100);
                    swipeActionTriggered = false;
                });
                u.onmouseover = () => syncGateHighlight(g, true);
                u.onmouseout = () => syncGateHighlight(g, false);
                
                // 左鍵刪除，右鍵多重選取
                u.onclick = (e) => {
                    if (activeTraceInput !== null || mobileDragging) return;
                    syncGateHighlight(g, false);
                    selectedIndices = [];
                    deleteGate(idx);
                };

                u.oncontextmenu = (e) => {
                    e.preventDefault();
                    if (activeTraceInput !== null || mobileDragging) return false;
                    const sIdx = selectedIndices.indexOf(idx);
                    if (sIdx > -1) selectedIndices.splice(sIdx, 1);
                    else selectedIndices.push(idx);
                    renderCircuit();
                    return false;
                };

                c.appendChild(u);
            });
            
            // --- 建立結尾空間 (End Unit) ---
            const endU = document.createElement('div');
            endU.className = 'circuit-unit';
            endU.style.minWidth = '50px';
            endU.style.flexGrow = '1';
            endU.style.cursor = 'default';
            endU.dataset.type = 'end';
            if (!isQuantumMode) endU.style.display = 'none';
            drawWires(endU, states.length > 0 ? states.length - 1 : 0);
            c.appendChild(endU);

            updateUndoStatus();
            if (selectedIndices.length === 0 && gateHistory.length > 0 && draggedIndex === null && activeTraceInput === null) {
                setTimeout(() => { if(wrapper) wrapper.scrollTo({ left: wrapper.scrollWidth, behavior: 'smooth' }); }, 100);
            }
        }

        function undo() {
            if (historyStack.length <= 1) return;
            if(typeof pop !== 'undefined' && pop.play) { pop.currentTime = 0; pop.play().catch(e=>{}); }
            historyStack.pop();
            gateHistory = [...historyStack[historyStack.length - 1]];
            selectedIndices = []; recalculatePositions(); finishMove();
        }

        function resetCircuit() {
            if(typeof pop !== 'undefined' && pop.play) { pop.currentTime = 0; pop.play().catch(e=>{}); }
            fishAtNode = [...initialFishAtNode];
            gateHistory = [];
            historyStack = [[]];
            selectedIndices = [];
            finishMove();
        }

        function deleteGate(idx) {
            if(typeof pop !== 'undefined' && pop.play) { pop.currentTime=0; pop.play().catch(e=>{}); }
            gateHistory.splice(idx,1);
            pushHistory();
            recalculatePositions();
            finishMove();
        }

        function updateUndoStatus() {
            const isActive = (historyStack.length > 1);
            const ub = document.getElementById('undo-btn');
            if(ub) {
                if(isActive){ ub.classList.add('active'); ub.style.pointerEvents="auto"; }
                else { ub.classList.remove('active'); ub.style.pointerEvents="none"; }
            }
        }

        function shareCircuit() {
            if (gateHistory.length === 0) {
                alert("The circuit is empty and cannot be shared.");
                return;
            }
            const circuitData = gateHistory.join(',');
            const shareUrl = `${window.location.origin}${window.location.pathname}?circuit=${encodeURIComponent(circuitData)}`;
            navigator.clipboard.writeText(shareUrl).then(() => {
                alert("Circuit sharing link copied! Send it to a friend to open this circuit.");
            }).catch(err => {
                console.error('Failed to copy link', err);
                alert("Link: " + shareUrl);
            });
        }

        function navWithSound(url) {
            if (typeof pop !== 'undefined') {
                pop.currentTime = 0;
                pop.play(); 
            }
            setTimeout(() => {
                window.location.href = url;
            }, 150); 
        }
    </script>
</body>
</html>
