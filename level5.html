</head>
<body id="body-root">

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzR0J0VXyl5ayKwDXlHimc4WS1FjvGEb2-gTBMhum8APQKfDHxc5wsiWRkNqkxJrocMOw/exec';
        let steps = 0, time = 0, isPro = false, timerInterval, gateHistory = [], historyStack = [[]],
            selectedIndices = [], fishAtNode = [7, 6, 5, 4, 3, 2, 1, 0], isSolved = false,
            lineMode = 1, hoverLine = null, currentOptionIndex = 0, currentOptions = [],
            tutorialStep = 0, tutorialActive = false, scrollCount = 0;
        let draggedIdx = null;
        let leaderboardData;
        let isShakeCtrlActive = false; 
        let lastShakeTime = 0;
        let shakePermissionRequested = false;
        let mobileDragging = false;
        let mDragIndex = null;
        let dragGhost = null;
        let isTouchDevice = false; 
        let activeMobileLine = null;
        let lastTiltDirection = 0;
        const TILT_THRESHOLD = 15; 
        const RETURN_THRESHOLD = 10; 
        let gyroPermissionGranted = false;
        const pop = new Audio('pop.m4a'), meow = new Audio('meow.m4a'),
            getDynamicOffset = () => parseInt(getComputedStyle(document.body).getPropertyValue('--cube-offset-x')) || 0;
        const nodePositions = [
            { t: 150, get l() { return 135 + getDynamicOffset() } },
            { t: 150, get l() { return 350 + getDynamicOffset() } },
            { t: 330, get l() { return 135 + getDynamicOffset() } },
            { t: 330, get l() { return 350 + getDynamicOffset() } },
            { t: 20,  get l() { return -10 + getDynamicOffset() } },
            { t: 20,  get l() { return 510 + getDynamicOffset() } },
            { t: 460, get l() { return -10 + getDynamicOffset() } },
            { t: 460, get l() { return 510 + getDynamicOffset() } }
        ];
        const edges = [[0, 1], [1, 3], [3, 2], [2, 0], [4, 5], [5, 7], [7, 6], [6, 4], [0, 4], [1, 5], [2, 6], [3, 7]];
        function handleMotion(event) {
            const acc = event.accelerationIncludingGravity;
            if (!acc) return;
            const threshold = 20; 
            const delta = Math.sqrt(acc.x ** 2 + acc.y ** 2 + acc.z ** 2);
            if (delta > threshold) {
                const now = Date.now();
                if (now - lastShakeTime > 1000) { 
                    isShakeCtrlActive = !isShakeCtrlActive;
                    lastShakeTime = now;
                    if (navigator.vibrate) navigator.vibrate([100]); 
                    const toast = document.getElementById('shake-toast');
                    toast.innerText = isShakeCtrlActive ? "Ctrl Mode: ON" : "Ctrl Mode: OFF";
                    toast.style.opacity = '1';
                    setTimeout(() => { toast.style.opacity = '0'; }, 5000);
                }
            }
        }
        function requestShakePermission() {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(state => {
                        if (state === 'granted') window.addEventListener('devicemotion', handleMotion);
                    }).catch(console.error);
            } else {
                window.addEventListener('devicemotion', handleMotion);
            }
        }
        window.onload = () => {
            initGameLayout(); initGates(); drawStaticLines(); updateFishUI(); updateUndoStatus(); fetchLeaderboard();
            timerInterval = setInterval(() => {
                time++; document.getElementById('timer').innerText = time;
            }, 1000);
            const requestGyroPermission = async () => {
                if (!gyroPermissionGranted && typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try {
                        const permission = await DeviceOrientationEvent.requestPermission();
                        if (permission === 'granted') gyroPermissionGranted = true;
                    } catch (error) { console.log("Gyroscope access request denied:", error); }
                } else {
                    gyroPermissionGranted = true;
                }
                window.removeEventListener('click', requestGyroPermission);
                window.removeEventListener('touchstart', requestGyroPermission);
            };
            window.addEventListener('click', requestGyroPermission);
            window.addEventListener('touchstart', requestGyroPermission);
            const btnPro = document.getElementById('mode-toggle'); 
            const btnMode = document.getElementById('mode-btn');   
            if (btnPro) btnPro.addEventListener('click', requestGyroPermission);
            if (btnMode) btnMode.addEventListener('click', requestGyroPermission);
            document.getElementById('circuit-content-wrapper').addEventListener('wheel', (e) => {
                e.preventDefault(); e.currentTarget.scrollLeft += e.deltaY;
            });
            document.addEventListener('wheel', (e) => {
                if (!hoverLine || lineMode === 1) return;
                if (tutorialActive && tutorialStep < 2) return;
                if (tutorialActive && tutorialStep === 5) return;

        }
        function executeLogic(type) {
            if (type.includes('_SWAP_')) { let [, , iA, iB] = type.split('_'); [fishAtNode[iA], fishAtNode[iB]] = [fishAtNode[iB], fishAtNode[iA]]; return; }
            let pm = Array.from({ length: 8 }, (_, p) => {
                let b = p.toString(2).padStart(3, '0').split('').map(Number);
                if (type.startsWith('X')) b[type[1]] ^= 1;
                else if (type.startsWith('CX')) { if (b[type[2]]) b[type[3]] ^= 1; }
                else if (type.startsWith('C0X')) { if (!b[type[3]]) b[type[4]] ^= 1; }
                else if (type.startsWith('TOF')) {
                    let s = type.split('_')[0].replace('TOF', ''), parts = [];
                    for (let i = 0; i < s.length; i++) { if (s[i + 1] === 'p') { parts.push({ v: parseInt(s[i]), p: true }); i++; } else parts.push({ v: parseInt(s[i]), p: false }); }
                    let t = parts.pop().v; let cond = parts.every(p => p.p ? !b[p.v] : b[p.v]); if (cond) b[t] ^= 1;
                }
                return parseInt(b.join(''), 2);
            });
            let newFish = new Array(8); for (let i = 0; i < 8; i++) newFish[pm[i]] = fishAtNode[i]; fishAtNode = newFish;
        }
        function recalculate() { fishAtNode = [7, 6, 5, 4, 3, 2, 1, 0]; let h = [...gateHistory]; gateHistory = []; h.forEach(g => { executeLogic(g); gateHistory.push(g); }); steps = gateHistory.length; finishMove(); }
        function finishMove() { document.getElementById('step-count').innerText = steps; updateFishUI(); renderCircuit(); checkWin(); }
        function updateFishUI() { for (let nI = 0; nI < 8; nI++) { const f = document.getElementById(`fish-${fishAtNode[nI]}`), n = nodePositions[nI]; if (f && n) { f.style.top = (n.t + 78) + "px"; f.style.left = (n.l + 22) + "px"; } } }
        function renderCircuit() {
            const c = document.getElementById('circuit-content'); c.innerHTML = '';
            gateHistory.forEach((g, idx) => {
                const u = document.createElement('div');
                u.className = 'circuit-unit' + (selectedIndices.includes(idx) ? ' selected' : '');
                u.draggable = !isTouchDevice && !isSolved;
                u.oncontextmenu = (e) => { e.preventDefault(); return false; };
                if (!isTouchDevice) {
                    u.ondragstart = (e) => { draggedIdx = idx; e.dataTransfer.effectAllowed = 'move'; e.target.style.opacity = '0.5'; };
                    u.ondragover = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; return false; };
                    u.ondrop = (e) => {
                        if (isSolved || draggedIdx === null || draggedIdx === idx) return;
                        pop.currentTime = 0; pop.play();
                        const movedGate = gateHistory.splice(draggedIdx, 1)[0];
                        gateHistory.splice(idx, 0, movedGate);
                        historyStack.push([...gateHistory]); selectedIndices = []; recalculate(); draggedIdx = null;
                    };
                    u.ondragend = (e) => { e.target.style.opacity = '1'; draggedIdx = null; };
                }
                let touchTimer = null;
                let startX, startY;
                u.addEventListener('touchstart', (e) => {
                    if(isSolved || e.touches.length > 1) return;
                    u.draggable = false; 
                    startX = e.touches[0].clientX;
                    startY = e.touches[0].clientY;
                    touchTimer = setTimeout(() => {
                        touchTimer = null;
                        startMobileDrag(e.touches[0], u, idx);
                    }, 300); 
                }, {passive: true});
                u.addEventListener('touchmove', (e) => {
                    if (mobileDragging) {
                        if (e.cancelable) e.preventDefault();
                        moveMobileDrag(e.touches[0]);
                    } else if (touchTimer) {
                        let dx = e.touches[0].clientX - startX;
                        let dy = e.touches[0].clientY - startY;
                        if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
                            clearTimeout(touchTimer);
                            touchTimer = null;
                        }
                    }
                }, {passive: false});
                u.addEventListener('touchend', (e) => {
                    if (touchTimer) { clearTimeout(touchTimer); touchTimer = null; }
                    if (mobileDragging) {
                        if (e.cancelable) e.preventDefault();
                        endMobileDrag(e.changedTouches[0]);
                    }
                    setTimeout(() => { u.draggable = true; }, 100);
                });
                u.addEventListener('touchcancel', (e) => {
                    if (touchTimer) { clearTimeout(touchTimer); touchTimer = null; }
                    if (mobileDragging) endMobileDrag(e.changedTouches[0]);
                    setTimeout(() => { u.draggable = true; }, 100);
                });
                u.onmouseenter = () => { if(!isSolved) previewGate(g); };
                u.onmouseleave = () => { if(!isSolved) clearHighlight(); };
                u.onclick = (e) => {
                    if (isSolved || mobileDragging) return;
                    pop.currentTime = 0; pop.play();
                    if (e.ctrlKey || e.metaKey || isShakeCtrlActive) {
                        if (selectedIndices.includes(idx)) selectedIndices = selectedIndices.filter(i => i !== idx);
                        else selectedIndices.push(idx);
                        renderCircuit();
                    } else {
                        selectedIndices = []; gateHistory.splice(idx, 1);
                        historyStack.push([...gateHistory]); recalculate();
                        hideIndicator();
                    }
                };
                let ctrl = [], target = -1, zero = [];
                if (g.startsWith('X')) target = parseInt(g[1]);
                else if (g.startsWith('CX')) { ctrl = [parseInt(g[2])]; target = parseInt(g[3]); }
                else if (g.startsWith('C0X')) { ctrl = [parseInt(g[3])]; target = parseInt(g[4]); zero = [parseInt(g[3])]; }
                else if (g.startsWith('TOF')) {
                    let s = g.split('_')[0].replace('TOF', ''), parts = [];
                    for (let i = 0; i < s.length; i++) { if (s[i + 1] === 'p') { parts.push({ v: parseInt(s[i]), p: true }); i++; } else parts.push({ v: parseInt(s[i]), p: false }); }
                    target = parts.pop().v; parts.forEach(p => { ctrl.push(p.v); if (p.p) zero.push(p.v); });
                }
                if (ctrl.length > 0) {
                    let min = Math.min(...ctrl, target), max = Math.max(...ctrl, target);
                    const v = document.createElement('div'); v.className = 'connection-v-line'; v.style.cssText = `top:${30+min*40}px; height:${(max-min)*40}px;`; u.appendChild(v);
                    ctrl.forEach(cl => { const d = document.createElement('div'); d.className = 'control-dot'; d.style.top = (24 + cl * 40) + 'px'; if (zero.includes(cl)) { d.style.background = '#fff'; d.style.border = '2.5px solid #463438'; } u.appendChild(d); });
                }
                const t = document.createElement('div'); t.className = 'circuit-target'; t.style.top = (31 + target * 40) + 'px'; u.appendChild(t); c.appendChild(u);
            });
            updateUndoStatus();
            const w = document.getElementById('circuit-content-wrapper');
            if (draggedIdx === null) setTimeout(() => w && w.scrollTo({ left: w.scrollWidth, behavior: 'smooth' }), 100);
        }
        function undo() { if (isSolved || historyStack.length <= 1) return; pop.currentTime = 0; pop.play(); historyStack.pop(); gateHistory = [...historyStack[historyStack.length - 1]]; selectedIndices = []; recalculate(); }
        function resetCircuit() { if (isSolved) return; pop.currentTime = 0; pop.play(); gateHistory = []; historyStack = [[]]; selectedIndices = []; recalculate(); }
        function updateUndoStatus() {
            const isActive = historyStack.length > 1 && !isSolved;
            const topUndo = document.getElementById('undo-btn');
            if(topUndo) {
                if(isActive) { topUndo.classList.add('active'); topUndo.style.pointerEvents="auto"; }
                else { topUndo.classList.remove('active'); topUndo.style.pointerEvents="none"; }
            }
            const bottomUndo = document.getElementById('undo-btn-bottom');
            if(bottomUndo) {
                if(isActive) { bottomUndo.classList.add('active'); bottomUndo.style.pointerEvents="auto"; }
                else { bottomUndo.classList.remove('active'); bottomUndo.style.pointerEvents="none"; }
            }
        }
        async function checkWin() {
            if (fishAtNode.every((pos, i) => pos === i)) {
                isSolved = true; updateUndoStatus(); if (timerInterval) clearInterval(timerInterval);
                const ft = time, st = steps, u = sessionStorage.getItem('currentUser'), savedLevel = parseInt(sessionStorage.getItem('currentLevel')) || 1;
                if (savedLevel < 6) sessionStorage.setItem('currentLevel', 6);
                setTimeout(() => { if(typeof meow !== 'undefined') { meow.currentTime = 0; meow.play(); } document.getElementById('victoryMsg').innerText = `STEP：${st} | TIME：${ft}s`; document.getElementById('victoryModal').style.display = 'flex'; }, 800);
                if (u) { fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'saveRecord', username: u, level: 5, steps: st, time: ft, circuit: gateHistory.join(',') }) }).then(() => { setTimeout(fetchLeaderboard, 1200); }); }
            }
        }
        function viewInLab() {
            const circuitData = gateHistory.join(',');
            window.location.href = `lab3.html?circuit=${encodeURIComponent(circuitData)}`;
        }
    </script>
