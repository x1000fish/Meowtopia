<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024">
    <title>Meowtopia - Level 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Gaegu:wght@700&family=Titan+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Shrikhand&family=Alfa+Slab+One&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #FFF9F0; background-image: linear-gradient(45deg, #fce4ec 25%, transparent 25%, transparent 50%, #fce4ec 50%, #fce4ec 75%, transparent 75%, transparent); background-size: 100px 100px; color: #463438; min-height: 100vh; }
        .hidden { display: none !important; }
        .main-layout { display: flex; align-items: flex-start; justify-content: center; gap: 20px; margin-top: 20px; }
        .game-canvas { position: relative; width: 850px; height: 500px; background: #fffaf5; border: 8px solid #463438; border-radius: 40px; overflow: hidden; box-shadow: 15px 15px 0px #FFB7C5; }

        .line-v { width: 8px; height: 250px; }
        .fish-wrapper { position: absolute; width: 80px; pointer-events: none; z-index: 30; display: flex; flex-direction: column; align-items: center; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }

        .fish-label { background: rgba(70, 52, 56, 0.8); color: #fff; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; margin-bottom: -47px; z-index: 5; position: relative; top: -10px; }
        .game-btn { cursor: pointer; border: 5px solid #463438; border-radius: 60px; padding: 12px; font-size: 26px; font-weight: 900; color: white; text-shadow: 2px 2px 0 #463438; box-shadow: 0 6px 0 #463438; position: relative; transition: all 0.1s; display: inline-block; }
        .game-btn:active { top: 6px; box-shadow: 0 2px 0 #463438; }

        .gate-btn-v2:active { transform: translateY(2px); box-shadow: 0 1px 2px rgba(70,52,56,0.2); }
        .gate-btn-v2:hover, .func-btn:hover { background-color: #FFB7C5 !important; color: #fff !important; border-color: #463438 !important; box-shadow: 0 3px 0 #463438 !important; transform: translateY(-2px); }
        .func-btn { width: 100%; margin-top: 5px; padding: 10px; border-radius: 35px; font-weight: 900; font-size: 16px; border: 2.5px solid #463438; cursor: pointer; box-shadow: 0 4px 0 rgba(70,52,56,0.1); }
        .btn-reset { background: #FFF9F0; color: #463438; }

        .btn-undo.active.highlight-focus:hover { background-color: #ff9fb2 !important; color: #fff !important; animation-play-state: paused !important; border-color: #463438 !important; border-width: 3px !important; box-shadow: 0 4px 0 #463438, 0 0 15px #99C44D !important; }
        .btn-undo.disabled { background: #FFB7C5 !important; border-color: #463438 !important; color: #ffffff !important; cursor: not-allowed; opacity: 0.5; }
        #pro-panel { width: 0; opacity: 0; height: 500px; overflow: hidden; background: #ffffff; border: 0px solid #463438; border-radius: 40px; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .pro-active #pro-panel { width: 320px; opacity: 1; border: 8px solid #463438; padding: 12px 20px 20px 20px; box-shadow: 10px 10px 0px #99C44D; }
        .panel-section-title { font-weight: 900; font-size: 18px; margin-bottom: 6px; margin-top: 6px; color: #463438; text-align: center; white-space: nowrap; overflow: hidden; }
        .pro-active #node-0, .pro-active #node-2 { left: 65px !important; }
        .pro-active #node-1, .pro-active #node-3 { left: 405px !important; }
        .pro-active .line-h { left: 130px !important; }
        .pro-active .line-v:nth-of-type(3) { left: 130px !important; }
        .pro-active .line-v:nth-of-type(4) { left: 470px !important; }
        .pro-active #fish-0, .pro-active #fish-2 { left: 95px; }
        .pro-active #fish-1, .pro-active #fish-3 { left: 435px; }
        #circuit-area { width: 900px; height: 0; opacity: 0; background: #ffffff; border: 0px solid #463438; border-radius: 30px; margin-top: 20px; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); position: relative; padding: 0 15px; overflow: hidden; }
        .pro-active #circuit-area { height: 170px; opacity: 1; border: 8px solid #463438; padding: 15px; box-shadow: 10px 10px 0px #FFB7C5; }
        .circuit-title { text-align: center; font-weight: 900; font-size: 1.25rem; margin-bottom: 8px; color: #463438; }
        #circuit-content-wrapper { position: relative; height: 130px; overflow-x: auto !important; overflow-y: hidden; margin-left: 30px; }
        #circuit-content { display: flex; height: 100%; padding: 0 7px; min-width: 100%; width: max-content; position: relative; background-image: linear-gradient(#463438, #463438), linear-gradient(#463438, #463438); background-size: 100% 3px; background-repeat: no-repeat; background-position: 0 20px, 0 60px; }
        .qubit-label { position: absolute; left: 12px; font-weight: 900; font-size: 16px; color: #463438; z-index: 5; }
        .circuit-unit { min-width: 48px; height: 85px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; cursor: pointer; transition: all 0.2s; }
        .circuit-unit:hover { background: rgba(255, 183, 197, 0.3); border-radius: 12px; }
        .circuit-unit.selected-gate { background: rgba(153, 196, 77, 0.3) !important; border-radius: 12px; box-shadow: inset 0 0 0 2px #99C44D; }
        .control-dot { width: 14px; height: 14px; background: #463438; border-radius: 50%; position: absolute; z-index: 5; }
        .connection-v-line { position: absolute; width: 2.5px; background: #463438; z-index: 3; }
        .circuit-target { position: absolute; width: 22px; height: 22px; border-radius: 50%; background: #fff; border: 2.5px solid #463438; display: flex; align-items: center; justify-content: center; z-index: 15; transform: translate(-50%, -50%); }
        .circuit-target::before { content: ""; position: absolute; width: 2.5px; height: 100%; background-color: #463438; }
        .circuit-target::after { content: ""; position: absolute; width: 100%; height: 2.5px; background-color: #463438; }
        #pro-guide-mask { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); z-index: 900; display: none; }
        #guide-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); z-index: 450; display: flex; }
        #guide-hint-text { position: fixed; background: #99C44D; color: #fff; padding: 4px 12px; border-radius: 9999px; font-weight: 900; font-size: 16px; z-index: 950; display: none; transition: all 0.3s; min-width: 150px; box-shadow: 0 4px 0 #463438; border: 3px solid #463438; text-align: center; }
        .next-btn { margin-top: 8px; background: #463438; color: #fff; padding: 4px 12px; border-radius: 10px; font-size: 14px; cursor: pointer; border: none; font-weight: 900; }
        .lock-btn { opacity: 0.4; cursor: not-allowed !important; pointer-events: none !important; filter: grayscale(1); }
        .highlight-focus { position: relative !important; z-index: 901 !important; pointer-events: auto !important; animation: pulse-btn-border 1.5s infinite ease-in-out !important; }
        .highlight-static { position: relative !important; z-index: 901 !important; border-color: #99C44D !important; box-shadow: 0 0 25px #99C44D !important; pointer-events: auto !important; }
        .highlight-canvas-obj { position: absolute !important; z-index: 901 !important; box-shadow: 0 0 30px 10px #99C44D !important; pointer-events: auto !important; }
        .fish-top-layer { z-index: 902 !important; }
        .gate-btn-v2.highlight-focus:hover, .func-btn.highlight-focus:hover, .highlight-focus:hover { animation-play-state: paused !important; border-color: #99C44D !important; border-width: 3px !important; background-color: #FFB7C5 !important; color: #fff !important; box-shadow: 0 4px 0 #463438, 0 0 20px #99C44D !important; transform: scale(1.05) !important; }
        .circuit-unit.highlight-focus { z-index: 901 !important; pointer-events: auto !important; animation: pulse-circuit 1.5s infinite ease-in-out !important; background: rgba(153, 196, 77, 0.2); border-radius: 8px; }
        .mode-toggle-fixed { position: fixed; top: 20px; right: 20px; width: 70px; height: 70px; background: white; border: 5px solid #463438; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; box-shadow: 0 4px 0 #463438; z-index: 500; }
        .start-hint-banner { position: fixed; top: 100px; right: 15px; z-index: 600; pointer-events: none; display: flex; flex-direction: column; align-items: flex-end; animation: tap-anim 1.5s infinite; }
        .hint-pill { background: #99C44D; color: #fff; font-weight: 900; padding: 4px 12px; border-radius: 9999px; font-size: 16px; margin-top: 8px; border: 3px solid #463438; box-shadow: 0 4px 0 #463438; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(70, 52, 56, 0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #FFF9F0; border: 8px solid #463438; border-radius: 40px; padding: 30px; text-align: center; width: 380px; box-shadow: 0 10px 0 #FFB7C5; color: #463438; }
        .no-fish-anim .fish-wrapper, .no-fish-anim .node { transition: none !important; }
        .mode-toggle-fixed:hover { transform: translateY(-2px); box-shadow: 0 6px 0 #463438;}
        .mode-toggle-fixed:active { transform: translateY(2px); box-shadow: 0 2px 0 #463438;}
        .gate-btn-circuit {padding: 0 !important; height: 76px;display: flex; align-items: center; justify-content: center; border-radius: 16px !important; position: relative; }
        .wire-container { position: relative; width: 60%; max-width: 50px; height: 100%; background-image: linear-gradient(#463438, #463438), linear-gradient(#463438, #463438); background-size: 100% 3px; background-repeat: no-repeat; background-position: center 24px, center 52px; pointer-events: none; }
        #canvas-bottom-btns { position: absolute; bottom: 20px; right: 30px; display: flex; flex-direction: column; gap: 10px; z-index: 100; }
        #canvas-bottom-btns .func-btn { margin-top: 0; width: 90px; font-size: 14px; padding: 8px 5px; text-transform: uppercase; border-width: 3px;}
        .pro-active #canvas-bottom-btns { display: none !important;}
        @keyframes green-pulse { 0%, 100% { box-shadow: 0 4px 0 #463438, 0 0 5px #99C44D; border-color: #463438; } 35% { box-shadow: 0 4px 0 #463438, 0 0 30px #99C44D; border-color: #99C44D; transform: scale(1.1); } }
        @keyframes tap-anim { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes pulse-red-undo { 0%, 100% { transform: scale(1); box-shadow: 0 4px 0 #463438; } 50% { transform: scale(1.05); box-shadow: 0 0 20px #FFB7C5, 0 4px 0 #463438; } }
        @keyframes pulse-btn-border { 0%, 100% { border-color: #463438; transform: scale(1); } 50% { border-color: #99C44D; transform: scale(1.05); box-shadow: 0 0 15px #99C44D; } }
        @keyframes pulse-circuit { 0%, 100% { box-shadow: 0 0 5px #99C44D; transform: scale(1); } 50% { box-shadow: 0 0 25px #99C44D; transform: scale(1); } }
        .yellow-glow { animation: green-pulse 1.5s infinite ease-in-out; z-index: 501 !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4" id="body-root">
    <div id="pro-guide-mask"></div><div id="guide-hint-text"></div><div id="guide-overlay"></div>
    <div id="mode-toggle-container">
        <div id="mode-toggle" class="mode-toggle-fixed yellow-glow" onclick="togglePro()">👁️</div>
        <div id="start-hint" class="start-hint-banner"><span class="text-5xl">👆🏻</span><div class="hint-pill">CLICK TO START PRO MODE</div></div>
    </div>
    <div class="w-full max-w-4xl">
        <div class="flex justify-between w-full px-4 mb-4 mt-6">
            <div class="text-3xl font-black" style="color: #463438;">STEPS: <span id="step-count">0</span> | TIME: <span id="timer">0</span>s</div>
            <div class="text-3xl font-black" style="color: #7bc202;">LEVEL 2</div>
        </div>
        <div class="main-layout">
            <div id="pro-panel">
                <div class="panel-section-title">Quantum Gate</div>
                <div class="grid grid-cols-2 gap-2 w-10/12 mx-auto" id="gate-container">
                    <button id="gate-x0" class="gate-btn-v2 lock-btn gate-btn-circuit" onclick="applyGate('X0')">
                        <div class="wire-container">
                            <div class="circuit-target" style="left: 50%; top: 25.5px;"></div>
                        </div>
                    </button>
                    <button id="gate-x1" class="gate-btn-v2 lock-btn gate-btn-circuit" onclick="applyGate('X1')">
                        <div class="wire-container">
                            <div class="circuit-target" style="left: 50%; top: 53.5px;"></div>
                        </div>
                    </button>
                    <button id="gate-cx01" class="gate-btn-v2 gate-btn-circuit" onclick="applyGate('CX01')">
                        <div class="wire-container">
                            <div class="connection-v-line" style="left: 50%; top: 25.5px; height: 24px; transform: translateX(-50%);"></div>
                            <div class="control-dot" style="left: 50%; top: 25.5px; background: #463438; transform: translate(-50%, -50%);"></div>
                            <div class="circuit-target" style="left: 50%; top: 53.5px;"></div>
                        </div>
                    </button>
                    <button id="gate-c0x01" class="gate-btn-v2 gate-btn-circuit" onclick="applyGate('C0X01')">
                        <div class="wire-container">
                            <div class="connection-v-line" style="left: 50%; top: 25.5px; height: 24px; transform: translateX(-50%);"></div>
                            <div class="control-dot" style="box-sizing: border-box; left: 50%; top: 25.5px; background: white; border: 2.5px solid #463438; transform: translate(-50%, -50%);"></div>
                            <div class="circuit-target" style="left: 50%; top: 53.5px;"></div>
                        </div>
                    </button>
                    <button id="gate-cx10" class="gate-btn-v2 gate-btn-circuit" onclick="applyGate('CX10')">
                        <div class="wire-container">
                            <div class="connection-v-line" style="left: 50%; top: 25.5px; height: 24px; transform: translateX(-50%);"></div>
                            <div class="control-dot" style="left: 50%; top: 53.5px; background: #463438; transform: translate(-50%, -50%);"></div>
                            <div class="circuit-target" style="left: 50%; top: 25.5px;"></div>
                        </div>
                    </button>
                    <button id="gate-c0x10" class="gate-btn-v2 gate-btn-circuit" onclick="applyGate('C0X10')">
                        <div class="wire-container">
                            <div class="connection-v-line" style="left: 50%; top: 25.5px; height: 24px; transform: translateX(-50%);"></div>
                            <div class="control-dot" style="box-sizing: border-box; left: 50%; top: 53.5px; background: white; border: 2.5px solid #463438; transform: translate(-50%, -50%);"></div>
                            <div class="circuit-target" style="left: 50%; top: 25.5px;"></div>
                        </div>
                    </button>
                </div>  
                <div class="panel-section-title">Control</div>
                <button id="reset-btn" class="func-btn btn-reset" onclick="resetCircuit()">Reset Circuit</button>
                <button id="undo-btn" class="func-btn btn-undo" onclick="undo()">Undo Step</button>
            </div>
            <div class="game-canvas" id="main-canvas">
                <div id="line-00-01" class="connection-line line-h" style="top: 95px; left: 280px;" onclick="swapOnly(0, 1, 'C0X01')"></div>
                <div id="line-10-11" class="connection-line line-h" style="bottom: 90px; left: 280px;" onclick="swapOnly(2, 3, 'CX01')"></div>
                <div id="line-00-10" class="connection-line line-v" style="top: 150px; left: 221px;" onclick="swapOnly(0, 2, 'C0X10')"></div>
                <div id="line-01-11" class="connection-line line-v" style="top: 150px; left: 571px;" onclick="swapOnly(1, 3, 'CX10')"></div>
                <div class="node" id="node-0" style="top: 25px; left: 155px;"><div class="fixed-number">00</div><img src="./image/Cat1.svg"></div>
                <div class="node" id="node-1" style="top: 25px; left: 505px;"><div class="fixed-number">01</div><img src="./image/Cat2.svg"></div>
                <div class="node" id="node-2" style="bottom: 25px; left: 155px;"><div class="fixed-number">10</div><img src="./image/Cat3.svg"></div>
                <div class="node" id="node-3" style="bottom: 25px; left: 505px;"><div class="fixed-number">11</div><img src="./image/Cat4.svg"></div>
                <div id="fish-0" class="fish-wrapper"><div class="fish-label">00</div><img src="./image/Fish1.svg"></div>
                <div id="fish-1" class="fish-wrapper"><div class="fish-label">01</div><img src="./image/Fish2.svg"></div>
                <div id="fish-2" class="fish-wrapper"><div class="fish-label">10</div><img src="./image/Fish3.svg"></div>
                <div id="fish-3" class="fish-wrapper"><div class="fish-label">11</div><img src="./image/Fish4.svg"></div>
                <div id="canvas-bottom-btns">
                    <button class="func-btn btn-reset" onclick="resetCircuit()">RESET</button>
                    <button id="undo-btn-bottom" class="func-btn btn-undo disabled" onclick="undo()">UNDO</button>
                </div>
            </div>
        </div>
        <div id="circuit-area" class="mx-auto">
            <div class="circuit-title">Circuit Diagram</div><div class="qubit-label" style="top: 60px;">q0</div><div class="qubit-label" style="top: 100px;">q1</div>
            <div id="circuit-content-wrapper"><div id="circuit-content"></div></div>
        </div>
        <div class="w-full text-center mt-6 mb-6"><a href="index.html" class="game-btn btn-red px-16">GIVE UP</a></div>
    </div>
    <div id="victoryModal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="text-5xl font-black mb-4" style="color: #463438;">MEOW!<br>🐾</h2>
            <p id="victoryMsg" class="text-xl font-bold mb-6"></p>
            <button onclick="location.href='index.html'" class="game-btn btn-green w-full mb-4">KEEP GOING</button>
            <button onclick="document.getElementById('victoryModal').style.display='none'" class="game-btn btn-red w-full">VIEW CIRCUIT</button>
        </div>
    </div>
    <script>
        let steps = 0, time = 0, isPro = false, fishAtNode = [0, 1, 3, 2], gateHistory = [], tutorialPhase = 0, tutorialCompleted = false, timerInterval;
        let isGameOver = false;
        let actionStack = [];
        let selectedIndices = [];
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzR0J0VXyl5ayKwDXlHimc4WS1FjvGEb2-gTBMhum8APQKfDHxc5wsiWRkNqkxJrocMOw/exec';
        const pop = new Audio('pop.m4a'), meow = new Audio('meow.m4a');
        window.onload = () => {
            timerInterval = setInterval(() => { time++; document.getElementById('timer').innerText = time; }, 1000);
            updateFishUI();
            updateUndoStatus();
            initGateHovers();
            const w = document.getElementById('circuit-content-wrapper');
            w.addEventListener('wheel', (e) => { e.preventDefault(); w.scrollLeft += e.deltaY; });
        };
        function initGateHovers() {
            const gateToLineMap = {
                'gate-cx01': 'line-10-11',
                'gate-c0x01': 'line-00-01',
                'gate-cx10': 'line-01-11',
                'gate-c0x10': 'line-00-10'
            };
            Object.keys(gateToLineMap).forEach(btnId => {
                const btn = document.getElementById(btnId);
                const lineId = gateToLineMap[btnId];
                if (btn) {
                    btn.addEventListener('mouseenter', () => {
                        const line = document.getElementById(lineId);
                        if (line) line.classList.add('line-highlight');
                    });
                    btn.addEventListener('mouseleave', () => {
                        const line = document.getElementById(lineId);
                        if (line) line.classList.remove('line-highlight');
                    });
                }
            });
        }
        function togglePro() {
            pop.currentTime = 0;
            pop.play();
            isPro = !isPro; const b = document.getElementById('body-root'); document.getElementById('guide-overlay').style.display = 'none'; document.getElementById('start-hint').style.display = 'none'; document.getElementById('mode-toggle').classList.remove('yellow-glow');
            b.classList.add('no-fish-anim'); b.classList.toggle('pro-active', isPro); updateFishUI();
            if (isPro) { if (!tutorialCompleted) { tutorialPhase = 1; document.getElementById('pro-guide-mask').style.display = 'block'; setTimeout(() => updateTutorialUI(), 100); } }
            else { if (!tutorialCompleted) tutorialPhase = 0; document.getElementById('pro-guide-mask').style.display = 'none'; document.getElementById('guide-hint-text').style.display = 'none'; clearAllHighlights(); }
            setTimeout(() => b.classList.remove('no-fish-anim'), 50); document.getElementById('mode-toggle').innerText = isPro ? "⚡️" : "👁️";
        }
        function clearAllHighlights() { document.querySelectorAll('.highlight-focus, .highlight-static, .highlight-canvas-obj, .fish-top-layer').forEach(el => el.classList.remove('highlight-focus', 'highlight-static', 'highlight-canvas-obj', 'fish-top-layer')); document.querySelectorAll('.gate-btn-v2').forEach(el => { if (el.id !== 'gate-x0' && el.id !== 'gate-x1') el.classList.remove('lock-btn'); }); document.getElementById('circuit-area').classList.remove('highlight-focus'); }
        function highlightAction(g) {
            let n1, n2, l; if (g === 'C0X01') { n1 = 0; n2 = 1; l = 'line-00-01'; } else if (g === 'CX01') { n1 = 2; n2 = 3; l = 'line-10-11'; } else if (g === 'CX10') { n1 = 1; n2 = 3; l = 'line-01-11'; } else if (g === 'C0X10') { n1 = 0; n2 = 2; l = 'line-00-10'; }
            if (n1 !== undefined) { document.getElementById(`node-${n1}`).classList.add('highlight-canvas-obj'); document.getElementById(`node-${n2}`).classList.add('highlight-canvas-obj'); document.getElementById(l).classList.add('highlight-canvas-obj'); fishAtNode.forEach((nid, fid) => { if (nid === n1 || nid === n2) document.getElementById(`fish-${fid}`).classList.add('fish-top-layer'); }); }
            return l;
        }
        function updateTutorialUI() {
            clearAllHighlights(); const h = document.getElementById('guide-hint-text'), btns = document.querySelectorAll('.gate-btn-v2');
            const lockOthers = (id) => btns.forEach(b => { if (b.id !== id) b.classList.add('lock-btn'); });
            if (tutorialPhase === 1) { lockOthers('gate-c0x01'); document.getElementById('gate-c0x01').classList.add('highlight-focus'); h.innerHTML = `TRY 0CNOT q0→q1`; positionHint('gate-cx01', { x: 0, y: 87 }); }
            else if (tutorialPhase === 1.5) { h.innerHTML = `IF q0 IS 0, FLIP q1!<br><button class="next-btn" onclick="nextTutorial()">NEXT</button>`; positionHint(highlightAction('C0X01'), { x: -220, y: 40 }); }
            else if (tutorialPhase === 2) { lockOthers('gate-cx01'); document.getElementById('gate-cx01').classList.add('highlight-focus'); h.innerHTML = `TRY 1CNOT q0→q1`; positionHint('gate-cx01', { x: 8, y: 15 }); }
            else if (tutorialPhase === 2.5) { h.innerHTML = `IF q0 IS 1, FLIP q1!<br><button class="next-btn" onclick="nextTutorial()">NEXT</button>`; positionHint(highlightAction('CX01'), { x: -220, y: 40 }); }
            else if (tutorialPhase === 3) { document.getElementById('undo-btn').classList.add('highlight-focus'); h.innerHTML = `TRY TO UNDO`; positionHint('undo-btn', { x: 15, y: 12 }); }
            else if (tutorialPhase === 4) { lockOthers('gate-cx10'); document.getElementById('gate-cx10').classList.add('highlight-focus'); h.innerHTML = `TRY 1CNOT q1→q0`; positionHint('gate-cx10', { x: 8, y: 15 }); }
            else if (tutorialPhase === 4.5) { h.innerHTML = `IF q1 IS 1, FLIP q0!<br><button class="next-btn" onclick="nextTutorial()">NEXT</button>`; positionHint(highlightAction('CX10'), { x: 40, y: 30 }); }
            else if (tutorialPhase === 5) { document.getElementById('reset-btn').classList.add('highlight-focus'); h.innerHTML = `CLEAN START? RESET`; positionHint('reset-btn', { x: 15, y: 11 }); }
            else if (tutorialPhase === 6) { lockOthers('gate-c0x10'); document.getElementById('gate-c0x10').classList.add('highlight-focus'); h.innerHTML = `ADD 0CNOT q1→q0`; positionHint('gate-c0x10', { x: 15, y: 14 }); }
            else if (tutorialPhase === 6.5) { h.innerHTML = `ADD!<br><button class="next-btn" onclick="nextTutorial()">NEXT</button>`; positionHint(highlightAction('C0X10'), { x: 40, y: 30 }); }
            else if (tutorialPhase === 7) { lockOthers('gate-cx10'); document.getElementById('gate-cx10').classList.add('highlight-focus'); h.innerHTML = `AND 1CNOT q1→q0...`; positionHint('gate-cx10', { x: 15, y: 14 }); }
            else if (tutorialPhase === 7.5) { h.innerHTML = `DONE!<br><button class="next-btn" onclick="nextTutorial()">NEXT</button>`; positionHint(highlightAction('CX10'), { x: 40, y: 30 }); }
            else if (tutorialPhase === 8) { document.getElementById('circuit-area').classList.add('highlight-static'); h.innerHTML = `HOVER GATES TO PREVIEW<br>CLICK ICON TO DELETE`; positionHint('circuit-area', { x: -300, y: -75 }); }
            else if (tutorialPhase === 100) { tutorialCompleted = true; document.getElementById('pro-guide-mask').style.display = 'none'; h.style.display = 'none'; clearAllHighlights(); }
        }
        function positionHint(id, off) { const h = document.getElementById('guide-hint-text'), r = document.getElementById(id).getBoundingClientRect(); h.style.display = 'block'; h.style.left = (r.right + off.x) + "px"; h.style.top = (r.top + off.y) + "px"; }
        function nextTutorial() { if (isGameOver) return; const mapping = { 1.5: 2, 2.5: 3, 4.5: 5, 6.5: 7, 7.5: 8 }; if (mapping[tutorialPhase]) tutorialPhase = mapping[tutorialPhase]; updateTutorialUI(); }
        function applyGate(g) {
            if (isGameOver) return;
            if (g === 'X0' || g === 'X1') return;
            const ph = { 1: { g: 'C0X01', n: 1.5 }, 2: { g: 'CX01', n: 2.5 }, 4: { g: 'CX10', n: 4.5 }, 6: { g: 'C0X10', n: 6.5 }, 7: { g: 'CX10', n: 7.5 } };
            if (ph[tutorialPhase] && g === ph[tutorialPhase].g) {
                const cp = tutorialPhase; tutorialPhase = ph[cp].n; updateTutorialUI();
                setTimeout(() => {
                    executeGateLogic(g);
                    actionStack.push({ type: 'add', index: gateHistory.length - 1, newGate: g });
                }, 800);
                return;
            }
            if (selectedIndices.length > 0) {
                pop.currentTime = 0; pop.play();
                selectedIndices.sort((a, b) => a - b);
                const start = selectedIndices[0];
                const count = selectedIndices.length;
                const oldGates = gateHistory.slice(start, start + count);
                gateHistory.splice(start, count, g);
                actionStack.push({ type: 'replace', index: start, oldGates: oldGates, newGate: g });
                selectedIndices = [];
                recalculatePositions();
                finishMove();
            } else {
                executeGateLogic(g);
                actionStack.push({ type: 'add', index: gateHistory.length - 1, newGate: g });
                if (isPro && !tutorialCompleted) updateTutorialUI();
            }
        }
        function executeGateLogic(g) {
            pop.currentTime = 0; pop.play();
            const pm = [0, 1, 2, 3].map(p => {
                let q0 = Math.floor(p/2), q1 = p%2;
                if (g === 'X0') q0 = 1-q0;
                else if (g === 'X1') q1 = 1-q1;
                else if (g === 'CX01' && q0 === 1) q1 = 1-q1;
                else if (g === 'C0X01' && q0 === 0) q1 = 1-q1;
                else if (g === 'CX10' && q1 === 1) q0 = 1-q0;
                else if (g === 'C0X10' && q1 === 0) q0 = 1-q0;
                return q0*2 + q1;
            });
            fishAtNode = fishAtNode.map(cp => pm[cp]);
            gateHistory.push(g);
            steps = gateHistory.length;
            finishMove();
        }
        function recalculatePositions() {
            let cp = [0, 1, 3, 2];
            gateHistory.forEach(g => {
                const pm = [0, 1, 2, 3].map(p => {
                    let q0 = Math.floor(p/2), q1 = p%2;
                    if (g === 'X0') q0 = 1-q0;
                    else if (g === 'X1') q1 = 1-q1;
                    else if (g === 'CX01' && q0 === 1) q1 = 1-q1;
                    else if (g === 'C0X01' && q0 === 0) q1 = 1-q1;
                    else if (g === 'CX10' && q1 === 1) q0 = 1-q0;
                    else if (g === 'C0X10' && q1 === 0) q0 = 1-q0;
                    return q0*2 + q1;
                });
                cp = cp.map(p => pm[p]);
            });
            fishAtNode = cp;
            steps = gateHistory.length;
        }
        function finishMove() { document.getElementById('step-count').innerText = steps; updateFishUI(); renderCircuit(); checkWin(); }
        function updateFishUI() { for (let i = 0; i < 4; i++) { const f = document.getElementById(`fish-${i}`), n = document.getElementById(`node-${fishAtNode[i]}`); if (f && n) { f.style.top = (n.offsetTop + 90) + "px"; f.style.left = (n.offsetLeft + 30) + "px"; } } }
        function renderCircuit() {
            const c = document.getElementById('circuit-content'); c.innerHTML = '';
            const gateToLineMap = {
                'C0X01': 'line-00-01',
                'CX01': 'line-10-11',
                'CX10': 'line-01-11',
                'C0X10': 'line-00-10'
            };
            gateHistory.forEach((g, idx) => {
                const u = document.createElement('div');
                u.className = 'circuit-unit';
                if (selectedIndices.includes(idx)) u.classList.add('selected-gate');
                
                u.onmouseenter = () => {
                    const lineId = gateToLineMap[g];
                    if (lineId) {
                        const line = document.getElementById(lineId);
                        if (line) line.classList.add('line-highlight');
                    }
                };
                u.onmouseleave = () => {
                    const lineId = gateToLineMap[g];
                    if (lineId) {
                        const line = document.getElementById(lineId);
                        if (line) line.classList.remove('line-highlight');
                    }
                };
                u.onclick = (e) => {
                    if (isGameOver) return;
                    const lineId = gateToLineMap[g];
                    if (lineId) {
                        const line = document.getElementById(lineId);
                        if (line) line.classList.remove('line-highlight');
                    }
                    if (e.ctrlKey || e.metaKey) {
                        const sIdx = selectedIndices.indexOf(idx);
                        if (sIdx > -1) selectedIndices.splice(sIdx, 1);
                        else selectedIndices.push(idx);
                        renderCircuit();
                    } else {
                        pop.currentTime = 0; pop.play();
                        const removed = gateHistory[idx];
                        actionStack.push({ type: 'delete', index: idx, oldGates: [removed] });
                        gateHistory.splice(idx, 1);
                        selectedIndices = [];
                        recalculatePositions();
                        if (tutorialPhase === 8) tutorialPhase = 100;
                        finishMove();
                        if (isPro && !tutorialCompleted) updateTutorialUI();
                    }
                };
                const is01 = g.includes('01'), is0 = g.includes('C0'), cY = is01 ? 20 : 60, tY = is01 ? 60 : 20;
                const v = document.createElement('div'); v.className = 'connection-v-line'; v.style.left = '23.5px'; v.style.top = Math.min(cY, tY) + 'px'; v.style.height = '41px'; u.appendChild(v);
                const d = document.createElement('div'); d.className = 'control-dot'; d.style.left = '18px'; d.style.top = (cY - 7) + 'px'; if (is0) { d.style.background = 'white'; d.style.border = '2.5px solid #463438'; } u.appendChild(d);
                const t = document.createElement('div'); t.className = 'circuit-target'; t.style.left = '25px'; t.style.top = (tY + 1.2) + 'px'; u.appendChild(t);
                c.appendChild(u);
            });
            updateUndoStatus();
            const w = document.getElementById('circuit-content-wrapper');
            if (selectedIndices.length === 0) {
                setTimeout(() => w.scrollTo({ left: w.scrollWidth, behavior: 'smooth' }), 100);
            }
        }
        function undo() {
            if (isGameOver || actionStack.length === 0) return;
            pop.currentTime = 0; pop.play();
            const action = actionStack.pop();
            if (action.type === 'add') {
                gateHistory.splice(action.index, 1);
            } else if (action.type === 'delete') {
                gateHistory.splice(action.index, 0, ...action.oldGates);
            } else if (action.type === 'replace') {
                gateHistory.splice(action.index, 1, ...action.oldGates);
            }
            recalculatePositions();
            if (tutorialPhase === 3) tutorialPhase = 4;
            selectedIndices = [];
            finishMove();
            if (isPro && !tutorialCompleted) updateTutorialUI();
        }
        function resetCircuit() {
            if (isGameOver) return;
            pop.currentTime = 0; pop.play(); fishAtNode = [0, 1, 3, 2]; gateHistory = []; actionStack = []; selectedIndices = []; steps = 0; if (tutorialPhase === 5) tutorialPhase = 6; finishMove(); if (isPro && !tutorialCompleted) updateTutorialUI();
        }
        function updateUndoStatus() {
            const isActive = actionStack.length > 0 && !isGameOver;
            const ub = document.getElementById('undo-btn');
            if (ub) {
                if (isActive) {
                    ub.classList.add('active');
                    ub.classList.remove('disabled');
                    ub.style.pointerEvents = "auto";
                } else {
                    ub.classList.remove('active');
                    ub.classList.add('disabled');
                    ub.style.pointerEvents = "none";
                }
            }
            const bottomUndo = document.getElementById('undo-btn-bottom');
            if (bottomUndo) {
                if (isActive) {
                    bottomUndo.classList.add('active');
                    bottomUndo.classList.remove('disabled');
                    bottomUndo.style.pointerEvents = "auto";
                } else {
                    bottomUndo.classList.remove('active');
                    bottomUndo.classList.add('disabled');
                    bottomUndo.style.pointerEvents = "none";
                }
            }
        }        
        async function checkWin() {
            if (fishAtNode.every((pos, i) => pos === i)) {
                isGameOver = true;
                updateUndoStatus();
                if (timerInterval) clearInterval(timerInterval);
                const ft = parseInt(document.getElementById('timer').innerText);
                const st = steps;
                const u = sessionStorage.getItem('currentUser');
                const currentLvInSession = parseInt(sessionStorage.getItem('currentLevel') || "1");
                if (currentLvInSession <= 2) {
                    sessionStorage.setItem('currentLevel', 3);
                }
                setTimeout(() => {
                    if(typeof meow !== 'undefined') { meow.currentTime = 0; meow.play(); }
                    document.getElementById('victoryMsg').innerText = `STEP：${st} | TIME：${ft}s`;
                    document.getElementById('victoryModal').style.display = 'flex';
                }, 800);
                if (u) {
                    const payload = {
                        action: 'saveRecord',
                        username: u,
                        level: 2,
                        steps: st,
                        time: ft,
                        circuit: gateHistory.join(',')
                    };
                    fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        cache: 'no-cache',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    }).catch(e => console.error("Database Error:", e));
                }
            }
        }
        function swapOnly(nA, nB, gT) { if (isGameOver) return; applyGate(gT); }
    </script>
